body:
  text: 卷七藤部二十五種附一種雞血藤膠産猛緬去雲南昆明計程一月有餘乃藤汁也土人取其汁如割漆然濾之殷紅似雞血作膠最良近日雲南省亦産其藤長亙蔓地上或山崖一莖長數十里土人得之以刀斫斷則汁出如血每得一莖可得汁數升彼處有店市之價亦不貴乾者極似山羊血取藥少許投入滾湯中有一線如雞血走散者真雲南志順寧府出雞血藤熬膏可治血症滇遊雜記雲南順寧府阿度里地方有一山綿亙數十里産藤甚異粗類槔梁細似蘆葦中空如竹剖斷流汁色赤若血故土人名之為雞血藤每歲端陽日攜帶釜甑入山斫取熬煉成膏泡酒飲之大補氣血與老人婦女更為得益或不飲酒者早晚用開水化服亦能奏效按順寧刊售藥單云順寧府順寧縣阿度吾山産此又云阿度吾里萬名山寺龍潭箐所産載於郡志有二種其一種起鼓丁刺者尤佳或盤屈於地或附樹而生伐之中通細竅汁凝如脂煮之有香者真或云兩種糯者為雌放者為雄應昌附注壯筋骨已痠痛和酒服於老人最宜治老人氣血虛弱手足麻木癱瘓等症男子虛損不能生育及遺精白濁男婦胃寒痛婦女經血不調赤白帶下婦女乾血勞及子宮虛冷不受胎陸象咸云曾見婦人合藥服之多年不育者後皆有子滇志雞血藤膠治風痛濕痹性活血舒筋患在上部飽食後服在下部空心酒服不飲酒者滾水調服其色帶微緑有清香氣酒服亦能興陽尤明府佩蓮云此膠治跌打如神其太夫人一日偶閃跌傷臂痛不可忍用山羊血參三七治之多不驗有客教服此膠沖酒一服其疾如失其性捷走血分可知順寧土人加藥料煎熬雞血膏其煎膏之時忌有孕婦看見決熬不成亦神物也統治百病能生血和血補血破血又能通七孔走五臟宣筋絡治婦人經水不調四物湯加減八珍湯加元胡索為引婦女勞傷氣血筋骨痠痛轉筋牛膝杜仲沉香桂枝佛手乾木瓜穿山甲五加皮砂仁茴香為引大腸下血椿根皮煎湯送下男子虛弱八味加減為引服此膠忌食酸冷五杭龔太守官滇帶有雞血藤回里豫親見之其藤皮細潔作淡黃色切開中心起六角稜如菊花樣色紅四圍仍白色干之其紅處輒突出二三分許竟成紅菊花一朵亦奇物也聞其藤最活血暖腰膝已風瘓戊申長兒景炎在四川敘州府與滇之昭通接界因囑其往覓此藤所寄來者外形不殊而中心惟作小紅點干之也不突起據來書云實金沙江土司山中所得然與龔太守所帶來者絶不相類豈此藤也有二種耶附記於此以俟考辛亥豫在臨安患臂痛胡春熙明府長君名什曾宦滇南歸里蒙贈雞血藤膠皆方塊每塊一二兩不等外塗以蜃灰作白色剖視其內皆黑色如膏藥膠狀云風癱痹痛有效其外灰見水即脫去據言其藤産騰越州銅壁關外新街所屬地遍山谷皆是新街守辨每歲輒命卡兵斫取熬膏除饋遺各上司及僚友外餘剩者轉市客商販入中土借沾微利以為守資渠所有即售自彼處也外必以蜃灰飾之庶久藏不壞因帶歸以示兒子景炎則又全非其所見景炎曾館昭通大關司馬白公家見其所藏雞血藤膠猩紅成塊儼如赤玉光潤可愛今胡公所贈內作黑色或系年久色黯抑系新街所産與大關有別惜不能親歷其地為之細核附筆於此以俟後之君子考訂焉乜金藤性溫無毒治中風痰迷半身不遂左癱右瘓不省人事痰涎上壅攻心作咽用一錢白湯磨下小兒急慢驚風大者五分小者一二分白湯磨下立效如神鹿角藤一名白毛刺汪連仕方云木本藤也刺長傷人皮肉立腫痛不休又名不薪木山人不斫性大熱氣臭打痞積治風氣如神皆用根搗共香糟罨之葉蒸酒服能鑽筋透骨子食之大能醉人買麻藤職方典出肇慶緣樹而生有子味苦可食山行斷取其汁飲之可以止渴粵志買麻藤其莖多水渴者斷而飲之滿腹已余水尚淋漓半日性柔易治以制履堅韌如麻故名言買藤得麻也治蛇咬鮮者乾者俱效紅木香紅皮藤一名廣福藤又名紫金皮立夏後生苗枝莖蔓延葉類桂略尖而軟葉蒂紅色咀之微香有滑延根入土入藥用須以水洗淨去外粗皮取內皮色紅者用之入口氣味辛香而涼沁如龍腦治風氣痛傷力跌撲損傷胃氣疼痛食積痧脹等症俱酒煎服紫金錠中必不可少雷頭風腫痛貼痛法紫金皮獨活赤芍白芷菖蒲蔥頭煎濃如膏調敷藥到立止如神汪連仕云金谷香今人呼緊骨香即紅木香一名木臘正名紫金皮土産者功淺入膏用行血散氣紅皮藤朱烺齊任城日鈔錢塘門外道姑橋下有紅皮藤凡患半肢風及大麻風者取藤四兩浸無灰酒一大壺入鍋內隔湯煮三炷香取起飲酒量好者以醉為度每酒一碗入藥酒三四匙陸續飲至藥酒完則風氣自愈其風從指甲縫中出對指尖以竹紙鋪几上驗之紙能吹動即是指尖風出也雷公藤生陰山腳下立夏時發苗獨莖蔓生莖穿葉心莖上又發葉葉下圓上尖如犁耙又類三角風枝梗有刺物理小識犁頭刺藤其葉三角如犁頭多在籬邊生可治瘰癧亦可截瘧一名霹靂木方勝板倒金鉤烙鐵草倒掛紫金鉤河白草犁尖草括耙草龍仙草魚尾花三木棉出江西者力大土人採之毒魚凡蚌螺之屬亦死其性最烈以其草烟燻蠶子則不生養蠶家忌之山人採熏壁蝨治臌脹水腫痞積黃白疸瘧疾久不愈魚口便毒癧𤶱跌打除壁蝨莖燒床下一切毒蛇傷萬病回春云凡被蛇傷用板扛歸不拘多少此草四五月生至九月見霜即罕有葉尖青如犁頭尖樣藤有小刺子圓如珠生青熟黑味酸用葉搗汁酒調隨量服之渣罨傷處立愈白火丹救生苦海用雷公藤五錢平地木三錢車前四錢天青地白葉三白草各三錢煎服又洗方雷公藤河白草煎浴水腫脹救生苦海平地木三錢雷公藤五錢車前草四錢天青地白草三錢路路通五個打碎煎服重者十服愈坐板瘡秋泉家祕烏賊骨五錢雷公藤三錢共為細末擦之干則以菜油調敷汪連仕方蒸龍草即震龍根山人呼為雷公藤蒸酒服治風氣合巴山虎為龍虎丹入水藥魚人多服即昏治翻胃噎膈瘧疾吐血便血喉痹食積心疼虛飽腹脹陰囊腫大跌打閃肭發背疔瘡乳癰産後遍身浮腫王安採藥方藤黃綱目主治條下只言點蛀牙自落無他治也張石頑云藤黃性毒而能攻毒故治牙蟲蛀齒點之即落毒能損骨傷腎可知葉氏得宜本草云服藤黃藥忌吃烟按三黃寶臘丸黎峒丸俱用藤黃以其善解毒也有中藤黃毒者食海蜇即解百草鏡藤黃出外洋及粵中乃藤脂也以形似筆管者良大塊者名牛屎藤黃不佳入藥取色嫩純明者用水蒸化濾去渣盛瓷器內隔水煮之水少時再添煮乾以三炷香為度以帛扎瓷器口埋土中七日取出如此七次曬乾用粵志廣中産黃藤熬汁即藤黃也性最寒以青魚膽和之治眼疾間有白者葉如土茯苓身小而長外有籜包以莖浸水洗目並無腫痛性酸澀有毒治癰疽止血化毒斂金瘡亦能殺蟲治刀斧木石傷及湯火傷竹木刺入肉一切諸傷神效膏用真麻油一斤藤黃八兩白臘八兩先將油入銅鍋次將藤黃捶碎熬透以麻布濾去渣加入白臘至滴水成珠為度貯瓷罐其膏夏老冬嫩為宜敷之即能止疼止血收口取效如神金不換治跌打刀傷蘇州周慎庵傳藤黃一兩研細末麻油四兩白臘五錢黃臘一兩將二臘入麻油內銅杓熬化取起放地上一人徐徐下藤黃末一人不住手攪勻以盡為度即成膏敷於患處用油紙攤貼綢帕縛好一二日即愈治一切無名腫毒風氣膏王站柱不藥良方藤黃四兩白臘八兩小磨香油十二兩先將油煎熟將成珠入水不散再加黃白攪勻瓷瓶收面上乃以麻油養之臨用攤貼祝氏效方一筆消用大黃二兩藤黃一兩明礬蟾酥各五錢麝香乳香沒藥各二錢用蝸牛搗爛作錠遇小癤毒未出癤頭以此醋磨新筆蘸藥圈外愈圈愈小圈毒消盡而止又一筆消方治一切癰腫雄黃膽礬硼砂藤黃銅緑皮硝草烏各一兩麝香二錢為細末和蟾酥為條如筆管大金箔為衣用時以醋磨濃新筆蘸藥塗毒四圍數次即愈消毒散治癰疽癤毒及初生多骨疽良方匯選大黃一兩芙蓉葉曬乾為末五倍子各一兩麝香冰片各三分藤黃三錢生礬三錢共為末米醋調成如厚糊塗於多骨疽之四周中留一頭如豆大以醋用鵝翎不時掃之若不掃任圍則無益一日夜即內消其餘癰癤亦以此敷之神效又方雄黃二兩麝香三錢藤黃一兩人中白五錢硃砂白芨生白蘞各二錢蟾酥一兩共研末用廣膠三錢煬化和藥末為錠遇毒將此藥磨醋水塗之消毒方治一切無名腫毒及對口發背救生苦海用滴花燒酒磨藤黃敷之不住手敷之不至半日即消無回丹治一切疔癰腦疽衆妙方用鹼藤黃雄黃大黃各一兩蟾酥麝香各二錢血竭甲片炒各五錢醋磨塗立效移毒方救生苦海云如毒生在肢節穴道險要處不成漏症即為廢人須用此藥只塗半圈即移過一邊用白芨白蘞三七五倍子大皂角山茨菰藤黃各等分俱銼薄片除藤黃余皆入砂鍋內水浸一日煎汁傾出入水再煎如此數次濾淨熬膏以藤黃將水蒸煬加入攪勻再熬入碗曬乾用時以雞蛋清磨出濃汁新筆蘸塗又方藤黃銀珠等分醋和敷趕毒至他處出膿如用榖樹汁調可搽癬一二次即消大提藥方圍毒初起凡對口發背惡疽四五日即消良方匯選雄黃藤黃麝香各一錢硃砂三分萆麻肉三錢紅升丹一錢五分先將萆麻研如泥後和各藥研爛用象牙匣封藏外以虎皮包之方不泄氣種福堂提藥方治諸毒不起敷之立起藤黃雄黃各三錢蟾酥紅藥各二錢冰片麝香各一錢萆麻肉一兩先將萆麻肉去皮打如魚凍水入諸藥打成膏瓷罐收貯勿令泄氣或云宜紅藥三錢冰片蟾酥勿用止加麝香三分辰砂一錢又黃提藥方鬱金雄黃藤黃各二錢牛黃蟾酥硇砂冰麝各五分巴豆肉八錢萆麻肉一兩共搗爛瓷瓶貯遇症放膏藥上少許貼之治一切惡毒未成可消已成用之化腐疔毒更妙諸毒圍藥祝氏效方南星炒四兩五倍子炒黑白芨炒各二兩藤黃薑黃炒各一兩共為細末醋調塗重者加牛黃一錢鹿茸五錢又種福堂方無膿即消有膿即潰五倍子一兩白芷六錢藤黃百草霜各三錢生半夏生南星白芨陳小粉飛面各四錢共為末紅醋調敷箍毒活人方五倍子略焙一兩藤黃四兩銅青少許小粉炒八兩作錠用時醋磨塗一切無名腫毒藤黃五錢五倍子二兩白蜜蔥頭各一兩用米醋調圍患處留頂勿敷五色蟾酥墨能立消腫毒雄黃銀硃膽礬韶粉藤黃銅緑硼砂各一兩麝香一錢共為末蟾酥為條如筆管大水磨塗疔瘡吳興楊氏便易良方銀硃蜒蝣白甘菊人中白苧根內白心雄黃藤黃大黃共搗敷上即退坐板瘡仙遺拾珠藤黃搗碎用雄豬網油青布一長條將藤黃摻在網油之上青布捲成條子線扎緊浸菜油內一夜火燃取滴下油杯積埋土中一夜出火毒塗瘡即效五黃散治一切頑癬雞腳大黃硫黃雄黃薑黃藤黃各等分為細末菜油調塗患處七日勿洗浴痊愈金氏離洞膏治臁瘡如神萬應油五兩藤黃一兩五錢淨黃臘二兩共熬黑棕色攤貼熬萬應油法香油六十兩以十六兩官稱作準淨桃枝一兩柳枝一兩槐枝一兩桑枝一兩蔥一兩男發四兩花椒五錢萆麻二兩馬前四兩蓽茇五錢桂枝一兩白芷二兩夏浸三日冬七日春秋五日然後熬至渣枯去渣每斤生油熬熟汁得八折此油凡一切膏藥可作地子金鎖銀開百草鏡云俗名鐵邊箕處處山野有之葉似天門冬葉又似土茯苓葉但差狹小耳藤生或緣石砌樹上竹林內亦有之非海金沙也其根黑色兩旁有細刺如邊箕樣故名入藥用根敏按今俗所用治一切喉症金鎖銀開乃天蕎麥之根形如纍丸黏結成塊産山上者皮黃汙泥中者皮黑與百草鏡所言各別或名同而物異耶李氏草祕天蕎麥亦名金鎖銀開形若蕎麥治乳癰風毒入諸散毒藥內取根二分生薑一分水煎服愈治敗血久病不痊又洗痔血皆佳李氏草祕又云小青草藤上蔓有倒摘刺細如稻芒開粉紅花生蘭子葉似蕎麥又名野蕎麥煎洗痔漏之聖藥治白濁用根搗汁沖酒服喉中風火孫玉庭云其根專治喉閉故得此名喉風喉毒用醋磨嗽喉涎痰去而喉閉自開矣痰核瘰癧不拘何等癧𤶱結核初起者梁湖陳府祕方用金鎖銀開須鮮者將來搗汁沖酒服其莖葉用白水煮爛和米粉作餅餌食之不過二三服立消若破爛者以梁上烏龍尾揉去粗屑納瘡中外貼膏藥亦服根汁吃餅餌五六次自結痂而愈洗痔漏治蛇傷木蛇毒搗汁和酒服草祕汪連仕採藥書金須鈄俗呼金鎖銀開其苗柔而堅性不斷今名象毛力能軟堅化痞合米醋搗汁盥口能開鎖纏喉風雖枯根亦可透鎖喉乳藤粵志乳藤蔓如懸鉤倒掛葉尖而長斷之有白汁如乳婦人産後以藤搗汁和米作粥食之乳湩自通初生嫩條可食其大實曰冬榮子大如柚子中有瓤瓣瓣相疊白如豬脂炙食皆甘美身懷數日香不減秋末冬初間採以相餉矜為服食之珍行血通乳粵志李氏草祕乳汁藤生山麓林中高二三尺葉似蒲萄子藍色一叢根皮掐之出汁如乳為諸毒癰瘡中之聖藥排膿散毒生肌止痛消腫益血痛不可忍者罨之即止已成未成已潰未潰始終皆不可少李氏草祕汪連仕草藥方乳門草即乳汁草又名土奶奶性寒涼行乳汁通氣而能入血分根止痢疾細藤者即遍地金又名雞盲草合雞肝蒸服專治小兒一切疳眼蝙蝠藤此藤附生巖壁喬木及人牆茨側葉類蒲萄而小多歧徑厚青滑絶似蝙蝠形故名治腰痛瘰癧腰疼淡寮試效方用蝙蝠藤二兩老人用三兩酒煎服二劑即痛止不可再服若多服一劑腰反傾倒不支皆治藤蔓延牆壁間長丈餘葉似泥藤中暑者以根葉作粉食之虛損者雜豬胃煮服無根草採藥録此草無根無葉生在柴草上纏結而生名無根金絲草色有紫有黃百草鏡無根金絲草一名大焰草即菟絲苗也生毛豆莖上者佳此草與女蘿相似以色黃如金而細如線者真若色紅紫粗類燈心者名女蘿又紫背浮萍亦名無根草與此別藥鑑無根金絲草莖細而赤無葉無根惟有青色細纍附於莖際蔓延極長多纏草木上其性涼味微甘利水治濕熱三四月採李氏草祕纏豆藤一名豆馬黃無葉有花子即菟絲子最治血解豆瘡毒難産酒煎服藥性考金絲草無根葉用苗此藥功在涼血散血故治癰疽腫毒諸症味苦性寒吐衄崩便咳咯諸血服之能止解諸藥毒瘴癘疔癰惡瘡臺志利水通淋葛祖方治狐臭騷氣闢汗愈虐百草鏡治癃淋濁痢帶下黃疸豫解痘毒敷紅絲療消毒保嬰丹王之才醫便凡小兒未出痘瘡者每過春分秋分日服一丸其痘毒即漸消化若只服一二次者出痘稀少若服三年六次者永不出痘此方屢驗萬勿輕視纏豆藤一兩五錢其藤八月收取毛豆莢上纏繞細紅絲採取陰乾以此為君妙在此藥上黑豆三十粒赤豆七十粒山楂肉一兩新升麻七錢五分生地黃荊芥防風川獨活甘草當歸各五錢連翹七錢五分黃連赤芍藥桔梗各五錢牛蒡子一兩硃砂另研甘草同煮過去甘草一兩五錢苦絲瓜兩個各長五寸隔年經霜者妙燒灰存性上藥為極細末砂糖拌勻共搗千餘下丸如李核大每服一丸濃煎甘草湯化下其前項藥豫辦精料遇春分秋分或正月十五日或七月十五日修合務在虔誠忌婦人雞犬貓孝服見之合藥須淨室焚香向太陽祝藥云神仙真藥體合自然嬰兒吞服天地齊年吾奉太上老君急急如律令敕一氣七遍慈惠小編治小便不通諸藥無效金絲草一握同韭菜根頭煎湯洗小肚即通金絲草多附黃豆莽上無根無葉細絲如棕色近水灘諸樹上皆有之麥裹藤各麥地皆有臨安縣鄉間尤多四月採之莖纏麥上葉類神仙對坐草而略尖微有毛葉對節生莖細節微紫葉小者佳葉大者無力跌撲張氏傳方以乾者一錢酒煎服白毛藤亦名天燈籠又名和尚頭草白毛藤生人家牆壁上莖葉皆有白毛八九月開花藕合色結子生青熟紅鳥雀喜食之百草鏡白毛藤多生人家園圃中牆壁上春生冬槁結子小如豆而軟紅如珊瑚霜後葉枯惟赤子纍纍綴懸牆壁上俗呼毛藤果採其藤干之浸酒云可除骨節風濕痛止血淋瘧疝氣汁滴耳中止膿不幹入藥內保腫毒不大治癧𤶱用煮牛肉精者食之清濕熱治黃膽水腫小兒蛔結腹痛採藥志云性熱活血追風生血治鬼箭有效風痛楊氏驗方桑黃二兩白毛藤二兩切碎用紹興原壇酒六斤煎三炷香每日服一飯碗黃膽初起百草鏡白毛藤神仙對坐草大茵陳三白草車前草各等分白酒煎服大氣脬不藥良方用白毛藤無灰酒服天球草一名盒子草俗呼盒兒藤好生水岸道旁苗高三四尺葉如波斯花有小絨五月結實為球球內生黑子二片生時青老則黑每片渾如龜背又名龜兒草丹術家取其汁伏硫汞根伏雌雄百草鏡鴛鴦木鱉一名水荔枝盒兒藤葉長尖有鋸齒生水涯蔓生秋時結實狀如荔枝色青有刺殼上中有斷紋兩截相合藏子二粒色黑如木鱉而小孫氏丹方盒子草子及葉有小毒蔓生岸旁葉尖花白子中有二片如盒子綱目附子榼藤後花實根形俱不甚詳性有小毒主蠱毒及蛇咬搗敷瘡上即愈疳積初起百草鏡云鴛鴦木鱉三錢煎服愈敏按此草似豫知子近時人罕用而吳氏遵程著從新以豫知子為近日所無直不知即天球草也世不用而草醫又易以他名松蘿山川志出武當山生高峰古木上長者丈餘治蛇虎傷湯火烙傷及頑瘡等症藥性考松蘿甘平能平肝氣瞋怒痰熱溫瘧吐痢頭風頭瘡癭瘤結聚亦能探吐膈痰去熱松上寄生利水導痰除胸中熱楓上寄生汪連仕云吊殺猢猻一名上樹猢猻又名鐵角猻兒乃楓樹上風木藤至年遠結成連珠傀儡能追風不換時刻酒蒸服加金雀根土當歸石床花根石蠶治癱瘓勾急之要藥蛇莆藤職方典産福寧莖細葉如猴耳治喉齒百病李頭藤職方典産福寧其藤腐朽者可代香用止嘔血活經絡龍鬚藤粵東小録藤産東莞微細如髮直起數丈無一節常飛越數樹如千百遊絲牽綴紅者名紅龍鬚紫者名紫龍鬚有五色然生無根蒂以穢物投之即消釋不知所去土人以其液和細土石灰塗釁糖釜其堅如鐵雖猛火不裂其花與子皆入藥浸酒服補筋骨祛風解毒能循脈絡無微不到藥性考五色龍鬚藤細如髮生無根蒂掛樹長髮臭藤根草寶云此草二月發苗蔓延地上不在樹間系草藤也葉對生與臭梧桐葉相似六七月開花粉紅色絶類牽牛花但口不甚放開搓其葉嗅之有臭氣未知正名何物人因其臭故名為臭藤其根入藥本年者細小二三年者大如萊蔔可用李氏草祕云臭藤一名卻節對葉延蔓極臭煎洗腿足諸風寒濕痛拘攣不能轉舒如神汪氏藥録臭蒲萄蔓延而生子如蒲萄而臭治風又云野蒲萄氣重味臭功能敗腸胃之癰治瘰癧用根煎酒數服自愈未破者消已潰者斂治風痛腸癰跌打損傷流注風火𤶱毒散鬱氣洗疝合紫蘇煎湯汪連仕方黃練芽今呼黃連芽一名黃槤頭春初採嫩芽小兒生食之取其清香可口味帶苦澀如黃連故名亦可以鹽湯焯食漉出曝乾為鹽菜暑月食之百草鏡此物藤生引蔓大樹上葉如桑寄生尖長柔滑頗光潤肥厚二三月枯枝生芽淡紅色如椿芽生食苦中帶甘入口生津安徽人家多醃以為菜與芹芽椿芽蘆芽並重藥性考云葉似槐而尖嫩時揉干代茶勝茗木甚細膩苦中帶甘味如橄欖鹽食酸甜解喉痛咽哽消熱醒酒舌爛口糜嚼汁可解味苦澀性寒解暑止渴利便食物宜忌生津明目清積熱解毒藥檢敏按方以智物理小識黃楝頭一名回味俗呼黃連頭樹分葉如椿大者合抱春採其葉味苦而甘皮可合香入藥治痢及霍亂綱目遺此未收如方氏所云則木也與百草鏡所云互異或地土有不同耶抑其物本有二種耶並存俟考木龍藤周益生家寶方藤出錢塘橫山喜沿人家牆壁及石崖上土人多識之治肺癰吐癰腸癰脅癰四症搗汁老酒沖服冬月以酒摏取汁二碗服立效蔞油按蔞即扶留藤蔞即蒟也嶺南人取其葉合檳榔食今人名櫓葉用其葉封固曬半載收貯待用可留數十年非獨疏積滯消瘴癘治病亦夥惟西洋人有之治手足紅腫或疼以蔞葉油揉擦用布包裹滴耳治耳痛刀傷朿傷以棉花浸蔞油貼裹傷處又治背癰及癤毒貼之初起者即解散已成即速潰膿亦可敷貼楊梅毒瘡漏痔以上俱泰西應振鐸本草補花部二十一種附十二種梅花梅梗綱目載梅花無治方止言點湯煮粥助雅緻而已食物宜忌云梅花味酸澀性平並無主治殆亦不知梅花之用入藥最廣而功效亦最大百草鏡梅花冬蕊春開其花不畏霜雪花後發葉得先天氣最足故能解先天胎毒有紅白緑萼千葉單葉之分惟單葉緑萼入藥尤良採能不犯人手更佳含苞者力勝性寒或曰平味酸澀清香開胃散郁煮粥食助清陽之氣上升蒸露點茶止渴生津解暑滌煩談撰卉木皆感春氣而生獨梅開以冬蓋東方動以風風生木故曲直作酸則酸者木之性惟梅之味最酸乃得氣之正北方水為之母以生之則易感故梅先衆木而華癸辛雜識梅花無仰開者蓋亦自能巧避風雪耳驗之信然粵志惟嶺南梅花最早冬至雷動地中則梅開地上蓋其時火之氣不足於地而發其最初之精華故梅開水之氣上足於天而施其最初之滋潤故雪落雪泄也從肅殺之中泄其一陽之精以為來春之生生者也雪深則水氣足梅早則火氣足火氣足而為天地陽生之始陰殺之終使萬物皆復其元梅之德所以為大天地一陽之復不可見見之於梅又其得氣之先也韶州梅長至已花臘月復開尤盛有於舊蒂而作新花者其地屬嶺北故梅以臘以正月開氣盛則開而又開瓊州梅有六出者豫謂梅五出者也五陽數也冬至一陽始復梅吐花得陽之先者今六出乃得陰數矣蓋以地氣而變苦於嚴寒故不用五而用六同於雪花也以梅為體以雪花為用人見其六而不見其五藏五在於六之中猶河圖之五在十中也河圖之一生水梅得水氣之先故花於冬至與雪同時雪者水氣所凝梅者水形所結卦皆屬坎水在天而凝雪水在地而發梅水之數六寒極則雪花與梅皆六出應其數也花微酸澀無毒清頭目利肺氣去痰壅滯上熱本草原始安神定魂解先天痘毒凡中一切毒治瘰癧雞蛋開一孔入緑萼梅花將開者七朵封口飯上蒸熟去梅花食蛋每日一枚七日痊愈唇上生瘡赤水玄珠白梅瓣貼之神效如開裂出血者即止紫金錠宜端午日製合飛硃砂紅芽大戟處州山慈菰千金霜川文蛤淨粉草河車以上六味各二兩珍珠琥珀明雄黃冰片陳金墨各五錢梅花蕊西牛黃各一兩川麝香四錢上各藥為末乳篩極細以糯米粉糊杵為丸研用稀痘神方白梅花蕊三錢採飽綻者須豫備曬乾生地黃三錢當歸三錢生甘草一錢臍帶小兒自己落下時去灰或礬用新瓦炙存性研末極細同煎濃汁濾清熬膏作一日吃完小兒永不出痘萬病回春載尹蓬頭混元丹治小兒諸虛百損用梅花合混元衣注梅花解痘先天之毒九仙奪命丹集聽云又名十聖丹治七十二般無名腫毒惡瘡流注火痹等症硃砂三錢雄黃乳香沒藥冰片血竭各二錢石膽礬銅青麝香枯礬熊膽飛過黃丹各一錢五分蜈蚣蚯蚓殭蠶各二條微炒黃色去嘴梅花一升寒水石牛黃蟾酥白官粉硼砂各一錢全蠍九個蝸牛七條以上二十三味為末研極細以硃砂一錢五分為衣其修合之法先將蟾酥用乳汁化開共為丸如丸不起略加麵糊如桐子大每服一丸令病人口嚼生蔥一根咽下又嚼一根極爛吐在手心上裹藥用滾熱老酒吞下量冷暖時候蓋被出汗如病人不能嚼人代嚼之亦可如無汗再服一丸自愈諸毒醫遲毒走攻心必不可救若汗來遲以熱酒催之不可以手摸摩患處如癢以舊木梳梳之自止稀痘集聽用緑萼梅花七朵須豫養於花瓶內春分日摘花半開者只用淨瓣搗爛白糖三匙滾水服之毒即全消免出痘矣小兒滿月後即可服梅花點舌丹集驗治一切疔毒及惡瘡初起天行瘟毒咽喉腫痛等症輕者二粒重者四粒先用無根水送下次取一粒噙於舌下化之乳香去油二兩珍珠豆腐煮過麝香水飛熊膽各六分沒藥去油京牛黃苦葶藶硃砂硼砂蟾酥人乳泡血竭雄黃水飛各二錢片腦一錢另研沉香一錢白梅花陰乾一錢二分共為細末用人乳汁化蟾酥丸黍米大金箔為衣豫稀痘疹不藥良方每年臘月清晨摘帶露緑萼梅蕊一百加上白糖搗成小餅令食之三花丹赤水玄珠將出痘之時用此能稀痘梅花桃花梨花取已開未開盛開者陰乾為末等分兔腦為丸雄黃為衣用赤小豆緑豆黑大豆湯送下梅桃丹赤水玄珠治痘已出未出不起不發隱在皮膚並治麻症斑症用梅花一兩桃仁辰砂甘草各二錢絲瓜五錢為末每服五分參蘇湯下痘不問前後凡黑陷咬牙寒戰用梅花六錢穿山甲一兩仙靈脾五分麝香一錢為末每服三五分咬牙寒戰加人牙二三釐內托散送下青梅散錫山衣德堂稀痘良方用生青果核七個打碎去仁曬乾研極細末不宜火焙又不宜沾生水再用玉蝶梅花二十一朵去蒂共白蜜兩茶匙搗濃恰交春分時與小兒服永不出痘即出亦不過三粒此方傳自江寧王培德家已九世無痘殤之兒真異方也二氣丸新安汪衛公先生傳其家親友凡小兒服此丸永不出痘其方即前稀痘神方臍帶曰坎氣梅花先天之氣故名二氣丸七仙丹張琰種痘新書治痘氣血兩虛灰白水泡癢塌等症黃耆二兩人參一兩甘草五錢紫河車一兩梅花一兩五錢鹿茸一兩天靈蓋一個共為末每服八九分用內托散煎湯送下氣實者加山楂陳皮各五錢應昌按天靈蓋即或有益亦不可用況二方功效全不在此乎二花散種痘新書云能起五陷黃蠟梅花素心者尤良陰乾不拘多少去毛殼罐盛聽用桃花陰乾山楂去核炒為末小絲瓜陰乾為末陳皮去白人參黃耆炙甘草炙硃砂紫河車酒洗去筋蒸焙乾鹿茸酒酥炙穿山甲取首尾四足者炒仙靈脾去四弦刺酒焙人牙火煅韭汁淬七次天靈蓋洗淨去酥各為末用按綱目梅花條下並無主治而於蠟梅花下亦僅言解暑生津而已不知蠟梅亦並非梅種其主治亦廣不僅治痘也龍腦骨種痘新書云治痘出未透心狂見鬼陷伏等症用梅花不拘多少曬乾為末加冰片少許共研為末以豬心血和勻為丸狂譫者燈心湯引紫陷者以紫草煎湯調之加酒數茶匙化下絶痘楊春涯驗方用南方緑萼梅蕊未放採藏風乾逢四時八節節前一日用雞蛋一個打孔入蕊紙糊好飯上蒸熟吃數次永不出痘即出亦不過數粒解痘毒劉氏得效方立春前後三日採紅梅蕊半含半開者一鍾去蒂仍安鍾內瓷碟蓋住一周時足氣汁升上用新擂盆未經五辛者搗研如泥捏成餅樣加明硃砂水飛一錢勻摻於上緩緩研勻再加白蜜少許丸如彈子曬半乾金箔為衣遇四絶日每服一丸甘草湯下忌鐵器葷腥服過一丸後當日晚間微微發熱次日遍身發出細瘰是其驗也種福堂方梅花丸治痘疹有起死回生之功又換痘丹中梅蕊犀角麻黃膏並用朱禹功仙傳稀痘方赤豆黑豆緑豆各一兩研末入新竹筒中削皮留節鑿孔入藥杉木塞緊用蠟封固臘月浸廁中一月取出風乾每藥配梅花片三錢每服一錢以經霜絲瓜藤筋煎湯下神效千里梅花丸途中備用醫學指南用枇杷葉乾葛末百藥煎烏梅肉臘梅花甘草各等分為末用臘化開投蜜每臘一兩加白蜜二錢和藥末搗二三百下丸如雞頭實大夏月長途含化一丸津液頓生寒香滿腹妙不可言梅梗諸梅樹皆可用以緑萼者佳凡梅有氣條青翠色此條無葉止光梗出枝罅薛徵君生白曾言用以通上下隔氣有效此氣條而非梗也用梗以帶葉成枝者入藥綱目梅部載梅實及核仁根葉獨不及梗保産神效方道德集云凡婦人三月久慣小産百藥不效者以梅梗三五條煎濃湯飲之復飲龍眼湯無有不保者雪荷花雪芝雪裡花産伊犁西北及金川等處大寒之地積雪春夏不散雪中有草類荷花獨莖亭亭雪間可愛戊戌春豫於史太守處親見之較荷花略細其瓣薄而狹長可三四寸絶似筆頭云浸酒則色微紅彼處土人服之為助陽要藥憶舊遊詩話雪連花千年不化元雪深處有之形似蓮花高可丈許取以釀酒倍增春色蓋陰極而陽生之意耳亦産巴里坤等處西北域記雪蓮産積雪中一莖並蒂浸酒色碧性熱人稱其功同仙茅枸杞而不知其禍乃同砒鴆也蝦蟆比蓮尤甚豫甥屠澗南自哈密回帶有雪荷花因訪其功效據言其地有天山冬夏積雪雪中有蓮以産天山峰頂者為第一然不可得山腰次之其生也有雌雄土人採干之成對以市性大熱能補陰益陽老人陽絶者浸酒服能令八十者皆有子性大熱治一切寒症此物産於極冷之地乃陰極陽生故也朱排山柑園小識雪蓮生西藏藏中積雪不消暮春初夏生於雪中狀如雞冠花葉逼肖花高尺許雌雄相併而生雌者花圓雄者花尖色深紅性大熱能除冷疾助陽道豪家爭致之以治房中之藥灤陽銷夏録塞外有雪蓮生崇山積雪中狀如今之洋菊名以蓮耳其生必雙雄者差大雌者小然不並生亦不同根相去必一兩丈見其一再覓其一無不得者蓋如菟絲茯苓一氣所化氣相屬也凡望見此花默往採之則獲如指以相告則縮入雪中杳無痕跡即劚雪求之亦不獲草木有知理不可解土人曰山神惜之其或然歟此生寒極之地而性熱二氣有偏勝無偏絶積陰外凝而純陽內結坎卦以一陽陷二陰之中剝復二卦以一陽居五陰之上下是其象也然浸酒為補劑多血熱妄行或用合媚藥其禍尤烈蓋天地陰陽均調萬物乃生人身之陰陽均調百脈乃合故素問曰亢則害承乃制自丹溪立陽常有餘陰常不足之說醫家失其本旨往往以苦寒伐生氣張介賓輩矯枉過直遂偏於補陽而參耆桂附流弊亦至於殺人是未知易道扶陽而干之上九亦戒以亢陽有悔也嗜欲日盛羸弱者多溫補之劑易見小效堅信者遂衆故余謂偏伐陽者韓非刑名之學偏補陽者商鞅富強之術初用皆有功積重不返其損傷根本則一也雪蓮之功不補患亦此理矣治痘不起發及悶瘄悶痘止用一瓣入煎藥中立效屢試皆驗陳海曙云雪芝南中紀聞衡嶽間有之乃冰霰所結歲久蒸積而成産陰崖絶壁間晶瑩如玉懸掛峻阪非攀蘿捫級不可擷取療肺疾降火清心雪裡花朱楚良在鎮海土人有采雪裡花者冬月嚴寒此花始生在招寶山龍潭旁環渚而發苗甚短小如六月雪狀高不過二寸許每雪時開白花如豆大土人採得干之入藥敷痔漏以雪裡花為末濕者乾摻乾者麻油調搽一二度其痔即消縮與卷四草部雪裡開附雪裡花內容雷同水仙花子能去風澤肌膚潤毛髮治五心煩熱嘈雜不寧同荷葉芍藥為末服催生蘭粵志一名報喜蘭風蘭之族並非蘭風也花如臘梅而色紅紫香味亦同每莖作七八枝懸樹間勿侵地氣遇有吉事則開寤生者以花懸戶上即生關涵嶺南隨筆報喜遇吉事始開種法以空為根以露為命與風蘭同主催生珠蘭藥性考珍珠蘭味辛窨茶香郁其根有毒可磨敷癰癤今名雞爪蘭花經云真珠蘭一名魚子蘭枝葉似茉莉花髮長條細蕊與建蘭同時香亦相似而濃郁過之好清者取其蕊焙茶尤妙但性毒止可取其香氣故不入藥張篁壬云中條山有老道士教人治狐魅有一女子為雄狐所祟教以用珠蘭根搗爛置床頭俟狐來交時塗其莖物上狐大嗥竄去次日野外得一死狐道士云此根狐肉沾之即死性能毒狐尤捷效也建蘭花葉根草蘭建蘭有長葉短葉闊葉諸種其花備五色黑色者名墨蘭不易得干之可治瞽目能生瞳神治青盲最效紅花者名紅蘭氣臭濁不入藥黃花者名蜜蘭可以止瀉青色者惟堪點茶或蜜浸取其甘芳通氣分素心者名素心蘭入藥最佳蓋建蘭一莖數花實蕙而非蘭也綱目以薰草為蕙即今零陵香於蘭草下正誤條申言蘭草可佩乃孩兒菊古名都梁香是也且斥寇氏丹溪二家所解蘭草混入世俗之蘭花為非而以蘭花為幽蘭與蘭草迥異然何以不立幽蘭一條不能無缺略之憾因急補之素心建蘭花干之可催生除宿氣解鬱蜜漬青蘭花點茶飲調和氣血寬中醒酒閩小記建寧人家以蜜漬蘭花冬月點茶芳香如初摘葉丹溪云建蘭葉稟金水之氣而似有火不知其能散久積陳郁之氣甚有力今時醫用以通舒經絡宣泄風邪亦佳本草匯云蘭葉稟金水清芬之氣似有火獨走氣道入西方以清辛金不獨開胃清肺消痰善能散積久陳郁之結氣今人但賞花香不知用葉亦缺典耳況藥味載內經甚少蘭獨擅名所謂治之以蘭除陳氣也故東垣方中每常用之與藿香枇杷葉石斛竹茹橘紅開胃氣之神品入沉香鬱金白蔻蘇子蘆根汁下氣開鬱治噎膈之將成者産閩中者力勝江浙諸種力薄辛平甘寒陰中之陽入手太陰足陽明經亦入足太陰厥陰經生津止渴開胃解鬱潤肌肉調月經養營氣本經主利水道因其走氣道故能利水消渴除胸中痰癖殺蠱毒不祥之氣者蓋肺主氣肺氣鬱結則上竅閉而下竅不通胃主納水穀胃氣凝滯則水穀不以時化而為痰癖蠱毒不祥之氣辛平能散結滯芬芳能除穢惡則上症自除本草匯按綱目蘭草條不指幽蘭而本草匯草部有蘭草所言皆指建蘭即瀕湖所云幽蘭是也今從其說補之根名土續斷治跌打和血物理小識幽蘭建蘭根甘宜入藥其花可茹葉以浸油黑髮又云都梁蘭根名土續斷當是此也五雜俎蘭根食之能殺人忌內服治痰嗽後吐血劉羽儀經驗方云先痰嗽後吐血而氣急者用天冬麥冬生地白芍紫菀山梔桑皮地骨皮等藥如氣急去天冬加真蘇子取蘭花根搗汁沖服尤妙江夏程云鵬著慈幼筏痘門載清地散花飲凡痘見標三日此方主之有夾疹者加蘭花根額上灰滯色加菊花蘭花梅花或蘭花根亦可又玉液春膏飲中治背漿不足加酒炒土蘭花草蘭葉短而狹小春花者名春蘭秋花者名秋蘭皆一干一花有一干數花者名九節蘭其萼中無紅斑點色純者名草素尤香入藥一干一花者良根治瘋狗咬行篋檢祕取根四兩水淨入黃酒二碗煎成一碗服完其毒即從大小便化血而出玫瑰花有紫白二種紫者入血分白者入氣分莖有刺葉如月季而多鋸齒高者三四尺其花色紫入藥用花瓣勿見火百草鏡云玫瑰花立夏前採含苞未放者陰乾用忌見火氣香性溫味甘微苦入脾肝經和血行血理氣治風痹藥性考云玫瑰性溫行血破積損傷瘀痛浸酒飲益治吐血玫瑰膏救生苦海用玫瑰花一百朵初開者去心蒂河水二碗煎半再用河水一碗煎半去渣和勻共有碗半復煎至一碗白糖一斤收成調膏不時服之噤口痢用玫瑰花陰乾煎服治乳癰玫瑰花七朵母丁香七粒無灰酒煎服自愈腫毒初起百草鏡玫瑰花去心蒂焙為末一錢好酒和服乳癰初起鬱症宜此百草鏡玫瑰花初開者陰乾燥者三十朵去心蒂陳酒煎食後服肝胃氣痛用玫瑰花陰乾沖湯代茶服新久風痹百草鏡玫瑰花去莖蕊蒂陰乾三錢紅花全當歸各一錢水煎去渣好酒和服七劑除根永不再發吐紅集聽用玫瑰花不拘多少去蒂搗汁熬膏貯瓶內每早空心茶匙挑四五匙白滾水沖服一二日即愈少林拳經玫瑰花能治跌打損傷風痹藥酒救生苦海用白槿花大紅月季花玫瑰花去蒂各一兩鬧羊花五錢風茄花五朵龍眼肉北棗肉各一兩紹酒五壺浸封七日隔水煮之壇上置白米一撮米熟成飯為度取出每服二三杯蓋暖臥避風即愈保真丸朱排山柑園小識保真丸能通經絡和百脈壯腰腎健脾胃加飲食健步履除一切痼疾能固真元用玫瑰花去蒂摘瓣以竹紙糊袋裝之薄攤曬乾取淨末一斤不宜見火此花色能益血香能補氣妙難盡述補骨脂一斤淘淨泥土用耆朮苓甘各五錢煎汁一碗拌曬以汁盡曬燥炒菟絲子一斤用芎歸芍生地各五錢煎汁去渣以汁煮菟絲子俟吐絲為度曬乾炒胡桃仁六兩連皮搗如泥杜仲四兩鹽水炒去絲韭子四兩淘淨微火炒各為細末煉蜜為丸如桐子大每晨空心白湯服四錢忌羊肉蕓薹並諸血一方加魚膘四兩男婦共服可以種子極效或加鹿角膠枸杞子金雀花一名黃雀花似六月雪而本高正二月開花色黃根有刺根入藥花鏡金雀花枝柯似迎春葉如槐而有小刺仲春開黃花其形尖旁開兩瓣勢如飛雀可愛其花鹽湯焯過控干入茶供百草鏡金雀花生山土中雨水時開花色黃而香形酷似雀白花者名銀雀最難得其莖有白點花後發葉碎小葉下有軟刺取根入藥去外黑皮及內骨用別有霞雀花更不可得嘉興府志金雀一名飛來鳳鹽浸可以點茶成化四明志金雀兒花産奉化丁末余館奉化劉明府署時明府幼孫患痘不起發醫用金雀花詢其故云此藥大能透發痘瘡以其得先春之氣故能解毒攻邪用花性平和血去風入肝脾二經亦入乳癰用百草鏡跌撲傷損以金雀花乾者研一錢酒下根治跌打損傷又治咳嗽暖筋骨療痛風性能追風活血兼通血脈消結毒濟世良方金雀根搗汁和酒服渣罨傷處治跌打損傷金蓮花廣群芳譜出山西五臺山塞外尤多花色金黃七瓣兩層花心亦黃色碎蕊平正有尖小長狹黃瓣環繞其心一莖數朵若蓮而小六月盛開一望遍地金色爛然至秋花幹不落結子如粟米而黑其葉緑色瘦尖而長五尖或七尖五臺山志山有旱金蓮如真金挺生陸地相傳是文殊聖蹟張壽莊云五臺山出金蓮花寺僧採摘干之作禮物餉客或入寺獻茶盞中輒浮一二朵如南人之茶菊然云食之益人查慎行人海記旱金蓮花五臺山出瓣如池蓮較小色如真金曝乾可致遠有分餉者以點茶一甌置一朵花開沸湯中新鮮可愛後扈從出古北口外塞山多有之開花在五六月間一入秋莖株俱萎矣金蓮花出五臺山又名旱地蓮一名金芙蓉色深黃味滑苦無毒性寒治口瘡喉腫浮熱牙宣耳痛目痛煎此代茗明目解嵐瘴恕軒疔瘡大毒諸風山海草函佛桑花粵語佛桑枝葉類桑花丹色名朱槿一名福桑又名扶桑重臺者曰愛老多以為蔬綱目木槿後有扶桑條止載外治故補之吳震方嶺南雜記扶桑粵中處處有之葉似桑而略小有大紅淺紅黃三色大者開泛如芍藥朝開暮落落已復開自三月至十月不絶佛桑與扶桑正相似而中心起樓多一層花瓣今人以扶桑佛桑混一非也紗緞黑退變黃搗扶桑花汁塗之復黑如新潤容補血粵語美顏潤血陳述齊瑣語朱槿花蒸醋食之粵中婦女多以此美姿敏按兩粵瑣語載朱槿與佛桑皮微有異云朱槿一名日及亦曰舜英葉如桑光潤而厚高止四五尺而枝婆娑自仲春花至仲冬一叢之上日開數百朵朝開暮落色深紅五出大如蜀葵瓣捲起勢若飛揚層出如樓子有蕊一條比瓣稍長上綴金屑日光所爍疑有火焰粵女多種之插枝即生蘇子瞻詩焰焰燒空紅佛桑謂朱槿也然佛桑又有殷紅水紅黃紫各色比朱槿差小稱小牡丹四時有花白者以為蔬菜甜美可口女子食之尤宜據陳述齊所云則佛桑與朱槿一類而二物要其功用亦不甚遠故粵語以為即朱槿今並附録其功用以補李氏所未備寶珠山茶云溪方以落地花仰者為貴山茶多種以千葉大紅者為勝入藥百草鏡山茶多種惟寶珠入藥其花大紅四瓣大瓣之中又生碎瓣極多味澀二三月採陰乾用之若俱是大瓣千葉者名洋茶不入藥單瓣者亦不入藥群方譜寶珠山茶可代鬱金研末麻油調塗湯火灼傷味微辛甘性寒破血消癰跌打吐血症用之又治腸風瀉血湯火傷鼻衄炙瘡均焙研七朵空心酒服百草鏡云涼血破血止血澀劑也消癰腫跌撲斷久痢腸風下血崩帶血淋鼻衄吐血外敷炙瘡赤痢救生苦海用大紅寶珠山茶花陰乾為末加白糖拌勻飯鍋上蒸三四次服鼻中出血何明遠方千葉大紅山茶花二三月採陰乾用時取五六朵煎服即止又張氏必效方鼻衄用寶珠山茶大紅者焙研三五錢砂糖滾水和服吐血咳嗽不藥良方寶珠山茶瓦焙黑色調紅砂糖日服不拘多少又方寶珠山茶十朵紅花五錢白芨一兩紅棗四兩水煎一碗服之渣再服紅棗不拘時亦取食之蔣儀藥鏡拾遺賦山茶花吐血衄血腸風下血之良將宋春暉云曾見有人患乳頭開花欲墜疼痛異常有教以用寶珠山茶焙研為末用麻油調搽立愈痔瘡出血汪子明方用寶珠山茶研末沖服粉團花根附有大小二種其花千瓣成簇大者曰玉粉團初青後白小者曰洋粉團青色轉白白後轉紅藍色入藥用大者性寒熏臭蟲同水龍骨雷公藤和燒熏之立除百草鏡洗腎囊風姚伯玉方用粉團花七朵水煎洗良方集要用蛇床子澀上野莧琇球花煎湯洗之根治喉爛傳效方取入土內者好醋磨以翎毛蘸掃患處涎出愈玉簪花綱目玉簪條載根葉之用獨不言其花今人取其含蕊實鉛粉其中飯鍋上蒸過云能去鉛氣且香透粉內婦女以勻面無皯痣之患其葉乾之熏壁蝨絶跡花性微毒治小便不通彙集方玉龍散中用之治癬第一靈丹寶志遺方鮮玉簪花三百朵為泥母丁香六兩沉香四兩冰片三錢麝香三錢山西城磚十二兩共為末用真麻油三斤半熬熟陳年石灰半斤滴水成珠為度候冷收瓷罐內黃臘封固埋土內二十一日取出敷患處自愈此藥可久貯勿使泄氣治杖破玉簪花手排熟貼傷處清涼膏張卿子祕方貼疳瘋毒大黃黃柏黃連黃芩鬱金皮硝白芨獨腳蓮天花粉玉簪花共研細末雞子清調敷留頂又二香追毒飲治肚心癰羌活連翹紫蘇甘草白芷防風銀花天花粉肉桂黃耆乳香木香沉香芍藥生地枳殼黃芩柴胡前胡茯苓玉簪花水煎食後服山海草函玉簪花入韶粉內敷疳瘡蛀梗玉龍散治小便不通用玉簪花蛇蛻各二錢丁香一錢共為末每服一錢酒調送下醫學指南玉蘭花瀕湖綱目辛夷集解下惟云有花白者人呼為玉蘭並不另立主治即辛夷亦用苞蕊不及其花之用也今採龍柏藥性考補之性溫香滑消痰益肺和氣蜜漬尤良痛經不孕良方集要玉蘭花將開未足每歲一朵每日清晨空心水煎服丁香花未詳形狀藥性考味辛微溫窨茶吊露清利頭目紫茉莉根此草二三月發苗莖逢節則粗如骨節狀葉長尖光緑前鋭後大小暑後開花有紫白黃三色又有一本五色者花朝開暮合結實外有苞內含青子成簇大如豌豆久則黑子內有白粉宿根三年不取大如牛蒡味微甘類山藥陳扶搖花鏡紫茉莉一名狀元紅本不甚高但婆娑而蔓衍易生葉似蔓菁按紫茉莉入夏開花至深秋未已白花者香尤酷烈其花見日即斂日入後復開亦不經久一日即萎西人有食之者去其外皮鹽漬以佐饌云能去風活血無濁淋等症然其性秉純陰柔中帶利久食恐骨軟陽虛人尤忌之性惡鐵凡取用忌鐵器根治乳癰白濁花可浸酒子名土山奈取其粉可去面上癍痣粉刺性寒藥性考野薔薇百草鏡山野與家種無異但形不大花皆粉紅色單瓣無千葉者春月山人採其花售與粉店蒸粉貨售為婦女面藥云其香可闢汗去黦黑花鏡野薔薇一名雪客葉細而花小其本多刺蔓生籬落間花有純紅粉紅二色皆單瓣不甚可觀但香最甜似玫瑰人多取蒸作露採含蕊拌茶亦佳患瘧者烹飲即愈六研齊筆記通元子服餌法春時服薔薇嫩頭一月即可每日服信三釐漸增之一分即可入水坐臥不病如是經年即可蠟塗身體挾利刃潛游江湖劫睡龍之珠得珠而行空自如觸石無礙三界八寰可縱浪矣此飛仙之業也而始於齧薔薇頭談此於客未有不胡盧而笑花治瘧伍涵芬讀書志白野薔薇花拌茶煎服可驅瘧鬼婦人鬱結吐血劉克中雲香烈大耗真氣虛人忌服之根治肺癰吐膿痰酒煎服口瘡煎湯漱口子名石珊瑚治産後軟癱婦人禿髮用薔薇嫩枝同猴姜煎汁刷之秋海棠嶺南隨筆海棠本無香惟清遠歸猿洞秋海棠肇慶𦏰羊峽春海棠其香特盛群方譜一名八月春草本花色粉紅甚嬌豔葉緑如翠羽此花有二種葉下紅筋者為常品緑筋者開花更有雅趣大觀録秋海棠亦名斷腸草其根葉有毒犬馬食之即死浸花水飲之害人漳州府志秋海棠歲每生苗其莖甚脆葉背作紅亂紋云是相思血也相傳昔人有以思而噴血階下遂生此故亦名相思草其花一朵謝則旁生二朵二生四四生八具太極象雅豔異常花鏡秋海棠一名八月春為秋色中第一本矮而葉大背多紅絲如胭脂作界紋花四出以漸而開至末朵結鈴子生丫枝花嬌冶柔媚其異種有黃白二色一名斷腸花周開鄠云秋海棠俗傳其花中黃心有大毒人食多死豫一日誤食此驚惶一夜倉卒旅邸無藥可解但委命聽之而已次日亦無恙丁憲榮云秋海棠葉初生山左小兒爭採食之味微酸生津能益唇色如塗朱然則其無毒可知藥性考海棠喜背陰而生故性寒凡大熱症可用味酸性寒無毒和蜜搽面澤肌潤肉其干搗汁治咽喉痛藥性考百草鏡云擦癬殺蟲用葉花浸蜜入婦人面藥用物理小識白銀以烏梅三葉酸秋海棠葉皆可海棠蜜救生苦海紅秋海棠採花去心白蜜拌勻蒸曬十次令化為度冬月早晨洗面後敷之能令色豔並治吹花癬痱𤻳慈航活人書有制海棠蜜法上白蜜一大杯紅秋海棠現取花片用拌入蜜內將花略搗爛日日曬或蒸數次自爛如泥其蜜色如海棠或加入好芙蓉粉少許光絶可愛且免麵皮凍裂茶菊城頭菊金鈴菊金箭頭菊米菊根茶菊較家菊朵不多心有黃白二色杭州錢塘所屬良渚檜葬地方鄉人多種菊為業秋十月採取花挑入城市以售黃色者有高腳黃等名色紫蒂者名紫蒂盤桓白色千葉名千葉玉玲瓏徽人茶鋪多買焙乾作點茶用常中丞安宦遊筆記鳳凰山産菊花不甚大蒂紫味甘取以點茶絶佳又浙省城頭一帶産菊名城頭菊皆生城上石縫中至秋開花花小於茶菊香氣沁腹點茶更佳此則茶菊之野生者味性不同臨安山中所産一種野菊名金鈴菊花小如豆與城頭菊倣佛山人多采入藥鋪作野菊花用實與野菊又不同野菊食之瀉人而鈴菊又不作瀉野菊瓣疏此則旁瓣密為別也瀕湖綱目菊分家野而此數種獨未言及今杭俗以茶菊作餉遺客為用最廣豫故不惜覙縷言之兼補瀕湖所未備焉百草鏡云甘菊即茶菊出浙江江西者佳形細小而香産於亳州者不可用白而微臭近日杭州筧橋安徽池州紹興新昌唐公市湖北缺州皆産入藥用陰乾者去蒂以白朮枸杞子地骨皮為使反河魨及無鱗魚園菊花大不入藥止可裝枕去風其根治疔腫卻效群方譜一名真菊一名家菊一名茶菊花正黃小如指頂外尖瓣內細萼柄細而長味甘而辛氣香而烈葉似小金鈴而尖更多亞淺氣味似薄荷枝幹嫩則青老則紫實如葶藶而細種之亦生苗人家種以供蔬茹凡菊葉皆深緑而厚味極苦或有毛惟此葉淡緑柔莖味微甘咀嚼香味俱勝擷以作羹及泛茶極有風致萬曆嘉善縣志花黃梗紫為甘菊最良野菊叢生花小性涼家菊花大氣弗聚矣黃茶菊以紫蒂為佳明目去風搜肝氣治頭暈目眩益血潤客入血分食物宜忌黃菊花即甘菊花苦微甘性平益肺腎去風除熱補血養目清眩暈頭風白茶菊千葉者佳通肺氣止咳逆清三焦鬱火療肌熱入氣分其根治疔腫喉疔喉癬海寧出茶菊名金井玉欄杆其花心黃邊白點茶絶佳聖惠方云黃甘菊雖能燥濕祛風亦能助火泄氣性平專入陽分治諸風頭眩解酒毒疔腫撲打損傷王阮亭居易録云四川提督吳英說昔得撲打損傷祕方雖重傷瀕死但一絲未絶灌下立蘇其方以十一月採野菊花連枝葉陰乾用時取一兩加童便無灰酒各一碗同煎熱服紅絲疔立效驗方以白菊花葉無白者別菊亦可冬月無葉取根加雄黃錢許蜒蚰二條共搗極爛從頭敷至絲盡處為止用絹條裹緊隔夜即清真神方也城頭菊朱排山柑園小識杭城石罅生菊枝葉極瘦小九月開花如豆香而且甘雍正初禁人採取以充貢品宮闈以作枕城上之菊既為野生而味甘亦一異也蘇頌圖經云有一種開小小花瓣下如珠子謂之珠子菊豈即此歟明目去頭風喉痹癤毒涼血其枝葉鮮者生搗罨疔瘡並服其汁兼治蛇咬瘰癧梅瘡眼息煎洗天泡瘡亦效金鈴菊百草鏡云採花干之作枕除頭風目疾內熱洗風火眼止熱瀉搗罨一切腫毒諸蟲咬螫有效胃虛便滑無實熱者忌用以其苦寒傷胃能作瀉也群方譜載金鈴菊花小如鈴其干長與人等凡菊葉皆五出此葉獨尖長七出花與葉層層相間不獨生於枝頭此乃家種金鈴菊非野生金鈴菊也然功用要亦倣佛金箭頭馬伯州菊譜花長而末鋭枝葉可茹名金箭頭又名風藥菊專治頭風較他菊十倍菊米處州出一種山中野菊土人採其蕊干之如半粒緑豆大甚香而輕圓黃亮云敗毒散疔去風清火明目為第一産遂昌縣石練山菊根張介賓本草正云白菊根善利水搗汁和酒服之大治癃閉瘰癧未破醫學指南採野菊根搗爛煎酒服渣塗上自消不消自破睡蓮廣志睡蓮布葉數重葉如荇而大花有五色當夏晝開夜縮入水底晝復出與夢草晝入地夜即復出相反廣州有之諺曰毋佩睡蓮使人好眠綱目蔬部載睡菜而睡蓮獨遺故補之張黻大觀録綽菜夏月生於池沼之間葉類慈菰根如藕條食之令人思睡又名瞑菜嶺南雜記睡蓮菜一名瑞蓮花瓣外紫內白干如叉股心似雞頭以水淺深為短長日沉夜浮必雞鳴採之始得出高州佩之多好眠廣志清香爽脆消暑解酲嶺南雜記瑞香花粵語乳源多白瑞香冬月盛開如雪名雪花刈以為薪雜山蘭芎藭之屬燒之比屋皆香其種以攣枝為上有紫色者香尤烈雜衆花中花衆往往無香皆為所奪一名奪香花乾者入藥用綱目芳草內瑞香條止載其根治急喉風用白花者研水灌之亦不言其花之功用故補之稀痘治乳岩初起藥性考瑞香花馥糖餞芳甘清利頭目齒痛宜含子午蓮綱目水草部入蘋以為此即大葉之蘋也古人以為食品祭用蘋蘩即此今浙人呼為子午蓮生水澤陂蕩中葉較荷而小缺口不圓入夏開白花午開子斂子開午斂故名採花入藥治小兒急慢驚風煎湯服用七朵或十四朵杭城張子元扇店施此救人多年矣桃金娘粵志草花之以娘名者有桃金娘叢生野間似梅而末微鋭似桃而色倍赬中莖純紫絲綴深黃如金粟名金桃娘八九月實熟青紺若牛乳狀産桂林今廣州亦多有之粵歌云攜手南山陽採花香滿筐妾愛留求子郎愛桃金娘花鏡金絲桃一名桃金娘出桂林郡花似桃而大其色更赬中莖純紫心吐黃鬚鋪散花外儼似金絲八九月實熟青紺若牛乳狀味甘可入藥用如分種當從根下劈開仍以土復之至來年移植便活花行血子味甘入脾養血明目假素馨出廣中青藤仔花也粵語青藤仔葉長三四寸多芒刺莖大如指而堅韌人家日用之猶北地之用柳條煎湯洗瘡疥良千金花此即千金草花千金草即本經蘭草今所呼孩兒菊省頭草是也二月宿根再發紫莖素枝赤節緑葉對節生光澤有歧嫩時可挼可佩八九月漸老枝頭成穗作花紅白狀似雞蘇久之花瓣轉白絨裂如球球中有子一粒絨著子上色黑味苦臭香氣裂即千金花也瀕湖綱目僅載其葉之用本草乘雅云以千金花煮酒臭類木香苦甚黃連用治滯痢獲效頗捷豫故採其說入花部以補所未備花氣香味苦浸酒治滯下以其能蘭闢不祥利水道宣氣四達之功耳乘雅梧桐花山海草函治杖丹癩頭湯火傷金鳳毛汪連仕云今人呼翠翎草翠繞如翎細葉塌地而生與翠云草鳳尾不同敏按此種即蔦蘿今人編竹為亭臺植之盆中秋開大紅小花者是也治耳疔痔漏十姊妹一名佛見笑汪連仕云取其根葉陰乾為末蜜糖湯調服治傷寒危篤立效乃元升觀之祕方雨韭汪連仕草藥方云雨韭生水澤旁即青慈菰花去濕之功同茵陳散一切疔腫消痔漏明目罌粟子油固精物理小識佛前舊供花雲谷醫抄治臁瘡爛腿用佛前多年陳久供花取來用香油浸貼即愈果部上二十一種附十六種延壽果乃鹿銜草之子又松潘衛志有延壽果云果生於土味甜似山藥並無樹果此或名同而物異也按鹿銜千金方名鹿藥草其葉大而面緑背青者為真蘇恭言有大小二種保升言葉似茺蔚叢生有毛者吳風草也此草惟生於秦地者有子土人名曰延壽果仁恕堂筆記張掖河西地有草根一種形如黃連盤根屈曲有若缺然邊人取之實籩豆用之供饋遺名曰延壽果俗又稱鹿跑草其味甚甜理血中邪濕溫補下元去風痹癧癤痛小兒食之定驚悸三邊紀略本草逢原云味微澀而甘不特有益老人而嬰兒先天不足者尤為上藥惜乎南方罕得也櫻額果屬也産關東烏喇口外其樹叢生果形如野黑蒲萄而稍小鮮實甚美曬乾為末可以致遠盛京志一名稠梨子實黑而澀土人珍之間以作面暑月調水服之可止瀉按宦遊筆記郁李即棠棣結子如櫻桃南産者酸澀不堪食盛京出者又名櫻額味甘鮮曬乾為末更佳味甘澀性溫暖補脾止泄瀉倒吊果御製幾暇格物編俗名吊搭果形似山梨而小體微長味酢肉多沙長蒂諸果始生時皆向上此果花實皆下垂故名生時堅澀熟乃沙樹枝葉俱如梨為秦中物産今遵化沿邊有之而考之書笈草木諸譜皆不載倒吊之名惟上林賦云答遝離支答遝音近打拉張揖注云答遝果名按梅堯臣牡丹詩用打拉二字北人方言以欹垂為打拉是答遝名果或因其下垂也說文海篇俱作㯚𣟳果今名吊搭或是答還音之轉耳性暖利胸膈健脾消食飛松子雲南土司志邊境各土司深山中産一種飛松子結實熟時人欲取之子輒飛去夜則仍歸根下土人記其處俟夜過子掘其根而取之饋遺以為珍品味絶香美徐霞客遊記飛松一名狐實亦作梧實正如梧桐子而大倍之色味亦如梧桐子而殼薄易剝坐密樹中一見輒伐樹乃可得遲則樹即存而子俱飛去成空株矣故曰飛松惟巔堂關外野人境有之其葉如柳味絶類土豆滇略梧實大如豆殼脆易剝不與他處類俗謂之山松子亦曰飛松朱排山柑園小識飛松出滇南似梧桐子稍大而微長內外色味俱肖而香美過之蔓生松樹上土人甚珍之下氣消痰通和血脈能返魂凡有人魂神不安及驚越失魂神不守舍一切等症此為要藥故靈璧趙氏天王補心丹治怔忡用之張緑猗言十香返魂丹加飛松子殼更效茶肭子邊輿考其樹出遼東塞外高有三尺許葉如南方楝樹背有黃白點花四出形如手碧色或有八出者結子大如拳熟便可食其甘如飴其樹浸水可為油燃燈入藥用子治一切病遼塞無藥土人有病者取茶肭子啖之即愈椰油椰中酒椰膏椰皮椰肉臺灣使槎録云可佐膏火或云用火炙椰其油自出凡楝椰子以手搖之聽水聲清亮則心大而甜其肉厚水聲濁則否澠水燕談録椰子生安南及海外諸國木如棕櫚大者高百餘尺花白如千葉芙蓉一本花不過三五顆其大如斗至差小外有黃毛軟皮中有殼正類檳榔殼上有二穴牙出穴中殼內類蘿蔔皮味苦肉極甘脆蠻人甚珍之劉恂嶺表録異椰殼中有液數合如乳亦可飲之冷而動氣廣果録椰樹高六七丈直竦無枝至木末乃有葉如束蒲長二三尺花如千葉芙蓉白色終歲不絶葉間生實如瓠系房房連纍一房二十七八實或三十實大者如斗有皮厚苞之曰椰衣皮中有核甚堅與膚肉皆緊著皮厚可半寸白如雪味脆而甘膚中空虛又有青漿升許味美於蜜微有酒氣曰椰酒蘇軾詩美酒生林不待儀言椰中有自然之酒不待儀狄而作也廣東名勝志文昌縣玉陽山椰子最多大三四圍高二三丈通身無枝至百餘年才有葉三月花連著實房房三十或二十七八子至六月熟七月收療齒疾凍瘡粵志祛暑氣華夷花木考治消渴塗髭發立黑澠水燕談録椰中酒食物考緬甸有樹頭酒即椰子中漿汁也華夷花木考載林邑王與南越王有怨遣刺客匕其首梟之樹上化為椰子樹當刺時王方大醉故椰漿如酒飲之醉人祛風消水腫止吐血塗頭黑髮然多食昏人動氣增渴性溫故也久服可烏須食物考椰膏粵載椰子殼土人取以熬膏色黑如漆塗癬良椰皮煮汁止血療吐逆澠水燕談録椰肉益氣生風澠水燕談録楊梅下疳筋骨疼痛不藥良方椰子殼燒存性臨燒以滾酒泡服二三錢暖臥取汗其痛即止宜母果嶺南雜記似橘而酸又名宜濛子元吳萊有宜濛熱水歌粵語宜男子似橙而小二三月熟黃色味極酸孕婦肝虛嗜之故曰宜母元時於廣州荔支灣作御果園栽種里木樹大小八百株以作渴水里木即宜母子也一名黎濛子吳萊詩廣州園官進渴水天風夏熱宜濛子百花醞作甘露漿南園烹成赤龍髓蓋以里木子榨水煎糖也蒙古以為舍里別即渴水也一名藥果當熟時人家競買以多藏而經歲久為尚汁可代醋染大紅以其汁調乃上藥性考黎朦子大如梅形似橘孕婦宜食能闢暑即宜濛子孕婦食之能安胎故又名宜母醃食下氣和胃懷孕不安食之良製為漿闢酷暑又能解渴宜母子以鹽醃歲久色黑可治傷寒痰火粵語天師栗即娑羅子一名娑羅子治胃痛最驗綱目於主治下失載通雅娑羅外國之交讓木也葉似柟皮似玉蘭色蔥白最潔鳥不棲蟲不生子能下氣益部方物記生峨嵋山中類枇杷數葩合房春開葉在表花在中或言根不可徙吳船録木葉如海桐又似楊梅花紅白色春夏間開長安客話臥佛寺內娑羅樹二株子如橡栗可療心疾宸垣識略娑羅花苞大如拳葉如枇杷凡二十餘葉相沓捧苞類桐花一簇三十餘朵經月方謝留青日札娑羅樹出西番海中豫在潯州時官圃一株甚巨每枝生葉七片有花穗甚長而黃如栗花秋後結實如栗可食正所謂七葉樹也藥性考娑羅子一枝七葉九葉苞如人面花似牡丹香白肉味苦微涼寬中下氣治胃脘肝膈膨脹疳積瘧痢吐血勞傷平胃通絡用陰陽瓦炙灰或酒煨食俱效單用不入他藥或稱天師栗非也葛祖遺方味甘溫無毒治心胃寒痛蟲痛性溫殺蟲胃痛百草鏡用娑婆子即娑羅子也以一枚去殼搗碎煎服能令蟲從大便出三服除根九種心痛楊春涯驗方娑羅子即武吉燒灰沖酒服化州橘紅橘瓤上絲糖橘紅橘餅藥制柑橘餅青鹽陳皮橘苓嶺南雜記化州仙橘相傳仙人羅辨種橘於石龍之腹至今猶存惟此一株在蘇澤堂者為最清風樓次之紅樹又次之其實非橘皮厚肉酸不中食其皮釐為五片七片不可成雙每片真者可值一金每年所結循例具文報明上臺屆期督撫差親隨跟同採摘批制官斯土者亦不多得彼土人云凡近州始聞誰樓更鼓者其皮亦佳故化皮贋者多真者甚難得關涵嶺南隨筆化州署橘樹一月生一子以其皮入藥痰立解後為風折即其地補種氣味便殊今稱化州橘紅者皆以增城香柚皮僞代之能化物而不能自化粵語化州有橘一株在署中月生一子以其皮為橘紅瀹湯飲之痰立消曩亦進御今為大風所拔新種一株味不及化州故多橘紅售於嶺內而産署中者獨異本草乘雅云橘柚專精者實實復專精者皮皮布細竅宛如人膚即脈絡肉理筋膜子核各有屬焉故力能轉入為升轉升為合即轉合為開也種種形證悉從入從合故胸中瘕熱水穀失宣神明不通氣逆及氣臭耳下氣者出已而降玉衡機轉之妙用也識藥辨微云化橘紅近日廣中來者皆單片成束作象眼塊或三十五十片兩頭以紅繩扎之成一把外皮淡紅色內腹皮白色周身亦有豬鬃皮此種皆柚皮亦能消痰又有一種為世所重每個五片如爪中用化州印名五爪橘紅亦柚皮所制較掌片為佳究之真者遠甚也真化州橘紅煎之作甜香取其汁一點入痰盂內痰皆變為水此為上品梁氏家藏蘇澤堂化州橘紅每一個七破反折作七歧曬乾氣甚香烈有橘紅歌云石龍靈異不可測首向青霄尾潛澤有時聲吼洪如鵝有時噴沙白似雪鳴或宰相應期生鳴或科甲蟬聯翼由來州牧履其常惟恐怪奇駭愚俗亭碑鼓吹鎮其頭重鑊纍石填其穴天生靈異無可憑離奇屈曲化為橘橘之為性溫且平能愈傷寒兼積食消痰止嗽功更奇誰先辨此真龍脈價值黃金不易求寄語人間休浪擲治痰症如神消油膩穀食積醒酒寬中氣虛者忌服解蟹毒慈惠編食蟹中毒橘紅煎湯服辰砂五香丸治翻胃噎膈嘔吐張氏祕效方用血竭乳香沒藥辰砂各一錢五分元胡一錢化州橘紅一錢共為末每三分酒服羊癲瘋良方集要雄黃天竺黃川貝母各五錢真琥珀一錢麝香一錢陳膽星一兩以上各另研全蠍十四個去足酒洗遠志肉甘草汁制鉤藤防風化州橘紅姜衣羌活茯苓天麻石菖蒲各五錢以上不可見火曬乾蟬蛻三十個白附子六錢共為末煉蜜為丸如龍眼大每服一丸開水下按百草鏡廣東高州府化州出陳皮去白者名橘紅今亦罕得土人以柚皮代之出售外方價亦不貴辨別之法須先看皮色筋味如皮皺粗色黃而厚內多白膜味反甜帶辛者乃乳柑皮也只堪點茶不堪入藥皮極厚而泡松紋極細而色黃內多膜無筋味甜多辛少者乃柚子皮也性忌冷服紋細色紅潤而皮薄多有筋脈味苦辛入口芳香者乃真化州橘紅也入藥以此種為貴然其性酸削能伐生氣消痰雖捷破氣損人不宜輕用近日有一種産仁和塘棲鎮蜜橘皮所制曰甜橘紅清香入肺醒脾消痰之功不下化産而性不峻削名為香金板南人體弱者宜之本草乘雅武林棲水出蜜橘凡數十品名金錢穿心者雖秀色可觀又不如佛肚臍形小皮癩甘美可口霜降採取氣足味足密藏至春剖皮抽脈破囊吮汁亦可振醒精神為得句破疑之助橘瓤上絲金御乘雲橘絲專能宣通經絡滯氣豫屢用以治衛氣逆於肺之脈脹甚有效綱目橘瓤上筋膜只引大明治口渴吐酒而沒其專功何耶因仍其說以補之通經絡滯氣脈脹驅皮裡膜外積痰活血糖橘紅仁和塘棲鎮者佳以皮去白切小塊用糖霜制味甘辛性溫理氣快膈治嗽消痰食物宜忌橘餅閩中漳泉者佳名麥芽橘餅圓徑四五寸乃選大福橘蜜糖釀製而成干之面上有白霜故名肉厚味重為天下第一浙制者乃衢橘所作圓徑不及三寸且皮色黯黑而肉薄味亦苦劣出塘棲者為蜜橘餅味差勝然亦不及閩中者又興化出金錢橘餅乃取金橘製成小如錢明如琥珀消食下氣開膈捷於砂仁豆蔻又可醒酒醉後點茶允為妙供味甘性溫下氣寬中消痰運食食物宜忌黃疸臌脹除膈止消經驗廣集治諸色痢行篋檢祕橘餅一兩圓眼肉五錢冰糖五錢水二碗露一宿溫服不露亦可至重者不過二三服無不神驗治瀉梁氏集驗夏月吃瓜果太多以致泄瀉不休用漳州好橘餅一枚細切薄片作二次放茶鍾內沖服橘餅湯經驗廣集治傷食生冷瓜果泄瀉不休橘餅一個切薄片放碗內以沸湯潑蓋住泡汁出即飲湯連餅食一餅可作數次服百果酒香櫞佛手各二個核桃肉圓眼肉蓮肉橘餅各半斤柏子仁四兩松子三兩紅棗二十兩黑糖三斤乾燒酒五十斤浸此酒補虛益腎乃河中李太守祕方藥制柑橘餅北硯食規用元明粉半夏青鹽百藥草天花粉白茯苓各五錢訶子甘草烏梅去核各二錢硼砂桔梗各三錢以上俱用雪水煎半乾去渣澄清取湯煮柑橘炭墼微火烘日翻二次每次輕輕細捻使藥味盡入皮內如捻破則不妙能清火化痰寬中降氣青鹽陳皮百草鏡制青鹽陳皮即蘇州宋公祠遺法也陳皮二斤河水浸一日竹刀輕刮去浮白貯竹筐內沸湯淋三四次用冷河水洗淨不苦為度曬至半乾可得淨皮一斤初次用甘草烏梅肉各四兩煎濃汁拌曬夜露俟酥捻碎如豆大再用川貝母去心四兩青鹽三兩研為細末拌勻曬露干收貯消痰降氣生津開鬱運脾調胃解毒安神橘苓橘樹上生如木菌棗皮紅色治乳癰煎酒服豆蔻檳榔此即綱目檳榔注內所云蒳子是也形如雞心一頭尖一頭圓僅如小指大外有殼包之殼白色如豆蔻形尖如橄欖長不及半寸藥肆每於豆蔻中檢出每豆蔻一斤不過數粒價亦倍廣南檳榔亦無有專貨之者或云此種始為雞心檳榔廣南所市者皆山檳榔及大腹子而已時珍循竺氏說以山檳榔為蒳子恐誤治反胃噎膈余功與廣檳榔同按百草鏡檳榔今藥肆所市者形扁而圓大乃大腹子俗名雌檳榔廣東文昌縣出者名文昌子尖小者名主賜檳榔又名吃子其形長尖狀如雞心內有錦紋又名雞心檳榔即雄檳榔也另有一種雞心檳榔來自洋舶從白豆蔻內揀出極罕有形亦長尖極小外有殼儼如棗核故又呼棗核檳榔入藥最勝耳聾灸法經驗廣集用雞心檳榔一個將臍內挖一窩如錢眼大實以麝香坐於患耳內以艾炷灸之不過三四次即效小兒疳積胡開甫方史君子五個生五個熟豆蔻內檳榔用薑湯磨汁空心蘸史君子肉食一二次即愈聤耳出膿豆蔻檳榔為末吹入立愈救生苦海口瘡豆蔻內檳榔煅存性加輕粉敷之廣果録瑣瑣蒲萄出土魯番北京貨之形如胡椒系蒲萄之別種也回疆志蒲萄一根數本藤蔓牽長花極細而黃白色其實有紫白青黑數種形有圓長大小味有酸甜不同一種色緑而無核較黃豆微大味甘美一種色紫而小如胡椒即瑣瑣蒲萄一種色黑形長寸許一種色白而大皆七八月熟晾乾可致遠本經逢原云瑣瑣蒲萄似蒲萄而瑣細故名生於漠北南方間亦有之其干類木而系藤本其子生青熟赤干則紫黑能攝精氣歸宿腎臟與五味子功用不甚相遠凡藤蔓之類皆屬於筋草木之實皆達於藏不獨此味為然此物向供食品不入湯藥故本草不載近時北人以此強腎南人以之稀痘各有攸宜五雜俎西域白蒲桃生者不可見其乾者味殊奇甘有兔眼蒲桃無核又有瑣瑣蒲萄形如茱萸小兒食之能解痘毒於文定筆麈云瑣瑣即馺娑之訛黎愧曾仁恕堂筆記瑣瑣蒲萄於文定引西京羽獵賦謂瑣瑣當為馺娑固屬附會而以為別有一種亦非河西蒲萄雖引根牽蔓不異中土而結實大長如馬乳色深紫味亦殊甘一枝千百顆大者在上細在下垂取而干之大者為白蒲萄細者名瑣瑣非兩種也故俗呼為公領孫惟緑蒲萄則來自西域非中土所有味甘核細微咸痘學真傳云味甘酸性平溫百草鏡云性熱入脾腎二經作酒彌佳治筋骨濕痛利水甚捷除遍身浮腫痘瘡不出酒研和飲神效強腎瑣瑣蒲萄人參各一錢火酒浸一宿侵晨塗手心摩擦腰脊能助膂力強壯若臥時摩擦腰脊力助陽事堅強尤為得力稀痘瑣瑣蒲萄一歲一錢神黃豆一歲一粒杵為細末一陽夜蜜水調服並擦心窩腰眼能助腎祛邪以北地方物專助東南生氣之不足也然惟稟質素弱者用之有益若氣壯偏陽者勿服恐其助長淫火之毒也按紫桃軒雜綴瑣瑣蒲萄神農九草之一中土久有不俟博望從西域帶來也吾里東塔朱買臣墓有之戊子余曾歷平湖幕署有一枝蔓延滿架夏開瑣碎花結實如緑豆望不可見吾杭螺螄山汪姓家亦有此然食之味薄不若甘肅者味厚也入藥自宜以西北者為優南棗山棗藏棗山金華東陽縣茶場以透明如血七枚長一尺者佳陳者入藥宦遊筆記金華東陽縣茶場出棗其大如拳核尖細如黍決之即脫清甘香脆以此名聞天下明中葉尚存數柯今此種已絶矣惟東南諸鄉於高阜地種之雖不及茶場亦美甲於他處其製法不一未熟輒擊以湯沃之使變色謂之湯紅干則其色紫已熟者名樹頭紅干則其色丹過熟者以所煮余汁煮之色味似庶糖謂之糖棗此則以時食為美不作干也又有一種棘差小而圓味殊勝棗物理小識南棗出蘭溪搖而知之其肉離核味甘微酸性溫補赤入心酸斂肝博記單方眼疾中有一種名紅線鎖目干治法取南棗核二十一粒將核截兩斷去仁淨以銅緑塞孔中仍將棗核合上以紙貼封一起放爐中燒紅取出以碗蓋存性每日只用七個研極細末調哺男母乳水抹三日立效腸紅下血南棗五枚同黃耆二錢煎湯五更服神效又方不藥良方南棗十枚槐米一兩同煎去米食棗日三次即愈痔瘡救生苦海南棗一枚去核鱉頭骨一個搗碎銅青裝滿棗肉扎緊火煅烟盡伏土存性研細用秋海棠煎洗然後用藥和水敷之三日消除壁蝨集聽大南棗去核入水銀火煨熏走馬牙疳不藥良方陳年南棗核燒灰研末摻之棗參丸醒園録用大南棗十枚蒸軟去皮核配人參一錢布包藏飯鍋內蒸爛搗勻為丸如彈子大收貯用之補氣最捷仙果不飢方醒園録大南棗一斤好柿餅十塊芝麻半斤去皮炒糯米粉半斤炒將芝麻研成細末棗柿同入飯中蒸熟取出去皮核子蒂搗極爛和麻米二粉再搗勻為丸曬乾收貯加參更妙本經逢原云古方中用大棗皆是紅棗取生能散表也入補脾藥宜用南棗取甘能益津也其黑棗助濕中火損齒生蟲入藥非宜山棗出廣西肇慶府葉如梅果似荔枝九月熟可食柳貫打棗譜山棗狀如棗而圓色青黃而味甘酸出廣州甘溫無毒生和脾胃益血壯神藏棗朱排山柑園小識藏棗來自西藏實産於天竺大者長二寸許形味絶似南棗能補氣功同人參藏中亦不易得其核似蠶蛹形而無仁補虛勞定神志治怯如神落花生油一名長生果福清縣志出外國昔年無之蔓生園中花謝時其中心有絲垂入地結實故名一房可二三粒炒食味甚香美康熙初年僧應元往扶桑覓種寄回亦可壓油今閩省産者出興化為第一名黃土味甜而粒滿出臺灣名白土味澀而粒細其油煎之不熟食之令人瀉一名土豆匯書近時有一種名落生花者莖葉俱類豆其花亦似豆花而色黃枝上不結實其花落地即結實於泥土中亦奇物也實亦似豆莢而稍堅硬炒熟食之作松子之味此種皆自閩中來物理小識番豆名落花生土露子二三月種之一畦不過數子行枝如蕹菜虎耳藤橫枝取土壓之藤上開花絲落土成實冬後掘土取之殼有紋豆黃白色炒熟甘香似松子味又云番豆花透空入土結豆當通潤臟腑酉陽雜俎又有一種形如香芋蔓生藝者架小棚使蔓之花開亦落土結子如香芋亦名花生花鏡落花生一名香芋引藤蔓而生葉丫開小白花花落於地根即生實連絲牽引土中纍纍不斷冬盡掘取煮食香甜可口南浙多産之萬曆仙居縣志落花生原出福建近得其種植之嶺南隨筆花與葉不相見為換錦花莢與蒂不相見為落花生種法以沙壓橫枝則蔓生花不生莢其莢別在根莖間亦稱落花生逢原云長生果産閩地花落土中即生從古無此近始有之味甘氣香能健脾胃飲食難消運者宜之或云與黃瓜相反豫曾二者並食未蒙其害因表出之花生殼韓柳生云焙研極細末著人身體沾肉即生奇癢敏按劉啓堂經驗祕方長生果一名落花生又名落地生不可與黃熟瓜同吃吃則立死黃熟瓜即香瓜非長而白色可以醃吃之黃瓜也始知俗傳之誤雨蓑翁食物便覽香芋一名落花生久服多男多食治翻胃然其性能動火生痰常人只宜少吃從新云辛甘而香潤肺補脾和平可貴食物宜忌云性平味甘舒脾廣志云暖胃藥性考云生研用下痰炒熟用開胃醒脾滑腸干嗽者宜餐滋燥潤火按落花生乃花謝落土感土氣而成實故有入脾和胃之功又能通肺氣曾見興化令王翁一子酷嗜此物後患軟癱豈非動火生痰之明驗歟近見人以花生入糖湯煮浸醬油入素供更為生痰老人尤不宜多食俞友梁有烏須簡便方止用落花生淨肉炒極焦黑研極細捻鬚一二日後色黑如漆四日兩頭瘧即三陰瘧安定臣云昔曾患此諸方莫療有人教服炒熟花生每日食一二兩不半月而愈玉神庵尼清慧言花生人云服之生痰有一大家婦咳嗽痰多醫束手不治庵尼云上勸服花生每日食二三兩漸覺稀少不半年服花生二十餘斤咳嗽與痰喘皆除想亦從治之法也童鹿葊言花生本有滌痰之功豫家凡患咳嗽止用生花生去殼膜取淨肉沖湯服咳嗽自安豈非化痰之功善於瓜蔞貝母世俗以火炒食反能生痰又凡被馬踢傷者忌服花生服之瘡愈增痛花生油一名果油色白甘平氣腥滑腸下積膩膈生痰核桃油好者補火若壞核桃榨取者有毒味劣不宜食阿月渾子與榛子同類性更溫良能止痢暖腎開胃除腸穢積得木香山萸能興陽薯良形如柚圓蔓生紅色浸酒服能活血藥性考無漏果此即海棕乃鳳尾蕉之子或稱為棗實非棗也以刀剝去青皮石灰湯瀹之蜜浸瓶封可久藏寄遠不壞味甘美性溫消食寬中除痰止嗽益氣潤顏久食令人肥美胖大海出安南大洞山産至陰之地其性純陰故能治六經之火土人名曰安南子又名大洞果形似干青果皮色黑黃起皺紋以水泡之層層脹大如浮藻然中有軟殼核殼內有仁二瓣味甘淡治火閉痘服之立起並治一切熱症勞傷吐衄下血消毒去暑時行赤眼風火牙痛蟲積下食痔瘡漏管乾咳無痰骨蒸內熱三焦火症諸瘡皆效功難盡述藕粉節粉八仙藕粉冬日掘取老藕搗汁澄粉干之以刀削片潔白如鶴羽入食品先以冷水少許和勻調次以滾水衝入即凝結如膠色如紅玉可愛加白糖霜摻食大能和營衛生津綱目藕下止載澄粉作食輕身延年而不知其功用更專益血止血也凡一切症皆不忌可服養余月令有澄藕粉法取粗藕不限多少洗淨截斷浸三日夜每日換水看極淨漉出搗如泥以布絞淨汁又將藕渣搗細又絞汁盡卻輕濾去渾腳以清水少和攪之然後澄去清水下即好粉曬乾收貯和糯粉白糖蒸食之或以白糖開水沖服俱可菱粉芡粉俱用此法味甘氣芬芳性平調中開胃補髓益血通氣分清表熱常食安神生智慧解暑生津消食止瀉節粉出淮安寶應一帶多有之乃藕節搗澄取粉曬乾其價較藕粉數倍味甘微帶苦性平開膈補腰腎和血脈散一切瘀血生一切新血産後及吐血者食之尤佳宦遊筆記淮以南皆澤國居人蒔藕暇則濾為粉淘汰既淨去其渣滓存其甘液風吹日曝漸成碎珠以湯沃而食之純任天然別有風味亦野物之可尚者矣尤著名者曰片粉擇藕之極佳者淘曬人工十倍尋常及其既成則如白雲片片纖塵不染味亦絶勝非大有力者不能制也八仙藕粉經驗廣集此粉滋胃保元治一切虛勞雜症白花藕粉白茯苓白扁豆炒蓮肉川貝母山藥白蜜各等分人乳另入滾水沖不拘時食人紅丸濟世養生集專治童子勞怯神驗之極用人龍二十一條即蛔蟲童便洗淨瓦焙勿令黑研末不破皮紅棗三十個飯上蒸熱去皮核蘿蔔子一錢五分炒研大熟地五錢煮爛杵膏真藕粉一兩五錢研真川連六分酒拌炒研末右將紅棗肉熟地膏和諸藥末搗勻為丸如桐子大每早以白滾湯送下七粒逐日加增二粒至二十一粒止以後不必再加服一料痊愈豫屢試皆效切勿泛視菱粉蒂殼湖州府志菱本兩角者有果菱差小有湖趺菱色紅而大有青菱色青角曲而利四角者野菱最小者角極銛有泰州菱實豐而美近又有無角者名餛飩菱德清有雞腿菱文武菱菱有多種老則皆可為粉造粉之法與造藕粉同食菱粉而腹脹者用薑湯或酒解之補脾胃強腳膝健力益氣耐飢行水去暑解毒蒂疣子俗名飯饎用鮮水菱蒂搽一二次即自落殼治頭面黃水瘡醫宗彙編隔年老菱殼燒存性麻油調敷即愈無名腫毒販翁醫要老菱殼燒灰香油調敷即愈並治天泡瘡指生天蛇醫宗彙編以風菱角燈火上燒灰存性研末香油調敷未潰者即散已潰者止痛立愈治脫肛張氏必驗方先將麻油潤濕腸上自去浮衣再將風菱殼水淨之即刻縮上不脫矣芡粉嘉泰會稽志芡一名雞頭山陰梅市産之最盛有數等小白皮最佳大白皮中白皮其皮甚堅難齧黃嫩者太軟皆不逮也造粉與藕菱同法益精氣強智力靈耳目固精添髓養余月令九龍丹販翁醫要治腎水不足邪火淫動遺精淋濁等症枸杞子酒蒸金櫻子焙山楂肉炒石蓮肉炒蓮鬚焙熟地搗膏芡粉炒白茯苓當歸等分共為末煉蜜丸如桐子大每服三錢空心白滾湯下
