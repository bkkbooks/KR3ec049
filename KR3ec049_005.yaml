body:
  text: 卷五草部下六十五種附十六種浙貝土貝今名象貝去心炒百草鏡云浙貝出象山俗呼象貝母皮糙味苦獨顆無瓣頂圓心斜入藥選圓白而小者佳葉喑齋云寧波象山所出貝母亦分兩瓣味苦而不甜其頂平而不尖不能如川貝之象荷花蕊也土人於象貝中揀出一二與川貝形似者以水浸去苦味曬乾充川貝賣但川貝與象貝性各不同象貝苦寒解毒利痰開宣肺氣凡肺家挾風火有痰者宜此川貝味甘而補肺不若用象貝治風火痰嗽為佳若虛寒咳嗽以川貝為宜張景岳云味大苦性寒陰也降也乃手太陰少陽足陽明厥陰之藥大治肺癰肺痿咳喘吐血衄血最降痰氣善開鬱結止疼痛消脹滿清肝火明耳目除時氣煩熱黃疸淋閉便血溺血解熱毒殺諸蟲及療喉痹瘰癧乳癰發背一切癰瘍腫毒濕熱惡瘡痔漏金瘡出血火瘡疼痛為末可敷煎湯可服性味俱厚較之川貝母清降之功不啻數倍反烏頭又解上焦肺胃之火張石頑本經逢原云貝母浙產者治疝瘕喉痹乳癰金瘡風痙一切癰瘍同苦參當歸治妊娠小便難同青黛治人面惡瘡同連翹治項上結核皆取其開鬱散結化痰解毒之功也吹喉散經驗廣集治咽喉十八症俱效大黑棗每個去核裝入五倍子一個去蟲研象貝一個去心研用泥裹煨存性共研極細末加薄荷葉末少許冰片少許貯瓷瓶內臨用吹患處任其嘔出痰涎數次即愈對口楊春涯驗方象貝母研末敷之神效土貝母一名大貝母百草鏡云土貝形大如錢獨瓣不分與川產迥別各處皆產有出安徽六安之安山者有出江南宜興之章注者有出寧國府之孫字埠者浙江惟寧波鄞縣之樟村及象山有之入藥選白大而燥皮細者良百草鏡云味苦性平微寒無毒能散癰毒化膿行滯解廣瘡結毒除風濕利痰傅惡瘡斂瘡口茅昆來筆記味大苦專消癰疽毒痰楊梅結毒非此不除乳癰初起白芷土貝母各等分為細末每服三錢陳酒熱服護暖取汗即消重者再一服如壯實者每服五錢楊春涯驗方天花粉乳香去油沒藥白芷歸尾土貝母赤芍獨活川芎各一錢甘草節陳皮各八分穿山甲三片皂角刺一錢五分金銀花二錢五分防風一錢二分好酒煎服又方白芷梢土貝母天花粉各三錢乳香去油一錢五分共炒研末白酒漿調搽再用酒漿調服三錢乳癰外科全生紫河車草浙貝各三錢用黃糖拌勻好酒和服盡醉蓋被取汗趙貢栽云浙貝乃寧波土貝母也治乳岩葉氏驗方陽和湯加土貝母五錢煎服數日可消姚希賙濟世經驗方治乳岩已破用大貝母核桃槅金銀花連翹各三錢酒水煎服癧𤶱不論已破未破皆治瑞安生驗方土貝母半斤牛皮膠四兩敲碎牡蠣粉炒成珠去粉為細末水發丸綠豆大每日早晚用紫背天葵根三錢或用海藻昆布各錢半煎湯吞丸三錢又癧𤶱膏藥用牛皮膠水熬化一兩入土貝母末五錢攤油紙上貼之吉云旅抄紫背天葵一兩五錢土貝母昆布海藻各一兩西牛黃三分海螵蛸五錢陳膽星三錢桔梗一兩共為細末酒發為丸如綠豆大每日服六七十丸好酒送下千金不易方治男婦小兒生癧𤶱內消用土貝母研末陳米醋調搽數日即消仙姑玉環散治痰核癧𤶱未潰用此方生南星生半夏土貝各等分研末醋蜜調勻敷癧𤶱初起土貝研細陳米醋和搽數日暗消又方土貝母大力子全蟲洗各五錢紫背天葵根昆布洗海藻洗各一兩青皮蟬退各三錢甲片炒四錢蜈蚣酒炙七條當歸二兩為末蜜丸砂仁湯下三錢虛加人參種福堂敷痰核瘰癧方用生南星生半夏生大黃各一兩大貝母昆布海藻海浮石銅綠明礬各五錢用商陸根汁蔥汁薑汁蜜四味調敷又痰核瘰癧膏中用大貝母痰核方人參甘草各六分川芎桔梗陳皮木香烏梅各八分當歸白芷防風茯苓各一錢半夏五分生薑三片黑棗二個水二鍾煎服如患處有水不幹加知母一錢土貝母一錢消瘰癧傅信方穿山甲和沙炒牛皮膠切碎麥殼炒各二兩土貝母連翹各一兩共為末大人三錢小兒二錢治汗斑集驗土貝母一兩南硼砂一兩冰片一分共研末搽之即愈家寶方硼砂只用五錢以暑月出汗時頻擦乃效治鼠瘡彙集關紹聖方大鯽魚一尾皂角內獨子每歲一個川貝母三錢土貝母二錢將皂角子貝母入魚肚內黃泥包裹陰陽瓦炭火焙乾存性研為細末每服三錢食後黃酒調服忌葷百日手發背慈惠編生甘草炙甘草各五錢皂刺二錢五分土炒土貝五錢五分半夏一錢五分甲片二錢五分炒黑知母二錢五分加蔥姜水酒煎二劑服即愈刀割斧砍夾翦槍箭傷損集驗云土貝母末敷之止血收口毒蛇咬祝氏效方急飲麻油一碗免毒攻心再用土貝母四五錢為末熱酒沖服再飲酒盡醉安臥少時藥力到處酒化為水從傷口噴出候水盡將碗內貝母渣敷傷口垂死者皆活腫毒初起百草鏡云此方傳自異人應驗如響重者不過三服輕者一二服初起即散已成者自潰且易收口甲片炙搗六錢全當歸五錢花粉八錢白芷五錢廣皮三錢土貝母研二錢銀花一兩皂刺三錢赤芍六錢防風五錢甘草節六錢乳香炙另研一錢沒藥炙另研一錢蘇木二錢川牛膝一錢川斷五錢酒水各半煎汁去渣將沒藥乳香末調服取汗忌雞犬孝服男女僧尼觸犯須避靜室服藥趙貢栽云此方專於攻散藥力太重惟可施於壯實之人虛弱者勿服按貝母有甜苦之分有川象之別百草鏡云出川者曰川貝出象山者名象貝絕大者名土貝川產者味甘間有微苦總不似他產之一味苦而不甘者也入藥能補氣利痰而不寒虛人宜之象貝一味苦寒能化堅痰性利可知若土貝功專化膿解癰毒性燥而不潤以象貝皆小土貝獨大於川產者亦異綱目不分著功用或其時尚未有此種耳又用藥識微云川貝中一種出巴東者獨大番人名紫草貝母大不道地出陝西者名西貝又號大貝張石頑云貝母川產味甘最佳西產味薄次之象山者微苦又次之一種大而苦者僅能解毒並去心用今川中亦產一種大如錢者土人以之搗粉作漿刷川綢用不知入藥然則土貝川中亦產不特浙江也憶庚子春有友自川中歸貽予貝母大如錢皮細白而帶黃斑味甘云此種出龍安乃川貝中第一不可多得信是則川中之甜貝母亦有大者不特金川子獨甜也並附以俟考草棉綱目木棉下注云棉有二種似木者名古貝今訛為吉貝似草者名古終今俗呼棉花乃草棉也按代醉編棉花種為番使黃始所傳宋末始入江南沈黃門炤曰番中有青黃白三種今特傅其白者耳不知江浙草棉多種藝而木棉罕見即草棉中亦有黃色者不盡是白者入藥以白為勝綱目有棉花油不言花及子功用悉為補之百草鏡云花可止血殼可治膈膈食膈氣用棉花殼八九月採不拘多少煎當茶飲之三日即愈忌食鵝藥性考云草棉甘溫禦寒卻冷燒灰止血凍瘃敷穩子熱補虛暖腰治損油毒昏目塗癬疥等子性熱味辛治腸風救生苦海棉子丸取棉花子炒黃黑色去殼為末用陳米濃汁加黑砂糖丸如桐子每日空心時滾水下三錢服至三斤斷根腸紅秘方集驗棉子炒為末用白糖拌米湯和服血淋不止許氏方炒燥為細末三白酒送下二錢立止白帶沙淋救生苦海調經門香附散中用棉子仁赤白帶下百草鏡棉花子炒黑去殼為末米糊丸每服三錢赤帶用砂糖湯下白帶用白糖湯下種子最妙方用棉花子砂糖各三錢沖酒服薰洗痔傅信方鬼饅頭棉花子烏菱殼鳳尾草等分煎湯先熏後洗如疼加乳香癢加楊柳須或木稜藤又方用棉花子同槐樹梗葉煎湯洗熏自愈下血血崩不止百草鏡棉花子燒灰存性酒下立止便毒濟世方用棉花子瓦煅存性為末每日空腹酒下二錢連服三次全消兼治血崩陽痿不起祝氏效方棉花子水浸曬乾燒酒拌炒去殼用仁半斤破故紙鹽水炒韭菜子炒各二兩為末蔥汁為丸梧子大每服二錢空心酒下痢疾救生苦海棉花子仁新瓦炒去油焦研細每服二錢紅用燈心湯下白用好陳酒下癧𤶱棉花瘡集驗用棉花子一斗燒酒拌和炒燥去灰再拌再炒以黑為度去殼再炒搗為末用砂糖調和每服三錢服過一升許即愈除壁蝨易堂驗方硫黃末拌棉花子燒烟燻二三次即絕中風口眼喎斜便易良方用棉花子炒黑為末乳香末三錢紅糖二兩飯後黃酒送下即愈腸風下血不藥良方生柿子二個竹刀切去蒂核以棉花子塞入柿內仍蓋好瓦上煅存性研細末米飲熱調服重者三服全愈穀道生瘡俗呼偷糞老鼠不藥良方用棉花子炒去殼磨粉每早中晚三次打糊服一碗半月全愈治腎子大小偏墜回生集棉子煮湯入甕將腎囊坐入甕口俟湯冷止一二次散其冷氣自愈癱瘓諸風醫學指南乳香沒藥各三錢棉花子白糖各六錢為末黃酒化服出汗愈風蟲牙疼家寶方用韭菜子黑核桃肉棉花子各一兩分為末醋糊丸火酒浸咬在疼處即止痔漏家寶方用棉花子仁六兩烏梅六兩共搗爛為丸桐子大早晚每服三錢開水送下服完即愈經水過多不止慈航活人書棉花子瓦器炒盡烟為末每服二錢空心黃酒下小便血劉羽儀經驗方用棉花子炒枯存性為末熱火酒調服服後在左腳大指節上有毛處以豆大艾丸將火灸之即止盜汗不止劉氏驗方棉子仁三四錢每日煎湯一碗空心服三四日即止腸風腸紅下血垂危德勝堂方淮棉花核一升槐米七錢用天目芽茶四兩泡汁將二味炒燥入茶汁內復泡又炒如此數次汁干為度磨末每服三錢空心酒調下三日立愈治牙宣蘭臺軌範用棉花核煅灰擦治吹乳郎興祖方棉花子一兩打碎酒水同煎服治陰囊腎子腫大方集驗棉花子仁煎湯洗之自愈血崩龔雲林萬病回春用棉花子仁炒黃色甘草黃芩等分為末每服二錢空心黃酒下又集驗良方用陳椶棉花子二味燒灰存性黃酒送下即止虛怯勞瘵久嗽吐血不止集效方棉花子不拘多少童便浸一宿為末每服一錢側柏葉湯下諸藥不效此方甚驗酒調服治血崩集聽云棉子仁止血不寒凡血症及婦人經病帶下崩淋醋炒七次用心疼腹痛集聽用側柏葉米泔水浸三日日易水一次曬乾炒黑棉子仁末一斤配柏末八兩如熱甚者對配種子方集聽棉子仁淨肉四兩燒酒拌曬三次熟地二兩枸杞一兩菟絲子破故紙茯苓山藥陳皮五味子連翹何首烏各一兩蜜丸鹽湯空心服四錢痔漏管周氏家寶方棉花子仁炒急性子炒蓖麻子仁炒各等分為末每服三錢空心好酒下輕者半月重者一月管自退出血不止家寶方棉花子燒灰存性為末敷之崩帶家寶方陳蓮蓬燒灰存性五錢棉花子肉燒灰存性三錢共一服無灰酒調下治痰火後半身不遂筋骨疼痛核桃仁棉花子仁杜仲炒巴戟砂仁骨碎補枸杞子續斷牛膝各二兩大蝦米四兩菟絲餅四兩用燒酒二十斤煮服如年高者加附子肉桂各一兩酒服完將渣曬乾為細末煉蜜為丸每服二錢酒送下打老兒丸良朋彙集方久服延年卻疾棉花子一斤炒去殼核桃肉四兩打爛用小米麵打糊為丸重三錢滾湯服仙傳蟠桃丸臥雲山人傳大有補益治諸虛百損棉花子取淨仁乾燒酒拌透下用黃酒水平對蒸一炷香紅棗用黃酒煮熟取淨肉各一斤歸身牛膝枸杞俱用酒浸肉蓯蓉酒洗去泥用山茱萸酒潤去核菟絲子酒蒸成餅白魚鰾麩炒成泡白茯苓人乳拌蒸故紙鹽水炒熟地酒煮如飴以上藥各四兩淨巴戟酒洗去心五兩共為細末煉蜜為丸三錢早晚酒水任意送下棉花子丸年希堯集驗良方云烏須暖腎種子陽虛人宜此用棉花子十數斤用滾水泡過盛入蒲包悶一炷香取出曬裂殼口取仁並去外皮用淨仁三斤壓去油淨用火酒三斤泡一夜取起蒸三炷香曬乾故紙一斤鹽水泡一夜炒乾川杜仲一斤去外粗皮黃酒泡一夜曬乾薑汁炒去絲枸杞子一斤黃酒浸蒸曬乾兔絲子一斤酒煮吐絲為度共為末蜜丸桐子大每服二三錢長春丸治腎虛精冷之症集驗良方魚鰾一斤蛤粉炒成珠極焦棉花子取淨仁一斤去油淨酒蒸白蓮鬚八兩金櫻子去子毛淨一斤金釵石斛八兩炒蒺藜四兩枸杞子四兩五味子四兩炒鹿角五斤鋸薄片河水煮三晝夜去角取汁熬膏和藥末為丸桐子大每服三錢健步仙方凌雲集棉花子仁一斤淨肉用燒酒三斤炒乾枸杞子四兩酒浸杜仲四兩鹽酒煮炒菟絲子四兩酒炒歸身二兩破故紙四兩酒洗炒胡桃仁四兩共為末煉蜜為丸桐子大每服三錢空心滾湯下紫草茸葉大椿痘學真傳云紫草茸古本不見近刻但在紫草項下註明紫草茸染手者為佳竟不知別有一種予幼時見世叔華泓卿家有紫草茸為發痘神丹乃其高祖學士鴻山公使外國帶歸者予取而藏之每遇血熱毒壅失血煩悶頂陷不起痘疔腫脹於清解藥中研加四五分無不神效惜乎方書不載不敢擅增本草近見神應心書獨標紫草茸色澹紅出烏思藏著大樹枝上如白蠟其價如千金不特發痘如神用酒調服一二錢能治諸腫毒惡瘡又云順手擂一錢酒下力能催生此浟水潭應夢屢獲其效並請正西番貢僧之語至近時亦知茸非紫草之嫩苗復誤認胭脂渣即是紫草茸此說更謬按紫草本草諸方皆用根韋宙獨行方治豌豆瘡不發煮紫草湯飲後人相承用之則以之治痘涼血解毒自此始也曾世榮活幼新書云紫草性寒小兒脾氣實者猶可用脾氣虛者反能作瀉古惟用茸取其初得陽氣以類觸類所以用發痘瘡則用茸亦見於此而亦未聞有烏思藏所出一種據葉所云又似紫鉚亦無的解以其親試歷效故存其說以俟後之博訪治痘及諸腫毒惡瘡催生己亥冬遇劉挹清少府於餘杭言其祖曾任蜀藩家有西藏紫草茸皆成塊如指頭大色紅而明透如琥珀知葉所載為不謬翟良痘科釋義云痘科用紫草古方惟用其茸取氣輕味薄而有清涼發散之功凡下紫草必用糯米五十粒以制其冷性庶不損胃氣而致泄瀉惟大熱便秘者不必加獨腳連獨腳一枝蓮八角蓮附粵西偶記生廣西草如黃連根極大持入藥肆則諸藥香氣盡消為真三腳五腳者次之百草鏡此藥產廣東根大如拳春月發苗經霜雪則死若善藏過冬則來年宿根復發苗高尺許葉大如杯宛似荷葉色綠柔厚莖有細毛六七月起莖莖有白毛開花微垂似山蘭而小其色微紅稗史鄱陽山間生一種草始萌芽時便以蓮蓬俗呼為獨腳連移植於居宅隙地及園圃中蛇虺不敢過其下王季光宅後榛莽叢中有蛇穴常出為人害乃種此草數本於穴外自是其患不作至暑月間穴內臭甚使園丁掘土訪求得死蛇十數蓋為草氣所熏潰也又一小蛇來到草傍立化為水矣採藥錄獨腳黃連苗葉如土大黃面青背赤根直色黃此草根下有赤練蛇數條者方是按綱目鬼臼亦名獨腳連無治疔之說至集解下注形狀又小有異同故仍為補之庚戌予在臨安有醫士盛天然言其地古城與餘杭接界產獨葉花生山坑不見天日其形一葉中含紅花一朵儼如蓮花狀其花從葉心透出下有根作獨蒜狀其花葉聞人聲輒縮入根內不可見遇之者記其處掘之亦止有根其葉與花雖剖根覓之亦無形跡倘得之者不論何等毒蛇咬以根擦摩蛇毒即盡如有誤服蛇變鱉者以少許煎湯服之即瘥並能解一切毒蟲咬螫一切蟲毒草木毒咽喉一十八症皆驗如神凡人鼻發紅色生痱𤻳掀癢異常名曰痧蟲食鼻以此根磨塗立愈此乃天生神物有山行遇之者不論持何物先擲之以鎮住然後再掘即不能遁形凡生獨葉花地四圍約尺許無草其上不可手取亦勿以鐵刀取須用竹刀掘取則不傷根蓋此草蛇最喜蟠其旁凡蛇咬人亦中人毒必退殼若覓此物臥其傍一宿則人毒解可免退殼之患大毒蛇都喜蟠其根旁故土最毒近人手則手爛然得其根反能解百種大惡蛇毒丐者覓此以為得寶云治疔腫癰疽以根或醋酒磨塗葉貼癰腫能消治蛇咬祝氏效方用獨葉一枝花生溪攤浮土上根如鼠糞用根口嚼搽瘡上退疔奪命丹萬病回春云此丹專治疔瘡防風八分青皮七分羌活獨活黃連各一錢赤芍六分細辛八分殭蠶一錢蟬退四分澤蘭葉五分金銀花七分甘草節一錢獨腳連七分紫河車即金線重樓七分右銼五錢先服倍金銀花一兩澤蘭一兩少用葉生薑十片同搗爛好酒鏇熱泡之去渣熱服不飲酒者水煎亦可然後用酒水各一半煎生薑十片熱服出汗病退減後再加大黃五錢同煎熱服以利二三次去餘毒如有膿加何首烏白芷梢在腳加檳榔木瓜要通利加青皮木香大黃梔子牽牛獨腳一枝蓮百草鏡山間有之二三月苗發生菅芧俗名干苛叢中獨莖無葉高尺許莖細強青白色莖端有一疙瘩至晚秋時疙瘩生花類蓮其根與黃麻很相似治疔腫癰毒流注八角連湧幢小品綏甯產之可以伏蛇諺云識得八角連可與蛇共眠治一切毒蛇傷按瀕湖綱目有鬼臼亦治毒蛇傷鄭樵通志云八角盤即鬼臼今人所謂獨腳連是也或粵語類舉其名呼為八角連未可知附存俟考汪連仕草藥方八角盤起金星名金星八角嬰兒取為獨腳連俗呼獨葉一枝花根如赤朮多眼如馬目今人呼馬目奪公消一切毒力能軟堅透膿露花粉粵志露花生番禺蓼湧狀如菖蒲其葉節邊有刺葉落根以火煏之成枝幹而多花花生叢葉中其瓣大小亦如葉而色瑩白柔滑無芒刺花抱蕊心如穗朝夕有零露在苞中可以解渴又有粉可入藥其生於他土者蕊落結子大如瓜曰路頭花多不香惟露花盛夏時露花始熟以花覆盆盎曬之香落茶子油中其氣馥烈是曰露花油蓼湧及增城人善為之遲開者曰寒花香益清徹不可為油其生東安山中者叢卑葉小自春至秋皆花近水者尤香亦不可為油塗兒女肌膚止汗通血香出西洋色如干醬百草鏡云出陝西羊絨客帶至杭貨賣治血症及肝血氣入藥最良臌脹救生苦海通血香一錢取亞腰葫蘆一個不去子膜入香於內再入酒煮仍以所開之蓋合縫封固以陳酒安鍋內懸葫蘆於酒中挨定勿令傾倒將鍋蓋密煮三炷線香為度煮時其香透屋牆之外煮完取出葫蘆內子膜並藥烘乾為末每服一錢空心時酒下間五日再服一錢服盡葫蘆內藥服五六錢即愈此方出廣筆記云治脾虛有濕者瘰癧良朋彙集有治瘰癧內消方紫背天葵一兩五錢海藻海帶昆布各一兩海螵蛸五錢貝母桔梗各一兩通血香三錢右藥為細末酒糊為丸桐子大每服七十丸食後溫黃酒送下痔漏通腸海藥秘錄胡連追毒方專治痔漏不拘遠年近日有漏或通腸及汙浞孔出者先用此方追盡膿血後服黃連閉管丸取效最穩用胡黃連八錢切片薑汁拌炒刺蝟皮一個切片炒黃為末通血香八分須用真者研末麝香二分共和勻軟飯為丸麻子大每服一錢食前酒下服藥後膿水反多乃藥之功勿懼可也黃連閉管丸胡黃連淨末八錢甲片麻油內煠黃五錢石決明煅過五錢真通血香六分不可少槐花五錢共為細末蜜丸麻子大每服一錢空心清米湯下早晚二服重者二十一日收功此方不用刀針掛線之苦誠起廢之良方也如漏邊有硬肉突起者加蠶繭二十一個炒末和入此方及遍身諸漏並治屢試屢效臟連丸治痔漏無論新久但舉發便下血作痛肛門墜重者膿血不止腫痛難坐者並治胡黃連淨末八兩通血香錢半用雄豬大腸盡頭一段長一尺二寸溫湯洗淨將連末及通血香灌入腸內兩頭以白絲線紮緊煮酒二斤半新砂鍋內煮酒將干為度取起腸藥各搗如泥倘藥爛曬一時復搗為丸桐子大每服七十丸空心溫酒送下久服除根又名白銀定子治漏有孔者只須半月見功神效三品一條槍白砒淨末一兩白礬淨末二兩明雄黃二錢四分通血香八分乳香一錢二分先將砒礬研極細末鐵杓熔成餅入炭火煅烟淨取出去火毒為末和入雄黃血香乳香細末作錠子成條插入漏內直透里痛處為止每日上三次至七日為止半月瘡結而愈如痛未痊用生肌散收口可也生肌散治諸痔諸瘡腫毒收口神速大妙乳香沒藥海螵蛸用三黃湯煮過寒水石煅過輕粉龍骨煅赤石脂煅冰片各等分共研細末摻患處外貼膏藥野馬豆出西藏乃番僧捻草末合成如豆形故名王怡堂云藏中出一種草彼土人呼為野馬草番僧擇日採之研為細末置淨器中供佛前更擇日合和為藥其合藥之日率彼土男婦皆於佛前誦咒以所和草末研為丸男丸者為雄婦丸者為雌藥亦分雌雄形雄者丸上有小圓凸雌者作長凹色有紅有黑皆如綠豆大丸畢仍置淨器中必須雌雄合在一處一二日能生出小豆如麻子屑飼以藏紅花間日視之紅花漸少則新生之豆漸大久則又生小豆以此生生不息亦一異也如攜帶遠方無藏紅花豆亦不死惟不能化生小豆耳西寧人曾玉瀛言野馬豆又呼嘛呢子如半粒綠豆大藏中人得此豆每日輒誦唵嘛呢叭𠺗吽六字數百遍丸豆時亦口唸此六字故名能治胃氣心痛惟瘄痘瘧疾忌服以其善於長化顛倒陰陽也馬少云衛藏圖識藏中有子母藥大裁可綠豆以哈達潔裹之經時小粒漸曾有子母相生之義傳達𡃤喇嘛默持佛咒以糌粑搓成者故以奇異著按此即野馬豆也朱排山柑園小識喇嗎嘗聚會以米麥數粒置瓶中四人守之誦唵嘛𡄣叭呢吽六字咒飲食則代無間晝夜四十九日有紅子滿瓶中大如芥子色似硃砂謂之嘛𡄣子佩之能避邪致祥小兒食之稀痘壬子予從戚友處覓得嘛𠺗子數十粒以玻璃盆貯之形勻圓儼似急性子而色紅據云初得時色不甚紅苦無藏紅花即市本地河南所產紅花研屑拌之久則色紅如硃砂平瑤海先生偶得西藏嘛𠺗子數十粒一時無玻璃器乃即置紙裹中供佛前日誦文殊六字真言數百遍其子能忽多忽少又能透出紙裹外變幻不常異之以告客客曰此物性成本得西僧咒力其造子之法今都中喇嘛亦能為之每四月八日大小喇嘛輒群聚佛前選高行持誦者數十人鐃鈴法鼓宣揚六字真言七晝夜其丸即用乾麵手搓如粟米大口唸手丸以金盆貯之丸時得咒力粒粒皆能自飛或在窗欞或在案格堆結團聚俟七晝夜滿後其不能飛者去之其飛者用帚掃下以送諸王大臣名嘛𠺗子可治諸疾變幻多寡蓋自其成性巳然無足異也入藥以西藏合者佳癸丑冬在上虞署晤平司馬少君菜仲言曾隨任中甸其地系西藏要路有喇嗎等彼地呼野馬豆為舍利子有草木佛三種彼土富人死必納一粒口中云入冥生光土人有病亦輒服之金御乘言慈溪有患耳聾者其家有藏中帶來嘛𠺗子取服三粒忽聞兩耳中大聲一震轟然如掣去數百斤物者嗣後耳更聰甚其人一日忽眠食妓家次日復聾如故再服亦無效矣味微辛性平治百病彼土無藥有病即服此豆夏草冬蟲出四川江油縣化林坪夏為草冬為蟲長三寸許下趺六足脰以上絕類蠶羌俗採為上藥功與人參同從新云產雲貴冬在土中身活如老蠶有毛能動至夏則毛出土上連身俱化為草若不取至冬復化為蟲四川通志云冬蟲夏草出里塘撥浪工山性溫暖補精益髓黔囊夏草冬蟲出烏蒙塞外暑茁土為草冬蜇土為蟲青藜余照四川產夏草冬蟲根如蠶形有毛能動夏月其頂生苗長數寸至冬苗槁但存其根嚴寒積雪中往往行於地上文房肆考邇年蘇州皆有之其氣陽性溫孔裕堂述其弟患怯汗大泄雖盛暑處密室帳中猶畏風甚病三年醫藥不效症在不起適有戚自川歸遺以夏草冬蟲三斤逐日和葷蔬作餚燉食漸至愈因信此物保肺氣實腠理確有徵驗用之皆效七椿園西城聞見錄夏草冬蟲生雪山中夏則葉歧出類韭根如朽木凌冬葉乾則根蠕動化為蟲入藥極熱徐後山柳崖外編冬蟲夏草一物也冬則為蟲夏則為草蟲形似蠶色微黃草形似韭葉較細入夏蟲以頭入地尾自成草雜錯於蔓草間不知其為蟲也交冬草漸萎黃乃出地蠕蠕而動其尾猶簌簌然帶草而行蓋隨氣化轉移理有然者和鴨肉頓食之大補紹興平菜仲先生言其尊人曾任雲南麗江府中甸司馬其地出冬蟲夏草其草冬為蟲一交春蟲蛻而飛去土人知之其取也有期過期無用也朱排山柑園小識冬蟲夏草生打箭爐冬生土中如蠶夏則頭上生苗形長寸許色微黃較蠶差小如三眠狀有口眼足十有二宛如蠶形苗不過三四葉以酒浸數枚啖之治腰膝間痛楚有益腎之功以番紅花同藏則不蛀或云與雄鴨同煮食宜老人潘友新云粵中鴉片丸用夏草冬蟲合鴉片人參合成乃房中藥也此草性更能興陽則入腎可知甘平保肺益腎補精髓止血化痰已勞嗽治膈症皆良從新味甘性溫秘精益氣專補命門藥性考按物之變化必由陰陽相激而成陰靜陽動至理也然陽中有陰陰中有陽所謂一陰一陽互為其根如無情化有情乃陰乘陽氣有情化無情乃陽乘陰氣故皆一變而不復返本形田鼠化鴽鴽化田鼠鳩化鷹鷹化鳩悉能複本形者陽乘陽氣也鉚石化丹砂斷松化為石不復還本形者陰乘陰氣也夏草冬蟲乃感陰陽二氣而生夏至一陰生故靜而為草冬至一陽生故動而為蟲輾轉循運非若腐草為螢陳麥化蝶感濕熱之氣者可比入藥故能治諸虛百損以其得陰陽之氣全也然必冬取其蟲而夏不取其草亦以其有一陽生髮之氣可用張子潤云夏草冬蟲若取其夏草服之能絕孕無子猶黃精鉤吻子相反殆亦物理之奧云周兼士云性溫治蠱脹近日種子丹用之燉老鴨法用夏草冬蟲三五枚老雄鴨一隻去肚雜將鴨頭劈開納藥於中仍以線紮好醬油酒如常蒸爛食之其藥氣能從頭中直貫鴨全身無不透浹凡病後虛損人每服一鴨可抵人參一兩綿絮頭草一名金佛草一名地蓮俗呼黃花子草生郊野立春後發苗葉多白毛似綿絮至立夏開黃花一莖直上花成簇處處山阪有之鄉人初春採其葉揉粉作𩝐食清香堅韌最適口此草形小布地生葉似慎火而薄摘之有白絲色青白本小如剪刀草按綱目有鼠曲俗名毛耳朵葉有白茸又名茸母宋徽宗詩茸母初生認禁烟即此蟻食此草即醉故又名蚍蜉酒草然其功用亦止載其能治寒熱咳嗽去肺寒大升肺氣而已今別補其功用味酸性熱多食損目治囊風濕癢煎湯洗愈兒疳梅瘡下疳同甘草煎洗鴉膽子一名苦參子一名鴉膽子出閩廣藥肆中皆有之形如梧子其仁多油生食令人吐作霜捶去油入藥佳治痢何夢瑤醫碥鴉膽丸用鴉膽子去殼捶去油一錢文蛤醋炒枯礬川連炒各三分糊丸硃砂為衣或鴉膽霜黃丹各一錢加木香二分亦可烏梅肉丸硃砂為衣二方俱丸綠豆大粥皮或鹽梅皮或圓眼乾肉或芭蕉子肉包吞十一二丸立止裡急後重吉云旅抄用鴉膽即苦榛子去殼留肉包龍眼肉每歲一粒白滾水下治痔金御乘雲近日閩中板客皆帶鴉膽子來治痔如神有患者以子七粒包圓眼肉吞下立愈至聖丹治冷痢久瀉百方無驗者一服即愈凡痢之初起實熱實積易知而易治惟虛人冷積致痢醫多不以為意蓋實熱之症外候有身熱煩躁唇焦口渴肚疼窘迫裡急後重舌上黃胎六脈洪數證候既急治者亦急輕則疏利之重則寒下之積去而和其陰陽無不愈者致於虛人冷積致痢外無煩熱躁擾內無肚腹急痛有赤白相兼無裡急後重大便流痢小便清長此由陰性遲緩所以外症不急遇此不可姑息但以集成三仙丹下之以去其積倘不急下必致薺虎貽患其積日久漸次下墜竟至大腸下口直腸上口交界之處有小曲折隱匿於此為腸穢最深之處藥所不到之地證則乍輕乍重或愈或發便則乍紅乍白或硬或溏總無一定任是神丹分毫無濟蓋積不在腹內而在大腸之下諸藥至此性力已過盡成粃糠安能去此沉匿之積所以冷痢有至三五年十數年不愈者由此故也古方用巴豆為丸下之者第恐久病人虛未敢輕用今已至捷至穩鴉膽子一味治之此物出閩省雲貴雖諸家本草未收而藥肆皆有其形似益智子而小外殼蒼褐色內肉白有油其味至苦用小鐵錘輕敲其殼殼破肉出其大如米敲碎者不用專取全仁用之三五歲兒二十餘粒十餘歲者三十多粒大人則四十九粒取大圓肉包之小兒一包三粒大人一包七粒緊包空腹吞下以飯食壓之使其下行更藉此圓肉包裹可以直至大腸之下也此藥並不峻厲復不肚痛俟大便行時有白凍如魚腦者即冷積也如白凍未見過一二日再進一服或微加數粒此後不須再服服時忌葷酒三日戒鴨肉一月從此除根永不再發矣倘次日腹中虛痛用白芍一枝甘草一枝各重三錢紙包水濕火內煨熟取起捶爛煎湯服之立止此方不忍隱秘筆之於書以公世用痢疾神方醫宗彙編用白石榴燒灰一錢真鴉片切片二錢鴉膽子去殼紙包壓去油三兩人參三分枯礬二分海南沉香三分共為細末調粥為丸重五六釐曬乾瓷瓶收貯紅痢用蜜一匙滾水調下紅白相兼陰陽水送下肚脹滾湯下水瀉米湯開水送下忌油膩腥酸一月元寶草生浙江田塍間一莖直上葉對節生如元寶向上或三四層或五六層此草有兩種一種兩葉包莖亦對節生一種獨葉莖穿葉心入藥心獨葉者為勝百草鏡元寶草生陰土近水處多有之穀雨後生苗其葉中闊兩頭尖如梭子形穿莖直上或五六層或六七層小滿後開花黃色氣性涼辛寒百草鏡性涼補陰治吐血衄血跌撲閃腰挫疼癰毒雀梅一名爵梅葉如薔薇結實如梅而小百草鏡云有一種山雀梅枝不蔓曲是樹不實亦有高大者按爵梅綱目主治蝕惡瘡外皆不載今復補其功用綱目郁李下引詩疏云一名雀梅與此名同物異亦不言治癰毒葉酸寒治乳癰便毒有奇效瀉熱解毒鐵烏鈴採藥書又名鐵鈴草其本色黑葉梗極堅實如鐵其汁黑可烏須主治楊梅惡瘡風氣癱瘓損折筋骨俱煎酒服汪連仕方奶酣草俗名奶孩兒處處人家種之葉尖大如指甲有枝梗夏月開細紫花成簇結子亦細今人種於盆內婦人暑月採之插發可闢膩䐈芳香辟惡去臭氣辛溫和中止霍亂吐瀉行氣活血發瘧者塞鼻能令寒熱漸輕土當歸荷包牡丹之根今人呼和血草即土當歸也汪連仕云用其根搗汁酒沖服之令人沉醉金瘡之聖藥也開金鎖從新云產江浙葉如萆薢高三四尺根如首烏而無稜內白色而無紋略似菝葜而無刺苦平祛風濕同蒼朮當歸治手足不遂筋骨疼痛鐵指甲李氏草秘其草葉似指甲生牆腳階岸石砌間王安採藥方此草沿松樹上一名佛指甲一名寄生治諸癤毒火丹頭面腫脹將危者少入皮消搗罨之立愈李氏草秘牙疼煅末擦之立效王安雪裡青荔枝草附一名土犀角一名過冬青生田塍間葉如天名精而小布地生無枝梗葉有細白毛四時不凋雪天開小白花又荔枝草亦名雪裡青百草鏡云雪天開小白花者乃過冬青三月起莖花白成穗如夏枯草有毛者名雪裡青味苦大寒瀉熱治咽喉急閉搗汁灌之甚效王氏驗方云能行上焦治腫痛散風火結滯咳血雪裡青根精豬肉切片層層隔開白酒淡煮至爛食之肺痿雪裡青搗汁加蜜和勻作二次服每日服五七次七日全愈齒痛雪裡青搗汁含痛處再用酒和服少許痔雪裡青湯洗之吹喉薄荷一兩雪裡青五錢加冰片三分為末吹喉或吹鼻孔亦可肺癰集效方雪裡青搗汁沖酒服之立效黃雨岩云危篤肺癰痿症第一用雪裡青搗汁服如吐尤妙治單雙蛾木蓮蓬雪裡青根葉搗汁米醋滾過衝入前汁含少許嘓之吐出即愈荔枝草一名皺皮蔥丹術家入爐火用百草鏡云荔枝草冬盡發苗經霜雪不枯三月抽莖高近尺許開花細紫成穗五月枯莖方中空葉尖長面有麻累邊有鋸齒三月採辛亥予寓臨安署中見荒圃中多此物葉深青映日有光邊有鋸齒葉背淡白色絲筋紋輟綻露麻累凹凸最分明凌冬不枯皆獨瓣一叢數十葉點綴砌草間亦雅觀也性涼涼血葛祖遺方治咽喉十八症消癰腫楊梅痔瘡急驚集聽荔枝草汁半鍾水飛過硃砂半分和勻服之立愈小兒疳積集聽荔枝草汁入茶杯內用不見水雞軟肝一個將銀針鑽數孔浸在汁內汁浮於肝放飯鍋上蒸熟食之即愈喉痛或生乳蛾救生苦海用荔枝草搗爛加米醋絹包裹縛箸頭上點入喉中數次愈雙單蛾集效方雪裡青一握搗汁半茶鍾滾水沖服有痰吐出如無痰將雞毛探吐若口乾以鹽湯醋湯止渴切忌青菜菜油痔瘡活人書雪裡青汁炒槐米為末柿餅搗丸如桐子大每服三錢雪裡青煎湯下白濁張綠漪傳方雪裡青草生白酒煎服無名腫毒葉天士效方雪裡青一握解者佳加金剪刀同搗爛入酒糟半鍾共搗敷不必留頭輕者自散重者雖出膿無妨治鼠癧經驗廣集用過冬青即荔枝草又名天名精五六枚同鯽魚入鍋煮熟去草及魚汁飲數次愈汪連仕草藥方鳳眼草即荔枝草土人稱為賴師草醫家名隔冬青涼血止崩漏散一切癰毒最效落得打一名土木香山雄黃五香草從新云近處有之苗高尺許葉如薄荷根如玉竹而無節搗爛則黏按從新所說似今人所名為紫接骨者落得打予養素園中曾種之苗長二三尺葉細碎如蒿艾秋開小白花結子白色成穗累累如水紅花但白色耳故又名珍珠倒捲簾治跌打損傷神效曾記辛己年小婢失足從樓梯墜下瘀血積滯因採此搗汁沖酒服以渣罨傷處一飯頃疼塊即散內瘀亦瀉出葉有清香者是此藥以家種隔二三年者入藥用良野產者入藥有草氣胃弱者服之多吐百草鏡云此草立春後始發苗十月枯八月開花苗葉如菊艾有歧尖而薄五月採嫩枝入藥李氏草秘七葉草一名落得打一名活血丹雖名草實樹其樹高一二尺五七尺不等搗汁和酒服治打傷撲損疔瘡腫毒煎洗痰咳瘰癧久久自消敏按此言木本當又是一種甘平治跌打損傷及金瘡出血並用根煎服或搗敷之不作膿葛祖方治跌打損傷無名腫毒去瘡瘀血死肉不痛百草鏡云性甘香溫入脾經去風調氣活血花擦牙疼治頭風及風氣苦花子一名毛連子又名小葉金雞舌又名苦花椒入藥梗葉並用治疔瘡瘴毒蛇傷熱腹痛熱喉風並效搗汁擂水夏冷服冬溫服佛手草朱烺齋任城日鈔杭州秦亭山聖帝殿廚房後石臺基上有草狀如百合名百合草一名佛手草寺僧藉以貨售香客以入藥治瘡不論何種惡瘡以此草煎湯洗之即愈敏按王安採藥方射干一名佛手草不治瘡與此別草石蠶餘杭山中多有之葉似大葉金星根黑色如蠶按甘露子亦名草石蠶與此別前溪逸志銅官山生石蠶藤也以石為土形則蠶也採食之可已風痹本草石蠶乃石似蠶者非真蠶也藤之蠶根於石石之蠶伏於土非格勿君子焉能辨其名號識其性情哉治虎傷收口用之虎咬成瘡口不斂者為末摻上即痂風痹羊毛痧敏按王安採藥方金星鳳尾即寶劍草其根名石蠶能解硫黃毒蛇毒治發背癰疽結核等症竹木魚刺黃疸熱淋洗眼疾陰濕瘡似此則非藤蠶甘露子明矣毛葉仙橋貓舌仙橋附一名翠梅草百草鏡云春月發苗葉狹尖糙澀微有毛三月開花碧色至五月間其莖蔓延黏土生根兩頭如橋故名三月採去根性寒葛祖方治失力黃能退諸瘡熱血風火氣毒百草鏡云散風火利濕熱治白火丹疥瘡澀精白濁用毛葉仙橋三錢酒煎服李氏草秘仙橋草形似橋倒地生根葉似柳厚背紫色者多秋開紫花一條治疔瘡諸毒癰腫用此草搗汁加酒服雖發狂垂死入口即生汪連仕云細葉者紫背仙橋背必須紫色延蔓倒地如橋土人名為疔瘡草能消疔腫拔根合蒼耳草酒煎服貓舌仙橋汪氏草藥方貓舌仙橋葉面生刺草本塌地生花青紫多產水澤旁治疔瘡理黃膽一切濕火汪氏荷包草一名肉餛飩草一名金鎖匙生古寺園砌石間似地連錢而葉有皺紋形如腰包青翠可愛百草鏡云二月十月發苗生亂石縫中莖細葉如芡實大中缺形似掛包餛飩故名蔓延貼地逐節生根極易繁衍山家階砌亂石間多有之四月十月採過時無性微寒治黃白火丹去濕火兼神仙對坐草用清五臟點熱眼止吐血洗痔瘡調婦人經忌鹽水腫初起百草鏡云活鯽魚大者一尾用瓷片割開去鱗及腸血以紙拭淨勿見水以荷包草填腹令滿甜白酒蒸熟去草食魚利濕熱治黃白膽臌脹白濁經閉搗汁點熱眼煎湯洗痔瘡腫痛百草鏡疝氣周氏家寶用荷包草研爛汁酒送服此草形似荷包上面有二子初生時有葉無子須至六七月方生黃疸家寶方荷包草螺螄三合同搗汁澄清煨熱服眼中生疔眼科要覽用肉餛飩草連根葉和酒漿板搗汁飲二三次即愈酒漿板即酒釀糟也蛇咬家寶方鶴頂紅即灰藋肉餛飩野甜菜三味共搗敷之鼠牙半支生高山石壁上立夏後發苗葉細如米粒蔓延絡石其根嵌石罅內白如鼠牙百草鏡載各種半支有七十二種此為第一百草鏡鼠牙半支二月發苗莖白其葉三瓣一聚層積蔓生花後即枯四月開花黃色如瓦松性寒消癰腫治濕鬱水腫治諸毒及湯烙傷疔癰等症蟲蛇螫咬蔣儀藥鏡拾遺賦半枝蓮解蛇傷之仙草半枝蓮飲百草鏡云治一切大毒如發背對口冬瓜騎馬等癰初起者消已成者潰出膿亦少鼠牙半支一兩搗汁陳酒和服渣敷苗頭取汗而愈章南聞試效狗牙半支虎牙半支附生陰濕地立夏前發苗葉尖細作品字式層覆而生夏至時開花黃色類瓦松花後即死其年雨水多其草必茂葉大者曰虎牙治癰疔便毒黃疸喉癬救生苦海用狗牙半支搗汁加陳京墨磨汁和勻嗽喉日咽四五次甚者半月愈天蛇頭疼不可忍醫宗彙編用半支連同香糟搗爛少加食鹽包住患處疼即止虎牙半支功同汪連仕採藥書虎牙半支性寒涼無毒葉片大者羊角半支葉扁大者馬牙半支俱生陰山谷中治疔腫火毒痔漏神效馬牙半支一名醬瓣半支鐵梗半支又名山半支生石壁上葉大叢生圓如醬中豆瓣故名百草鏡云醬瓣半支又名旱半支葉如醬中豆瓣生石上或燥土平隰皆有之蔓生二月發苗莖微方作水紅色有細紅點子經霜不凋四月開花黃色如瓦松山左人以為菜茹江獻祥雲此有二種有紅梗青梗之別治婦人赤白帶第一妙藥赤帶用赤梗者白帶用白梗者採得搗汁半酒盞酸迷迷草亦有赤白二種赤帶用赤者白帶用白者搗汁半酒盞和勻加紹酒半盞煮熟一服即止永不再發性寒消癰腫治濕熱利水和血腸癰痔漏治蛇咬疔疽便毒風痹跌撲黃疸擦汗斑尤妙百草鏡跌撲用醬瓣半支一握搗汁陳酒和服絕瘧家寶方醬板豆草六月六日雞鳴時採略洗蒸熟一日曬乾不幹焙之每一斤配老薑一斤磨細收貯一日者一錢二日者二錢三日者三錢酒調服服後飲酒至醉為妙合時忌雞犬婦人見之神效狗咬以酒洗淨瘡口血搗醬板半支罨上一二日即痂而愈王小靜試驗瘰癧金養淳云馬牙半支作菜常服多年瘰癧皆消屢試屢驗治急痧用醬瓣草陰乾每服三錢水煎服治淋疾奇方類編用芝麻一把核桃一個石上馬牙半支共搗碎生酒沖服治水臌汪連仕云取醬瓣草搗合麝香貼臍眼如人行五里其水即下狗尾半支百草鏡云生頹垣牆側人家荒圃中尤多俗呼狗尾草葉如茅六月開花形如狗尾採取花莖下截陰乾用綱目狗尾草下止載穿疣目去赤眼惡血而不言別功用故為補之治疔癰癬面上生癬取草數莖揉軟不時搓之即愈風粟癮疹狗尾草莖刮出瘀血避風數次自效見杭集三方羊毛癍家寶方一名羊毛痧以狗尾草煎湯內服外用銀針挑破紅瘰用麻線擠出瘰中白絲如羊毛狀者即愈否則脹死金雞獨立草散喉風採藥志云散喉癰之聖藥敏按此即翠羽草宜並神仙對坐草一名蜈蚣草山中道旁皆有之蔓生兩葉相對青圓似佛耳草夏開小黃花每節間有二朵故名按外科全生云此草梗葉長青經冬不衰殊不知春生秋死不衰之說謬矣百草鏡云此草清明時發苗高尺許生山隰陰處葉似鵝腸草對節立夏時開小花三月採過時無王安採藥方一名地蜈蚣黃疸初起又治脫力虛黃百草鏡用神仙對坐草三葉白荷包草平地木茵陳各三錢水煎分三服早中晚下一服全愈脫力虛黃五劑祝氏效方洞天仙草膏用之又毒蛇咬搗此草汁飲以渣罨傷口立愈一切疝氣劉羽儀驗方仙人對坐青木香二味搗汁沖酒服立效治反胃噎膈水腫臌脹黃白火疸疝氣陰症傷寒王安紫羅蘭白花者良產溪澗者尤佳其根入藥不可多服令人吐瀉傷胃氣治臌脹腫滿清利水道土產者治跌打損傷取根搗酒服少許汪連仕採藥書龍鬚草野席草烏龍鬚一名叉雞草綠袍草鐵線草鐵線筒人字草似扁蓄而小細圓與綱目石龍芻別百草鏡云生山澤穀雨後發苗與野席草相類但席草之葉直上此草橫生布地小滿時抽莖開花青細德勝堂傳方棒槌草亦名丫雞草治跌打汪連方甌人以此織蓆有石龍芻草龍芻之名後訛芻為須土產者即叉雞草又名鹿跑草治一切瘡疥至真織蓆龍鬚其性溫和散風火大理濕熱治口咽諸毒火症牙痛野席草生山澤水旁較席草稍短細亦名龍鬚草清明後生苗小滿時開花細小根類竹根黑色入藥取根用止血崩風氣疼痛鶴膝風夢遺酒煎服湯煎洗出汗草藥鑑利濕熱治癃淋精濁崩中濕痹鼻衄痄腮明目疣痛口咽諸毒火症鶴膝風百草鏡瘰癧痰核王用予鼻中不時出血野席草根煎服一盤珠齒牙疼痛動搖欲落者仁惠方用野席草根煎湯代茶服一二日牙疼自止永不再發齒牙動搖者亦堅固如石烏龍鬚徐一士云有鄉人行野田中見老烏桕樹上掛生細長草一叢如燈心狀下垂一道士指謂曰此名烏龍鬚乃五福星所照在樹而生此取曬藏之可治痼疾一切血症鄉人如其教後用頗驗治癰腫一切血症勞瘵真珠草與菜部真珠菜異臨症指南云珍珠草一名陰陽草一名假油柑此草葉背有小珠晝開夜閉高三四寸生人家牆腳下處處有之癸亥予寓西溪看地見山野間道旁有小草葉如槐而狹小葉背生小珠如鳳仙子大累累直綴經霜輒紅詢土人皆不識偶歸閱指南始悟此即真珠草也薄暮取視其葉果閉治小兒百病及諸疳瘦弱眼欲盲皆效為末白湯下或蒸煮魚肉食指南九龍草百草鏡云生石上蔓延丈餘節處生根苗頭極多葉絨細青色又名九頭獅子草又名金釵草按綱目九龍草僅於雜草內附見而所引楊清叟外科方一條述其苗葉尚是此草至云生紅子如楊梅則誤矣性溫行血脈治風痹跌撲損傷雙單蛾痛風奶癰家寶方九龍草搗同醬板罨除臭蟲經驗廣集取九頭獅子草放床四角每角用二三顆置草荐下任其自干去臭蟲神妙紅白蛇纏王氏秘方九龍草焙存性麻油調搽周氏家寶治毒蛇咬用九龍草搗汁半碗雄黃二錢酒沖服止痛此草生紅子如楊梅樣搗汁亦可治喉痛按此則楊清叟外科所載形狀同或名同物異與獅子草回殊並存以俟考石打穿鐵筅帚葛祖方一名龍芽草石見穿地胡蜂地蜈蚣百草鏡地蜈蚣與神仙對坐相似惟葉上有紫斑為別且神仙對坐草之花每節兩朵此則攢聚莖端或三四或五六相聚為別疑即石見穿龍芽草生山土立夏時發苗布地葉有微毛起莖高一二尺寒露時開花成穗色黃而細小根有白芽尖圓似龍芽頂開黃花故名金頂龍芽一名鐵胡蜂以其老根黑色形似之又一種紫頂龍芽莖有白毛葉有微毛寒露時抽莖開紫花成穗俱二月發苗葉對生貼地九月枯七月採按石打穿綱目於有名未用下列之只言止骨痛大風癰腫不言他用而葛祖遺方載其功用甚廣並有諸名考之百草鏡龍芽二種與地蜈蚣俱非一物論其功用石打穿治黃疸地蜈蚣治跌撲黃疸故百草鏡因其用相同於地蜈蚣下注疑即石打穿於龍芽草下注亦名石見穿治下氣活血理百病散痞滿跌撲吐血崩痢腸風下血明明二種功用各異不知葛祖方何以混為一此書傳自明末或有舛訛或有的識未敢妄議附識於此以俟再考敏按蔣儀藥鏡拾遺賦云滾咽膈之痰平翻胃之噦石打穿識得者誰注噎膈翻胃從來醫者病者群相畏懼以為不治之症余得此劑十投九效不啻如饑荒之粟隆冬之裘也乃作歌以志之歌曰誰人識得石打穿綠葉深紋鋸齒邊闊不盈寸長更倍圓莖枝抱起相連秋髮黃花細瓣五結實匾小針刺攢宿根生本三尺許子發春苗隨弟肩大葉中間夾小葉層層對比相新鮮味苦辛平入肺臟穿腸穿胃能攻堅採掇莖葉搗汁用蔗漿白酒佐使全噎膈飲之痰立化津咽平復功最先世眼愚蒙知者少岐黃不識名浪傳丹砂句漏葛仙事余愛養生著數言據歌中所言形狀則又似鐵筅帚故並存其說而附錄之癸丑余親植此草於家園見其小暑後抽苔屆大暑即著花吐蕊抽條成穗儼如馬鞭草之穗其花黃而小攢簇條上始悟馬鞭草花紫故有紫頂龍芽之名此則花黃名金頂龍芽與地蜈蚣絕不相類因此草亦有地蜈蚣之名故百草鏡疑為石見穿也李氏草秘石見穿生竹林等處葉小如艾而花高尺許治打傷撲損膈氣則石見穿之葉如艾又與石打穿之葉深紋鋸齒不侔矣葛祖方消宿食散中滿下氣療吐血各病翻胃噎膈瘧疾喉痹閃挫腸風下血崩痢食積黃白疸疔腫癰疽肺癰乳癰痔腫乳癰初起百草鏡龍芽草一兩白酒半壺煎至半碗飽後服初起者消成膿者潰且能令膿出不多鐵筅帚山間多有之綠莖而方上有紫線紋葉似紫頂龍芽微有白毛七月開小黃花結實似筅帚形能刺人手故又名千條針百草鏡芒種時開花成簇種福堂方鐵筅帚即石見穿綱目馬藺子亦名鐵筅帚其葉似薤根如刷帚與此全別草寶云鐵筅帚葉似紫頂龍芽而無毛為別七月開小黃花結實類筅帚能刺人手故名黃疸用此草乾者一兩白酒煎服四五劑即愈治風痹血崩黃疸吐血跌撲鬼箭風如神搗敷肩癰鶴膝風鮮者連根葉如秋冬根老取葉汁加飛面調勻包紮煎湯浴瘡疥立愈治風痹鶴膝等風茅昆來效方鐵筅帚三兩龍眼肉半斤酒煮飲又方鐵筅帚白毛藤地蘇木龍芽草蒼耳草各一兩酒煎服五劑風痹藥酒救生苦海云並治跌打瘋腫鐵筅帚八角金盤根白毛藤蘇木各一兩酒浸十日用跌打傷金居士選要方用鐵筅帚三兩酒煎服鬲症蔣雲山傳方石打穿草按月取草頭一個如三月三個四月四個以月分為多寡之數搗汁同人乳羊乳汁攪勻服立效面上斑靨朱子和方取鐵筅帚地上自落下葉並子煎湯澄清洗面三四次其斑自消鶴膝風種福堂方石見穿草用根梗俱紅色者佳連枝俱用如秋冬根梗俱老止用葉半分俱要當日取新鮮者隔宿勿用同鐵筅帚草一分加飛面少許同打扎膝眼內狗卵草一名雙珠草生人家頹垣古砌間葉類小將軍草而小穀雨後開細碎花椏間結細子似腎又類椒形青色微毛立夏時採百草鏡云蔓延而生喜生土牆頭二三四月採五月無二月發苗乃小草也三四月間節椏中結子形如外腎內有兩細核性溫治疝氣行下部發大汗為妙治腰痛疝氣澹寮方用狗卵子草鮮者二兩搗取汁白酒和服飢時服藥盡醉蒙被暖睡待發大汗自愈此草性溫能達下部如無鮮者須三四月予採曬乾存貯倘用乾者止宜一兩煎白酒加紫背天葵五錢同煎更妙庚戌予館臨安暑後荒圃多生此草驚蟄後發苗似小將軍而葉較小色亦淡綠春分後即開花細碎藕合色節椏輒有花結子如狗卵頗壯滿可觀其草蔓地千百穗並一根立夏後多槁予同舍許氏子髫年患疝發輒作厥以此草煎酒服後永不再發一粒金丹一名洞里神仙又名野延胡江南人呼飛來牡丹處處有之葉似牡丹而小根長二三寸春開小紫花成穗似柳穿魚結子在枝節間生青老黃落地復生小枝子如豆大其根下有結粒年深者大如指小者如豆一種黃花者乃蒿屬根上亦無子採取不可誤用治跌打損傷風氣消癰腫便毒瘰癧天蛇毒鴉翅毒搗敷火丹痔腫風痹閃肭腰痛腫毒初起百草鏡取一粒金丹根上子一兩搗汁陳酒和服並治瘰癧初起兔耳一支箭獨葉一支槍金邊兔耳兔耳酸生陰山腳下立夏時發苗葉布地生類兔耳形葉厚邊有黃毛軟刺莖背俱有黃毛寒露時抽心高五寸許上有倒刺而軟即花也每枝只一花故名一枝箭入藥用棉裹煎恐有毛戟射肺令人咳百草鏡兔耳一枝箭葉如橄欖形邊有針刺只七八葉貼地生八月抽莖高近尺許花如桕穗而有萌刺莖葉有毛七月採有小鹿銜銀茶匙忍冬草月下紅等名汪連仕云兔耳箭初生苗名金茶匙入血分止吐血治肺癰王安採藥方葉底紅者名金茶匙性寒味苦行血涼血入肺經清肺火治吐血勞傷調血最效為怯弱要藥肺癰肺痿黃疸心痛跌打風氣傷力咳嗽咯血腫毒腸癰肺癰縮腳癰慈航活人書用白石楠葉嫩腦十二個兔耳草二兩好酒煎服肺癰二服腸癰縮腳癰一服即愈骨蒸勞怯吳普仁方用兔耳一枝箭蒸雞服獨葉一枝槍生深山四五月間土人採得入市貨之長二三寸一莖二梗一梗一葉葉如兔耳又似箭頭一梗細尖如新抽竹萌故名百草鏡獨葉一枝槍生山原清明時發苗穀雨後死長二三寸一葉一花葉如橄欖花似錐鑽味甘淡功用與一枝箭同朱烺齋任城日記諸毒蟲咬以獨葉一枝槍草生擦之即愈金邊兔耳形如兔耳草貼地生葉上面淡綠下面微白有筋脈緣邊黃毛茸茸作金色初生時葉稍卷如兔耳形沙土山上最多味甘淡治虛勞吐血兔耳酸汪連仕草藥方即穿地鈴治跌打損傷金線釣蝦蟆蔓生田野山石間葉似三角風光潤帶青黃色根名金線釣蝦蟆又名獨腳蟾蜍亦名金線重樓準繩痘毒方中用之非綱目草河車及蚤休也丹房本草金鈴草一名掛金藤亦曰金線釣蝦蟆其子狀如鈴折斷莖液如乳汁取自然汁伏雄制硫其霜可煉雌煮汞百草鏡金線釣蛤螞生山土莖蔓紅細根大葉類金鎖匙芒種時開花如穀精花採根入藥按防己亦與此相似但根形不似蛤螞莖不甚紫葉不甚圓有尖岐葉蟲蛛網紋不明不多為別草寶云金線重樓生陰山腳下根有疙瘩形類蟾蜍入土不深刨土易取其性涼乃吐藥也小滿時發苗蔓延紫色葉不相對類黃龍藤而柔軟葉上有蛛網紋甚明若葉不圓而微尖紋不明莖不甚紫形不類蟾蜍者乃防己非重樓也汪連仕草藥方紅線者是金線釣蝦蟆青莖者乃漢防己王聖俞云重樓根儼如三足蟾其根旁又生根結蟾蜍年久者掘得一本之下根有數十蟾蜍累累橫掛其力最大趙貢栽云金線釣蝦蟆生者力大乾者稍次凡大毒服之必吐人多懼畏勿用然吐後其病如失毒即內消凡發背毒氣攻心非此不治若小毒斷不可用因藥力性大病不能相當也不能相當則有偏勝之害性平味苦消癰去風散毒百草鏡根性涼托癰疽追散腫毒治瘰癧為外科聖藥採藥志治腸癰追風敗毒葛祖方吐痰涎可帶瓜蒂扁鵲心書金線重樓俗名金線釣蝦蟆採得去外黑皮用石槌打碎勿犯鐵器曬乾為末小瓷瓶收貯凡遇一切要吐痰涎之症用帶瓜蒂最妙風痰結胸用一錢陰陽水和服傷寒成瘧用一錢臨發空心水和服禁口痢用一錢涼水服忌鐵器跌撲傷張氏傳方取根搗汁酒和服渣敷葉名天膏藥貼腫毒破爛能拔毒收口拍熟貼毒能拔毒水外出酒煎服治心疼磨水搽痔煎膏貼百病汪連仕草藥方天膏藥治疔瘡惡毒流注𤶱毒鼠瘻合生酒搗服敗毒功多食之令人吐瀉雞蝨草此草深秋有開紫花子如椒核處處原隰皆有葉如苧麻葉而氣臭故名雞蝨必效方云海寧沈清芝患風毒穿流五六處疼痛異常覓此草服之一劑即愈治風毒流火取一握煎酒吃或入酒煮一炷香去渣服俱效老君須百草鏡云此草立夏後發苗葉似何首烏微狹對生莖與葉俱微有白毛不似首烏莖葉之光澤根類白薇白色極多故名入藥用根王安採藥錄老君須生溪澗邊起藤二三尺梗青根鬚白黃色有數十條能消痞按王三才醫便云老君須春夏秋冬常有青出眾草為尊莖藤青葉似檟葉而尖小根如須白似芋頭根牽藤而去俗名社公口須亦治腫毒採根擂生酒服渣敷患處味辛性熱破瘀毛氏癧𤶱方用之治瘰癧治痞結醫便痞結年久成龜鱉者累用極效用老君須一味春夏用莖葉秋冬用根不拘多少用好生酒一罐外用鯽魚一雙和藥同入罐內日落時煮以魚熟為度令患人先食魚次飲酒再以藥渣撲痞結所至次早去之大小便見物下即效如不應連服三五次追其物無跡而神效難言余曉園云治風痹消血瘕面黃痞塊汪連仕云老君鬚根細如白薇理氣消腫通利關格敗毒消癰俱以酒煎服王安採藥方金釵草根名老君須合龍虎丹用治三十六種風症癱瘓鶴膝等風葛公草傳信方云藥似蛇卵草又似吉慶子面青有蒙背白色三葉分枝梗似薔薇有刺四月間結子取根用子亦可入藥治血症傳信方云將葛公根一兩忌鐵器用木擊碎以水二大碗煎作一碗加好酒一碗再煎至茶杯八分臥時服服後蓋暖周身以手磨胸膈臍腹數遍明晚如前再服一兩後日亦如前服一兩連服三日愈葛祖方葛公草一名家母藤治腳氣腫疼沙木槌搗汁熬成膏鵝翎掃患處干即潤之芸香草職方考出雲南府能治毒瘡入夷方者攜以自隨如嚼此草無味即知中蠱急服其汁吐之可解按雲南志出昆明有二種五葉者名五葉芸香韭葉者名韭葉芸香治瘴瘧藥性考云生成五葉產昆明治瘡毒等疾專能解蠱搗汁服之韭葉芸香能截瘴瘧夷人多邪蠱攜此草嚼之無味即知中毒雲南志解蠱治毒瘡一切瘡毒瘴瘧並搗汁服藥性考味辛治症同鏡面草滇南志出滇中能通血脈按此草今處處有之多生階砌石畔葉如指面大而圓其邊微作碎齒葉面光如鏡深綠色土人呼為蟢兒草又名地連錢不見開花止見葉而已亦呼鏡面草不知滇中所產即此類否性涼治肺火結成膿血癰疽採藥志月閉和敝蓑煎酒服滇南志石將軍一名紫羅球秋時開花有紫色圓暈生高山石上立夏後生苗葉類龍芽草略小對節高不過尺根本勁細似六月雪謝云溪云西湖鳳凰山有之生石岸旁者入藥地土上生者太肥治症不能即驗葉如椐木對生方梗紫色高尺余開細紫花成球能活血疏風消瘀散腫味淡性平治一切跌打損傷血瘀不散搗汁服之或以水酒同煎如風寒閉塞或癰疽初起服之俱效五葉草此即燒人場上草也程云來即得方名五葉草亦不載形狀能移痘後眼翳用此草搗如豆大一小餅如左眼有翳貼右眼角肉上其翳即移至右眼再用此餅貼左眼角肉上其翳移至鼻梁內即去此餅翳膜便除蛇草諸羅志形似菠薐開小白花按綱目有蛇眼草生古井及年深陰濕地形如淡竹葉葉背有紅圈如蛇眼狀搗敷治蛇傷未知即一物否附以俟考治蛇傷連根搗罨傷口仍煎泡酒服立愈汪連仕採藥書蛇眼草產鄉間盧叢水澤旁甚多治一切蛇傷疔痔俗呼蛇口半枝蓮又名落得咬千年健朱排山柑園小識千年健出交趾近產於廣西諸上郡形如藤長數尺氣極香烈可入藥酒風氣痛老人最宜食此藥忌萊菔壯筋骨浸酒同鑽地風虎骨牛膝甘枸杞二蠶沙萆薢作理風用止胃痛酒磨服蜈蚣萍生溪澗田港止水中若流水則不生形如蕨萁中一莖兩旁細葉攢對似蜈蚣狀故名葉頗糙澀不似浮萍之光澤綱目水藻集解下有馬藻葉亦對生形亦微似而實非一物蓋藻可食此則不可食故主治亦別也俗呼邊箕萍群方譜麻薸萍之異種長可指許葉相對聯綴不似萍之點點清輕也按麻薸即今蜈蚣萍治蝨同壽錄蜈蚣萍曬乾燒烟燻之則一切跳蚤壁蟲皆除老鸛草龍柏藥性考補遺出山東味苦微辛去風疏經活血健筋骨通絡脈損傷痹症麻木皮風浸酒常飲大有效或加桂枝當歸紅花芍藥等味入藥用莖嘴鬼香油汪連仕草藥方鬼香油細葉者名天香油連根葉搗汁其味如香油故名李氏草秘鬼香油苗葉如香薷一人大腿腫痛二三月有膿內潰不得出垂危罨上即破膿出數服而愈以此草汁調敷藥尤妙治諸癤腫毒冬瓜癰附骨疽李氏草秘冬瓜癰附骨疽用此草加甘草一錢入醬板鹽花搗罨有效潤肌膚滋顏色敗瘡毒土人止蛇咬蜂螫蛓毛傷取葉擦之汪連仕草藥方肥兒草龍柏藥性考補遺產廣西平樂縣治小兒一切疾及痧脹需為要藥玉釵草李氏草秘此草對葉圓梗生近田水溝中治打傷跌腫損折搗汁服之罨諸腫毒汪連仕採藥書草里金釵開黃花細莖獨苗直上如醒頭草治金瘡活血白濁遺精開白花者草里銀釵白玉釵草治婦女白帶白淫合生白酒煎服石蛤蚆百草鏡生山土根皮色紅入藥用根周維新云石蛤蚆乃映山紅之根花鏡云山躑躅俗名映山紅類杜鵑花而稍大單瓣色淡若生滿山頭其年必豐稔有紅紫二色紅者取汁可染物李氏草秘石蛤蚆苗長二三尺莖方葉似竹葉根形如蛤蚆堅如石敏按汪連仕方映山紅根名翻山虎土人呼搜山虎治癧𤶱能拔根醫風合巴山虎蒸酒服名二虎丹核其功用雖不甚懸殊而究其形狀的非一種當以李氏草秘所載為是煎洗梅瘡能消風塊風氣痛祝穆效方地蜈蚣草石蛤蚆草各等分紹酒煎服腸癰景岳新方腸癰生於小肚角微腫而小腹隱痛不止者是若毒氣不散漸大內攻而潰則成大患急宜以此藥治之先用紅藤一兩許以好酒二碗午前一服醉臥之午後服紫花地丁一兩許亦如前煎服服後痛必漸止為效然後再服末藥除根末藥方用當歸五錢蟬退殭蠶各二錢無龍大黃各一錢石蛤蚆五錢老蜘蛛二個新瓦上以酒杯蓋住外用火煅干存性同諸藥為末空心用酒調服一錢許逐日漸服自消經驗廣集石蛤蚆用葉禿瘡不藥良方云即肥瘡日久延蔓成片發焦脫落又名癩頭瘡先以艾葉鴿糞煎湯洗淨瘡痂再用豬肉湯洗之隨用躑躅油以躑躅花根四兩搗爛用菜油一碗煎枯去渣加黃蠟少許布濾候冷以青布蘸搽日三次氈帽戴之勿令見風散毒能令癢止發生久搽自效疔腫諸毒李氏草秘石蛤蚆用酒磨服少得入口垂死可生有此則不愁疔瘡之患諸腫毒醋磨敷之香蕉鐵樹葉鐵樹附皇華紀聞粵地濕熱人多染麻風所居室人不敢處必種香蕉木本結實者於院中一二年後其毒盡入樹中乃敢居兩廣雜誌蕉種甚多子皆甘美以香牙蕉為第一名龍奶奶者乳也言若龍之乳不可多得然食之寒氣沁心頗有邪甜之目其葉有硃砂斑點植必以木夾之否則結實時風必吹折故又名折腰娘凡蕉葉必三三開則三落落不至地但懸掛莖間干之可以作書花出於心每一心輒抽一莖作花聞雷而坼坼者如倒垂菡萏層層作卷瓣瓣中無蕊悉是瓣漸大則花出瓣中每一花開必三四月乃闔一花闔成十餘子十花闔成百餘子小大各為房隨花而長長至五六寸許先後相次兩兩相抱其子不俱生花不俱落終年花實相代謝雖歷歲寒不凋子經三四月始熟粵人嬰兒乳少輒熟蕉子飼之又以浸酒味甚美其蕉心嫩白可為葅綱目芭蕉條下所載各類於香蕉獨未明晰今依粵志補之收麻風毒五雜俎鳳尾蕉其本粗巨葉長四五尺密比如魚刺然高者亦丈餘又有番蕉似鳳尾而小相傳從琉球來者云種之能闢火患是水精也枯時以鐵屑糞之或以鐵釘釘其根上則復活蓋金能生水也植盆中不甚長一年才落下一葉計長不能以寸亦不甚作花予種之三十年僅見兩度花其花亦似芭蕉而色黃不實鐵樹葉出東洋舶上帶來葉如篦箕生兩旁作細尖瓣嗅之有清氣似梅花香按群芳譜鐵樹出海南閩廣多有之其花狀如鐵絲燈籠廣張千瓣瓣各一花程扶搖花鏡鐵樹葉類石楠質理細厚干葉皆紫黑色花紫白如瑞香四瓣較少團一開累月不凋嗅之乃有草氣海南人言此樹黎州極多有一二尺長者葉密而花紅樹儼類鐵其枝椏穿結甚有畫意入盆玩最佳但人罕見故稱奇耳橫州馴象衛殷指揮貫家有鐵樹每遇丁卯年開花而出五臺山者定以六月十九日開花楊萬里詩注鐵樹葉似蒻而紫干如密節菖蒲似此諸說同一鐵樹而開花與枝葉又不同如此今洋中帶來及世俗所用入藥之鐵樹葉形如篦箕據云其樹須壅以鐵屑乃盛則番蕉葉也以其食鐵故亦名鐵樹其性亦平肝取其相製為用亦頗驗謝肇浙五雜俎番蕉能闢火患將枯時以鐵屑糞之或以鐵釘釘其根則復活蓋金能生水也種盆中不甚長一年才落下一葉計長不能以寸亦不甚作花三十年僅見兩度花耳花亦似芭蕉而色黃不實群芳譜鳳尾蕉一名番蕉產於鐵山如少萎以鐵燒紅穿之即活平常以鐵屑和泥壅之則茂而生子分種易活江西塗州有之花鏡鳳尾蕉一名番蕉產於鐵山江西福建皆有葉長二三尺每葉出細尖瓣如鳳尾之狀色深青冬亦不凋如少萎黃以鐵燒紅釘其本上則依然生活平常不澆壅以生鐵屑和泥壅之自茂且能生子分種易活極能闢火患人多盆種庭中以為奇玩友人唐振聲在東甌見鳳尾蕉土人皆呼為鐵樹則知今人所用及洋舶帶來之葉皆番蕉葉而非真正鐵樹葉也瀕湖於隰草部只列甘蕉蘘荷而於虎頭鳳尾等蕉概不及焉或當時未有知其性者今錄之以補其缺平肝統治一切肝氣痛難產鐵樹葉三片煎水一碗服之即下指南鐵樹家寶真傳云亦名鐵連草生於鐵山銅壁之上又鐵石之上亦生並非草本形如屏風狀如孔雀尾分張黑色細枝刀砍不斷斧之乃折治一切心胃及氣痛煎湯服立愈藥性考鐵樹黑色葉類石楠逢丁卯年開花四瓣紫白色形如瑞香圓小不馣樹高數尺止血下痰其花人採以治痰水留青日札鐵樹花海南出樹高一二尺葉密而紅枝皆鐵色生於海底諺云鐵樹開花喻難得也虎頭蕉出福建臺灣五虎山者佳一莖獨上葉抱莖生不相對形類蕉而小苗高五六寸秋時起莖開花似蘭色紅結實有刺類芘麻子外面苞狀若高三四尺者名美人蕉系一類二種也今閩沙縣亦出草寶虎頭蕉性溫力猛有毒能治風痹凡服者不得過二錢服後須避風倘不謹慎必發風疹治風痹性熱去風治血淋白帶一切吐血舟車經驗方用芭蕉一大片入鍋內炒乾存性為末黃酒調服立效此方亦治一切吐血若用美人蕉更妙蕁草宦遊筆記南人呼為蕁麻北人呼為蠍子草黔境遍地有之葉類麻多毛刺觸之螫人腫痛不可忍此毒甚於蜂蠆蠍蝮墨莊漫錄川陝間有一種惡草羅生於野其枝葉佛入肌肉即成瘡泡浸淫潰爛久不能愈即蕁麻也白香山詩颶風千里黑蕁草四時青此草有花無實雪下猶青故也人海記塞山有毒草中人肌膚毒甚蜂蠆自唐山營逾汗鐵木嶺外遍地有之俗名蠍子草蘆高四五尺葉如麻嫩時可供馬秣經霜則辛螫不可觸綱目蕁麻條止載其塗蛇毒點風疹他皆未及悉補之治瘋採取煮汁洗亦可肥豕解暈草即廣東萬年青今人呼為廣東萬年青葉如建蘭而深厚入冬不凋初茁芽背作紫色長則色青夏開紫花成穗亦如麥冬狀其根有子分苗種極易繁茂以其出自粵中故名綱目有名未用吉祥草下瀕湖所引吉祥草即此也亦呼吉祥草時俗婦臨蓐以此草連盆移至產室云能解產厄及血暈此草色澤翠潤葉葉勁直如箭入產室則葉皆軟垂色亦槁瘁必經數月乃復鮮豔亦一奇也其根下子入藥用海寧周世任云此草根下子大冷子宮凡婦欲斷產取子百粒搗汁服永不再孕矣性涼味甘理血清肺解火毒為咽喉七十二症要藥治急驚活人書用洋吉祥草根搗汁加冰片少許茶匙灌下三匙立蘇萬年青一名千年蒕闊葉叢生每枝獨瓣無歧梗葉頗青厚夏則生蕊如玉黍狀開小花叢綴蕊上入冬則結子紅色性善山土人家多植之浙婚禮多用之伴禮函取其四季常青有長春之義百草鏡四月八日浴佛日杭俗人家植萬年青者多剪其葉棄擲街衢云令人踏之則易長且發新葉茂密入藥採葉陰乾煎洗坐板痔瘡極效勝於他日採者土宿本草雁來紅萬年青皆可治汞甘苦寒治咽喉急閉搗汁入米醋少許灌之吐痰而愈藥鏡云其根多作草熏氣入腹令人嘔吐子可催生從新乳香湯吞一粒男左女右手中帶出藥性考云味苦微甘解毒清胃降火能止吐血同紅棗七枚劈開煎飲用嫩葉陰乾根療喉痹以養心葉短尾圓者真白火丹祝氏效方萬年青搗汁服痔漏家寶方萬年青葉取汁如無汁即用根水少許同搗取汁搽老幼脫肛慈航活人書萬年青連根煎湯洗用五倍子末敷上立效一切跌打損傷活人書山芝麻橡慄樹花萬年青花鐵腳威靈仙汁為丸黃豆大每服一丸陳酒下頭風嵩崖雜記霹靂丹治頭風如神用萬年青根削尖蘸硃砂塞鼻孔內左塞右右塞左兩邊痛者齊塞神效取清水鼻涕下須一周時妙蛇毒德勝堂傳方用萬年青磨塗渣罨皆妙陰囊大用萬年青根搗汁熱沖陳酒服三次即愈痔瘡腫痛難行活人書豬腿骨去兩頭同萬年青入砂鍋內水煮一炷香乘熱熏溫洗日三次數日愈永不發纏喉風經驗單方用萬年青根頭切碎打爛絞汁灌下吐出痰涎即好倘口閉用牙刷挖開灌下不吐再用髮梢進喉間探之汪連仕云萬年青俗呼冬不凋草治瘡毒收濕熱洗腳氣湯泡火傷天泡瘡白蛇纏搗汁搽王安採藥方治中滿蠱脹黃疸心疼哮喘咳嗽跌打傷李氏草秘萬年青今酒肆多種之能解眼蠱治白火丹為末酒服一二錢即愈又治噎膈仙半夏各種曲附近日諸醫皆用之藥肆亦多製備相傳製法系仙人所傳故名仙半夏能化痰如神若不信將半夏七八粒研入痰碗內即化為清水其法用大半夏一斤石灰一斤滾水七八碗入盆內攪涼澄清去渣將半夏入盆內手攪之日曬夜露七日足撈出控干用井華水洗淨三四次泡三日每日換水三次撈起控干用白礬八兩皮硝一斤滾水七八碗將礬硝共入盆內攪晾溫將半夏入內浸七日日曬夜露足取出清水洗三四次泡三日每日換水三次取出控干入後藥甘草南薄荷各四兩丁香五錢白豆蔻三錢沉香一錢枳實木香川芎肉桂各三錢陳皮枳殼五味子青皮砂仁各五錢上共十四味切片滾水十五碗晾溫將半夏同藥入盆內泡二七日足日曬夜露攪之將藥取出與半夏同白布包住放在熱炕用器皿扣住三炷香時藥與半夏分胎半夏干收用有痰火者服之一日大便出似魚膠一宿盡除痰根永不生也綱目半夏條附方載法制半夏其製法與此不同今藥肆所售仙半夏惟將半夏浸泡盡去其汁味然後以甘草浸曬入口淡而微甘全失本性名曰仙半夏並非照方製法醫家亦視虛人有痰者用之以為性平和而不傷於燥烈是無異食半夏渣滓何益之有清痰開鬱行氣理痹痰疾中風不語研七八粒同井華水送下以手摩運腹上一炷香時即醒能語敏按龔雲林云仙方製半夏化痰成水皆治壯人痰火有餘之症服之有效虛人痰火忌服各種半夏曲綱目半夏修治條引韓飛霞醫通造半夏曲云能專治各病又不載其製法特為補之生薑曲薑汁浸造治淺近諸痰礬曲礬水煮透兼姜和造最能卻水治清水痰也皂角曲煮皂角汁煉膏和半夏末為曲或加南星稍加麝香治風痰開經絡竹瀝曲用白芥子等分或三分之一竹瀝和成略加曲和治皮裡膜外結核隱顯之痰麻油曲麻油浸半夏浸五日炒乾為末曲和造成油以潤燥治虛咳內熱之痰牛膽曲臘月黃牛膽汁略加熟蜜和造治癩癇風痰開鬱曲香附蒼朮撫芎等分熬膏和半夏末造成治郁痰硝黃曲用芒硝十分之三同曲煮透為末煎大黃膏和成治中風卒厥傷寒宜下由於痰者海粉曲海粉雄黃居半夏之半煉蜜和造治積痰沉痼霞天曲用黃牛肉煎汁煉膏名霞天膏將膏和半夏末為曲治沉疴痼痰以上諸曲並照造麴法草菴七日待生黃衣懸掛風處愈久愈佳建神麯範志曲白酒藥曲附出福建泉州府開元寺造者佳此曲採百草罨成故又名百草曲以黑青色煎之成塊不散作清香氣者真色帶黃淡者曰貢曲力和平不及青黑者力大此曲愈陳愈妙藥性考泉州神麯微苦香甘搜風解表調胃行痰止嗽瘧痢吐瀉能安溫疫嵐瘴散疹消斑感冒頭痛食滯心煩姜煎溫服或二三錢造云百草法秘不傳得名範志塊造方端用之應效饋遠人歡蔡氏藥帖云治風寒暑濕頭眩發熱表汗立愈能消積開胸理膈調胃健脾及四時未定之氣兼能止瀉消腫及飲食不進等症又能止霍亂吐瀉咳嗽赤白痢疾小兒傷飢失飽一切症倘外出四方不服水土瘴氣肚痛皆取效如神範志齋蔡協德住泉州府城西街東塔前向造百草神麯即今建曲每個重半斤或四兩乾隆辛卯五月蔡氏正造麴忽有一客至視百草而嘆曰當今男婦老幼秉氣衰薄百草恐傷元氣予有奇方共藥九十六味配合君臣佐使另加十二味青草紫蘇薄荷等物搗爛煎湯合共一百零八味製為小方塊每塊一兩按端午及六月六日諸神會聚皆可依法制造藥性平和氣味甘香遠行者宜備可以代茶常服大人每服三錢水一碗煎七分小兒每服一錢五分水一茶鍾煎六分半飢飽時服忌生菜惟孕婦不可服此藥切片煎湯藥渣不散須認形色淡黃者為真福建泉州府城內範志吳亦飛馳名萬應神麯氣味中和清香甘淡能搜風解表開胸快膈調胃健脾消積進食和中解酒止瀉利水治四時不正之氣感冒發熱頭眩咳嗽及傷食腹痛痞滿氣痛嘔吐瀉泄痢疾飲食不進等症痘疹初發用托邪毒又治不服水土瘴氣瘧痢外出遠行尤宜常服大人每服三錢水一湯碗煎七分小兒每服一錢半或一錢水一大茶鍾煎七分每錢破作五六塊外感發熱頭眩咳嗽瘧疾嘔吐俱加生薑同煎泄瀉加烏梅同煎惟痢疾一症須加倍用大人每用五錢小兒二三錢加好箔茶心同煎每斤價銀一兩六錢若用匣裝每個五文店住學院考棚邊桂檀巷內觀音亭頂南畔第三間範志吳氏牌匾為記白酒藥曲藥性考曰白酒藥曲松江得名良薑四兩草烏半斤吳萸白芷黃柏桂心乾薑香附辣蓼苦參秦椒九味一兩等分菊花薄荷二兩齊稱丁皮益智五錢杏仁共為細末滑石五斤米粉鬥八河沙拌勻造丸乾用釀酒芳馨炒焦拌食滯積消靈帕拉聘七椿園西域聞見錄帕拉聘草根也全似三七但色藍或黑出溫都斯坦回地人多往採取重價貨於回城云可治疾中土人弗達不敢嘗也治一切陰冷痼疾服之立除一枝蒿紹郡府佐李秉文久客西陲言巴里坤出一種藥各一枝蒿生深山中無枝葉一枝茁土氣味如蒿四月間牧馬卒驅馬入山收草攜歸煎膏以售遠客有販至蘭州貨賣者活血解毒去一切積滯沉痼陰寒等疾驅風理怯香草石振鐸本草補西國產香草山野遍生樹高尺許枝幹虯曲經冬不凋花小而色紫白成實時中有小黑粒春時插之即活惡肥而喜潔遇夏即生小蟲因蠅卵所致見小白點與絲網宜去之衣袖觸動芬芳襲人可紉以為佩採其花藏衣箱中能闢諸蟲焚其枝葉能闢除瘟疫嵐瘴房屋溽穢氣自除主治解鬱凡心懷憂悶以布包置左脅下之傍能令胸膈舒暢除蚤蝨壁蝨取枝葉曝乾為粉以布包貼肌膚上須多乃效體受風寒不快以枝葉煎湯浴之浴後睡片時即愈食不知味以葉煎酒空腹飲之同麵食使舌本津津饜飫面有黑瘢取葉或水或酒濃煎每晨塗面能滅斑滋顏齒痛動搖醋煎葉乘熱擦之漱之又治胃火盛口臭頭多風痱併發穢觸人與記舍腦也不堅固取葉煎水服時加醋不特除頭外之病並裨頭之內司蓋人之記舍在腦故也敏按以上所說皆出泰西石氏本草核其形狀功用則似今人所名奶孩兒草近是但奶孩草正名奶酣草見霜即萎並非經冬不凋入春子種其宿根亦不發亦罕有尺許虯曲之枝幹或泰西地暖土肥如粵中之茄可以經冬成樹或又別有一種木本者姑存其說以俟考臭草本草補泰西既產香草復產臭草雖熏不同蕕效用則一其本高尺余開小黃花摘花蕊陰乾待用與葉同功結子成實裂分四房每房子數粒春秋二仲皆可種之春月將枝插之亦活不畏霜雪亦不喜肥須澆以清水人以手捋之便臭氣拂拂亦非穢汙朽腐可比也其功用亦與香草等植樹下能殺樹上蟲植圃中能闢蛇蠍蜈蚣等諸毒泄瀉及小便不通取臭草葉或生或煮食之服毒並蛇蠍蜈蚣等毒急取臭草葉生食其毒自解腹內蛔蟲以清油煎臭草葉搗爛敷臍上勝食使君子遠矣鼻血取臭草葉搗爛塞鼻孔即止危急重病昏暈採葉醋烹搓熟塞鼻即醒耳痛以臭草葉搗爛取自然汁置石榴皮內煅過滴耳中目痛以葉置清水內露二三夜將葉蘸水點眼目力過勞以臭草葉自然汁加蜂蜜一滴並略加小茴香自然汁調和點眼久則光明楊梅瘡以自然汁略加好酒並清水粉同煎治之婦人心氣痛病由於子宮上衝用臭草葉嗅之以愈為度大庾曹上士曾用此方嘆其靈驗小兒大便腸出以好酒煮臭草葉搗爛用布作膏貼之
