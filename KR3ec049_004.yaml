body:
  text: 卷四草部中七十種附十種金豆子夜關門附百草鏡一名金花豹子三月生苗十月枯雖豆類卻不起蔓本高一二寸分枝成叢葉似槐而稍大處暑時開黃花五出磬口蠟梅似之結莢向上類豇䝄而短長只二三寸實似緑豆而扁皮有紫斑較緑豆稍大味淡子治疔癰如神葉治腫毒茅氏傳方以葉曬研醋和付留頭即消或酒下二三錢按付淡庵草花訣金豆子開黃花子如緑豆入滾茶味清香即草決明周憲王救荒本草有山扁豆即茳芒決明味甘滑可作酒麴俗呼獨占缸苗葉花子皆可瀹茹及點茶食所載形狀亦與金豆子同而瀕湖綱目決明後附茳芒云性平無毒火炙作飲極香除痰止渴令人不睡調中隋稠禪師採作五色飲以進煬帝者是也無治疔腫之說故並存以備考夜關門葉如槐夜即合開黃花仁和筧橋人多種之俞曉園云有草木二種草本者良木本者乃合歡也能追風取皮治肺癰不斂熬膏貼毒生肌收口按綱目馬蹄決明葉亦如槐晝開夜合其葉本小末奓秋開黃色花或即系決明但綱目於決明子下亦不言疝氣今並存之莢治疝氣接骨仙桃一名奪命丹活血丹蟠桃草生田野間似醴腸草結子如桃熟則微紅小如緑豆大內有蟲者佳百草鏡仙桃草近水處田塍多有之穀雨後生苗葉光長類旱蓮高尺許莖空摘斷不黑亦不香立夏後開細白花亦類旱蓮而成穗結實如豆大如桃子中空內有小蟲在內生翅穴孔而出採時須俟實將紅蟲未出生翅時收用藥力方全蓋此藥之用全在蟲須曬焙令內蟲死若掛懸風乾恐內蟲生翅而出藥亦無用矣按此草須芒種後採若過夏至則蟲穴孔而出化為小蚊苞空無用矣性溫味甘淡消癰腫跌打或搗汁或屑服俱效治肝氣和胃集聽云一名八卦仙桃此草生田野葉如石榴葉實如桃子絶小內生小蟲者真取實連蟲用一方專治肝氣胃氣小腸疝症用仙桃草有蟲者金桔核福桔核蓽澄茄各等分為末砂糖調丸緑豆大每晚服一錢許至重者二服斷根治勞損虛怯百草鏡云取有蟲仙桃草用童便制透入補藥用治吐血百草鏡云用新鮮接骨仙桃草搗汁加人乳和服按吐血諸方皆用涼血之劑惟此藥性熱加人乳能引血歸經故妙跌撲損傷救生苦海用地蘇木五錢八角金盤根一錢接骨仙桃草五錢臭梧桐花三錢煎酒服七葉黃荊山黃荊附一名豬臥草地五爪珠子草烏食草烏蛇草七絃琴亦名七葉黃荊藤生土牆腳下陰地葉尖長相對三四行成一瓣莖上起稜一凹間紫色白露後抽心高三五尺開細白花成簇結子亦細碎霜後紅如珊瑚細珠根長而白入藥百草鏡云此種有木本者名扦扦活治跌撲癰腫味甘生服能令人吐治勞力傷跌打魚口漆瘡煎湯洗治便毒搗汁將肥皂一個煅存性調酒服渣敷患處罨之治跌撲損傷閃腰挫氣痛集聽云此祕方也用烏蛇草曬乾為末砂糖酒調服最凶者加童便須端午日午時收者更效若急用不拘時日取鮮者搗爛服發汗愈此草有五名一曰烏蛇草一曰烏龍草一曰豬臥草一曰七葉黃金因其葉七片一枝或五片大者九片其根名千秋藤九十月間頂上結紅子曬乾吞之可治疝氣汪連仕草藥方七葉黃荊俗呼扦扦活又名放棍行又名珊瑚配與烏蛇草別行血敗毒洗一切瘡疥鬼箭風山黃荊玉環志葉似楓而有杈結黑子如胡椒而尖可屑粉煮食又有水荊似藜結黑子不可食翦其枝可以接梨入藥用山荊消食下氣退管方黃荊條所結之子炙燥為末五錢一服黑糖拌空心陳酒送服專治痔漏之管服至管自退出九竅出血救生苦海黃荊有二種赤者為苦青者為荊其木心方其枝對出一枝五葉或七葉葉如榆葉長而尖作鋸齒五月時開花紅紫色成穗子如胡荽子大有白膜皮包裹用其葉搗汁酒和服二合立止骨蒸勞熱養素園驗方六月雪黃荊子豨蘞草何首烏當歸川芎熟地白茯苓水二鍾姜三片煎八分服有痰加半夏漆瘡姚希周經驗方烏蛇草不論鮮干一握煎湯一洗即愈傷寒發熱而厄逆者回春用黃荊子不拘多少炒水煎服立止杖瘡起疔甲黃荊子焙乾為末搽上即開不用刀刮肝胃痛周山人方用黃荊子研末和粉作團食一二次斷根腳蛀用氏方用黃荊嫩腦葉搗爛罨上即愈救命王金不換附一名死裡逃生治小兒感冒風寒咳嗽大人傷力損傷吐血諸風疼痛無名腫毒金不換亦名救命王似羊蹄根而葉圓短本不甚高此草出於西極傳入中土人家種之治病故山澤中不産立春後生夏至後枯用根綱目三七亦名金不換與此別又木本亦有金不換汪連仕草藥方金不換大葉者為金鉢盂大接骨草細葉者小接骨草吐血頗效因呼為吐血草軍中箭傷罨之效即呼箭頭草性平破瘀生新治跌打消癰腫止血愈疥癬和糖醋搗擦蠔蟲傷用葉搗塗治肺癰葉能伸臂力開硬弓臂痛或力弱不能弓者取其葉揉軟覆膊上以帛束之過夜痛者即定疼且全力俱攝入臂上開弓更不費力營伍需為要藥腫毒初起百草鏡金不換草根葉不拘搗碎五錢陳酒煎服肺癰百草鏡金不換草取根一兩或葉七瓣搗汁酒煎服三次愈不論口臭吐穢物者皆效風痛楊氏驗方金不換錢半小活血枳殼蘇葉當歸各三錢烏藥川芎各二錢花粉五錢老酒一斤煎熱服跌打疼痛風氣慈航活人書救命王即金不換葉如冬菜葉春夏用葉冬用根搗汁沖酒服渣加毛腳蟹搗爛敷如風氣只用渣敷汪連仕方行血破血合地蘇木落得打共酒服黃麻葉醫方集聽云此治主血之聖藥一名牛泥茨一名三珠草一名天紫蘇三月生苗如麻葉有微毛取葉嚼之味如苦蘿久嚼微辛大葉旁兩小葉如杏葉至八九月每葉生子三粒狀如粟米子內一粒如菜子嫩時青色老即黑色取子入藥治咳傷肺開花細紫紅色自五月起至十月止處處有之治血症集驗取葉同虎杖龍芽用血崩集驗用黃麻葉連根搗爛酒煎露一宿次早服之氣症心疼肚痛痢疾痞結子治咳傷肺汪連仕云大麻子即黃麻子性熱行血醫人合麻藥共風茄用六月霜丁未余館奉化邑人暑月俱以此代茶云消食運脾性寒解暑如神五月內山村人率刈干束縛挑入城市售賣豫以百錢買得一束如干薄荷狀而長大倍之莖上綴白珠成穗土人云子能下氣消食更甚於枝葉偶得痞悶不快因取一枝沖湯代茶飲次日即健啖異常所言信不妄也三才藻異一名六月冷即曲節草也性寒故名花似薄荷葉似劉寄奴名蛇藍解暑消積滯小兒暑月泡茶食之佳性苦寒亦厚腸胃止痢開膈食之令人善啖凡傷寒時疫取一莖帶子者煎服之能起死回生屢試皆效又善解毒洗瘡疥皆愈按綱目曲節草一名六月霜瀕湖所引圖經云甘平無毒治發背消癰拔毒同甘草作末米汁調服而他治有殊功並未言及今仍補之山海螺生山溪澗濱隰地上葉五瓣附莖而生根如狼毒皮有皺旋紋與海螺相似而生於山故名雖生溪畔性卻喜燥枝葉繁弱可以入盆玩百草鏡云生山土二月採絶似狼毒惟皮疙瘩掏破有白漿為異其葉四瓣枝梗蔓延秋後結子如算盤珠旁有四葉承之治腫毒瘰癧取汁和酒服渣敷患處汪連仕云苗蔓生根如蘿蔔味多臭治楊梅惡瘡神效王安採藥方山海螺一名白河車加紫河車紅白石膏名四聖散治腸癰便毒臟毒乳癰疽皆效水楊柳張琰種痘新書云水楊柳仍草本生溪澗水旁葉如柳其莖春時青至夏末秋初則赤矣條條直上不分枝丫至秋略含赤花凡痘焦紫乾枯者以此洗之立見光亮漿水即行其效如神已洗之後若往視之則已洗未洗之處其明潤焦暗形色判然取水行漿之效孰有速於此者但須用巾蘸其藥水頻頻與拭必水足而後已也若秋冬葉落取根用之瀕湖綱目木部有水楊亦主痘毒引魏直愛心鑑浴痘法但所載形狀與此全別惟於集解下注有赤楊與張琰所說不甚相遠而又無主治故為補之性微寒味缺涼血解毒痘瘡焦黑浴之立起治跌打損傷𤶑瘟脹疫解暑郁惡毒治痘水楊柳湯張琰治痘紅紫乾燥不起漿有水楊柳湯云古方所載是木細葉紅梗枝上有圓果果有白鬚散出此等俗呼水楊梅以其果似楊梅也余未試用余常用者乃是草生水邊葉如柳葉其梗至秋則紅赤無果結此草冬用枝梗及根春夏秋用枝葉凡痘紅紫乾枯不起水者內服活血解毒之劑外用此煎水拭頭面連拭數次立見光潤即具行漿之勢所未洗者其色不變手足拘攣費建中救偏瑣言用草本水楊柳酒煎服甚驗痔漏洗方傳信方水楊柳根煎湯洗俟蟲出愈膀胱落下劉羽儀驗方此名茄病其色或紫者可治白者不可治黃連一錢狗脊水楊柳根五倍子魚腥草四味多寡不拘枯礬錢許共為末煎湯先熏後洗乘熱時輕輕托進睡臥一二日即愈再服調理藥毛世洪經驗集扦扦活即水楊柳其根可治楊梅結毒小將軍一名研星草散血丹生陰濕地立春後有苗葉類狗卵草略大莖微紅穀雨後開花細小結子二粒如荷包草子百草鏡二月發苗葉如雙珠草節間生子如鵝不食草子而略大三月採五月枯葛祖方治黃疸腳氣丹毒遊風吐血咳血百草鏡治跌撲刀傷癰腫痰中帶血洗疥瘡採藥志性溫敗毒治杖傷跌打損傷搗汁酒和服渣罨患處立刻消腫而愈余居士選要方治跌撲用五靈脂三錢麝香錢半小將軍草三兩鮮者取汁先將酒煎上二味待好去渣再入藥汁滾一二沸取服僧鑑平言此草治疔腫如神不論疔生何處及何種疔皆可用此搗極爛敷瘡口留頭次日即干緊肉上洗去再敷至重者付二次即愈輕者一塗即好真救疔垂死之聖藥也親試神驗九鼎連環草一名九葉雲頭艾三月生苗系子出高二三尺葉似艾菊香亦近之霜後枯産口外五臺山二處近有人帶種各處可植八九月間起穗結蕊類野菊蕊但不開花結實其實如野菊花心百草鏡春月發苗葉類艾菊香亦近之八月時無花而實實先起疙瘩逐漸長大內包十餘子子細長小葉乾之甚香黃梅時須不時焙曬否則易黴黴則無用性溫通行氣血治風痹有效風痹百草鏡用九鼎連環草乾者二兩核桃肉三兩搗爛當歸一兩五錢黃酒浸隔水煮用牛筋草一名千金草夏初發苗多生階砌道左葉似韭而柔六七月起莖高尺許開花三叉其莖弱韌拔之不易斷最難芟除故有牛筋之名根入藥治脫力黃勞力傷治瘵取此草連根淨去泥烏骨雌雞腹內蒸熟去草食雞良百草鏡行血長力入肝經按湖州府志南天燭亦名牛筋草又名烏飯草與此名同物異翠羽草一名翠云草孔雀花神錦花鶴翕草鳳尾草其草獨莖成瓣細葉攢簇葉上有翠斑百花鏡翠云草無直梗宜倒懸及平鋪在地因其葉青緑蒼翠重重碎蹙儼若翠鈿云翹故名但有色而無花香非藝也其根遇土即生見日則萎性最喜陰濕粵志孔雀花可以避暑汪連仕採藥書翠云草一名翠翕草即矮腳鳳毛治痔漏同胡桃葉煎洗王連仕方治吐血神效百草鏡女子吐血翠云草三錢水煎服嘉慶癸亥豫寓西溪吳氏家次子年十五忽腹背患起紅瘰蔓延及腰如帶或云蛇纏瘡或云丹毒乃風火所結血凝滯而成豫疑其入山樵採染蟲毒乃以蟾酥犀黃錠塗之不效二三日瘰愈大作膿復與以如意金黃散敷之亦不效次日瘡旁復起紅暈更為闊大有老嫗教以用開屏鳳毛即翠云草也搗汁塗上一夕立消此草解火毒如此又不特治血神效也半嬌紅一名老鸛紅水雞冠立夏後生苗一莖直上莖紅葉尖長而狹八月結實六角五月採治風痹跌撲煮羊肝食退目中紅障普賢線山川典産峨嵋山乃樹上苔須蔓引而成長數尺或言深谷有尋丈者湖湘故事載羅汗絛即此唐鴛湖曰普賢線産峨嵋山乃普賢石上青苔也山僧採取曬乾以為上藥益都方物記仙人絛生大山中與苔同種但岩陰石隈多鮮翠長二三尺叢垂若絛敏按酉陽雜俎仙人絛出衡嶽無根蒂生石上狀如同心帶三股色緑亦不常有絛即絛也此生石上者方入藥無疑治胃脘心氣疼痛煎服瀕死者皆效藏紅花土紅花附出西藏形如菊干之可治諸痞試驗之法將一朵入滾水內色如血又入色亦然可沖四次者真綱目有番紅花又大薊曰野紅花皆與此別治各種痞結每服一朵沖湯下忌食油葷鹽宜食淡粥治吐血王士瑤云不論虛實何經所吐之血只須用藏紅花將無灰酒一盞花一朵入酒內隔湯燉出汁服之入口血即止屢試皆效土紅花福建續志土紅花大者高七八尺葉如枇杷而小無毛秋生白花如粟米粒生福州及南恩州山野中福州生者作細藤似芙蓉上青下白根如葛頭入藥薄切用米泔浸一宿更用清水浸一宿搗服阿勃參程賦統會云産拂秝國華夷花木考阿勃參出拂秝國長一丈餘皮色青白葉細兩兩相對花似蔓菁正黃子似胡椒赤色斫其枝汁如油其油極貴價重千金油塗疥癬即愈茄連延綏鎮志葉如蘭草而肥厚種之畦塍根圓大類葵露出土外開黃花京師謂之撇蘭能解煤毒靈通草楚庭稗珠僧建公之徒參悟患聾達公謂得羅浮靈通草始瘳參悟來博館入山於玉女峰得此草莖長三尺如箸而莖虛中兩頭皆實頂開七葉取葉煎水服截其虛者貫兩耳中夜一聲若雷聾遂開治聾羅裙帶職方典出廣西南寧府葉滑嫩長二寸許似帶治折傷損手足者取葉火煨微熱貼之即愈金狗脊職方典出粵南寧府即蕨根形如狗脊毛如狗毛有黃黑之別止諸瘡血出治頑痹黑色者殺蟲更效雪裡開雪裡花附雁山志性大寒深谷中有之能解砒毒冬時開花故名治喉瘡熱毒萬氏家抄取根搗汁服雪裡花朱楚良在鎮海其土人有采雪裡花者冬月嚴寒此花始生在招寶山龍潭旁環渚而發苗甚短小如六月雪狀高不過二寸許每雪時開白花如豆大土人採得干之入藥敷痔以雪裡花為末濕者乾摻乾者麻油調搽一二度其痔即消縮苦草綱目木草類載苦草云生湖澤中長二三尺狀如茅蒲之類主治白帶又主好嗜干茶麵黃二種病其氣味藥性又失載今依張璐玉本經逢原補之苦溫無毒香竄入足厥陰肝經理氣中之血産後煎服能逐惡露但味苦伐胃氣竄傷腦膏粱柔脆者服之減食作瀉過服則晚年多患頭風昔人畏多産育以苗子三錢經行後曲淋酒服則不受妊傷血之性可知山馬蘭野馬蘭獨腳馬蘭甌江志別名一枝香按綱目馬蘭下集解注云又有山蘭生山側似劉寄奴葉無丫不對生花心微黃赤大補血而不言其有治痰開塞之功百草鏡山馬蘭治疔極效故又名疔見怕其蔓延到處節上生根故又名鬼仙橋皆俗見隨義而呼也治風痰喉閉驚風敷疔定痛搗汁塗小兒蛇㾩煎湯洗痔腫疥癢百草鏡風痰喉閉永嘉縣志山馬蘭取根搗碎用人乳浸男病用哺女婦人乳女病用哺男婦人乳浸少頃令病人仰臥凳上將頭倒垂將乳汁男左女右滴入鼻中候喉中有痰涎壅塞即轉身垂頭開口任痰自流痰完病愈但此藥入鼻後病人不許有聲一作痰即止小兒驚風牙關緊閉煎汁灌入喉中即愈鎖喉風頭面頸項俱腫飲食不下傳信方白馬蘭搗爛井花水取濃汁白酒漿均調下喉立效小兒頸項腿肋縫中潰爛養生經驗方以馬蘭汁調六一散搽之即愈馬蘭搗為膏能治大人兩腿赤腫流火或濕熱伏於經絡皮面上不紅不腫其痛異常病人只叫腿熱他人按之極冷此謂伏氣之病用此膏搽之立愈流注顧錦州傳方採山馬蘭煮熟麻油醬油作蔬拌食半月自消野馬蘭百草鏡云馬蘭氣香可作蔬此種系野生者其氣臭不可食三月發苗莖赤而粗秋開白花成簇細碎三月採因其功能涼血與馬蘭同故名莖葉根俱入藥性寒涼血治濕熱蛇吸小兒㾩瘡獨腳馬蘭李氏草祕此草生河澤邊葉如柳對葉圓梗治發背諸腫毒熱癤搗汁一杯入酒二杯服之未成膿者即消有膿者即出重極者服半碗或一碗再劑渣罨玉淨瓶俗名豬屎草氣殺郎中白山桃春月發苗葉尖長排生莖有白紋斑點高數尺葉對節生夏開細白花成簇如華蓋結實如萊蔔子大青圓霜降後紅其根肥白十月採入藥味甘性平和血行血有效治勞傷跌撲汪連仕草藥方氣殺郎中草一名青背仙禽又名疔見怕山人呼疔頭草其性清涼降火消癰毒散腫拔疔根紗帽翅臺海採風圖此草一莖數十花色黃入藥用葉治癬石風丹生石上能療瘡毒出雲南蒙化府象鼻草職方考出雲南府治丹毒跌撲損傷透骨草珍異藥品云形如牛膝綱目有名未用下附透骨草亦未詳其形狀據其所引治病諸用乃鳳仙草也蓋鳳仙亦有透骨草之名與此迥別療熱毒良珍異藥品治風氣疼痛不拘遠年近日家寶方透骨草二兩穿山甲二兩防風二兩當歸三兩白蒺藜四兩白芍三兩豨蘞四兩去莖用葉九蒸九曬海風滕二兩生地四兩廣皮一兩甘草一兩以上為末用豬板油一斤煉蜜為丸梧子大早晚各五錢酒下腿疼難忍醫學指南核桃肉四個酸葡萄七個斑蝥一個鐵線透骨草三錢水煎熱服出汗愈不問風濕皆效治痞醫學指南透骨草一味貼患處一炷香或半炷香時即揭去皮上起泡即愈洗癰瘓祕方醫學指南蛤蚧一個麻黃川椒透骨草防風大鹽各四兩白花蛇二錢艾一把槐枝一條川烏草烏各二兩紫花地丁一斤用水二桶煎大缸半埋在地入水溫時坐上洗再用水二桶煎渣候冷時再入熱水或一日或一夜臨出時用水澆頂心數次再用芥末稀貼患處紙絹裹熱坑上睡汗出盡為度忌早起飲食就臥內妙汪連仕採藥書透骨草倣佛馬鞭之形大能軟堅取汁浸龜板能化為水合金瘡入骨補髓兼治難産專主煉膏丹按鳳仙白花者亦名透骨白追風散氣紅花者名透骨紅破血墮胎亦有透骨之名非一物也不死草珍異藥品出柳州高一二尺狀如茅食之延年暑時置盤中食物不腐並可闢蠅拳黃雞子珍異藥品一名水蘿蔔治霍亂吐瀉瘧疾每用一錢嚼碎水飲下雞腳草汪連仕採藥書即雞爪花其子名勝光子去星翳明目清肝根行血治風治大麻瘋鶴膝瘋雞爪風刀槍草粵西叢載此草細葉黃花止金瘡血苦地膽出粵西葉可貼熱毒瘡箭頭風粵西叢載花似箭頭職方典産廣西南寧府山中花如箭鏃治風四肢骨節痛煎水熏洗之愈消痰治氣急定喘妙方王登南方取箭風草放鮮肉內煨熟要淡忌用鹽醬取出去草食肉紅果草叢載云有二種果大者葉略尖不入藥用又有果如小指頭頂者葉圓邊花梗有軟刺入藥用治牙痛酒刺龍柏藥性考紅果草出廣西葉圓刺弱味辛煎湯漱牙痛勾金皮珍異藥品云形未詳治無名腫毒惡毒醋磨塗上即消牙疼以皮塞牙縫中即定咽喉乳蛾每用三五釐細嚼咽下琉璃草出始興玲瓏岩莖如芹梗與肇慶風藥相類食之治風仙人凍一名涼粉草出廣中莖葉秀麗香猶藿檀以汁和米粉食之止飢山人種之連畝當暑售之職方典仙人草莖葉秀麗香似檀藿夏取其汁和羹其堅成冰出惠州府療飢澤顏金絲草出陝西慶陽性涼味苦能去瘴解諸藥之毒紅珠大鋸草治臌脹黃膽王安卿採藥志大鋸草敗毒消腫清火金剛草治肺癰痔漏疔腫臺七里臺灣志即七里香出臺地者能闢烟瘴所種之地蚊蚋不生闢瘴焚其烟化蚊蚋為水番薏茹採風圖一名番苦苓一名心痛草種出荷蘭葉秀嫩似雲板曬乾則香結子青紅色治一切心氣痛馬尾絲臺志略此草葉細而長花紅而小根如荔子核黃色多細絲如發不拘鮮干皆可用治蛇蜂諸毒方正草福建續志出永春州葉狹而長藍色平分四方攢莖而上其實六瓣治金蠶蠱七仙草三才藻異葉尖細長治杖瘡大母藥四川通志出雪山石塊上有雌雄二種出必雙出補元氣益髓脈功同人參藍布裙四川通志草本出松潘衛治腳氣壯筋骨露筋草藻異生施州高三尺春苗即花子碧色不凋治蜘蛛傷瘡百里奚草藻異名羖羊齒産陰地如秋海棠味酸治牙疼黃德祖藻異德祖即石公號此草生圯上故名葉如尖刀獨梗芋花紅白頭如何首烏治瘡癬斑節相思諸羅志枝葉類薄荷而大味似艾性能解毒野丈人藻異葉似芍藥花類木槿白毛寸余披下如白頭翁去腸垢消積滯戴文玉藻異戴文玉草名如金叉草黃色療血疾金果欖出廣中百草鏡云出廣西性寒皮有疙瘩味苦色黃陳廷慶雲內肉白者良但有二種一種味甚苦一種味微苦入藥以味苦者良性涼解毒百草鏡云凡腫毒初起好醋磨傅露出患頭初起者消已成者潰咽喉一切症煎服一二錢即效如喉中疼爛用三錢為末加冰片一分吹之藥性考金楛欖産廣西生於藤根堅實而重大者良藤亦可用味苦性大寒解毒咽喉急痹口爛目痛耳脹熱嗽嵐瘴吐衄俱可磨服疽癰發背焮赤疔瘯蛇蠍蟲傷俱可磨塗柑園小識金苦欖種出交趾近産於廣西蒼梧藤邑蔓生土中結實如橄欖皮似白朮剖之色微黃味苦土人每鑿山穿石或深丈許取之先君嘗覓得二十枚愈數百人而疔喉等症有起死回生之功當廣傳之以補本草之缺性寒味苦能祛內外結熱遍身惡毒消瘴癘雙單蛾及齒痛切薄片含之極神效磨塗疔瘡腫毒立消柑園小識雁來紅一名老少年無有用入藥者惟急救方有治腦漏法用老少年煎湯熱薰鼻內然後將湯服二三口大妙冬間用根瀕湖綱目青葙下附雁來紅亦無主治土宿真君本草雁來紅制汞膏子眼藥去遠年星障眼科要覽老少年銀杏剖殼為君官渣根大葉者佳千里光雄楊梅樹根皮為臣煎成濃膏量加制甘石冰片又方加茶樹根皮花鏡老少年其苗初出似莧莖葉穗子與雞冠無異至深秋本高六七尺則腳葉深紫而頂葉大紅鮮麗可愛愈久愈妍如花秋色之最佳者又有一種少年老則頂黃紅而腳葉緑為別一種枝頭亂葉叢生有紅紫黃緑相兼雜出者名十樣錦一種根下葉緑頂上葉純黃者名雁來黃天燈籠草一名山瑚柳形似辣茄而葉大本高尺許開花白色結子如荔枝外空內有緑子經霜乃紅京師呼為紅姑娘按此草主治雖夥惟咽喉是其專治用之功最捷綱目主治下失載故補之性寒治咽喉腫如神汪連仕採藥書金燈籠園人稱為天燈籠種盆為景更稱為珊瑚架性能清火消鬱結治疝神效敷一切瘡腫專治鎖纏喉風治金瘡腫毒止血崩酒煎服又以反手取根七株去梗葉洗淨連須切碎酒二碗煮鴨蛋二枚同酒吃治瘧如神子入藥保毒不大王安採藥方見腫消一名土三七乳香草越人曰奶草初生苗葉面青背紫葉似羊角菜多歧秋開小黃花如菊垂絲可愛根似芋魁人家多種之按綱目有見腫消云其葉似桑治癰腫狗咬當別是一種採藥録見腫消生溪澗中葉有三角枝梗皆青根亦青色形如菖蒲根性涼治諸瘡毒行周身活血追風散氣此又一種名同物異草寶云治跌打損傷消腫散瘀要藥百草鏡云治乳癰腫毒金瘡止血杖丹棒瘡喉癬雙蛾咳嗽急慢驚風延緑堂方土三七春夏用葉秋冬用根搗汁一鍾用水酒漿和勻灌入自效楊瘌毛入肉作痛祕方集驗土三七亦名金不換用其葉搗爛立塗即止千年老鼠屎紫背天葵根也百草鏡云二月發苗葉如三角酸向陰者紫背為佳其根如鼠屎外黑內白三月開花細白結角亦細四月枯按東壁綱目菟葵下注云即紫背天葵於主治只言其苗不及其根之用今為補之出金華諸暨深山石罅間者根大而佳春生夏枯秋冬罕有性涼清熱治癰疽腫毒疔瘡癧𤶱跌撲瘋犬傷七種疝氣痔瘡勞傷百草鏡癧𤶱傅藥醫宗彙編用紫背天葵子每歲用一粒用鯽魚搗爛敷之立消瘰癧救生苦海用千年老鼠屎搗碎同好酒入瓶煮一炷香隔三日隨意飲醉蓋被取汗數次自效黃賓江傳天葵丸專治瘰癧紫背天葵一兩五錢海藻海帶昆布貝母桔梗各一兩海螵蛸五錢共為細末酒糊丸如梧桐子大每服七十丸食後溫酒下此方用桔梗開提諸氣貝母消毒化痰海藻昆布以軟堅核治瘰癧之聖藥也諸疝初起經驗集凡疝初起必發寒熱疼痛欲成囊癰者用荔枝核十四枚小茴香二錢紫背天葵四兩蒸白酒二壇頻服即愈闢瘟草魚鱉金星鳳尾金星草一名獨腳金雞又名鴨腳金星佩帶之可闢疫氣近見市者有小葉而短狹大葉而長狹者皆非闢瘟草也小者名七星草俗呼骨牌草惟無五六蓋五六乃天地之中不易結寄生石樹間大者名劍脊金星長一二尺生山溪澗旁老則葉背皆起星此二種東壁綱目已收載闢瘟草葉如鴨腳有三岐一莖一葉氣味清香老則有星香氣亦減百草鏡云鴨腳金星即闢瘟草葉如鴨腳大而薄背生星點至八九月間星老乃黃干之其氣香冽不變若葉太老及經水者便不香端午採嫩者陰乾用勿見火性平味苦氣香治傷寒瘧痢風氣腫毒時氣惡氣散邪風乳癰熱瘡小兒痘眼疳喉閉生蛾同金鎖匙汁醋漱痧脹香竄疏經絡治疳百草鏡治痧脹用鴨腳金星草曬乾為末取少許㗜鼻中或煎服亦可小泉驗方疔腫用鴨腳金星草煎酒一服即消魚鱉金星生背陰山石上立夏後發苗根細如纖線蔓延石上葉不對節一長一圓長者為魚圓者為鱉魚葉經霜則老背起金星惟鱉葉無亦生西湖飛來峰絶頂治臌脹瘰癧火毒症採藥志云性涼治痰火毒行上部採藥方消痞塊痰核痄腮永師方治烟筒戳傷喉用魚鱉金星草煎濃湯咽喉中傷立止疼而愈永師方一作永寧傳方鳳尾金星草根類竹根黃色有須葉類建蕙而短長不滿尺春月發苗背有點子兩行相對有數十粒極密秋霜後乃黃生石山下其根蔓生百草鏡金星鳳尾其葉細碎形似鳳尾三月發苗葉背有星作細白點子秋後乃黃生古牆石塹中背日者佳惟實熱症可用性涼治吐血咽喉火毒諸丹毒發背癰𤶱百草鏡癰疽非陽毒及非金石藥毒者戒用謝云溪云性太涼男女忌服雖取效一時但精血受寒不能生育為虞耳寧德縣志白腳者治痢家寶方治喉癬金星鳳尾草搗汁加米醋數匙和勻用竹箸裹新棉花蘸汁點患處稠痰隨箸而出亦治喉風水茸角華陀中藏經狀如鬼腰帶竹小窠子生三四月開黃花葉如百合六七月採兩浙呼為合萌治吹奶水茸角不拘多少新瓦上煿干為末臨臥酒調服二錢次日即愈已破者略出黃水亦效老鴉蒜一名銀鎖匙一名石蒜一枝箭百草鏡云石蒜春初發苗葉似蒜又與山茨菰葉相似背有劍脊四散布地七月苗枯中心抽莖如箭干高尺許莖端開花四五成簇六出紅如山丹根如蒜色紫赤肉白有小毒理喉科綱目主治失載金士彩雲此吐藥也且令人瀉治喉風痰核白火丹肺癰煎酒服對口初起家寶方用老鴉蒜搗爛隔紙貼之干則頻換其毒自消雙單蛾神醫十全鏡老鴉蒜搗汁生白酒調服嘔吐而愈洗痔漏沈惠如傳方老鴉蒜鬼蓮蓬搗碎不拘多少好酒煎置瓶內先熏待半日湯溫傾出洗之三次全愈痰火氣急王都官方蟑螂花根即老鴉蒜洗焙乾為末糖調酒下一錢玉如意四方如意草一名箭頭草剪刀草大風草百草鏡云生山間或田塍有紫白二種紫花者名金剪刀白花者名銀剪刀入藥白花者良葉與人家盆栽者無異但花小葉狹長而尖微有別耳敏按山野間如意草葉上尖下圓深青色與人家所種無異惟葉色稍深緑耳其花亦有紫白二種至狹長之葉者乃地丁草所謂銀剪刀白花者是也金剪刀紫花者是也與如意草一類二種其性情功效亦不甚遠葛祖方治痞塊瘡毒追風理氣逐疫肺癰乳癰初起百草鏡用玉如意草一兩白酒煎飽肚時服初起者二服即消成膿者兩劑必潰已潰者三服易斂疼痛者服之能止乳癰疔瘡救生苦海白花如意草一名銀剪刀生田野山間較人家種者葉狹花小搗汁服之渣敷患處兒背生泡集驗小兒背上起白泡纍如綴珠一二日即破膿血外流癢甚一處方好一處又起用如意草搗爛敷之長巾縛定一夜而愈腳上生瘡集驗治腳上生瘡亂孔如蜂窩者用如意草搗爛敷之或用干如意草為末雞子清調敷亦可按此種又與地丁草不同地丁小而此種大地丁葉深緑此葉淺緑有云家種如意草亦有白花者乃真玉如意野生者仍是銀剪刀耳性劣不若家種者良痘兒氣急劉氏驗方白花地丁不拘多少煎湯服之立止炎天火痘劉氏驗方暑月出痘有一種火痘遍身皆紅者是也用白花地丁搗汁白酒沖服立解四方如意草汪連仕草藥方其葉四處分開一名地靈芝乃瑞草四方開花莖多葉繁如如意治神鬼二箭活血追風水楊梅一名金勾葉家母利藤勾子此草結紅子如楊梅小兒採食之綱目有水楊梅云其實類椒乃地椒是別一種葉點牙痛取葉搗汁點眼角飲香茶一鍾閉目少頃牙疼即止野靛青一名鴨青處處有之如莧菜葉尖中心有青暈治結熱黃疸定瘡毒疼痛生肌長肉困來草劉羽儀經驗方此草又名水灌頭子如桑子但桑子長而此子圓又如茶紙子但茶紙子紅而此子緑又不可不辨治黃疸用困來草石芫荽即鵝兒不食草二味洗淨搗汁沖陳酒一大鐘服之四五次自愈走馬胎出粵東龍門縣南困山中屬廟子角巡司所轄山大數百里多低槽深峻巖穴皆藏虎豹藥産虎穴形如柴根乾者內白嗅之清香研之膩細如粉噴座幽香頗甜淨襲人研粉敷癰疽長肌化毒收口如神蒼耳子油物理小識出山東治瘋飛鸞草秋景盦雜記飛鸞草生錢塘葛嶺後山金鼓洞洞在道士庖湢之右涉泉入洞暗處仰見一線天光光中見有此草形如飛鸞有頭有翅有三尾雪中開五色花中抽一莖直上著花葉狀如金絲荷葉草面緑而背銀紅色光者可治病有黑毛而不開花者乃斷腸草能殺人不可誤採也故須雪中見花者為真根如老薑入藥用葉性上升味苦寒治咽喉及口內諸病取葉七片滾水沖服立愈此草味雖苦寒性反不下降而獨上升見物即沾竄烈可知以此草衝於水中用指蘸之則苦寒全在指上其水即淡若沾唇則味在唇上水雖咽下而味不入喉也故治咽喉者須以小管灌於喉中或令病人張大口用匙灌入直達喉所則味在患處矣金鼓洞左近背陰地亦有之青烟白鶴草汪連仕云草生海島其性最行氣味甚猛烈色緑如翠能入氣分血分消積氣散鬱血續筋骨土人以煎膏療病治內外一切症其汁即阿魏近日方士於後營打枝巷葉家園取樹脂僞充射利又有以秦皮代充者真者亦稀見矣
