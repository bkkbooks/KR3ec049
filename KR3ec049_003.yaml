body:
  text: 卷三草部上五十六種附十一種參條從新云遼參之橫生蘆頭上者其力甚薄止可用以調理常病生津止渴其性橫行手臂凡指臂無力者服之甚效千金方云凡煮參湯須用流水煎之佳若用止水則不驗參鬚百草鏡參鬚寧古塔來者色黃粗壯船廠貨次之鳳凰城貨色帶白為劣煎之亦無厚味從新云參鬚亦遼參之橫生蘆頭上而甚細者性馬參條相同而力尤薄本經逢原云參鬚價廉貧乏者往往用之其治胃虛嘔逆咳嗽失血等症亦能獲效以其性專下行也若治久痢滑精崩中下血等症每至增劇以其味苦降泄也腳瘡濕爛百草鏡云芽茶參鬚各等分為末摻之固牙補腎方祝氏效方生熟石膏各五錢甘松山奈各三錢細辛二錢寒水石二錢升麻一錢五分青鹽參鬚各三錢北五味五十粒畢澄茄四十五粒共為末每晨擦牙漱口咽下亦可參葉遼參之葉也率多參客帶來以其氣味清香而微甘善於生津又不耗氣故販參者干之帶以餉遺代茶葉入湯用不計入藥用也人亦無用之者近因遼參日貴醫輒以之代參凡症需參而無力用者輒市葉以代故今大行於時蘇州參行市參葉且價至三五換不等以色不黃瘁緑翠如生手挼之有清甜香氣者真氣清香味苦微甘其性補中帶表大能生胃津祛暑氣降虛火利四肢頭目浸汁沐發能令光黑而不落醉後食之解酲第一按人參三丫五葉乃稟三才五行之精氣寄形於草質為百草之王其根干之色黃得坤土正色其子秋時紅如血是土之餘生火也故能峻補元氣返人魂魄其功尤能健脾蓋脾主中宮為萬物之母人無土不生參得土德之精以生人非若耆朮之膩滯世所以重之然百草本性大率補者多在根葉則枝節之餘氣不可以言補也參葉雖稟參之餘氣究其力止能行皮毛四肢性帶表散與參力遠甚惟可施於生津潤燥益肺和肝之用今一概用作培補元氣起廢救危何不察之甚耶清肺生津止渴藥性考人參子人參子如腰子式生青熟紅近日販參客從遼東帶來者皆青緑色如小黃豆大參葉上甚多寧古塔一帶七八月霜大難以入山故不能待其子熟生取而歸以售客每多緑色發痘行漿凡痘不能起發分標行漿者藥內加參子後日無癢塌之患珠參金沙江志産東川者味似參較苦本草從新云出閩中以大而明透者佳須多去皮滾水泡過然後可用因其苦劣之味皆在外邊近中心則苦減而稍甘書影叢說雲南姚安府亦産人參其形扁而圓謂之珠兒參藥性考珠兒參根馬薺苨同苦寒微甘味厚體重救生苦海云補肺降火下氣肺熱有火者宜之臟寒者服之即作腹痛鬱火服之火不透發反生寒熱血症用之可代三七藥性考性辛辛溫味甘托裡外症堪用按珠參本非參類前未聞有此近年始行然南中用之絶少或云來自粵西是三七子又云草根大約以參名其性必補醫每患其苦寒友人朱秋亭客山左聞貨珠參者有製法服之可代遼參每五錢索價五十金秋亭罄千金市其方祕不輕授豫懇其弟退谷始得其術因録之以濟貧珠參切片每五錢以附子三分研末拌勻將雞蛋一個去黃白每殼納參片五錢封口用雞哺待小雞出時取出將筆畫一圈於蛋上作記如此七次共成七圈其藥即成矣每遇垂危大症併産蓐無力吃參者煎服五錢力勝人參並能起死回生較臘狐心功力尤捷不得少服約人以五錢為率每次須多做數兩救人濟陰保元湯醫鈴此方理脾化邪生氣引氣生血為調經聖藥滇珠參三錢以米仁四錢拌水蒸透咀片再入姜加米仁汁蒸曬乾用懷生地一兩砂仁酒姜三味拌蒸九曬收再以瓦焙為炭當歸四錢白芍三錢酒炒川芎二錢去淨油米泔水浸洗收干再入酒浸丹參四錢酒洗透茺蔚子四錢酒蒸透香附三錢以薑土醋鹽童便甘草水乳汁逐次制過用云白朮五錢陳土炒女貞子三錢以白芥車前水浸乾用如氣血熱加丹皮生地氣血寒加肉桂數分不真確之寒熱而先後至者照本方如經閉無分婦女本方加牛膝太子參從新云雖甚細小卻緊而堅實力不下大參百草鏡云太子參即遼參之小者非別種也乃蘇州參行從參包中檢出短小者名此以售客味甘苦功同遼參羅浮參羅浮山志羅浮所産人參殊與本草人參不類狀如仙茅葉細莖圓有紫花三葉一花者為仙茅一葉一花者為人參根如人字色如珂玉煮汁食之味與參無別但微有膠漿耳味甘帶苦生津養胃補虛羸潤肺西洋參藥性考洋參似遼參之白皮泡丁味類人參惟性寒宜糯米飯上蒸用甘苦補陰退熱薑製益元扶正氣從新云出大西洋佛蘭西形似遼東糙米參煎之不香其氣甚薄若對半劈開者名片參不佳反藜蘆入藥選皮細潔切開中心不黑緊實而大者良近日有嫌其性寒飯鍋上蒸數十次而用者或用桂圓肉拌蒸而用者忌鐵刀火炒苦寒微甘味厚氣薄補肺降火生津液除煩倦虛而有火者相宜腸紅類聚要方用西洋參蒸桂圓服之神效東洋參汪玉於言東洋參出日本東倭地其參外皮糙中油熟蒸之亦清香與遼參味同微帶羊膻氣入口後微辣為各別耳然性溫平與西洋佛蘭參性寒平者又別此參近日頗行無力之家以之代遼參用亦有效每枝皆重一錢許亦有二三錢者總以枝根有印日本二字名價八換無字價五換蓋有印字者乃彼土之官參最道地無印者皆彼土之私參也亦有通身皮糙內肉白色者不佳桂圓肉拌蒸曬用癸丑三月豫在李燮堂先生處見有東洋參二種一種大者粗如拇指儼似西洋參最堅實多肉一種小者每枝不過二三分亦有分許者肉薄不甚堅實據言二種皆日本洋客帶來新時俱色白皮皆有皺紋其大者切片口含過夜皆化而無滓小者含口中三夜皆不化大者煎湯色淡少味小者反濃厚二種俱出日本倭地而小者何以色味獨厚豈生産之土又不同耶又一種亦出東洋近奉天旅順等處者皮上有紅紋云彼倭國中亦珍之言其力更十倍於此舶商多以貴價售得轉販中土今蘇州有東洋參店專市此參者蓋因上年壬子冬江浙疫痘遍染小兒死者不下千百計有教服東洋參能助漿解毒服之果驗遂大行於時入藥內須飯鍋上蒸透曬乾用瓷瓶收存方免蛀壞又一種東洋參出高麗新羅一帶山島與關東接壤其參與遼參真相似氣亦同但微薄耳皮黃紋粗中肉油紫屠舞夫攜來豫曾見之據云性溫平索價十換言産蓐服之最效其力不讓遼參也五雜俎人參出遼參上黨者最佳頭面手足皆具清河次之高麗新羅又次之今生者不可得見入中國者皆繩縛蒸而夾之故上有夾痕及麻線痕也新羅參雖大皆用數片合而成之功力反不及小者擇參取透明如肉及近蘆有橫紋者則不患其僞矣昭參金沙江志即人參三七産昭通府肉厚而明潤頗勝粵産形如人參中油熟一種王子元官於滇曾以此遺外舅稼村先生豫親見之狀較參紅潤大小亦不等味微苦甜皮上間有帶竹節紋者劉仲旭少府云昭通出一種名蘇家三七儼如人參明潤紅熟壯少者服之作脹惟六十以外人服則不腹脹其功大補血亦不行血彼土人患虛弱者以之蒸雞服取大母雞用蘇三七煎湯將雞煮少時又將三七渣搗爛入雞腹用線縫好隔湯蒸至雞爛去三七食雞可以醫勞弱諸虛百損之病據所言即昭參也宦遊筆記三七生廣西南丹諸州番峒中每莖上生七葉下生三根故名三七土人入山採根曝乾色微黃形似白芨長而有節者其味微甘而苦頗類人參人參補氣第一三七補血第一味同而功亦等故人並稱曰人參三七為藥品中之最珍貴者此常中丞筆記所言人參三七以形圓而味甘如人參者為真其長形者乃昭參水三七之屬尚缺分晰也識藥辨微云人參三七外皮青黃內肉青黑色名銅皮鐵骨此種堅重味甘中帶苦出右江土司最為上品大如拳者治打傷有起死回生之功價與黃金等沈學士云竹節三七即昭參解酲第一有中酒者嚼少許立時即解又近時人參三七中有名佛手山漆者形長儼如佛手上有指出廣西藥客販至其價在圓山漆之上此名荸薺山膝即所稱銅皮鐵骨參三七是也壬戌有客自打箭爐來帶有藏三七名佛手參儼如干麥冬而堅實形小不大作三叉指形玲瓏如手故名王聖俞曾嘗其味淡而微辛涼云能治肺血勞損此亦白芨三七之屬也浙産臺溫山中出一種竹節三七色白如殭蠶每條上有凹痕如臼云此種血症良藥庚申豫於晉齊處見瓊州山漆圓如芋皮光色黃白肉黃如金云瓊人珍之名野山漆勝右江所出者又一種出田州土司如佛手形名佛手三七云此種系野生入藥更勝百草鏡云人參三七味微甘頗似人參入口生津切開內瀝青色外皮細而緑一種廣西山峒來者形似白芨長者如老幹姜黃有節味甘如人參亦名人參三七又名竹節三七此外又有旱三七名蘿蔔三七色白味苦有小三七色黑出湖南寶慶府亦名紅三七有羊腸三七即水三七之類形如羊腸細曲又一種出雲南昭通者能亂人參色味無異且油熟明透但少蘆耳然回味太甜金御乘雲近時市品三七之外有水三七有白芷三七有竹節三七其形狀功效皆未見其有考核者味甘苦同人參去瘀損止吐衄補而不峻以末摻諸血中血化為水者佳大能消瘀療跌撲損傷積血不行以酒煎服之如神按人參三七出右江土司邊境形如荸薺尖圓不等色青黃有皮味甘苦絶類人參故名彼土人市入中國輒以顆之大小定價每顆重一兩者最貴云百年之物價與遼參等余則每顆以分計錢計者價不過一二換而已昭參無皮形如手指絶無圓小者間有短扁形者亦頗類白芨樣金沙江志所載以為即人參三七恐未確故附存劉說以備考治吐血種福堂方用雞蛋一個打開和人參三七末一錢藕汁一小杯陳酒半小杯隔湯燉熟食之不過二三枚自愈七寶散仇氏傳方刀傷收口用好龍骨象皮血竭人參三七乳香沒藥降香末各等分為末溫酒下或摻上陳氏回生集載軍門止血方人參三七白蠟乳香降香血竭五倍牡蠣各等分不經火為末敷之菊花參産雲南東川府巧家汛江邊葉似菊花功用同人參力較遜紅毛參百草鏡漳泉估舶從紅毛帶來絶不類參形長而粗長者有三四尺色紫黑粗者如拇指折之中有白點痕有起花紋與建參相似止瀉痢如神煤參出陝西西安等處形如參皮心俱青黑故名施柳南太守云此參出陝西華山食之多吐人其性亦劣味微苦甘同人參功力則薄耳建參法落梅附藥性考福參出閩浙頗似人參而性味辛熱虛寒病宜之歌云又有福參辛苦甘齊性溫益氣虛冷人宜注福參多食則喉痛故知性熱乙未豫館剡川故鄞屬也聞有市建參者往覓得之儼如臺參中油熟一種大者惟不能純透亦有蘆無竹節紋味亦苦甘以竹刀剖之心空不似遼參之堅實劉贊之自閩回言閩中近日大行亦清補兄患風火牙疼煎湯漱口立愈則性又帶寒散或言其性熱者猶未確也金御乘雲建人參性熱獨不宜於産婦與遼參形色氣味真相似但遼參入口回味生津此則回味消澀故功用亦殊河南出光山參嵩山參儼與遼産無別惟嚼之有渣不糯味亦淡法落梅金沙江志産雲南東川府法戛地己酉友人王鼎條患心腹痛有客從滇帶此物來呼為法落梅用根其形儼如上黨參色亦黃白味甘苦服之疾愈據云彼中人皆名法落梅而不知諸書何以作梅字耶蔡云白言建參閩人呼法落梅治心痛如神土人參各地皆産錢塘西湖南山尤多春二三月發苗如蒿艾而葉細小本長二三寸作石緑色映日有光土人俟夏月採其根以入藥俗名粉沙參紅黨即將此參去皮淨煮極熟陰乾而成味淡無用準繩劫瘴消毒散用之呼為百丈光甘微寒須蒸之極透則寒去氣香味淡性善下降能伸肺經治節使清肅下行補氣生津治咳嗽喘逆痰湧火升久虐淋瀝難産經閉瀉痢由於肺熱反胃噎膈由於燥澀凡有升無降之症每見奇效以其根一直下行入土最深故也脾虛下陷滑精夢遺俱禁用以其下行滑竅孕婦亦忌白帶初起百草鏡土人參切片三兩用陳紹酒飯上蒸熟分作三服吃完即愈王安採藥方云土人參補陰虛對配茯苓熬膏治楊梅結毒酒煎服上黨參防黨附本經逢原云産山西太行山者名上黨人參雖無甘溫峻補之功卻有甘平清肺之力不似沙參之性寒專泄肺氣也百草鏡云黨參一名黃參黃潤者良出山西潞安太原等處有白色者總以淨軟壯實味甜者佳嫩而小枝者名上黨參老而大者名防黨參味甘性平治肺虛能益肺氣防風黨參從新云古本草云參鬚上黨者佳今真黨參久已難得肆中所市黨參種類甚多皆不堪用惟防黨性味和平足貴根有獅子盤頭者真硬紋者僞也白黨即將此參煮曬已成原汁已出不堪用翁有良辨誤云黨參功用可代人參皮色黃而橫紋有類乎防風故名防黨江南徽州等處呼為獅頭參因蘆頭大而圓凸也古名上黨人參産于山西太行山潞安州等處為勝陝西者次之味甚甜美勝如棗肉近今有川黨蓋陝西毗連移種栽植皮白味淡類乎桔梗無獅頭較山西者迥別入藥亦殊劣不可用味甘平補中益氣和脾胃除煩惱解渴中氣微虛用以調補甚為平安南沙參藥性考南沙參形粗似黨參而硬味苦性涼清胃瀉火解毒止嗽寧肺從新云南沙參色稍黃形稍瘦小而短近有一種味帶辣者不可用張璐本經逢原云沙參有南北二種北者質堅性寒南者體虛力微功同北沙參而力稍遜按參類不一有竊參名者如苦參沙參是也有竊參形者如薺苨三七是也凡參皆隨地運為升降故各地皆産參而性亦各異功用總不及遼參今擇可入藥為綱目未及載者悉附識於此以廣知焉張觀齊云珠兒參者其形獨蒜似之去皮煮熟色如紅熟人參因圓大而如珠故名其味苦而微帶辛不知何根子所造價每斤五錢治牙痛有驗大略苦者性寒而辛者必散是火鬱發散之意未必全在補功也至於紅黨參即紅蘿蔔草所造白黨參未考此皆蘇地好奇者所制好奇之醫因而用之走方者所以惑鄉人稱太子參者乃參中之全枝而小者是參客巧取之名也洋參清氣同參味苦必寒疑産陰山補功雖不及人參較之珠兒紅白黨等遠矣土人參俗名觀音山貨形與人參無二亦有糙熟之分出處不一中有白絲心而味淡親見臺溫處州及新昌嵊縣人有貨此參者價每兩兩許未考其性亦未用過如南沙參誤用者甚多南沙參産於浙地者鮮時如蘿蔔土人去皮煮熟如熟山藥曬乾如天花粉而無粉性本名粉沙參功專散毒消腫排膿非南沙參也其南沙參形如桔梗而中空松味淡微甘桔梗帶辛而南沙參不辛産於毫門者最佳俗名雄桔梗藥肆中即於桔梗包中撿出水潤打扁切片確類銀柴胡片此則入肺而理嗽功如北沙參而兼理氣蓋中空之義也台州亦出桔梗而條幹帶硬亦有雄桔梗如南沙參但色不如毫産者白蓋參類本不一近日價日昂貴而各種僞品雜出人亦日搜奇於窮岩荒壑中覓相似草根以代混倘誤用之為禍非淺王繹堂云時下盛行一種福建長樂參廣西南陔參二物頗似儼與臺參油熟無別味亦苦中帶甜蒸湯亦極濃厚然皆性熱不似人參之平和滋益也即臺參中近日人頗有入白糖及滷水制透取其重也凡參八分可制重二分作一錢以圖利店中有此參者每日必蒸焙否則潮潤難售故市參者須加意焉於術即野術之産於潛者出縣治後鶴山者為第一今難得價論八換其形有鶴頸鶴頭羽翼足俱全皮細帶黃切開有硃砂點其次出北鄉皮色帶黑不黃茅翼云産徽州者皆種術俗稱糞術乃糞力澆灌大者肥而無鶴頸野生者名天生術形小有鶴頸甚長內有硃砂點術上有須者尤佳以得土氣厚也於朮亦野生出於潛産縣治龍脈土上者其內點真似硃砂猩紅如灑血鶴頸肉蘆干之清香産他處內或無點純白或有黃點總不及龍脈上産者為上品冬月採取形味方全一種江西術其形甚小與野術相似雖有鶴頸而甚短其體堅實其味苦劣不可用萬曆杭州府志白朮以産於潛者佳稱於朮清異録潛山産善術以其盤結醜怪有獸之形因號為獅子術西吳里語孝豐天目山有仙丈峰産吳術名雞腿術入藥最佳百草鏡云白朮一莖直上高不過尺其葉長尖傍有針刺紋花如小薊冬採者名冬朮汁歸本根滋潤而不枯燥卻易油不能止瀉春採夏採者藏久雖不易油卻枯燥不潤肉亦不飽滿凡收術須陰乾勿曬曬則爛野術形小蘆梗細硬皮細若蘆軟而粗即種術矣又有象術系臺術中撿出如野術者但切開有暈紋臺術雖種而不用糞故不肥大服之不脹倘野術難得此為穩安徽宣城歙縣亦有野生術名狗頭術亦佳又一種系取野術種灌以糞形雖大皮卻細緊出樟村較徽省種術稍好今人論野術云黑土者真不知土色各處不同不可執一而論又云小者真然老山貨年久亦有大者又云有硃砂斑者真不知於朮亦有無硃砂斑者據土人言産縣後山脈及黃塘至遼東橋一帶西流水四十里地之術方有硃砂點他處則無但野術入口甜味雖重氣極清香自不同也總以白為佳以潤為妙葉天士本草云浸刮飯鍋上蒸曬如棗黑黃土炒為中宮和氣補脾之藥本經逢原云云術肥大氣壅臺術條細力薄寧國狗頭術皮赤稍大然皆栽灌而成故其氣濁不若於潛野生者氣清無壅滯之患入風痹痰濕利水破血藥俱生用然非於潛産者不可生用也張觀齊云今有一種野術深山處必有形如於術切開有硃砂斑香而不甜細考其味親見其苗乃天生之蒼朮也因久無人採故大而宛如於術大凡術以火焙乾者味必苦生曬者味必甜臺術以及各處種術皆於朮所種而變者功雖不如於術服亦有驗今於朮絶少市中皆以仙居所産野術充於朮功亦相等辛亥五月有客自青田縣來帶有天生術大小如一約重兩許俱生者未經日曬乾焙若干之可三錢許其術形儼如仙鶴翅足皆具亦有長頸頸皆左顧一一相似無作磊塊形者詢之云此術不生於土所生之地系青田邊境有一山山有石壁壁上每年生此術二三十斤不能多有吾杭西北山近留下小和山一帶地方及南高峰翁家山等處皆産野術氣味香甜生啖一二枚終日不飢生津溢齒解渴醒脾功力最捷切開無硃砂點膚里膩細而白如雪色名曰玉術又呼雪術亦不易得入藥功效與於朮等較他産野術尤力倍也甘補脾溫和中補氣生血無汗能發有汗能止開胃補脾則能進飲食去勞倦止肌熱化症癖和中能已嘔吐定痛安胎燥濕利小便生津液止泄瀉化胃經痰水理心下急滿利腰臍血結去周身濕痹凡下焦陰氣不脫上焦陽氣驟脫者無力用參重用野術大能起死回生用糯米泔浸陳壁土炒或蜜水炒人乳拌用炒黃不宜焦焦則無力矣熬膏更良禁忌同白朮代參膏楊春涯驗方於朮十斤白米泔水浸三晝夜洗淨浮皮蒸曬十次有脂沾手為度切片熬膏一火收成滴紙不化用白茯苓十斤舂末水飛去浮只取沉者蒸曬十次沾手如膠與術膏攪勻每服兩許米湯送下治虛弱枯瘦食而不化用於術酒浸九蒸九曬一斤菟絲子酒煮吐絲曬乾一斤共為末蜜丸梧子大每服二三錢四制仙術散治盜汗不止此藥入神於朮四兩分四制一兩黃耆煎汁炒一兩牡蠣粉炒一兩麩皮湯炒一兩石斛湯炒只取術為末服三錢粟米湯下各色痢疾傳信方於朮一兩老薑一兩當歸五錢水二碗煎好露一宿服自愈保胎丸良方集要茯苓二兩條芩一兩於朮土炒一兩紅花一兩沒藥三錢制香附一兩元胡索醋炒一兩益母草去根一兩共研末蜜丸桐子大早晚白滾水服七粒不宜增減戒惱怒勞傷生冷發氣等物凡遇腹痛腰痠作脹即宜服之成孕三月即服起直至足月不但保胎即臨産亦可保易生無恙方內紅花元胡索二味皆是行血滑胎之品分兩太重每味只可二錢方合本方君臣用者詳之三日瘧古今良方九制於術一斤廣皮八兩熬膏用飴糖四兩收又方專治四日兩頭或一二年至三四年不愈者或愈而復發連綿不已者用於術一兩老薑一兩水煎發日五更溫服即愈重者二服永不發矣北云術邊塞志産遼東口外五國城等處此術初生土中並無枝葉生於暗地者多城北最盛天氣晴和則掘地求之可得色如枯楊柳大小如箸蔓延數十步屈曲而生此地病人無藥物凡有疾者煎此術湯服之自愈又可占病人之吉凶若煎沸數次藥浮者病即愈半浮半沉者病久不愈土人以此驗之治風寒傷食一切病南連仙姑連天姥連附一名土連浙溫白金華山中俱有之出處州者名處連以形大毛輕者好性較川連尤寒北人市去為馬藥百草鏡土黃連二月發苗根葉與羊蹄大黃無異但短小耳三月抽莖高有尺許花細成穗結實初青後紅子藏稜中夏至後枯出浙江者名慈連安徽寧國府宣城出者粗肥名宣黃連性寒而不滯入膏丹用最良吉氏家傳血痢用宣連為末以雞子搜作餅炭火煅令通赤蓋定勿泄氣候冷研細空心米飲下五分大人一錢以意加減按宣連即今江浙東西一路所産黃連皆當日宣州路也仙姑連出臺州仙居縣邑人相傳吳魏時蔡經居此故以名邑王方平曾偕麻姑降其宅今遺址猶存其地産黃連粗如雞距皆作連珠形皮色青黃光潔無毛味大苦寒折之有烟色如赤金者佳療火症更捷於川産者馬藥非此不可天姥連出天台皮色鼠褐略有毛刺味苦入口久含有清甘氣大瀉心火性寒而帶散故治目症尤效水黃連川中一種黃連生於澤旁周身有黃毛如狗脊毛狀名水黃連頗細小醫家不知用布人以之僞充真川連出售惟祝氏效方用之百草鏡水黃連打箭爐出者形細長少硬刺較重於他連以皮肉帶青色者為佳出小西天者色黑有毛者佳無毛光黃者次之治鼻疳用百部三錢切片曬乾炒取淨末二錢地骨淨炒二錢五倍子炒黃柏炒甘草炒各二錢水黃連切片炒一錢共為末如鼻疳爛通孔者以此調香油搽立結痂愈馬尾連出雲南省藥肆皆有之乾者形如絲上有小根頭土人盤取之以市性寒而不峻味苦而稍減不似川連之厚性能去皮裡膜外及筋絡之邪熱小兒傷風及痘科用浙烏頭即僧鞋菊此乃烏頭之産於浙地錢塘筧橋人種之市為風瘓藥近日人家園圃亦有之名鸚𪃿菊又曰僧鞋菊追風活血取根入藥酒良霍石斛五色石斛附出江南霍山形較叉斛細小色黃而形曲不直有成球者彼土人以代茶茗云極解暑醒脾止渴利水益人氣力或取熬膏餉客初未有行之者近年江南北盛行之有不給市賈率以風蘭根僞充但風蘭形直不縮色青黯嚼之不黏齒味微辛霍石斛嚼之微有漿黏齒味甘微咸形縮者真百草鏡石斛近時有一種形短只寸許細如燈心色青黃咀之味甘微有滑涎系出六安州及潁州府霍山縣名霍山石斛最佳咀之無涎者系生木上不可用其功長於清胃熱惟胃腎有虛熱者宜之虛而無火者忌用年希堯集驗良方長生丹用甜石斛即霍石斛也範瑤初云霍山屬六安州其地所産石斛名米心石斛以其形如纍米多節類竹鞭干之成團他産者不能米心亦不成團也甘平微咸陳廷慶雲本草多言石斛甘淡入脾鹹平入胃今市中金叉及諸斛俱苦而不甘性亦寒且形不似金叉當以霍斛為真金叉斛清胃除虛熱生津已勞損以之代茶開胃健脾功同參耆定驚療風能鎮涎痰解暑甘芳降氣五色石斛雲南志産祿勸州普渡河瀕江石壁間色紺紅者佳療胃熱益虛羸銀柴胡經疏云俗用柴胡有二種一種色白黃而大者名銀柴胡專用治勞熱骨蒸色微黑而細者用以解表發散本經並無二種之說功用亦無分別但云銀州者為最則知其優於發散而非治虛熱之藥明矣本草匯柴胡産銀夏者色微白而軟為銀柴胡用以治勞弱骨蒸以黃牯牛溺浸一宿曬乾治勞熱試驗本經逢原云銀柴胡銀州者良今延安府五原城所産者長尺余肥白而軟北地産者如前胡而軟今人謂之北柴胡勿令犯火犯火則不效百草鏡云出陝西寧夏鎮二月採葉名藝蒿長尺余微白力弱於柴胡藥辨云銀柴胡出寧夏鎮形如黃耆內有甘草串不可混用翁有良云銀柴胡産銀州者佳有二種但辨形如鼠尾與前胡相等查前胡與柴胡相類皆以西北出産者為勝形既相同當以湖廣古城柴胡為準今銀柴胡粗細不等大如拇指長數尺形不類鼠尾又不似前胡較本草不對治病難分兩用究非的確用者詳之金御乘雲銀州柴胡軟而白北産亦有白色者今人以充白頭翁此種亦可謂銀柴胡蓋銀指色言不指地言尤金銀花白色者曰銀花是也銀柴胡原有西産北産之分不必定以銀夏者為銀柴胡也然入藥以西産者勝按綱目注銀柴胡以銀夏出者為勝不知今人所用柴胡有北柴胡南柴胡之分北産如前胡而軟南産強硬不堪用又銀柴胡雖發表不似柴胡之峻烈綱目俱混而未析甘微寒無毒行足陽明少陰其性與石斛不甚相遠不但清熱兼能涼血和劑局方治上下諸血龍腦雞蘇丸中用之凡入虛勞方中惟銀州者為宜北柴胡升動虛陽發熱喘嗽愈無寧宇可不辨而混用乎按柴胡條下本經推陳致新明目益精皆指銀夏者而言非北柴胡所能也周一士云凡熱在骨髓者非銀柴胡莫療治虛勞肌熱骨蒸勞虐熱從髓出小兒五疳羸熱撫芎産江西撫州中心有孔者是辛溫無毒逢原云性最升散專於開鬱寬胸通行經絡郁在中焦則胸膈痞滿作痛須撫芎開提其氣以升之氣升則鬱自降故撫芎總解諸郁直達三焦為通陰陽氣血之使然久服耗氣令人暴亡矣按芎藭有數種蜀産曰川芎秦産曰西芎江西為撫芎綱目取川芎列名而西芎撫芎僅於注中一見亦不分其功用蓋芎藭以蜀産為上味辛而甘他産氣味辛烈遠不逮矣殊不知西芎與川芎性不甚遠俱為血中理氣之藥第西産不及川産者力厚而功大至撫芎則性專於開鬱上升迥然不同故石頑於川芎下另立撫芎一條以明不可混今從之芎歸飲不藥良方治失血湧吐因飽食用力或因持重努傷脈絡用當歸二兩或三兩酒浸洗撫芎一兩微炒水三碗酒一碗半煎至八分作二次服之取其引血歸經並治跌撲墜打而傷脈絡令人大吐者二症中如有瘀血或加大黃下之或加桃仁紅花破之或加鬱金黃酒行之審症酌加其效更速普濟方一切熱癤時毒腫痛撫芎煅研入輕粉麻油調塗土藜蘆汪連仕云即千葉水仙花黃白者入藥紅者不可服取根罨毒曬燥研末合通關散搐鼻令人吐痰一切風症多可用之緑升麻從新云乃升麻之別一種繆仲醇廣筆記用治下痢每每有驗性最竄捷治痢疾下傷按升麻色緑者佳非另一種也金鐘薄荷汪連仕草藥方云即細葉薄荷山産者根堅硬以米醋磨敷蜂刺蟲叮蜈蚣咬葉治跌打損傷腹蟲牙痛煎湯咽之王安採藥方金鐘荷葉即薄荷止吐血黃疸跌打諸般風氣合濟陰丸白毛夏枯草産丹陽縣者佳葉梗同夏枯草惟葉上有白毛今杭城西湖鳳凰山甚多性寒味苦專清肝火山牛膝一名蘇木紅今人呼荔支紅又名透血紅産富陽竹園內善能理瘡並刀箭入肉活血化瘀寬筋理跌打損傷治破傷風七十二般惡疾非此不除功勝川産汪氏方土連翹巴山虎附乃鬧羊花子也鬧羊花即黃杜鵑一名石棠花牛食之即瘋顛富陽北泥山白洋溪一帶山中甚多彼土人呼為石棠花即黃色映山紅也百草鏡云殼似連翹子類芝麻故一名山芝麻入藥每服三分不可多服方術家麻藥中有之其根名巴山虎入藥去骨用汪連仕草藥方土連翹即鬧羊花子今呼為南天竺草苦溫治風寒濕痹癧癤腫脹撲損疼痛疽毒疔瘡用之神效汪連仕草藥方治跌打損傷能活血疏風理七十二般風氣為外科聖藥透骨丹藥鑑治跌撲損傷深入骨髓或隱隱疼痛或天陰則痛或年遠四肢無力此藥主之真神方也鬧羊花子一兩火酒浸炒三次童便浸二次焙乾乳香沒藥不去油血竭各三錢為末研勻再加麝香一分同研瓷瓶收貯封固每服三分壯者五六分不必吃夜飯須睡好方服酒可儘量下服後避風有微汗出為要忌房事酸寒茶醋等物弱者間五日一服壯者間三日一服按吉云旅抄有治無名腫毒疔瘡發背一醉消奇方用山芝麻三分研極細末以好酒煎數沸帶渣服下蓋被出汗不可見風一服全消但不可用燒酒則又與藥鑑治法異並附於此善用者擇之將軍復戰丹張云野瑣記治跌打損傷以山芝麻二十兩童便浸四次燒酒浸三次略炒乳香沒藥各炙去油三兩血竭煨二兩為極細末火酒送下四分隨食白煮豬肉壓之如持齊者食白腐乾服藥後切記避風七釐散吳興楊氏便易良方治金刃傷止痛如神用龍骨硼砂血竭酒洗兒茶天芝麻即土連翹各五分為細末每服七釐十全丸緑竹堂驗方治風痹跌撲癰疽初起一服即能消散惟虛弱人須先補而後用此攻之麝香三錢穿山甲土炒脆廣木香生研血竭另研雄黃水飛山芝麻酒炒番木鱉黃土炒焦黃為度不可太枯篩取淨末自然銅火煅醋淬九次研細水飛殭蠶炒去絲去頭足以上各一兩川蜈蚣去足尾二十一條酒炙為末蜜丸桐子大以硃砂為衣金箔裹之蠟丸封固每用一丸至重者再進一丸用羌活紫蘇酒煎化服取汗避風否則發戰傷人一方去木鱉子加風茄花五錢山芝麻亦用五錢較穩馬前散救生苦海治癰疽初起跌撲內傷風痹疼痛其效如神番木鱉忌見鐵器入砂鍋內黃土拌炒焦黃為度石臼中搗磨用細篩篩去皮毛撿淨末山芝麻去殼酒炒各五錢乳香末箬葉烘出汗五錢穿山甲黃土炒脆一兩每服一錢酒下不可多服服後避風否則令人發戰栗不止如人虛弱每服五分五虎丹治風痹跌撲腫毒初起草烏去皮薑汁拌曬隔紙炒山芝麻燒酒拌曬炒雄黃水飛血竭箬葉上烘煬穿山甲砂炒各一兩為末丸如芥子大酒下二三分不可多此方見草寶真劫劑也巴山虎即鬧羊花根也衆炒方名巴山虎追風定痛神妙草頭痧藥行篋檢祕鵝不食草並子一兩南星半夏藜蘆漏蘆牙皂鬧羊花子鬧羊花根各一錢俱曬燥磨極細末此藥專治中暑中寒中風不語牙關緊閉急慢驚風小兒筋抽將藥吸入鼻內噴嚏來立時蘇醒亦可用陰陽水調服二三分立愈熏痔漏仙方不可刀針掛線及服藥丸散用鬧羊花根俗名老虎花象杜鵑色黃其根如鐵將此根捶碎煎湯放罐內置桶中蓋上挖一孔對痔坐定熏之湯冷復熱之再熏其管觸藥氣自漸漸潰爛不堪熏半月自愈重者一月收功永不再發切不可洗治兩腮紅腫梁氏集驗百合一個山芝麻根去皮貝母元明粉各一錢銀硃七分加白麵調敷土茜草一名地蘇木過山龍風車草此南方所産茜草也葉四五辨成一叢攢莖節而生方梗柔蔓皮糙澀棘人指獨莖直上一二尺乃有分歧處葉如箭鏃風吹能環轉如車輪故名又名八仙草以其葉相對攢簇枝葉間生也其根黃赤色不可染又名活血丹百草鏡云此草秋時結實小如梧桐子實後枯立夏後發苗百草鏡性平入肝脾心經治打傷跌壓活血性善行血無瘀者禁用葛祖方治風氣痛通經下胎黃疸鬼箭打瘕痞蛇傷藥鑑云功專活血治跌撲癰毒癥瘕經閉便血崩中帶下痔漏風痹鬼箭風臌脹黃疸蛇傷疔瘡朱羅峰方過山龍仙橋草蒼耳草豨蘞草紫花地丁野苧麻根六味等分酒煎服取汗須多服蟾酥丸汗出咸者可治若味淡不可治又方地蘇木陰乾為末重者八錢輕者五錢好酒煎服如放黃者沖酒服渣罨疔上野苧麻採藥志天青地白草又名川綿蔥即野苧麻也一名銀苧又名天名精生天土河塹旁立春後生苗長一二尺葉圓而尖面青背白有麻紋結子細碎根搗之有滑涎入藥用根取鬆土者良肥白無筋按此與地菘別性涼治諸毒活血止血功能發散止渴安胎塗小兒丹毒通蟲脹崩淋哮喘白濁滑精牙痛喉閉骨哽疝氣火丹癤毒胡蜂毒蛇咬發背疔瘡跌打損傷救生苦海午日取野苧麻陰乾曬燥搓熟取白絨收藏夏月遇有金刃傷者敷之即止血且不作膿百草鏡跌撲野苧根一兩搗碎好酒煎服儘量飲醉漆瘡紅腫合紫霞膏又為女科聖藥痘毒以野苧麻去皮搗敷癰疽發背對口一切無名腫毒野苧麻搗汁用無灰酒衝下渣敷患處露頭蓋被出汗即出膿水痊愈跌打閃挫方教師白宇亮傳大鯽魚一尾獨核肥皂一個胡椒七粒黃梔子九個老薑一片蔥頭三個野苧麻根一段乾麵一撮香糟一團紹酒隨數用同前藥合搗如泥炒熱敷患處立愈外用布包扎緊次日青出即愈救生苦海治神鬼箭用野苧麻川南星同搗敷徐若寧云蛇虺咬看傷處有竅是雄蛇無竅是雌蛇以針挑破傷處成竅然後取野苧麻嫩頭搗汁和酒服之三盞絞剩渣敷傷口能令毒從竅中出傷立愈將渣棄水中永不復發雞鴨腳艾百草鏡葉細多歧間有闊者雜之姜蕤如雞鴨腳然故名搓之作艾香治腳氣疝氣千里光一名九里明一名黃花草綱目附見千里及下按千里光為外科聖藥俗諺云有人識得千里光全家一世不生瘡綱目不載入外科用百草鏡云此草生山土立夏後生苗一莖直上高數尺葉類菊不對生圖經云千里光生淺山及路旁葉似菊而長背有毛枝幹圓而青春生苗秋有黃花不結實採莖葉入眼藥名黃花演治目不清去紅絲白障迎風流淚百草鏡明目去星障煎湯浴瘡瘍合膏點赤眼貼楊梅瘡狗咬以千里膏摻粉霜貼之治蛇傷治四塊鵝掌風王三才醫便用千里光草一握蒼耳草一中握朝東牆頭草一小握共入瓶內水煎百沸以手少擦麝香向瓶熏之仍用絹帛係臂上勿令走風三次即愈千里光即金叉草是也治時疫赤鼻聤耳火眼諸瘡癤腫毒破爛及鵝掌風合千里光膏點赤眼貼楊梅瘡加狗油熬粉霜尤妙王安採藥方小青草五月生苗葉短小多莖不甚高開花成簇紅色兩瓣與大青同但細小耳一名蜻蜓草一名蒼蠅翅綱目小青條集解下引圖經生福州三月生花亦不載其形狀未免失考且主治亦別圃事須知小青一名淡竹花此則另是一種味苦大寒理小腸火治兒疳積赤目腫痛療傷寒熱症時行咽痛治疳積煮牛肉田雞雞肝食之疳瞎煮豬肝食黃疸勞虐發熱翳障初起百草鏡小青草五錢煮豆腐食雀目百草鏡一名雞盲白晝見物將暮即昏雞肝或羊肝取一具不落水小青草五錢安碗內加酒漿蒸熟去草吃肝三服即愈加明雄黃五分尤妙澤半支百草鏡葉如鼠牙半支生山澗處葉皆對節夏開黃花如瓦松治蛇咬疔腫狐尾草汪連仕採藥書狐尾草花如狐尾九節而生長水澤旁名狐媚花主治吐血金瘡取根敷一切腫毒根罨洗瘡用葉金錢草一名遍地香佛耳草俗訛白耳草乳香藤九里香半池蓮千年冷遍地金錢其葉對生圓如錢鈸兒草葉形圓二瓣對生象鐃鈸生郊野濕地十月二月發苗蔓生滿地開淡紫花間一二寸則生二節節布地生根葉四圍有小缺痕皺面以葉大者力勝干之清香者真三月採勿見火綱目有積雪草即此但所引諸書主治亦小異故仍為補之至綱目所載言其治女子少腹痛有殊效其方已載綱目此不贅述味微甘性微寒祛風治濕熱百草鏡跌打損傷虐疾産後驚風肚癰便毒痔漏擦鵝掌風汁漱牙疼葛祖方去風散毒煎湯洗一切瘡疥神效採藥志云發散頭風風邪治腦漏白濁熱淋玉莖腫痛搗汁沖生酒吃神效按蔣儀藥鏡云佛耳草下痰定喘能去肺脹止哮寧嗽大救金寒以之烈入熱部豈以其氣辛耶白虎丹祝氏效方鮮野淡菜即車前草洗淨加遍地香搗爛用白酒和汁絞出鵝毛蘸搽患處即消疥瘡救生苦海鈸兒草加鹽少許搓熟頻擦全化然後洗浴三次必愈若用煎洗反不見效疔瘡走黃毒歸心慈航活人書銅錢草即遍地香採葉搗爛童便煎服服後再飲好菜油二三碗令吐如吐即不必服矣再加生豬腦一個同白棕子搗勻敷張介賓本草正佛耳草味微酸性溫大溫肺氣止寒嗽散痰氣散風寒寒熱亦止泄瀉鋪艾卷作筒用熏久嗽尤妙望江青一名還精草玉星草銀腳鷺鷥血見愁穀雨後發苗生澤旁湖岸方莖中空葉狹長而尖有鋸齒對節小滿後抽莖開花成穗細紫層層而上寒露時枯根多須節間方而白極長亦空明根尤妙王聖俞云銀腳鷺鷥葉似胡麻而小直莖可尺許長其葉對生根絶類水芹味甘而多津液採而以蜜拌蒸食治肺虛失音及久服最益人西湖諸山皆有之據此則似另一種蓋望江青根白而不長若長者乃銀腳鷺鷥也並存以俟考李氏草祕望江青俗呼天芝麻以其葉似芝麻葉也方梗對節生葉至春節間開紅紫花生水溝澤邊形微似諸蘭草涼苦百草鏡性寒而味微苦入肺經吐血服之生精還力除濕熱去星障療肺癰勞力傷脫力黃同金器煎服愈驚風治打傷撲傷最活血搗汁沖酒服渣罨傷處一人閃足痛不能舉無苗尋其根搗汁入煎劑三服而愈同牛膝芍藥當歸獨活玉叉草活血丹七葉草五爪龍放棒行金雀腦覆絲藤擫草等和勻搗汁加酒服之損傷垂死但得入咽可生並治諸爛痛瘡癬吐血亦效目中去星翳障百草鏡望江青一兩羊肝一具同豆腐煮食吐血白蜜二兩隔湯頓熟望江青一兩煎汁沖蜜服不論遠年新起一切血症二服除根嘉慶三年豫僕孫成患血症甚劇得此方而愈但服此藥後每服須吃桂圓五斤二服吃十斤方無後患此藥服後人如醉惺惺然欲睡一周時自愈再得燕窩粥培元更妙乳癰乳核秋泉家祕祖傳天下第一奇方專治乳癰乳核腫硬大者服之即內消用九龍川即龍見怕一兩細葉冬青即山黃楊五錢龍爪紫金鞭即馬鞭草又名龍爪草一兩金翦刀三錢九節金絲草即望江青五錢遍地金龍草即地五爪三錢用無灰酒二碗加香櫞葉或桔葉十餘片煎鍾半飢時隨量二三次服之渣再煎服絶虐望江青乾者五錢煎酒服豫表戚張石港生平常服望江青每日用乾者三錢北棗六枚同煎食如是三年身輕腳健終身無疾其功不下參也無骨苧麻接骨草麻衣接骨紫接骨附即玉接骨一名血見愁玉錢草麒麟草玉連環葉小圓根如水芹生濕陰處立夏時發苗逢節則粗葉尖長根蔓延色白多粗節類竹根搗之汁黏高者尺許鬆土種之極易繁衍入藥用根百草鏡云玉盤龍一名無骨苧麻葉類苧麻而薄小背不白莖如箸色明透至九月莖白明如水晶上有細紅點子十月萎採宜九月一名玉梗半枝蓮搗之有白漿稠滑綱目蒴藋條釋名云即接骨草蘇恭云葉似芹寇宗奭云花白子青十月子乃紅熟有一二百子時珍云每枝五葉按群芳譜則花白而葉不類其根乃似水芹今人搗汁以續筋骨損折頗驗名玉接骨當是此種然綱目無一語治折傷且所引形狀率多含混故特詳晰補之性涼味甘淡入肺經血分治吐血腸紅下血跌打損傷採藥志云接骨草又名玉梗金不換性溫能止血生肌行肺經之惡血引血歸經理氣開胃大有功效接骨草苗如竹節出廣西粵語此草叢生高二三尺葉大如柳而厚莖有節色緑而圓花白午開自三月至九月不絶群芳譜四季花一名接骨草葉細花小色白自三月開至九月午開子落枝葉搗汁可治跌打損傷九月內剖根分種肇慶志接骨草出封川陽江一名四季花生園林中莖緑而圓葉長如指而尖花白跌傷骨節搗爛敷之可以接骨而本草不載李氏草祕羊耳草又名接骨草生牆崖上葉如羊耳專治接骨性平治折傷續斷骨搗罨即愈麻衣接骨生背陰山腳下或澗旁穀雨後發苗葉類苧麻背不白對節生節下則粗如鶴膝作紫色敏按接骨草數種俱産深山澗隰旁近地罕得人家間有種之者然麻衣接骨每不易得玉接骨性涼味甘而補能和中調血生髓益津其功不僅專治折損麻衣接骨性溫而行血惟專治折損故人多不傳其種辛亥豫館臨安遊西徑山寶珠寺見山門外遍隙地皆麻衣接骨形狀儼如土牛膝而粗處作紫黯色甚脆折之從粗節處斷視之紫透中心誠為佳草不易得而山僧土人悉皆莫識故得滋育盈畦也治跌打損傷紫接骨生山上與麻衣接骨相似而葉莖俱紫治跌撲勞傷損瘀汪連仕云金寶相一名金鉢盂罨金瘡之聖藥又能散風透膿一夜即透其葉如蝴蝶花根如商陸即皺皮蔥今呼麻葉接骨敏按汪所論當又是一種亦非荔枝草而又不是似牛膝之一種接骨也鳳眼草花上細粉附此草苗如薄荷葉微圓長五六寸穀雨後生苗立夏後枝丫間復生二小葉節節皆有至秋後二小葉中心白色儼如鳳眼故名八九月眼中開花其花如須長一二寸紫黃色亦可入藥百草鏡鳳眼草芒種後其枝丫間二小葉中心各起蕊一粒如人兩眼細碎如石胡荽子狀至小暑後色轉紅黃漸抽長如須此草自苗至老葉皆有淡紅暈敏按經驗廣集治小便不通有皂角湯熏法方中用鳳眼草乃臭春葉別名與此名同物異又荔枝草亦名鳳眼草與此亦異治一切風痹活血去風酒煎服立效室女乾血勞用鳳眼草連根葉鮮者一兩加紅花三錢酒煎服通經自愈四日兩頭虐用鳳眼草煮紅棗飲汁自愈俱傳信方婦女經閉不通發熱勞症鳳眼草為末一兩紅花炒二錢水三鍾煎一鍾入黑糖五錢空心服三五劑見血方止醫學指南遺精白濁鳳眼草炒乾研末五錢沖熱黃酒服醫學指南花上細粉入癬藥殺蟲定癢風膏藥桂海草木志葉如冬青粵志肇慶七星巖産風藥叢生石罅其葉圓厚和酒嚼之治風疾一曰風草一曰風菜諺云風病須風菜即此按福寧府志風藤草一名山膏藥治風愈瘡或即此歟治太陽頭疼目昏眩竹葉細辛即獐耳草香勝細辛治脫力虛黃汪氏方離情草出雲南夷中多有鬻之者凡人為情欲錮閉往往致死得此草一莖煎服之入口即豁如夢覺斷緣絶愛亦不自知所以然也按段成式雜俎載左行草使人無情范陽以之入貢或即此類歟又有合情草與之相反可知造物之生物必有對待如此也已相思絶情愛如神和合草此即合情草也柳崖外編永昌府瀾滄江外有和合草根潔白結男女交媾狀土人見之用稻米周遭圍之掘方可得否則遁去有夫婦不諧者服之即歡好然載諸江船輒沉溺不得渡智者用長線系置岸側持線登舟渡畢然後引過故滇省近邊一帶時時有之聞服之者曰男視女雖嫫母西子王嬙不若也女視男雖醜亦潘安雖老亦健兒也治夫婦相憎疾煎酒服鹽蓬鹼蓬藥性考二種皆産北直咸地土人割之燒灰淋湯煎熬得鹽其葉似蒿圓長至秋時莖葉俱紅燒灰煎鹽勝海水煮者味鹹性涼清熱消積知風草藥性考生雷瓊蔓生無毒土人春日視其苗有一節則一次有風入藥以無節者浸酒用治一切風痹入骨能拔之外出鳳頭蓮出臺灣內山形如黃連色紫多細須茸茸然分歧如鳳頭故名性平治咽喉一切諸症梨松果如肥皂出臺灣治疔瘡磨塗蒲包草活人書又名鬼蠟燭新語云水蠟燭草本生野塘間秋杪結實宛與蠟燭相似有詠者云風搖無弄影煤具不燃烟以其開花結實儼似蠟燭故名蘆葦蕩中頗多土人採其實以治金刃傷止血用治瘰癧蒲包草連根採來洗去泥切寸段砂鍋煎湯代茶飲不論男女皆愈但婦人服此愈後終不受孕須服北京真益母丸四五兩可解之汪連仕採藥書蒲萼即蒲草南人呼莎草北人呼板枝花結實為鬼蠟燭其粉即蒲黃鬼扇草採藥録鬼扇草生石壁上葉面青有直紋如白果葉狀枝枝生如扇骨人若打死在地搗此草汁灌入口即蘇醒鮎魚須採藥録鮎魚須草梗葉青色面起直紋葉葉有須二條其根如竹鞭狀治疔瘡一切諸瘡汪連仕云鮎魚須沿藤如豆葉二丫內生二須根白而粗專治外科一切疔瘡腫毒罨之立消紫背稀奇採藥録紫背生陰山著地布苗葉有兩大兩小麵灰色有直紋背微紫若起心有藤一二尺長葉尖對生治痘毒用活草一斤作二服酒煎下已成速愈未成立消雀麥汪氏採藥書即雀角花此花令人蠲忿花象雀腳獵人採熬藥箭呼為破關草人以其內爛痔漏呼為破管草性熱氣烈傷人肌膚立能潰腫須米醋炒用腐腸之品不入湯劑惟外治點痔漏用之汪氏方
