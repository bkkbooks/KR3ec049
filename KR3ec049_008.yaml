body:
  text: 卷八果部下四十三種附五種諸荔殼陳定九荔枝譜有奇荔能治病經兵燹後亦僅有存者今録之於佐以備用粵語南方離火之所出荔枝得離火多故一名離枝亦曰麗枝麗離也文從兩日天地之數水一而火二故麗從兩日日為五行之華月為六氣之精日麗乎支猶之乎日出於扶桑也麗枝乃震木之大者震木以扶桑為宗子而麗支其支子故曰麗支日出於離離盡午中故麗支以夏至熟離為坤之中其色黃故曰黃離麗支之核外赤內黃則黃離之美也坤之中其味甘故曰甘節麗支之肉少酸多甘則甘節之吉也荔枝以臘而萼以春而華夏至而翕然子赤生於木而成於火也皮紅肉白而核覆純丹火包其外復孕其中也肉白為金金為內外火所煉故味醇和而甘其液乃金水之精甘又屬土備五行之粹美而以火為主者也粵以火德王凡花多硃色皆火花實多朱實皆火實太陽烈氣之所結火實之屬凡百種而荔枝為長火為母荔枝則火之長子也荔枝多食未嘗傷人飲蜜一杯即解或以青鹽調白火酒飲或飲荔枝酒過醉則以荔枝殼浸水飲之又荔枝多露有過食者味爽就樹間先吸其露次咽其香使氤氳若醉五內清涼則可以消肺氣滋真陰卻老還童荔枝歲初而蕾二月而花發發時多電則花落實小多雨則花腐少雨則花液相膠而不實估計者視其花以知其實多少而判之藏荔枝法就樹摘完好者留蒂寸許蠟封之乃翦去蒂以蠟封翦口以蜜水滿浸經數月味色不變保和枝産泉郡北陳岩石蓮花峰實大色黃可消胸膈煩悶調逆氣導營衛其核燒灰酒下可已痢止腹痛回春果産漳郡康仙祠葉大如掌色翠與衆荔殊其實味苦澀酸辣不可口採以浸酒能已風去癘治癩如神葉亦然以上閩産紫玉環産四川瀘州曝乾啖一枚可去瘴癘即早行大霧中嵐氣不得侵也以上川産玉露霜産廣東新會崖門山白殼丹肉不摘經冬不落其味甘酸啖之止嗽降肺火療怯症妃子笑産佛山色如琥珀大如鵝卵核小如豆漿滑如乳啖之能除口氣使齒牙經宿猶香牟尼光産潮州大浦山中味如乳飲之功同參嶺以上廣東産墨荔産廣西平樂萬山中皮肉俱黑如墨味臭而苦辣不可啖或曰出賀縣山中或曰荔浦修仁二邑山中多有之味臭有大毒誤食之必心腐腸爛而死按荔枝名品最多有緑皮者緑核者有黃皮者白皮者三月四月七月熟者然其性大約相同惟此數品治療各異故類及之殼痘出無漿心不爽快以荔枝殼煎湯飲不藥良方王聖俞云荔殼能理血透發分標凡一切疹瘄不能透達痘出模糊一片者非此不能解表成漿血崩同壽録用荔枝殼燒灰存性研末好酒空心調服每服二錢輕者一服即止至重者三服愈龍眼核殼附綱目龍眼核主治多言其肉至其核之功用最廣只載其能治胡臭他皆未之及又不及其殼今悉採他本補之腦漏黃氏醫抄用廣東圓眼核入銅爐內燒煙起將筒熏入患鼻孔內數次即愈一切瘡疥高只元傳世方用龍眼核煅存性麻油調敷即愈治癬祝氏效方圓眼核兩個去外黑皮捶碎雄黃硫黃密陀僧枯礬川椒末各三分共為細末以生薑蘸擦患處即愈集聽方患癬用龍眼核去外黑殼用內核米醋磨搽滅斑生髮張覲齋云桂圓核仁凡人家有小子女者不可不備遇面上或磕傷及金刃傷以此敷之定疼止血生肌愈後無瘢若傷鬢髮際愈後更能生髮不比他藥愈後不長髮也小腸疝氣不藥良方荔枝核龍眼核各七枚俱燒灰大茴二粒炒共為末好酒調下外用生薑搗爛敷腎即消經驗廣集治疝氣偏墜小腸氣痛神效荔枝核炒龍眼核炒小茴香炒各等分為細末空心服一錢以升麻一錢水酒煮送下念珠丸張氏必效方治陰疝偏腫囊中疼痛難忍乳香去油淨二錢圓眼核三錢黃蠟二兩和藥末成丸彈子大分為一百零八丸蛤粉為衣用線穿起露一宿收貯遇症每服三丸乳香湯下小便不通用龍眼核去外黑殼打碎水煎服如通後欲脫者以圓肉湯飲之足指癢爛藥鏡用桂圓核燒灰摻之立效無名腫毒黃氏醫抄桂圓核以水調塗俱效能止折傷出血療金瘡滅斑煙筒傷喉萬近蓬云凡煙管誤戳傷喉出血不止者用桂圓核去外黑皮惟取內核仁焙搗為極細末看喉中傷處用筆管安末吹之即定疼止血而愈屢試果驗治刀傷出血殷仁趾傳方以龍眼核炒搗磨細敷之刀斧傷黃販翁醫抄桂圓核不拘多少用火燒枯存性研末摻患處即愈按陳杰回生集大興李振祖西平云龍眼核末敷金刃傷昔在西秦及巴里坤軍營救愈多人查本草綱目及別集本草俱末紀載可知世間有用之材自古迄今淹沒者不可勝計矣龍眼殼乃龍眼外裹肉之殼本黧黃色閩人恐其易蛀輒用薑黃末拌之令黃且易悅目也廣中桂圓多不用薑黃拌故今廣圓猶存本色入藥用殼須洗去外色黃者敷湯泡傷行篋檢祕用圓眼殼煅存性為末桐油調塗患處即止痛愈後又無斑痕真良方也泉州府志龍眼最小者呼鬼眼龍眼是其中者今不復識別蜜望粵志其子五月色黃味甜酸飄洋者兼金購之有夭桃與相類六七月熟大如木瓜味甜酢以羹魚尤善凡渡海者食之不嘔浪肇慶志蜜望子一名莽果樹高數丈花開極繁蜜蜂望之而喜故名交廣録蜜望二月開花五月子熟色黃一名望果其類有夭桃五月開花六七月子熟年歲荒則結實愈多粵謠云米價高食夭桃故廣人貴望果而賤夭桃貴之故望之蜂望其花人望其果也止船暈按船暈北人謂之苦船苦音庫此症多嘔吐不食登岸則巳胃弱人多有之蜜望果甘酸能益胃氣故能止嘔暈蒲桃樹羅浮志蒲桃樹高二三丈其葉如桂四時有花叢須無瓣如剪出絲球長寸許色兼黃緑結實如蘋果殼厚半指絶香甜核與殼不相連屬搖之作響羅浮澗中多有之猿鳥合啄之余隨流而出山人阻水取之動盈數斛以之釀酒曰蒲桃春經歲香不減作膏尤美荸薺粉童北硯食規出江西虔南土人如造藕粉法制成貨於遠方作食品一名烏芋粉又名黑三稜粉甘寒無毒毀銅銷堅除腹中痞積丹石蠱毒清心開翳去肺胃經濕熱過飲傷風失聲瘡毒乾紫可以起發北硯食規野荸薺生山土中春有苗三葉似韭而細葉上有光其根如豆大年久則愈大入藥用根一名山荸薺磨粉水中濾過曬乾點眼去翳障如神取粉忌鐵器按山荸薺喜燥其生必於高原乾土尤最易蕃衍有人移入園圃一經汙濕根即朽爛然其生不易長百年才如錢大耳昔客東甌聞馬氏點眼藥粉為天下第一見其修制乃由此磨粉合海鰍目珠粉加入藥中著效異常云其性能去面黝斑痣消痞去目星努肉較産池澤者尤峻利也磨光散種福堂方點眼神藥用野荸薺粉洗淨去皮石臼中搗爛密絹絞汁如做藕粉法再用清井水飛曬乾爐甘石用黃連黃柏黃芩甘菊薄荷煎水煅再用童便煅一次將藥水飛曬乾珍珠入豆腐內煮過研細水飛每荸薺乾粉一兩配製過甘石五錢珠末三錢各將瓷瓶收貯臨用漸漸配和加冰片少許點之明目去翳祕方種福堂方錦紋大黃一兩北細辛四兩將二味用上高泉水一百二十兩將藥入砂鍋煎至二十兩以細絹濾去渣用大銀碗一個盛藥碗下以磚三塊放定碗底下將燈盞注麻油用燈草七根燃燈熏碗底內煎藥成膏滴水成珠每膏一兩用野荸薺粉五錢多些亦不妨冰片三分和勻作錠如多年厚翳每兩加水飛過蟬蛻末五分須要去頭足泥沙水洗曬乾為末水飛三次用又方野荸薺粉豬胰各等分搗和用雞子殼半個放藥在內臨臥合印堂上俟水流入目中翳隨淚出二十日即愈並治田螺頭眼櫻桃核山櫻桃今人常用以洗疹瘄服之亦發透瘄痘以其得春氣早而性熱善達表也綱目不載豈以發風熱故耶逢原云櫻桃核今人用以升發麻斑力能助火大非所宜春夏時尤忌入藥用山櫻桃核佳發麻疹瘄痘滅斑痕凍瘃出痘喉啞王永光方用甜櫻桃核二十枚砂鍋內焙黃色煎湯服眼皮生瘤醫學指南櫻桃核水搽之其瘤漸漸自消山櫻桃有毛與櫻桃別是一種辛平味劣止瀉腸癖除熱調中栗殼綱目載其治反胃消渴瀉血此外無他不知其能解參之力勝於萊蔔故急録之楊春崖驗方解人參栗子殼煎湯服之良刺菱沙角乃小菱也生杭西湖里六橋一帶多有之以其四角尖如針芒刺手故名春盡時兒童採取入市貨賣菱生水中根苗與大菱不殊其葉下有氣管故其性通肝腎凡一切病多忌生冷惟此菱不忌最能開胃生津其菱大者如蠶豆小者如黃豆味絶鮮美雖至秋老亦不甚大蓋地土使然誠水仙佳種也陳淏花鏡一種最小而四角有刺者曰刺菱野生非人所植花紫色人曝其實為菱米可以點茶味甘鮮性平無毒生食補脾健胃止渴生津平肝氣通腎水益血消食老者煎食健脾止泄痢根利水通淋沙角乃菱中一種小者只兩角臨平湖一帶多産之出嘉興者名餛飩青以其似餛飩也較他菱體小味甘沙角較餛飩菱尤小色紅味甘異常味甘平大補脾土不滯氣餛飩青性寒生食解積暑煩熱生津煮食健脾和胃益氣花鏡云遲熟而甘肥者名餛飩菱藥性考餛飩沙角生熟俱得老則甘香補中益氣生者解酒能壓丹石烏欖仁出廣東今果肆皆有市者皮黃黑色肉白有文層疊如海螵蛸狀酒筵中以為豆籩食品綱目集解下云烏欖青黑肉爛而甘取肉捶碎放干自有霜如白鹽謂之欖醬其子仁肥大名欖仁而主治所載悉言白欖即今常食之青果又所載欖仁治吻燥者亦指青果核中仁而言非指烏欖仁也今採嶺南果録中補其遺按粵志木語橄欖有青烏二種閩人以白者名青果粵中只名白欖不曰青果也白欖利微人少種焉烏欖下番禺諸鄉皆種之種至二年其秧長八九尺必扦之乃結實扦至三年而子小收十年而大收矣其樹本高而端直多獨干至頂乃布枝柯有雌有雄雄為主雌為客猶婦之歸於夫也豫如棗大長寸許光無稜瓣先生者下同後生者上向八九月熟梯子擊以長竿或刻其干東寸許納以紅鹽則其干東子落刻其干西或南北亦然古詩所云紛紛青子落紅鹽也烏欖子大肉厚其性溫故味澀甘以溫水泡軟俟紫脂浮起溢出乃可食水冷則生膠熱則肌膚反實故必溫水之和乃醇其性亦有婉諫之道焉總二欖論之白欖雄而烏欖雌白屬陽而烏屬陰陽故色白而行氣陰故色紅而補血惟烏者陰故有仁可食白者陽故仁小而不成此其別也仁味甘淡潤肺下氣補血殺諸魚毒刺梨宦遊筆記刺梨形如棠梨多芒刺不可觸味甘而酸澀漬其汁同蜜煎之可作膏正不減於楂梨也花於夏實於秋花有單瓣重臺之別名為送春歸蜜萼繁英紅紫相間植之園林可供玩賞獨黔中有之移於他境則不生殆亦類優曇花之獨見於南滇耶食之已悶消積滯筆記枇杷核本經逢原云枇杷其核大寒伐肝脾以之同落蘇入麩醬則色青翠同蟹入鍋則至熟不赤性寒走肝可知敏按石頑所説以其核能駐色不變斷為性寒不知枇杷獨有先天四時之氣其性溫平其核能化一切毛羽觀花圃人貯雞鵝毛水以灌花者患其難化輒搗枇杷核數枚投入缸水中不三日則雞鵝毛皆爛化知其直走厥陰更捷利也治肝有餘諸症氣實者可用敏按祝士校遊戲方枇杷核煮蛤蜊能脫丁則其性又善離蓋枇杷具四時全氣其實能令分者合故肺嗽能斂核能令合者離故肝實可疏一合一離正見互為乘除之妙物理小識枇杷核能去黴垢故能化痰羊桃粵語其種來自大洋一曰洋桃高五六丈大者數圍花紅色一蒂數子七八月間熟色如蠟一名三斂子亦曰山斂斂稜也俗語誤稜為斂也亦以其味酸能斂顏色也有五稜者名五斂以糯米水澆則甜名糯羊桃廣人以為蔬綱目五斂子即羊桃惟言其主治風熱生津止渴他功效皆未及今依粵語補之爾雅長楚銚芅注今羊桃也或曰鬼桃葉似桃花白子如小麥亦似桃陸機疏云葉長而狹花紫赤色其枝莖弱過一尺引蔓於草上鄭氏曰藤生子赤狀如鼠糞故亦名鼠矢兒童食之一名羊腸一名御弋蜀本圖經子細如棗核苗長弱蔓生不能為樹今呼為細子根似牡丹群芳譜羊桃福州産其花五瓣色青黃詩檜風隰有萇楚猗儺其枝即指此也酸甘澀平無毒久食能闢嵐瘴之毒中蠱者搗自然汁飲毒即吐出脯之或白蜜漬之持至北方不服水土與瘧者皆可治嶺南雜記有食豬肉咽喉腫痛食羊桃即解藥性考羊桃生時極酸不可食熟則帶甘過食寒中內熱者宜之多食冷脾胃動泄澼可曬乾歌曰獮猴桃寒酸甘止渴調中下氣解煩除熱骨節風痛能壓丹石通淋療痔瓤可煎食倒捻子綱目都捻子即倒捻子僅言其治痰嗽噦氣暖腹臟益肌肉而已時珍曰食之必倒捻其蒂故謂之倒捻子訛為都捻子也味甚甘軟粵語都捻子朴樕叢生花如芍藥而小春時開有紅白二種子如軟柿外紫內赤亦小有四葉承之子汁可染若胭脂花可為酒葉可曲皮漬之得膠以代柿蘇子瞻名為海漆非漆而曰漆以其得乙木之液凝而為血可補人之血與漆同功功逾青黏故名以其為用甚衆食治皆需故名都念産羅浮者高丈許子尤美嶺南酒有以花為釀而雜以諸果者花則以檳榔花為最果則以倒捻子為最倒捻子又名黏子花於暮春實於盛夏諺曰六月六黏子熟熟以為酒色紅味甘人與猿猴爭食之所在皆然東坡雜記吾謫居南海以五月出陸至滕州自滕至儋野花夾道如芍藥而小紅鮮可愛朴樕叢生土人云倒黏子花也至儋則已結子爛紫可食殊甘美中有細核嚼之瑟瑟有聲亦頗苦沁兒童食之使大便難野人夏秋下痢食葉輒已子活血補血研濾為膏餌之又止腸滑甘蔗滓皮綱目甘蔗條瀕湖特補蔗滓言其治小兒白禿燒煙入目令目暗其他未能悉今復廣之救生苦海收口長肉背疽惡瘡用之屢效收甘蔗滓曬燥煅存性研極細以小竹管如瘡口大者一個以細夏布扎緊於上篩藥填滿瘡孔內膏藥蓋住自能收口醫鍵云對口一名梟疽用甘蔗滓焙燥為末白色狗屎焙末和勻將竹管一個稀絹包竹管頭入藥篩膏藥上貼之垂死者亦生痘疔經驗單方用甘蔗滓曬乾真香油點燈燒成灰以津液調勻銀簪挑破點上立效一方加珍珠油胭脂調塗更效敏按蔗有數種紫皮者名崑崙蔗青皮者乃扶風蔗也黃海若云凡痘疹不出及悶痘不發毒盛脹滿者此痘屬急症宜青皮甘蔗榨汁與食不時頻進則痘立起其寒散解毒之功過於蚯蚓白鴿惜人不知其功用入藥如用滓亦宜以青皮蔗滓為上蔗皮綱目止載治口疳而不知其皮可入香料海外三珠有四葉香餅乃用蔗皮又幹者墊臥可去鬱熱本草匯有接氣沐龍湯亦用其皮故為補其説臘梨初起百草鏡紫甘蔗皮煅存性香油調搽接氣沐龍湯專治陽衰久痿滑精不用內服惟主外治大約患此者或由稟弱或由縱欲或憂鬱所致或心腎不交用此最妙紫稍花甘草甘遂良薑文蛤母丁香巴戟天川烏附子吳茱萸川椒細辛淫羊藿蛇床子楝樹子甘松各一兩鎖陽蓯蓉官桂羊皮紅蔗皮滿山紅罌粟殼水泡去筋各二兩紅豆七十粒須擇酒藥內所用辣者白頸蚯蚓七條炙倭鉛八兩切薄片勻七劑每日一劑瓦鍋內煎湯先熏後洗以冷為度晚重溫藥湯再洗如此七日內禁房事坐板瘡甘蔗皮燒存性香油調塗家寶方竹衣乖經驗廣集此藥治竹衣乖並無皮膚膿血淋漓赤剝楊梅一切胎毒用爐甘石煅淬入黃連汁三次童便四次一兩黃柏豬膽塗炙七次紫甘蔗皮燒存性孩兒茶赤石脂各五錢緑豆粉炒七分冰片五分為末先用麻油將雞蛋黃煎黑去黃候冷調塗即愈猴闥子宦遊筆記出臨海深山茅草中土名仙茅果秋生冬實樵人採食並可磨粉其性溫補然城市亦無食之者綱目有猴騷子形與此別又臨海出猴總子一名土柿每年九十月間生形與紅柿同皆非一物臨海異物志猴闥子如指頭大味苦可食他處所無性溫暖丹田益五臟健脾增氣力瓜子殼傳信方治腸紅不論新久三服全愈用地榆炒黑一錢白薇一錢五分蒲黃炒黑一錢桑白皮一錢五分瓜子殼二兩煎湯代水不藥良方單用瓜子殼一味煎服治腸風下血吐血不藥良方瓜子殼一茶鍾煎湯一碗吃下血即止蒲桃殼止厄忒如神橙餅同壽録有制橙餅法方擇半黃無傷損橙子太青者性硬難酥將小刀劃成稜入淨水浸去酸澀水一二天每日須換水待軟取起擠去核再浸一二天取起將簪腳插入每縫觸碎內瓤然後入鍋用清水煎之勿令焦約有七八分爛取出拌上潔白洋糖須乘熱即拌即日曬之待糖吃進再摻再曬令糖吃足將干糖再塞入橙肚內略壓扁入瓶貯用亦可點湯服消頑痰降氣和中開胃寬膈健脾解魚蟹毒醒酒若氣虛瘰癧者勿服津符子産緬甸見千金方味苦平性滑主益心血養肺金止渴生津液多食口爽失滋味安和五臟久食輕身明目治瀉痢不止男女虛勞咳嗽吐膿血肺癰肺痿聲啞欲死者每日啖十枚一月不間斷即愈必思答産回回國地見忽必烈飲膳正要味甘無毒治調中順氣滋肺金定喘急久食利人三陰瘧百藥不效必思答三枚酒一盞煎半飲之即止難産不下或子死腹中必思答七枚酒煎服即下又治胞衣不下黃皮果廣志黃皮果狀如金彈六月熟其漿酸甘似葡萄與荔枝並進荔枝饜飫以黃皮果解之諺曰飢食荔枝飽食黃皮綱目於果部附諸果條下僅引海槎録云出廣西橫州狀如楝子及小棗味酸至其功用並未之及焉今依廣志補之消食順氣除暑熱廣志酸平無毒主嘔逆痰水胸膈滿痛蛔蟲上攻心下痛食物本草敏按廣東瑣語載果中有白蠟子與黃皮果絶相似而味尤勝諺有云黃皮白蠟甜酸相雜想功效亦不甚遠也廣東通志黃皮果大如龍眼又名黃彈子皮黃白有微毛瓤白如肪有青核數枚甚酸澀食荔枝太多用黃皮果解之甘劍子狀如巴欖子仁附肉有白靨不可食能發人病北人呼為海胡桃味甘氣烈治脾胃虛寒食少泄痢不止形體尪羸泄下虛脫百方不效用甘劍子七枚連殼煅為末空心酒下三服即止再服調理藥揚搖子生閩越其子生樹皮中體有脊形甚異長四五寸味甘無毒通百脈強筋骨和中益氣潤肌膚好顏色花鏡此果長五寸色青無核臨海異物志揚搖有七脊子生樹皮中其體雖異味則無奇長四五寸色青黃味甘海梧子出林邑樹似梧桐色白葉似青桐子如栗肥甘可食南方草木狀占城即林邑産海梧子與中國松子同但結實肥大形如小栗三角肥甘樽俎間佳果也味平無毒利大腸小腸益智慧開心胸明耳目心下怔忡夜多惡夢健忘每日空心食海梧子十數枚月餘自愈疝氣囊大如斗海梧子七個燒灰服之即愈木竹子出廣西皮色形狀如大枇杷肉味甘美秋冬實熟味甘性平治吐逆不食關格閉拒不通脾虛下陷肛門墜脫不收清熱涼大腸去積血利百脈通調水臟止渴生津解暑消酒利耳目治咳嗽上逆櫓罟子桂陽虞衡志出廣西大如半升碗數十房攢聚成球每房有縫冬生青至夏紅熟味甘補脾胃固元氣制伏亢陽扶持衰土壯精神益血寬痞消痰解酒毒止酒後發渴利頭目開心益志婦人不孕用櫓罟子浸好酒內三日日日飲之百日有孕又目生翳障漸漸昏暗視物不明櫓罟子浸白蜜內每日連蜜啖一枚一月即退㯆子出九真交趾子如桃實長寸余二月開花連著子五月熟色黃鹽藏食之味酸如梅性涼平清心潤肺止渴生津制亢極之陽光消炎蒸之暑氣又降三焦實火治鼻中出血又牙宣牙齦出血用㯆子核連仁燒存性調水含咽即止羅晃子出廣西夏熟味如栗狀如橄欖其皮七層出橫州者皮九層剝至九層方見肉故又名九層皮果思恩府志羅晃子俗名九層皮形類蠶豆可茹味如煨栗外有黑殼連肉有皮九層故名産于山樹中味甘性溫治臟腑生蟲及小兒食泥土腹痛癬痞積硬養肝膽明目去翳止渴退熱解利風邪消煩降火翻胃吐食或食下即吐或朝食暮吐暮食朝吐用羅晃子七枚煅存性每日酒調下方寸匕服完為度即愈腹中蛔蟲上攻心下痛欲死面有白斑用羅晃子牽牛子各七枚水煎服蟲自下夫編子南方草木狀出交趾武平山谷中三月開花連著子五六月熟入雞魚豬鴨羹中味最美亦可鹽食味甘性平主寧心志養血脈解暑渴利水道生津液止逆氣喘急除煩清熱潤肺滋命門益元氣骨蒸勞熱四肢瘦削如枯柴用夫編子同白鴨爛煮不用鹽醬日日啖之吃鴨三頭見效白緣子出交趾樹高丈餘味甘美如胡桃味甘平主潤肺止渴清熱消食祛風暑濕氣治疥癬及山嵐瘴氣所侵變成痎瘧寒熱往來頭痛痰逆足膝屈弱難行寒濕邪氣所侵用白緣子一片舂爛浸酒日飲一次月餘全愈系彌子廣志狀圓而細色赤如軟棗其味初苦後甘可食味平無毒主益五臟悅澤人面去頭面諸風産後痢疾不止用系彌子一合酒水各一盞煎八分空心服下片刻即效人面子出海南又出廣中樹似含桃子如桃實春花夏實至春方熟蜜煎甘酸可食其核兩邊俱似人面耳目口鼻無不畢具廣志人面子大如梅李其核類人面兩目口鼻皆具肉甘酸宜為蜜煎仁絶美以點茶如梅花片光澤可愛茶之色香亦不變以增城水東所産為佳其核中仁搖之即脫去他産則否此樹最宜沙土沙土松易發數歲即婆娑偃蓋山民植之以為利味甘性平無毒醒酒解毒治風毒著人遍身疙瘩成瘡或痛或癢食之即愈難産不下産母手握人面子一個單日右手握雙日左手握即下嶺南雜記人面子煮肉及鴨必用捶爛熬膏甘酸益津四味果出祁連山木生如棗剖以竹刀則甘鐵刀則苦木刀則酸蘆刀則辛行旅得之能止飢渴味甘辛酸無毒明目養肝寧神定志和胃進食下氣止咳腎虛腰痛不能反側用四味果同狗腰子煮熟並食每日一次一月愈敏按東方朔神異經云南方大荒有樹名如何結子味如飴有核形如棗子長五尺圍如長金刀剖之則酸蘆刀剖之則辛食之者地仙不畏水火白刃又啓蒙記如何隨刀而改味或曰此即仙經所謂大棗據此二説即今四味果也千歲子南方草木狀出交趾蔓生子在根下須緑色交加如織一苞恆二百餘顆皮殼青黃色殼中有實如栗味亦如之干則殼肉相離撼之有聲如肉豆蔻關涵嶺南隨筆千歲子多子根鬚干則殼肉相離撼之有聲味甘平主和中益胃利肺除熱止渴醒酒解暑小便閉塞千歲子十數枚打碎水煎清飲下即通利發背惡瘡千歲子不拘多少搗爛如泥調塗三次見效侯騷子蔓生大如雞卵味甘性冷消酒輕身王太僕曾獻之見酉陽雜俎甘寒無毒食之不飢延年強健消酒除濕治黃疸小便不利溺如黃金色口渴煩熱齒痛牙宣出血不止小兒重舌木舌侯騷子核燒灰擦之或用蜜調塗亦可浮癰發背侯騷子煎湯飲之再搗塗之大效仙掌子乃仙人掌上所生子也粵語仙人掌多依石壁而生葉徑而長若齟齬狀開花儼如鳳形子生花下名曰鳳栗葉曰鳳尾竻發苞外類芋渠內攢瓣如珠各擎子珠於掌一枝一掌自下而上子自青赤而黃有重殼外厚內薄熟其仁食之味甜兼芡栗可以延年又名千歲子此草可闢火廣人多植之堂側性宜沙土惡肥膩明黃佐仙人掌賦序仙人掌奇草也多貼石壁而生惟羅浮黃龍金沙洞有之葉徑而長若齟齬狀發苞時外類芋魁內攢瓣如翠球各擎子珠如掌然青赤轉黃而有重殼剖之厚者在外如小椰可為匕勺薄者在裡如銀杏衣而裹園肉煨食之葉兼芡栗可補諸虛久服輕身延年俗呼為千歲子此與蔓生者名同物異也雲南通志仙人掌葉肥厚如掌多刺相接成枝花名玉英色紅黃實似山瓜可食味甘性平補脾健胃益腳力除久瀉敏按群芳譜仙人掌出自閩粵非草非木亦非果蔬無枝無葉又並無花土中突發一片與手掌無異其膚色青緑光潤可觀掌上生米色細點每年只生一葉於頂今歲長在左來歲則長在右層纍而上植之家中可鎮水災如欲傳種取其一片切作三四塊以肥土植之自生全掌矣近日兩浙亦有據所載當另是一種與此全別或名同物異歟酒杯藤子出西域藤大如臂花堅硬可以酌酒文章映徹實大如指味如豆蔻食之消酒相傳張騫得其種於大宛甘辛平無毒消食下氣消酒止渴辟邪瘧消癰腫殺蛔蟲治尸蛀勞瘵蟲蠱瘰癧癭瘤結核癰疽潰爛食果成積用酒杯藤子燒灰糖拌服下五七錢自效飲酒過量成病用酒杯藤子煎服極驗藥果關涵嶺南隨筆藥果似橙而味酸可染紅治噦蕳子出交趾合浦藤緣樹木正月開花四五月熟如梨赤如雞冠核如魚鱗甘平無毒主中惡氣飛尸邪蠱心腹卒痛狂邪鬼神鬼疫癘瘧夢寐邪惡氣心神顛倒不寧昏冒如癡治驚癇恍惚或言語不倫歌笑不休用蕳子核七枚燒末入硃砂少許薑湯下方寸匕自愈楸子食物考甘酸小於沙果色黃紅黑如櫻桃顆産於代北味頗清香作脯點茶俱可此與林檎同名異類本草未分故正之多食澀氣令人好睡子宜去盡食之煩心隈支益部方物略記生邳州山谷中樹高丈餘枝修而弱開白花實大如雀卵狀如荔枝肉黃膚味甘味甘無毒治七種疝氣及一切瘡瘍疥癬以上自津符子至隈支止諸果品綱目附録諸果後僅載其形狀不録其主治而沈云將食纂云諸果都出外國及邊瘴地方雖不常見但俱屬異品不惟可口兼可療治百病凡行歷遠方者即當攜其種流傳中土有功於世不小故附録而兼細核其主治豫因取之以補李氏之遺至其形狀綱目已詳載而復列之者亦欲覽者便於解悉後日遇物能名故不厭重贅也呂宋果本草補呂宋島中産一果名加挖弄外肉而內核味苦不堪食其初惟有一處深山峻嶺生此樹甚高大土人多不識旅人至島百年後始知其中果可用近三十年頗悉其療治各病極有奇驗遂攜至中國若果之皮肉其效尤捷有呼為寶豆者豆言果之形狀寶言其貴重也治中毒服毒將果或磨或刮以清水或清油調服毒即吐蛇蠍蜈蚣等傷磨清水服之並刮敷患處疫疾中風昏僕磨水服之腹痛瀉利磨水服瘧疾初作時磨水服刀斧傷血漏刮末敷患處即止血止痛蛔蟲疳積磨水服蟲即吐出難産磨水服頭瘡癢爛臘梨切碎此果以油煎之乘熱遍擦向火取暖隨以布向火取熱覆病人身上而睡又以被蓋不見生風即愈潮熱磨水服漸減而愈諸谷部十五種附十九種沙米延綏鎮志苗莖如麻葉類艾而稍圓有刺高尺許生子成房粒細如黍杵去皮用羊羹作食服之不飢邊外名黍喇棘瀚海記沙蓬米凡沙地皆有之鄂爾多斯所産尤多枝葉叢生如蓬米似胡麻而小性暖益脾胃易於消化好吐者多食有益作為粥滑膩可食或屑之可充餅餌茶食之需人海記張家口內保安沙城一帶地産沙蓬實如蒺藜中有米如稗子食之益人藥性考云蓬蒿之實名曰沙米清熱消風飢荒食旨味甘性溫通利大腸消宿食治噎隔反胃服之不飢西國米珠兒粉竹米嶺南雜記出西洋西國煮不化而色紫柔滑者真偽者以葛粉為之通雅今南楚兩粵專采葛根作粉食其粉可作丸曰葛粉丸廣人以假西國米能醒酒朱排山柑國小識西國米來自閩廣洋艘大如緑豆以色紫煮不化者真健脾運胃功最捷久病虛乏者煮粥食最宜益胃和脾病起宜食珠兒粉洋舶帶來粵澳門杭寧波乍浦通舶市者皆有形絶細如蘇子勻圓而白雲系外洋人采葛根及薇箕根或茹粉所造煮之須滾水沖泡粒粒分明如魚子樣極柔滑以糖霜和食或淡食氣清香味甘滑明目運脾開胃解酒生津久服尤能強腎東西洋考大泥即古浡泥今隸暹邏土産有西國米亦名沙孤米其樹名沙孤身如蕉空心取其里皮削之以水搗過舂以為粉細者為王米最精粗者民家食之以此代谷今賈舶慮為波濤所濕只攜其粉歸自和為丸庚申十月豫在陳夔友家見有胡西菽盛以玻璃小筆管瓶內菽白而細與珠兒粉無別云得自王撫軍署可入藥大能消痰其甥女一夕患肺風痰喘危極兒醫多言不救用此一錢調薑汁灌下其效如神竹米物理小識竹結實斑文兩兩相比謂之竹米下積如神陳倉米朱公米嶺南記武昌漢陽門內舊為陳友諒倉基甲子年有掘得黑米者色如漆堅如石炒之即松秋燈叢話康熙甲子武昌郡之福坊掘得黑米數十斛堅如石炒研為末治膈症如神傳為偽陳友諒積粟所又天門學宮前明改建北郭倉基地亦掘得黑米治疾頗驗乾隆丙申黃州重修郡學疏浚泮池池底積粟甚夥色如漆而堅治病效如前人爭取之太守王公廷棟恐系前人鎮壓物禁而掩之敏按酉陽雜俎乾陀國尸毗王倉庫昔為火所燒其中粳米燋者於今尚存服一粒永不患瘧炒研治膈症如神不藥良方陳年倉米治卒心痛燒灰和蜜服之即止朱公米南中紀聞靖州南二十里飛山寨相傳為元末朱都督屯兵之所牆礫時有米粒色微黑而不腐云是朱公所遺兵糧遊客謁神祠取輒得之至今尚存療脾疾山穀宦遊筆記出塞外土人名烏爾格納莖長尺余細如草節如竹葉亦如竹每二節一葉秀穗類蓼花結粒似穀而色紅採之曬乾去其皮煮粥粥如穀香蒙古用以充飢兼碎面合茶商民均雜粟食之色紅豔可愛而味與穀無辨故名之曰山穀實生於水濱或山溝爾味甘香行氣利水清大小腸火亦補脾胃根蒙古人名墨克爾外皮微細內實粉白味甘美蒙古生啖商民合肉熬食秋冬之際蒙古搜掘鼠穴得食物盈筐內多此物長二三寸俱野鼠齧截運藏者味甘生津滋潤血脈調營衛利水青稞黃稞藥性考青稞黃稞仁露於外川陝滇黔多種之味鹹可釀糟吊酒形同大麥皮薄面脆西南夷人倚為正食下氣寬中壯筋益力性平涼除濕發汗止泄多食脫髮損顏色米油此乃滾粥鍋內煎起沫釅滑如膏油者是也其力能實毛竅最肥人用大鍋能煮五升米以上者其油良越醫全丹若云黑瘦者食之百日即肥白以其滋陰之功勝於熟地也每日能撇出一碗淡服最佳若近人以熟粥絞汁為米油未免力薄矣味甘性平滋陰長力肥五臟百竅利小便通淋精清不孕紫林單方用煮米粥滾鍋中面上米沫浮面者取起加煉過食鹽少許空心服下其精自濃即孕矣鍋焦陳久年糕一名黃金粉乃人家煮飯鍋底焦也取僧寺中米多焦厚者入藥良味苦甘性平補氣運脾消食止泄瀉八珍粉用之鍋焦丸小兒常用健脾消食家寶方用鍋焦炒黃三斤神麯炒四兩砂仁炒二兩山楂四兩蒸蓮肉去心四兩雞肫皮一兩炒共為細末加白糖米粉和勻焙作餅用老幼脾瀉久不愈梁侯瀛集驗方鍋焦為末四兩蓮肉去心淨末四兩白糖四兩共和勻每服三五匙日三次食遠下白瀉不止種福堂方乾飯鍋粑二兩松花二兩炒臘肉骨頭五錢烘脆共為末砂糖調不拘時服脾胃不健祝氏效方鍋焦二斤蓮肉一斤白糖半斤蜜一斤丸如桐子大每服數十丸空心白湯下玉露霜治老人脾泄最效白朮炒二兩陳皮一兩五錢蓮肉去心四兩薏苡仁四兩炒糯米一升炒緑豆一升炒熟陳米鍋粑一斤炒糖霜量加共為末每用二三錢滾水調勻服之行篋檢祕預稀痘疹不藥良方銀花金者不用陰乾鍋粑每一升入銀花一兩共研末用洋糖或做糕餅或開水調和每日令小兒食之陳久年糕燒灰治痢阿迷酒出東洋氣味香冽頗釅厚每服不過半盞大能助元氣驟長精神估舶帶來凡督撫大員輒多備貯為不時之需或遇要事疲憊一滴入口精神百倍較鴉片尤速物理小識吉利重酎以紅花苄胡桃入曲釀者醫溲數效味甘辛竄達能捷通百脈益元生氣每日少飲一二滴理怯如神酒釀酒菌俗名酒窩又名浮蛆乃未放出酒之米酵也味釅厚多飲致腹瀉性善生透凡火上行者忌之味甘辛性溫佐藥發痘漿行血益髓脈生津液赤眼淹纏祝氏效方杜仲厚朴桑白皮檳榔各一錢取雄雞肝一個忌見水去紅筋入白酒釀六兩隔湯蒸熟去渣以湯肝食下隔二日再服一次全愈小兒鼻風吹乳腫痛劉起堂經驗方用酒釀和菊花葉敷上立愈無葉用根甘菊葉尤佳搗汁沖和服更效吹乳方周氏家寶用苧麻根嫩者炒和白酒釀少許共搗爛敷患處一日夜即消忌食發物頭風用蒼耳子白芷穀精草各五錢川芎三錢甜酒釀四兩老酒二碗煎一碗服妙淨方夢遺白濁酸梅草二錢孩兒菊二錢搗取汁加不見水酒釀空心量服救世青囊難産用酒釀麻油蜂蜜童便雞子白各半盞煎溫服即下痘出不起不藥良方用狗蠅七枚冬日取蠅在狗耳內搗爛和酒釀服即日發起紅潤可觀痘瘡不起良方集要荸薺搗汁和白酒釀頓溫服之但不可頓大熱大熱則反不妙慎之保元丹千金不易方此丹張氏家傳已五世矣黃精一斤甘枸杞四兩酒釀五斤好黃酒五斤入罐煮一炷香每飲一茶杯藥渣搗為丸加胡桃肉八兩大黑棗八兩青州柿餅一斤酒菌生酒罈中不恆有凡藏酒之家千百壇酒間有一罈啓之中空無酒下有菌結於中其菌初結之時酒上薄凝如衣膜久則漸厚一二寸便能滲酒將酒中精華醇釅之氣盡攝於膜內膜乃漸厚酒亦漸少久久則酒干所存十不餘一啓視之其膜如鮮海蜇濡潤而軟嗅之作酒香微帶黴蒸氣識者取之焙乾乾者如瓜皮面青黑背作肉紅色濕軟如棉可入藥蓋酒能生菌必壇系新出窯未脫火氣而置酒之地又為濕熱所蒸致中變而成此故造釀家用壇貴舊而不貴新也金御乘自慈溪歸帶有酒菌出以相示云彼土亦罕得間有之然不多見也治一切酒傷酒勞酒疸因酒成病諸症服之立效神黃豆緬豆回回豆青花豆真寧豆池北偶談産滇之南徼西南夷中形如槐角子視常豆稍巨用筒瓦火焙去其黑殼碾末白水下之可永除小兒痘毒服法以每月初二日十六日為期半歲每服半粒一歲每服一粒一歲半每服一粒半遞至三歲服三粒則終身不出矣或曰按二十四氣服之以二十四粒為度或云水畢閉日服之珍異藥品云出雲南近西地方痘將發未發時用神黃豆連殼焙炒燥用豆研細水服本經逢原云神黃豆産緬甸形如槐子近時稀痘方用之一陽日用清水磨服痘學真傳云神黃豆出雲南能稀痘生熟各一粒甘草湯咀服寧陽張琰種痘新書云凡痘自胸以上自臍以下俱有而中間一截全無者名兩頭痘此氣血不能貫通上下而腰臍之間為寒毒凝滯也若不急治七日之後必變灰白之症矣見點時急用生耆當歸赤芍桔梗防風荊芥厚朴續斷白芷山楂木通神黃豆三十粒服此中間方有痘乃可無虞南詔備考普洱府及永昌府皆出神黃豆能稀痘青花豆可治瘡有客帶滇産神黃豆來其形如細竹筒長可三四寸搖之有聲其中如竹節片片相疊剖出如棋子樣白色包裹中含一豆黃色光亮形如瓠子中有線痕堅實而扁服之解痘毒按神黃豆有二種百草鏡云出雲南普洱府又四川亦産莢如連翹略短內有豆微紅色産雲南者形如槐角子比蠶豆略大瓦上焙乾去外黑殼用二種形狀不同系地土所産各別然其稀痘解毒之性則一也寶笈方痘將出時用神黃豆按一歲一粒剝去外殼並內皮將瓦焙熟一半留生一半芫荽湯調服毒重者稀毒輕者更稀十餘歲者亦不過七粒尚未出痘者亦如法以水調服之竟不出痘宜三月三五月五七月七九月九等日緬豆滇略緬豆如豆蔓生子大如栗斑文點點咀之敷惡瘡良然性迅惡誤服之吐瀉致死五雜俎云滇中有神黃豆似五倍子能令兒童稀豆然亦不甚驗也回回豆五雜俎云出西域狀如椿子磨入面中極香能解面毒青花豆宦遊筆記雲南永昌府有青花豆出於外地夷人帶來易貨者治瘡真寧豆出甘肅慶陽真寧地味甘平能解諸藥毒穭豆葉附逢原云細黑豆一名穭豆俗名料豆今人以飼馬故俗又呼馬料豆杭州府志黑豆之細者曰穭豆細而扁者曰零烏豆俗名馬料豆可肥馬從新云黑大豆之小者為馬料豆不知料豆雖小而形長微扁與黑豆形迥別當另是一種綱目穭豆下僅載其能去賊風風痹治婦人産後冷血而已其他一切功用全未之及為今補之味甘溫無毒壯筋骨止盜汗補腎活血明目益精入腎經血分同青鹽旱蓮草何首烏蒸熟但食黑豆則鬚髮不白其補腎之功可知今人以制何首烏取以引入腎經也炒焦淋酒治頭風腳氣以其直達腎經血分煮汁服解烏附丹石藥毒藥性考本經黑大豆即今之馬料豆也其色黑而形如人腰故入腎經益水明目多服令人身重一年後復原久服身輕非花豆中之黑大豆也凡服豆忌萆麻子厚朴豬肉歌云黑大豆甘腰子樣式所以補腎藥餌宜入即是馬料煮寒炒熱調中下氣止痢攣急利水除脹追風活血生研敷腫吞止煩渴解一切毒甘草煎汁傷中淋露産後諸疾明目悅顏制服有益又云穭豆即小黑豆因其粒細稱驢豆別馬料也治産後血風冷痛其粒細不及馬料歌云穭豆黑小甘逐邪風冷痹血滯浸酒和融雨蓑翁食記小黑豆入鹽煮久食大能補腎事親述見穭豆補五臟益中助十二經脈調中暖腸胃殺鬼氣舒筋紫虛子吞豆法黑料豆淘淨曬乾以淨瓶裝之初服每日一粒以白湯生吞之次日吞二粒每日加一粒至百日吞百粒從此每日吞百粒但初起服之腸胃未剛每遇大便須看豆化不化如豆化則漸加倘未化仍照舊勿加必待食之能化然後遞加至百粒為度服之能益精補髓壯力潤肌發白復黑久則轉老為少終其身無痰病也救生苦海有嫦娥奔月方與紫虛吞豆法同但其法按太陰盈虧之數初一日吞一粒逐日加一粒至望日十五粒而止十六日又逐日減一粒至晦日一粒而止月初則又加起與紫虛之法微有不同並附以備用煮料豆方明太醫劉浴德有增補內經拾遺四卷其種子論後載有煮料豆藥方云老人服之能烏須黑髮固齒明目當歸四錢川芎甘草廣皮白朮白芍丹皮菊花各一錢杜仲炒黃耆各二錢牛膝生地熟地各四錢青鹽六錢首烏枸杞子各八錢同馬料豆煮透曬乾去藥服豆又羲復方馬料豆五升桑椹半斤枸杞子四兩肉蓯蓉半斤竹刀切去筋青鹽龍骨各二兩同豆煮熟和藥同曬乾貯罐用常食大有補益又方呂逸儒傳方何首烏一斤用馬料豆汁煮或老酒亦可要九蒸九曬枸杞一斤酒蒸用干藥末搗勻曬馬料豆一斗再用料豆五升煮汁以汁煮豆曬乾九蒸九曬或用好酒煮亦可菟絲子一斤酒煮曬焙補骨脂一斤酒洗焙真川椒四兩曬烘青鹽二兩川牛膝一斤酒煮焙煉蜜為丸服之又方何首烏二斤青鹽一兩棗仁杜仲枸杞各二兩遠志小茴香陳皮各一兩肉蓯蓉苡仁香附白茯苓川芎各二兩五味子牛膝補骨脂木瓜各一兩五錢歸身三兩肉桂五錢防己一兩二錢甘草八錢小黑豆一斗用水煮藥數十滾瀝出渣以藥汁煮豆汁盡為度曬乾每服百粒開水下延齡廣嗣仙方懷生地酒製何首烏酒煮旱蓮草鹿銜草真者絶少用仙靈脾代之以上各三兩按四時乾山藥乳拌當歸身酒炒真青鹽以上各一兩按分至石菖蒲菟絲子肉蓯蓉酒浸去膜補骨脂五加皮骨碎補淮牛膝白甘菊原杜仲酒炒斷絲枸杞子蛇床子槐角子金櫻子覆盆子川黃連建澤瀉以上各五錢按十六節以上二十四味俱合二十四氣除去青鹽鍋內煎汁至半瀝渣再將渣煎過半瀝清沖和煎濃入馬料豆三升七合女貞子一升七合按陰陽二氣二至二分合年月日時周天度數餘一合半以置閏煮數十滾將青鹽研細傾入同煎以汁盡為度取豆曬乾收貯瓷瓶每晨四錢滾湯送下如遇出門飢餓即可嚼食代點此豆謹按陰陽二十四氣合周天度數製法得中和補益之妙久服能令人鬚髮再黑齒落更生耳目聰明手足便利壯陽補腎固本還元多育子息多增年壽常服不斷可成地仙凡腎虛目暗上盛下虛者尤為切合四寶大神丹家寶方能治五勞七傷服藥後忌腥臭發物房事馬料豆五升用混堂油制九次黃耆八兩人乳制七次白當歸酒洗四兩金櫻子二斗去內子與毛外去刺淘淨熬膏臨收時加童便一二盞聽用右將前三味和金櫻膏丸如梧子大每服三錢桂圓湯下明目補腎兼治筋骨疼痛不藥良方小紅棗十二枚冷水洗淨去蒂甘州枸杞子三錢小馬料豆四錢水二碗煎一碗早晨空心連湯共食之絶瘧制首烏剩下黑料豆可以絶瘧凡四日兩頭瘧用豆煎湯服即愈截三日瘧祝穆效方常山雲苓官桂甘草檳榔各三錢小黑豆四十九粒酒水各二碗慢火煎二碗當晚先服一碗蓋暖而睡留一碗至次日須將發前早兩個時辰服要熱服蓋暖臥待瘧至至亦輕鬆亦有當日而愈愈後忌房事戒食生冷勞碌風霜忌食雞羊牛蛋白扁豆半月永截不發又祕方集驗治瘧檳榔蘿蔔子常山甘草各一錢紅棗四枚烏梅七枚馬料豆每歲一粒水二碗煎一碗服忌三日葷油永不再發痰喘氣急同壽録用梨刓空中心納小黑豆令滿留蓋合住扎緊粳火煨熟搗作餅每日食之中風口噤文堂集驗方馬料豆一升煮濃汁如飴含汁在口即能言也黑白丸治痞積開胃消食健脾補腎百草鏡方馬料豆白蒺藜去刺各一斤炒磨末蜜丸梧子大每服二三錢開水送下治陰症手足紫黑集驗方黑料豆三合炒熟好酒烹滾熱服加蔥須同烹更妙盜汗文堂集驗方蓮子七粒黑棗七枚浮麥馬料豆各一合水煎服三次愈腎虛腰痛並治陰虧目昏活人書用腰式烏豇豆馬料豆各一兩煮湯入鹽少許五更時乘熱服忌鐵器陰虧目昏老眼失明活人書馬料豆甘枸杞女貞子各十兩陰虧目昏除女貞子為末煉蜜丸梧子大早晚服二三錢自效赤白帶下白果去皮煮熟蜜餞每日清晨吃七枚再食炒馬料豆一兩白滾水送下數日愈妊娠腰痛痠軟産家要覽馬料黑豆二合炒焦熟白酒一大碗煎至七分空心下治産後中風口噤目瞪角弓反張姚希周集驗用黑料豆鍋內炒極焦衝入熱黃酒內服之立效再服回生丹全愈華真君三豆湯稀豆楊春涯驗方緑豆赤飯豆馬料豆等分每日煮湯與小兒吃出豆自稀如遇痘毒亦用此湯飲之搗搽敷上其毒自消痘風爛眼集驗云風爛眼用醃白梅一個去核入緑礬少許川椒三十粒以五銖錢二個夾之用苧麻扎住無根水浸洗自愈若出痘得此症再加馬料豆一歲一粒投水中眼藥丸方周氏家寶用馬料豆一升炒蟬蛻四兩酒洗去頭足木賊草四兩去節菟絲子一斤炒甘菊花四兩曬乾白蒺藜一斤各為末水法為丸每服二三錢晚服滾湯下如若年高桂圓湯下各種癬陳別駕彬曾任太醫院官有治各種癬方用馬料豆以瓦罐不拘多少裝入罐內罐口以銅絲罩格定使豆不能倒出然後用大高邊火盆一個盆鑿一孔將罐倒合孔上四圍以干馬糞壅之火燃罐底盆底下用磚墊空安碗一個接油上火煨罐內豆自焦有油從盆底滴入碗中色如膠漆以此搽癬三次即愈解藥毒凡服藥過多以致頭面浮腫唇裂流血或心腹飽悶臍下撮痛者用馬料豆緑豆各四兩合煎汁連豆服病好為度中附子川烏天雄斑蝥毒不藥良方馬料豆煎汁服之即解穭豆葉治瘤急救方頸後粉瘤馬料豆葉闢麝香草同搗敷患處其瘤漸軟漸消破則手擠去粉疙瘩不破聽其自消蠶豆殼治癧𤶱行篋檢祕用油鹽蠶豆殼一鍾麻油浸一周時取起將豆殼瓦上焙研為末麻油調搽患處立愈膈食指南云用蠶豆磨粉紅糖調食數次即愈小便久日不通難忍欲死慈航活人書蠶豆殼三兩煎湯服之如無鮮殼取干殼代之黃水溜瘡毛世洪經驗集云凡大人小兒頭面黃水瘡流到即生蔓延無休者用蠶豆殼炒成炭研細加東丹少許和勻以真菜油調塗頻以油潤之三日即愈治漏種福堂方用炒熟蠶豆殼磨末每服三四錢加沙糖少許調服禿瘡張卿子外科祕方用鮮蠶豆搗如泥塗瘡上干即換之三五次即愈如無鮮者用干豆以水泡胖搗敷亦效吐血張卿子方以新蠶豆殼四五年陳者炒煎湯飲之即愈天泡瘡蠶豆黑殼燒灰存性研末加枯礬少許菜油調敷一次即愈藥性考云蠶豆苗能醒酒醬油糟油以面豆拌罨成黃鹽水漬成之伏造者味厚秋油則味薄陳久者入藥良味鹹性冷殺一切魚肉菜蔬菌毒塗湯火傷多食發嗽作渴解食癧作脹以陳年醬油飲少許即消中輕粉毒以三年陳醬油化水頻漱之集簡方糟油藥性考摩風瘙腰膝痛開胃暖臟止嘔噦解蔬菜毒腐漿沫渣皮乳鍋巴泔水麻腐瀕湖綱目於豆腐集解注腐皮堪入饌而漿乳皆遺之又胡麻亦可作腐綱目胡麻條亦遺之今悉為補概名曰腐腐漿味甘微咸性平清咽祛膩解鹽滷毒藥性考云味甘微苦性涼清熱下氣利便通腸能止淋濁銀杏研漿傷寒十日不汗張卿子妙方用未點豆腐漿一大碗調好白蜜熱服即出汗愈神效腳氣腫痛難走者熱豆腐漿加松香末搗勻敷過夜即好行走永無後患大便下血古今良方荸薺一斤或半斤豆腐漿不沖水者一大碗將腐漿頓極熱搗荸薺汁乘熱衝入飲之鹽哮救生苦海用豆腐漿點糖少許日日早服一碗不間斷過百日自愈治黃疸劉羽儀驗方每日空心冷吃生豆腐漿一碗吃四五次自愈忌食生蘿蔔痰火吼喘經驗廣集飴糖二兩豆腐漿一碗煮化頓服愈治勞及自汗回生集方用黑豆掏淨磨成腐漿鍋內熬熟結成皮每食一張用熱黑豆漿送下即效凡人每日清晨吃黑豆腐漿大有補益可以免勞病之患肺癰肺痿用芥菜滷陳年者每日將半酒杯沖豆腐漿服服後胸中一塊必塞上塞下塞至數次方能吐出惡膿日服至愈血崩不藥良方生豆腐漿一碗生韭菜汁半碗空心服一二次五妙湯治産後並弱症郁文虎傳方用頭鍋腐漿一碗腐皮一張生雞蛋一個打碎衝入漿內再加圓眼肉十四枚白糖一兩入漿內滾服五更空心食陳廷慶雲豆腐漿入陰分瀉火通淋濁凡淋症用六一散沖腐漿食最妙五更沖雞蛋白糖點服寧嗽補血粵人以腐漿煮粥食名甜漿粥大能補虛羸腐沫即豆腐泔水上結沫是也治鵝掌癬生手掌及足掌層層剝皮血肉外露此沫熱洗即愈腐渣此造豆腐所剩之渣人以飼豬入藥須用生腐渣治一切惡瘡無名腫毒神效不藥良方用豆腐渣在砂鍋內焙熱看紅腫處大小量作餅子貼上冷即更換以愈為度大便下血古今良方用不見水豆腐渣炒黃清茶調服即愈治臁瘡裙邊瘡爛臭起沿養素園方生豆腐渣捏成餅如瘡大小先用清茶洗淨絹帛拭乾然後貼上以帛纏之一日一換其瘡漸小肉漸平此費啓彰親試有效之方也又可敷腳蛀腳上皮蛀生水孔而皮濕爛者不藥良方豆腐渣貼三日即愈不要落生水腸風下血慈航活人書雪花菜即豆腐渣用未曾濾出漿者帶水鍋內炒燥為末每服三錢紫血塊者白糖湯下紅血塊者砂糖湯下日三次雖遠年垂危者服之神效腐皮味甘性平養胃滑胎解毒小兒遍身起羅網蜘蛛瘡臊癢難忍仁惠編用豆腐皮燒存性香油調搽自愈落頭疽慈惠小編用壁上蟢子五六隻腐皮包好吃完即愈冷嗽劉羽儀驗方干豆腐衣燒灰存性為末熱陳酒調下吃四五十張即愈水臌脹種福堂方陳芭蕉扇去筋燒灰存性五分千金子去油殼二分五釐滑石二分共為細末以腐衣包滾水送下十服愈腐乳一名菽乳以豆腐醃過加酒糟或醬制者味鹹甘性平養胃調中腐巴此即腐漿鍋底所結焦巴也入藥曬焙研末或生搗作丸皆可用藥性考名鍋炙開胃消滯逐積治淋濁補血慈航活人書有五效丸用豆腐鍋巴一兩加川連一錢同搗丸如桐子大每服五錢赤帶蜜糖滾水吞下白帶砂糖湯下熱淋尿血白湯下腸風下血陳酒下血風瘡先將豆腐泔浸洗去靨以布拭乾用前末藥即川連腐巴粉末丸時留一半真麻油調搽干則再塗三四次自愈翻胃神方珍記用豆腐鍋巴黃色者佳炒研末每服三錢沙糖湯調服白湯下痢疾神方珍記陳冬米炒豆腐鍋巴二味各等分為細末空心白湯調服二三錢服後宜餓半日自愈腐泔即豆腐所瀝下之水也藥性考云豆腐有鹽滷點者有石膏點者俱能清熱性清涼能通便下痰通癃閉洗衣去垢膩麻腐乃胡麻小粉所造者味甘性平潤肌滑腸解毒蔣儀藥鏡滋生賦云麻腐豆粉清腸清胃芝麻殼此乃芝麻外殼也綱目載其苗曰青蘘又有麻枯餅麻花麻秸無麻殼因補之湯火傷楊春涯驗方芝麻殼燒存性研細遇火傷者用麻油調搽即愈倘濕爛乾摻之半身不遂千金不易方芝麻殼五錢酒煎服出汗即愈諸蔬部四十種附十八種甘儲粳粉甘儲酒一作甘薯又名朱薯以其皮有紅者也一名金薯今俗通呼為番薯或作番茹有紅皮白皮二色紅皮者心黃而味甜白皮者心白而味淡南方各省俱植之沿海及島中居民以此代谷其入藥之功用亦廣而諸家本草皆未載李瀕湖特補列綱目中惜其所言者惟補虛乏益氣力健脾胃強腎陰而已他皆未之及焉乾隆五十一年冬今上特允閣學侍郎張若渟之請敕直省廣勸栽植甘薯以為救荒之備陸中丞耀有甘薯録之輯所載衛生一門實足補李氏所未及因擇録之以補其遺陸公原序云甘薯即薯蕷之屬見於陳祈暢異物志嵇含南方草木狀中土之有此物其來舊矣第不甚貴重栽植者少明季有閩人陳經綸復自呂宋移其種歸巡撫金公學曾勸民樹藝閩人德之號為金薯然自是長樂謝肇浙黃州李時珍新城王象晉各有論述皆不及經綸事而其裔孫世元父子復為金薯傳習録盛侈其先世傳自呂宋之功一似中國素非所産者此考證之疏也夫以一物之微足以備荒療疾而又不費功力其為功於民食實不淺鮮前任布政使李公渭嘗舉以教山東之民其性又喜沙土高地于山海之區尤屬相宜五雜俎百穀之外有可以當谷者芋也薯蕷也而閩中有番薯似山藥而肥白過之種沙地易生而極蕃衍飢饉之民多賴全活此物北方亦可種也群芳譜朱薯一名番薯大者名玉枕薯形圓而長本末皆鋭皮紫肉白質理膩潤與芋及薯蕷自有各種氣香生時似桂花熟者似薔薇露撲地纏生一莖蔓延數十百莖節節生根一畝種數十石勝種穀二十倍閩廣人以當米穀有謂性冷者非二三月及七八月俱可種但卵有大小耳卵八九月始生冬至乃止生便可食若未大者勿頓掘令居土中日漸大到冬至須盡掘出不則敗爛金氏學曾曰薯傳外番因名番薯形如王瓜藕臂如拳如指如卵如棗大小不一實同種別皮有紫有白有深淺紅有濃淡黃肉亦如之蒸熟勻膩如脂甘平益胃性同薯蕷海隅人以供饔飧蔓延極速節節有根入地即結每畝可得數千斤勝種五穀幾倍徐氏元扈曰昔人謂蔓菁有六利柿有七絶豫謂甘薯有十二勝收入多一也白色味甘諸土種中特為敻絶二也益人與薯蕷同功三也遍地傳生剪莖作種今歲一莖次年便可種數十畝四也枝葉附地隨節生根風雨不能侵損五也可當米凶歲不能災六也可充籩實七也可釀酒八也干久收藏屑之旋作餅餌勝用餳蜜九也生熟皆可食十也用地少易於灌溉十一也春夏下種初冬收入枝葉極盛草穢不容但須壅培不用鋤耘不妨農十二也陸公薯録有溉種藏制諸法雖無關於藥病而有濟於備荒故並録之種薯宜高地沙地起脊尺余種在脊上遇旱可汲井澆灌即遇潦年若水退在七月中氣候既不及藝五穀即可剪藤種薯至於蝗蝻為害草禾蕩盡惟薯根在地薦食不及縱令莖葉皆盡尚能發生若蝗信到時急令人發土遍壅蝗去之後滋生更易是天災物害皆不能為之損人家凡有隙地但只數尺仰見天日便可種得石許此救荒第一義也歲前深耕以大糞壅之春分後下種若地非沙土先用柴灰或牛馬糞和土中使土脈散緩與沙土同可行根重耕起要極深將薯根每段截三四寸長覆土深半寸許每株相去縱七八尺橫二三尺俟蔓生既盛苗長一丈留二尺作老根余剪三葉為一段插入土中每栽苗相去一尺大約二分入土一分在外即又生薯隨長隨剪隨種隨生蔓延與原種者不異凡栽薯須順栽若倒栽則不生節在土上則生枝在土下則生卵約各節生根即從其連綴處斷之令各成根苗每節可得卵三五枚凡藤蔓已遍地不能容者即為遊藤宜剪去之及掘根時捲去藤蔓俱可飼牛羊豕或曬乾冬月喂皆能令肥脂二三月種者每株用地方二步有半而卵遍焉每官畝約用薯三十六株四五月種者地方二步而卵遍焉畝約六十株六月種者地方一步有半而卵遍焉約一百六株有奇七月種者地方三尺以內得卵細細小矣畝約九百六十株種種疏密略以此準之九月畦種生卵如箸如棗擬作種此松江法也金氏曰薯苗入地即活東西南北無地不宜得沙土高地結尤多天時旱潦俱能有秋養苗地宜松耕過須起町高四五寸春分後取薯種科置町內發土薄蓋縱橫相去尺許半月即發芽日漸蔓延長一丈或五六尺割七八寸為一莖勿割盡留半寸許當割處復發生生不息若養蔓作苗須用稍長尺許密密栽豎如養蔥蒜法栽莖使牛耕町寬二尺許高五六寸將莖斜插町心約以七分在町內三分在町外町內者結實町外者滋蔓每莖相去一尺余十餘日町兩旁使牛耕開令曬又七八日以糞壅之乃使牛培土每町可得薯三四斤若雨多須將蔓掇町上毋令浮根匝地然實結地內蟲不能災葉如食盡亦能復發早栽宜稀晚栽宜密三四月栽者實粗大七八月栽者實細小秋末實始加大冬至前當掘盡不掘盡亦不能大熟時須先割蔓置町下俟干捲起冬月銼喂牲畜若北地早寒則遲一個月栽早一個月掘宜遲宜早亦看天氣寒暖耳甘薯疏云江南田汙下者不宜薯若高仰之地平時種藍種豆者易以種薯有數倍之獲大江以北土更高地更廣即其利百倍不啻矣倘慮天旱則此種畝收十石數口之家止種一畝縱旱甚而汲井灌溉一至成熟終歲足食又何不可取種之法群芳譜云九月十月間掘薯卵近根先生者勿令損傷用軟草包裹挂通風處陰乾一法於八月中揀近根老藤剪七八寸長每七八根作一小束耕地作畦將藤束栽如栽韭法過月餘每條下生小卵如蒜頭狀冬月畏寒稍用草蓋覆至來春分種一法霜降前取近根卵稍堅實者陰乾以軟草作襯另以軟草裹之置無風和暖不近霜雪不受冰凍處一法霜降前收取根藤曬令乾於灶下掘窖約深一尺五六寸先用稻粳三四寸次置種其上更加稻粳三四寸以土蓋之一法七八月取老藤種入木筒或磁瓦器中至霜降前置草篅中以稻粳襯置向陽近火處至春分後依前法種金氏曰存薯之法不一在人變通或存木斛草囤瓷甕竹籠中俱可但性畏寒又畏熱置避風和暖處用草浮蓋俾通氣若封固則發熱壞爛敏前在東甌玉環見其島民少穀食多以茹為糧彼土有地率多種茹土人云其利十倍於谷以茹糧多者為富其收茹之法多曝乾切條以竹席圍如囤儲之久亦不蛀用則以水煮代飯云食之多力鮮病蓋其味甘能補脾土故也金氏曰薯初結即可食味淡多汁及時則甜煨食煮食爆食蒸食亦可生食切片曬乾碾作饘粥磨作粉餌滾水灼可作丸拌麵可作酒舂細水濾去渣澄曬成粉其葉可作蔬範咸臺灣府志長而色白者是舊種圓而黃赤者出自文來國金姓者攜回故名金薯諸羅縣志他物不種必用子用仁或原物根芽獨薯不然取一條片片切之只留皮一面種之髮根生苗亦一異也氣味甘平無毒主治補中活血暖胃肥五臟白皮白肉者益肺氣生津中滿者不宜多食能壅氣煮時加生薑一片調中與薑棗同功紅花煮食可理脾血使不外泄敏按甘儲俗傳能發諸病患痔漏者愈後食之復發亦以性能下行而滯氣故也痢疾下血傳習録云痢疾之起多因脾胃先虛而後積滯成痢其有脾氣虛甚欲健中焦者必宜甘溫之藥其有命門不暖欲實下焦者必宜純熱之藥至若濕熱所致煩熱口燥腹痛純紅小水黃赤以及下血者用此薯蒸熟以芍藥湯頻頻嚼服或薯粉調冬蜜服亦愈酒積熱瀉傳習録云泄瀉之症不一或水土相亂並歸大腸而瀉或土不制水清濁不分而瀉或小腸受傷氣化無權而瀉或真陰虧損元陽枯涸而瀉者此皆各從其類治之若酒濕入脾因而飧泄者用此薯煨熱食濕熱黃疸黃疸之症有四一曰陰黃由氣血敗也一曰表邪發黃即傷寒症也一曰膽黃驚恐所致也更有陽黃一症或風濕外感或酒食內傷因濕成熱因熱成黃者用此薯煮食其黃自退遺精淋濁遺精之與淋濁症有不同故治亦不同然大要責在心脾腎故凡遇此症無論有夢無夢有火無火或氣淋血淋膏淋勞淋總宜調養心脾每早晚用此粉調服大有奇功血虛經亂婦人血虛或遲或早經多不定故陽虛補其陽陰虛補其陰氣滯順其氣其有不宜辛燥寒涼而宜於清和者用此薯饔飧頻服調養其脾使脾健生化經期自定小兒疳積疳者干也在小兒為五疳在大人為五勞其病由於哺食乾燥之品嗜啖肥厚之物妄服峻利之藥以致津液乾涸延而成疳此薯最能潤燥生津安神養胃使常服之則舊積化而疳愈矣甘薯粳群芳譜云造粳將糯米水浸五七日以米酸為度淘淨曬乾搗成細粉看晴天將糯米粉入生水和作糰子如杯口大即將薯根拭去皮洗淨沙石土徐徐磨作漿要極細勿攙水將糯團煮熟撈入瓶中用木杖盡力攪作糜候熱得所大約以可入手為度將薯漿傾入每糯粉三斗入薯漿一斤攪極勻先將干小粉篩平板上次將糜置粉上又著乾粉捍薄曬半乾切如骰子樣曬極干收藏用時慢火燒鍋令熱下二合許慢火炒少刻漸軟漸發成圓球子次下白糖芝麻或更加香料炒勻候冷極浮脆每粳二升可炒一斗芋漿山藥漿俱可作按此物食之厚腸胃健腳力縮痰涎解毒活血甚妙甘薯粉功同甘薯造法用薯根粗布拭去皮水洗淨和水磨細入水中淘去浮渣取澄下細粉曬乾同豆粉用此粉水作丸與珍珠沙穀米無異按此粉余前在閩中及玉環俱有土人造以售客販行遠方近日寧波及乍浦多有販客市粉價賤於麵粉近日餅餌鋪中率多買此攙和麥面中作果餌以售其粉亦高低不同有曰淨粉則依前法所造者滾水沖之儼如藕粉故藕粉店中亦多買此攙和非有識者莫辨有曰行粉則連浮渣一切皆磨細和入只可作餅餌用其色亦黃而不白然其又有甜苦二種沙土細潔者則其茹作粉甜倘先一年種煙其地次年種茹則苦澀人不售之惟堪作粉味亦苦矣但以味甘有清香化開色如玉者佳甘薯酒和脾暖胃止瀉益精造法用薯根不拘多少寸截斷曬乾甑炊熟取出揉爛入瓶中用酒藥研細搜和按實中作小坎候漿到看老如法下水用絹袋濾過或生或煮熟任用其入甑寒暖酒藥分兩下水升斗或用曲糵或加藥物悉與米酒同法若造燒酒即用薯酒入鍋如法滴糟成頭子燒酒即用薯糟造當用燒酒亦與酒糟造燒酒同此酒福建最多土人名土瓜酒燒酒曰土瓜燒其酒味微帶苦峻烈不醇不善飲者食之頭目微有昏眩亦無大害閩中紹酒價貴此酒值廉土人相率飲此亦以餉客山百合此百合之野生者瓣狹長而味甘山人採貨之藻異云百合有三種一名山百合花遲不香二名檀香百合可食三名虎皮百合食之殺人百草鏡百合白花者入藥紅花者名山丹黃花者名夜合今惟作盆玩不入藥百合以野生者良有甜苦二種甜者可用取如荷花瓣無蒂無根者佳能利二便氣虛下陷者忌之逢原云余親見包山土罅中蚓化百合有變化未全者大略野生百合蚓化有之其清熱解毒散積消瘀乃蚓之本性耳應驗方癰疽無頭野百合同鹽搗爛敷甘入肺清痰火補虛損治肺癰救生苦海取白花者三兩搗爛白酒和絞取汁一碗不拘時服七服全愈石衣石耳台州仙居有之生峻嶺絶壁海崖高處乃受陰陽雨露之氣漸漬石上年久則生衣鮮者翠碧可愛乾者面黝黑背白如雪土人以作羹餉客最為珍品煮法用滾水一碗投鹽少許泡石衣於中用手細細擺揉去其細砂待軟如綿其細砂去淨色即變紫如玫瑰必得鹽水則所銜細砂始能吐盡再過清水二三次以雞湯下食滑脆鮮美味最香甘為山蔬第一台州六屬惟仙居有之或云各處深山皆有非仙居人不能取故仙居人有專業此為生者近則一二百里遠則數百里外向深岩危壑人迹莫能躋攀者壁上始有此物其取之法人則藤兜飛架衣雞毳躡鞋趫捷如猿猱取之則銛鉤鋒鏟輪絙入山有祭買路有楮非仙土人莫能盡其術也然結侶雖多其採取只許一人往不得兩人並採亦奇也每年必損人故其值昂而貪利者且競趨之味甘氣清性寒無毒清膈熱利小水化痰消癭結滯氣有補血明目之功婦人食之能潔子宮易於受胎男子食益精增髓石耳群芳譜石耳一名靈芝生天台四明河南宣州黃山巴西邊徼諸山石岩上遠望如煙廬山亦有之狀如地耳山僧採暴饋遠洗去沙土作茹勝於木耳粵志韶陽諸洞多石耳其生必於青石當大雪後石滋潤微見日色則石生耳大者成片如苔蘚碧色望之如煙亦微有蒂大小朵朵如花烹之面青紫如芙蓉每當昧爽擷取則肥厚見日漸薄亦微化為水凡香菌感陰濕之氣而成善發冷氣多和生薑食乃良惟石耳味甘腴性平無毒多食飫人能潤肌童顏在木耳地耳之上南粵瑣記凡青石以烈日輒出汗汗凝結則成石耳青為木氣故生耳若白石則否或曰此亦菌之類厚者菌薄者耳或曰凡乳床必因石脈而出不自頑石出其在陰洞者為乳床在陽岩者為石耳石耳之美見稱於伊尹其言曰漢上石耳蓋上古已珍之矣性寒或曰平味甘腴無毒藥性考石耳寒平石崖懸珥氣並靈芝久食色美益精悅神至老不毀瀉血脫肛灰服愈矣名勝志安吉州梅溪石門中産石耳食之止熱野芋艿青芋土芋藤野芋頭鬼芋汜勝之農書芋有六種五野芋六青芋野芋有大毒殺人凡芋三年不收即成野芋性滑下石毒服食皆忌之青芋亦有毒必須灰汁易水煮之堪食只宜蒸啖之中野芋毒者令人戟喉音啞煩悶垂死以大豆漿或糞汁解之薑汁亦可葛祖遺方合麻藥治跌打損傷痔漏麻風敷腫毒止痛治瘡癬搗敷腫傷乳癰野芋頭和香糟搗敷青芋療冷熱止渴土芋藤土芋即黃獨俗名香芋肉白皮黃形如小芋一名土卵與野芋不同綱目野芋附家芋內土芋另立一條可知然所引僅據陳藏器一説不知其功能稀痘小兒熟食大解痘毒其藤燒灰敷痘爛成瘡可無瘢痕群芳譜土芋其根惟一顆而色黃故名黃獨野芋頭文堂集驗一名仙人掌同野芋一種但此種葉較小略似慈菰葉有尖此又與草本形如鞋底者不同仙人掌形如鞋底治諸物食積已成痞塊者用野芋頭磨爛和糯米粉淡煮粥每早食一茶鍾不用油鹽十服後其積自消試驗無害集驗鬼芋羅浮志深谷中産物如薯芋狀山人得之剖作四片入砂盆磨作膠漿鍋煮成膏待冷則凝結如餅塊一復剖為四片添水再煮成膏膏成照前三煮四煮乃可食令飽一芋所煮可充數十人之腹故稱鬼芋焉芋有四異初生不借根苗葉上朝露著地即成種子一異也採製不令婦人雞狗見之見即化水二異也磨時煮時匕須順旋逆之即化水三異也一芋之成由一而四四而十六十六而六十有四如卦象之數四異也聞廬山衡嶽各有鬼芋採製又不同野毛豆野毛豆生園隰中蔓生枝細弱葉細尖兩兩排枝對生清明後開淡紫細花結實如毛豆立夏後可採初生苗絶似金鳳花苗葉其莢儼似角蒿中有子二圓如小緑豆小滿前後皆黑老便枯落矣生田塍間莖葉及莢較家者細小一名勞豆沈氏效方性微寒平肝火治疳疾目疾百草鏡治黃白疸性能發汗救生苦海治痘毒八九月時田塍邊採連莖根用煅存性研單用其豆更妙麻油和敷不問初起日久未潰已潰俱效按通雅引焦弱侯曰野田小豆曰䝁音勞陳留耆舊傳云赤眉以䝁豆與桓牧隋末子通攻江都夏侯端採䝁豆食之身之曰野豆也魯刀切勞豆或䝁䝁二字之訛也然考古今注䝁豆一名治豆葉似葛而實長尺余可蒸食一名䝁菽綱目鹿藿一名䝁豆又名鹿豆即今野緑豆爾雅釋草箘鹿藿注今鹿豆也唐書夏侯端傳擷䝁豆以食則似又非野毛豆之屬今野毛豆亦名䝁豆豈名同而物異歟並與之以俟考肝疳初起百草鏡野毛豆鮮者七錢乾者五錢雞肝一具同煮食煎服亦可野蘿蔔地骷髏三生蘿蔔一名紫金皮又名巴壁虎百草鏡云野萊蔔苗葉根形與家種者無二肉雖白而皮色帶黃為異王氏博濟方以干萊蔔為仙人骨俗又呼地骷髏雁山志山蘿蔔性寒狀如圃種者土人用治癰疽搗汁服之渣塗亦可庚戎豫來臨安署內有廢圃多商陸土人呼為山蘿蔔與此名同物異治肺癰百草鏡以七枚搗汁服地骷髏按地骷髏乃刈萊蔔時偶遺未盡者根入地瘦而無肉老而多筋如骷髏然故名能大通肺氣解煤炭燻人毒非干萊蔔也王禺中所言尚未明晰痞塊醫宗彙編陳年木瓜一個地骷髏即蘿蔔種枯根四兩煎汁時常服一小盞數日除根氣痞食痞俱治萬應丹海昌方治黃疸變為臌脹氣喘翻胃胸膈飽悶中脘疼痛並小兒疳疾結熱噤口痢疾結胸傷寒傷力黃腫並脫力黃各症用人中白以露天不見糞者方佳火煅醋淬七次一兩神麯白卜子地骷髏即土中蘿蔔各五錢砂仁二錢以上俱炒陳香櫞一個共為末蜜丸桐子大每服三五七丸或燈草湯下或酒下三生蘿蔔此乃人工製造者唐正聲傳此法云得自祕授取水蘿蔔一枚周圍鑽七孔入巴豆七粒入土種之待其結子取子又種待蘿蔔成仍鑽七孔入巴豆七粒再種如此三次至第四次將開花時連根拔起陰乾收貯罐內遇臌脹者取一枚捶碎煎湯服之極重者二枚立愈南瓜蒂瓤附綱目南瓜主治只言補中益氣而已至其子食之脫髮今人以為蔬多食反壅氣滯膈昔人皆未知也吳秀峰言凡瓜熟皆蒂落惟南瓜其蒂堅牢不可脫昔人曾用以入保胎藥中大妙蓋東方甲乙木屬肝生氣也其味酸胎必借肝血滋養胎欲墮則腹酸干氣離也南瓜色黃味甘中央脾土之精能生肝氣益肝血故保胎有效神妙湯保胎用黃牛鼻一條煅灰存性南瓜蒂一兩煎湯服永不墮疔瘡行篋檢祕用老南瓜蒂數個焙研為末麻油調塗立效南瓜瓤治湯火傷慈航活人書伏月收老南瓜瓤連子裝入瓶內愈久愈佳凡遇湯火傷者以此敷之即定疼如神辣茄人家園圃多種之深秋山人挑入市貨賣取以熬辣醬及洗凍瘡用之所用甚廣而綱目不載其功用陳靈堯食物宜忌云食茱萸即辣茄陳者良其種類大小方圓黃紅不一惟一種尖長名象牙辣茄入藥用又一種木本者名番薑範咸臺灣府志番薑木本種自荷蘭開花白瓣緑實尖長熟時硃紅奪目中有子辛辣番人帶殼啖之內地名番椒更有一種結實圓而微尖似奈種出咬𠺕吧內地所無也藥檢云辣茄一名臘茄臘月熟故名亦入食料苗葉似茄葉而小莖高尺許至夏乃花白色五出倒垂如茄花結實青色其實有如柿形如稱錘形有小如豆者有大如橘者有仰生如頂者有倒垂葉下者種種不一入藥惟取細長如象牙又如人指者作食料皆可用食物宜忌云性辛苦大熱溫中下氣散寒除濕開鬱去痰消食殺蟲解毒治嘔逆療噎膈止瀉痢祛腳氣食之走風動火病目發瘡痔凡血虛有火者忌服藥檢云味辛性大熱入口即辣舌能祛風行血散寒解鬱導滯止澼瀉擦癬百草鏡熏壁蝨洗凍瘃浴冷疥瀉大腸經寒澼外痔百草鏡以象牙辣茄紅熟者挫細甜醬拌食毒蛇傷百草鏡用辣茄生嚼十一二枚即消腫定痛傷處起小泡出黃水而愈食此味反甘而不辣或嚼爛敷傷口亦消腫定痛祛臭蟲方經驗廣集用羊骨頭一個秦椒半斤共入火盆內同鋸木屑燒之門窗閉緊勿令出煙其蟲自死敏按木屑用樟木者佳凍瘃蔡云白方剝辣茄皮貼上即愈痢積水瀉醫宗彙編辣茄一個為丸清晨熱豆腐皮裹吞下即愈敏按花鏡番椒一名海瘋藤俗呼辣茄本高一二尺叢生白花秋來結子儼如禿筆頭倒垂初緑後硃紅懸挂可觀其味最辣人多采用研極細冬月以代胡椒蓋其性熱而散能入心脾二經亦能祛水濕癸亥豫在臨安有小僕於暑月食冷水臥陰地至秋瘧發百藥罔效延至初冬偶食辣醬頗適口每食需此又用以煎粥食未幾瘧自愈良由胸膈積水變為冷痰得辛以散之故如湯沃雪耳又名秦椒李成裕遼載秦椒一名番椒形如馬乳色似珊瑚非本草秦地之花椒即中土辣茄也龍柏藥性考秦地乃草本辣椒綱目諸注誤為秦地花椒不知即今之辣茄又名辣虎性熱味辣溫中散寒除風發汗去冷癖行痰逐濕多食眩旋動火故也久食發痔令人齒痛咽腫刀豆根殼附綱目殼部刀豆條發明下注刀豆本草失載惟近時小書載其暖而補元陽近有人燒其子存性白湯調服止厄逆有效故瀕湖特為增入而不知其用甚廣今悉補之治頭風集聽云刀豆根乃治頭風之神藥每用須五錢酒煎服治鼻淵年希堯集驗方老刀豆文火焙乾為末酒服三錢重不過三服即愈殼治腰痛萬氏家抄用刀豆殼化灰好酒調服外以皂角燒煙燻之牙根臭爛洪氏一盤珠刀豆殼燒灰加冰片擦涎出即安治久痢種福堂方用刀豆莢飯上蒸熟洋糖蘸食一二日即愈治婦女經閉腹脅脹痛欲死並消血痞經驗廣集陳年刀豆殼焙燥為末好酒服一錢加麝香五釐亦妙喉癬張氏必效方刀豆殼燒灰以二三釐吹之立效楊梅瘡萬氏濟世方當歸川芎苡仁木通木瓜生地熟地金銀花防己防風荊芥黃柏白芷知母甘草皂莢豬苓去皮各二兩人參二錢山紅花刀豆殼各五錢硬飯糰二兩水煎一鍋濃汁不拘時當茶服忌魚腥生冷四劑全愈地腎粵志羅浮多地腎一名松黃但松黃未落為松實已落而英華未散為地腎其狀若彈丸大者如雞卵紅黃相錯一一晶瑩熟之可入饌其生無根蒂散布松下土松石潤處有之或亦鬆菌之類也乍浦九山補志松花菌山之有松者皆産惟陳山東麓為多三月間松花入土至四五月經雨後即生至八九月又生鮮肥滑嫩素品之上味也味甘性平生津消痰治溲濁不禁葛乳一名葛花菜名山皆有亦産高州粵志高州多種葛雷州人市之為絺綌秋霜時有葛乳湧生地上如芝如菌赤色味甘脆微苦乃葛之精華也亦曰葛菌瀕湖僅據太和山志載其醒酒與酒積成疾他皆未及故特補之性涼解肌熱散風火及陽明風熱癍疹鮮草果粵志人多種之為香料即杜若非藥中草果也其苗似縮砂三月開花作穗色白微紅五六月結子其根勝於葉味辛溫能除瘴氣久服益精明目令人不忘真珠菜六安有真珠菜如真珠益部方物略記真珠菜戎瀘等州有之生水中石上翠縷纖蔓首貫珠蜀人以蜜熬食之或以醯煮可致千里不壞黃山志真珠菜藤本蔓生暮春發芽每芽端綴一二蕊圓白如珠葉翠緑如茶連蕊葉臘之香甘鮮滑他蔬讓美利水通淋結消腹脹下氣癃閉鷓鴣菜連江志生海石上色微黑漳州府志鷓鴣菜散碎花微黑出漳浦療小兒腹中蟲積食之即下如神葛仙米生湖廣沿溪山穴中石上遇大雨衝開穴口此米隨流而出土人撈出初取時如小鮮木耳紫緑色以醋拌之肥脆可食土名天仙菜干則名天仙米亦名葛仙米以水浸之與肉同煮作木耳味大約山洞內石髓滴石所成性寒不宜多食四川亦有之必遇水沖乃得歲不常有他如深山背陰處大雨後石上亦間生然形質甚薄見日即化或干如紙不可食矣梧州府志葛仙米出北流縣勾漏洞石上為水所漬而成石耳類也採得曝乾仍漬以水如米狀以酒泛之清爽襲人此原非谷屬而名為米傳云晉葛洪隱此乏糧採以為食故名嶺南雜記韶州仁化縣丹霞山産仙米遍地所生粒如粟而色緑煮熟大如米其味清腴大抵南方深山中皆有之宦遊筆記出粵東葛仙洞外有流泉噴薄石上遂生苔菌之類其狀如米粒青色芼以為羹味極鮮美土人呼為葛仙米有未識者疑是青螺按韶州府志丹霞出仙米頗與此相類但一生沙土一生水石為異耳陸祚蕃粵西偶記道書寶圭洞天即今北流縣勾漏山洞口前後産葛仙米採而干之粒圓如黍揉麵釀酒極芳香性寒味甘爽解熱清膈利腸胃按葛仙米本屬石耳之類憶庚子歲曾於劉明府席間食之時以為羹儼如青螺狀翠碧可愛味極甘鮮滑脆適口入蔬為宜藥性考云清神解熱痰火能療或云久服延年蓋亦能清臟熱者黃矮菜一名黃芽菜咸淳臨安志冬間取巨菜覆以草積久而去其腐葉黃白鮮瑩故名黃菜萬曆杭州府志杭人訛為黃雅菜戒庵漫筆黃矮菜杭州呼為花交菜群芳譜燕京圃人以馬糞入窖壅培菘菜令不久見風日長生苗葉皆嫩黃色脆美無滓謂之黃芽菜乃白菜別種莖葉皆扁甘溫無毒利腸胃除胸煩解酒渴利大小便和中止嗽冬汁尤佳食物宜忌味甘性溫滑利竅陳堯士云補虛羸按黃矮菜有南北二種南産者惟杭城太平門外沙地産者為最他處悉高大粗松絶無捲心密葉味亦較遜北産糧艘帶來者味更美質更細且無粗筋有重至十餘斤一顆者南中亦不易得也陳確齋云食之潤肌膚利五臟且能降氣清音聲惟性滑泄患痢人勿服白茄葉蒂汪連仕方一名玉盤茄有大小兩種大者如雞卵小者如指頭初生色白老則皮黃能入骨追風治一切癱瘓根名白風藤合酒蒸服茄實蘸硫黃擦白癜風除大麻風東粵茄園産者良名茄丸葉治腸紅大便下血劉羽儀驗方用白茄子葉經霜方採刷淨毛去焦黃葉陰乾取三四葉煎濃湯如此吃三四次其血即止永不復發此方曾經邪犬咬過之人勿服蒂治發背及一切毒癰初起味水軒雜記用白茄蒂七個生首烏等分酒煎服即消天茄出廣中如大拇指其形如茄而有稜堅如石擊之不得碎其蒂黃黑如醬色一種牽牛花嫩子蘇人採為蜜餞入食品者亦名天茄大能破氣與此迥別胃脘痛救生苦海水磨服之每服一枚見效蠍毒五雜俎記關中有天茄可治蠍毒牛心茄子産瓊州一核者入口立死兩核者可以糞清解之入外科膏藥用麻藥用此藥只可外敷不宜內服緬茄高濂珍異藥品云緬茄一作沔茄形如大栗上有罩帽如畫皮樣出滇南緬甸地方堅如石滇略緬茄枝葉皆類家茄結實似荔枝核而有蒂土人雕刻其上而系之拭眼去翳亦解瘡毒滇南雜記緬茄出緬甸大而色紫蒂圓整蠟色者佳粵志廣東高州府出木茄上有方蒂拭眼去昏障即緬茄也水磨塗治牙痛抹眼眶去火毒又能解百藥毒治疔瘡走黃良朋彙集此方出寶坻張相公百發百中真神效方凡疔瘡走黃毒攻入內不知人事但有氣者可救用緬茄一枚以瓷碗盛黃酒將茄放碗內磨得下磨不下只管於酒內磨一鍾約熟茶時將酒裝入長頸錫壺內再入連須蔥兩根牙咬不令斷白豇豆七粒如蕎麥開花時加蕎麥七粒別時不用又用小麥令衆人口嚼成麵筋封固壺口放水鍋內煮一炷香取出熱服出汗即愈醬茄糟茄此即人家醬中食茄入藥宜陳年者佳治耳癢出膿妙藥方醬茄擠汁滴之治牙痛周氏家寶方醬茄燒灰存性為末掩患處腹內鱉瘕壽域方陳年醬茄燒存性入麝香輕粉少許脂調貼之糟茄山海草函燒灰存性治鵝口疳玉瓜即廣昌土瓜出江西常中丞宦遊筆記廣昌土瓜本草不載形甚拙圓者如瓠或磊砢如贅疣無瓣無瓤長沙土中外汙內潔細肌密理剖之白如冰玉入口清甘無滓消煩釋滯或熟食之亦佳殆瓜中異品也其性蔓生春種而秋成冬初始入市無種春深後切瓜連皮成小塊用沙土覆於室內久之芽生於是就沙地為窖令深而寬藉以茅欲其中通而根可旁達既長密葉蔓生纍纍插竹引之上行培以雞糞乃繁碩土人又名玉瓜抱朴子云五原蔡誕入山而還語家人曰豫至崑崙得玉瓜以玉瓜井水洗之乃軟可食是豈其遺種耶江西他縣亦有産者然小而渣多惟廣昌附郭五里內為佳豫食於元宵後喜其味美至郡覓之東風送暖瓜即不可留矣味甘性平調中益氣舒郁化滯消食清大小腸火生津滋血和營衛熟食補脾健胃節瓜粵草志節瓜乃冬瓜中一種小者白皮蔓地生一節生一瓜得水氣最多故解暑毒止渴生津驅暑健脾利大小腸穿腸瓜吉云旅鈔穿腸瓜乃大便解出甜瓜子生苗結實土人名糞甜瓜不拘大小皆可入藥採來曬乾新瓦焙焦為末乳鉢研極細攤地上出火毒收貯聽用但此瓜不易有須以人力製造其法將爛熟甜瓜與七八歲小兒空心帶子食之令其勿嚼碎子次日解出大便子裹糞內帶糞曝乾時早即於本年下出倘時晚不及生瓜花亦可用否則藏於次年下種更好大人便出者子亦可種此瓜生在夏秋若春冬要用必須預備治痔漏吉云旅鈔有祕授消痔神方不論遠年近日痔漏三服除根用穿腸瓜焙存性為末每末一兩加蟬蛻末三錢五分以金銀花五錢浸酒一二日煎數滾調藥末每服二錢七分空心金銀花酒下外以白海南花並根葉煎湯不時先熏先洗三日即愈海南花春冬無鮮者預收陰乾備用蓋痔漏乃大腸鬱火臟腑積熱發而為腫為痛為瘡久而成管今用此藥以散火消毒去積除壅其管自退不問新久屢試屢驗忌房事惱怒煎炒辛辣物併發氣之類百日永不再發此方傳自西洋僧有洋客患痔漏痛甚不能上海船其僧出此藥與服三日即愈求其方送洋布十匹黃金五兩始得此方用無不效天骷髏此乃鄉野村中桑樹及屋籬上所挂霜打絲瓜也其子名烏牛子治婦人白帶血淋臌脹積聚一切筋骨疼痛並宜服之汪連仕方鬼骷髏汪連仕云乃殘老之向日葵其子性烈通氣透膿合麝香急性子搗爛為膏貼臍能落胎敏按冬日桃園中有樹上乾枯殘桃亦名鬼骷髏與此名同物異白鼓釘宦遊筆記口外白鼓釘即內地蒲公英葉有鋸齒婆娑鋪地與內地生者迥殊內地者花早開單瓣生沙漠者花開於夏至前宛似黃菊一望燦然滿地其蕊瓣重疊顏色嬌媚暮春草甫萌芽口外啖此味用之不竭不啻春韭秋菘也採食之清火亦為通淋妙品其莖中折斷有白汁諸蟲盛夏孕育人手觸之成疾百藥難效取汁厚塗即愈鄭方升云一莖兩花高尺余者掘下數尺根大如拳旁有人形拱抱搗汁酒服治噎膈如神按上所載皆綱目未及言者且口外所産又與內地異綱目蒲公英入柔滑類歸草部今沙漠所産人以作菜茹故入菜部亦各從其類也清火毒鬱熱通乳通淋消腫治膈噎療一切毒蟲蛇傷三寶薑香祖筆記産臺灣鳳山縣相傳明初三寶太監所植治百病有效彎薑滇南記産雲南百夷中餌一刀圭終其世斷絶人道土人以飼牧馬不之宦也川薑出川中屈曲如枯枝味最辛辣絶不類薑形亦可入食料用包汝楫南中紀聞云扶叢鄉猺人攜木薑土茶餉余受其木薑作羹味如茱萸醬即此物也味辛性熱治胃寒散冷積寒澼痰氣沙蔥西北遊記口外沙石中生野蔥一名楞蔥一名沙蔥石楞中所産故名楞沙磧中所産故名沙其葉與家蔥同大更過之味辣於家蔥根絶似蒜頭大更過之味亦辣於蒜善食辣辛者不能罄一枚雖細如草莛拈生於沙磧甚密醃之調羹勝如韭雉羹兔羹尤宜又有沙蔥草與沙蔥相似人食之心迷亂馬食之腹隱痛惟宜於橐駝採者折以辨之沙蔥本脆折易斷此草柔韌難折入藥取根西域聞見録丕雅斯類野蒜頭大如雞子葉如蔥而不中空味辛甘肅人呼為沙蔥回人嗜之寬中下氣消食解肌活血發汗表風寒滌宿滯風蔥臺志出臺灣療風疾番蒜徐昆柳崖外編番蒜出臺灣番地外形似木瓜中似柿有浮山張氏宦於閩一婢食鱉肉後誤食莧遂病面黃腹脹𮀚碐欲死者數矣半載後有饋番蒜者婢偶食之遂大瀉有物如小鱉者數十少頃爽然疾若失方知番蒜可治鱉莧毒也治鱉瘕解食毒水毒蒜梗此大蒜近瓣處中心短梗也乾者入藥用治瘡成管年希堯集驗方用大蒜梗燒灰存性搽患處其管自消坐板瘡黃氏醫抄用蒜梗燒灰為末先洗淨去靨將藥末搽上洗漏立驗良朋彙集云夏應遴試效過防風荊芥地骨皮川椒蘄艾瓦松各五錢槐條一兩陳蒜梗二兩共入麻布袋內熬滾熱蕩止痛神效熏痔瘡救生苦海蒜梗陰乾以火盆置微火將梗投入移火盆於木桶中令患者坐熏之四圍以衣被塞緊勿走泄煙三次自愈凍瘡種福堂方大蒜煎湯洗之刺兒菜西北遊記即內地之紫花地丁俗呼刺兒菜葉如柳有刺毛夏開紫花生平地者起莖生溝壑者起蔓內地在在有之生口外沙漠者花開於夏至後大如蒜頭色紫可愛人多采食之暮春萌芽之際挖其根狀如大枝人參色較微白巨者如蘆蔔烹調適口誠塞外鮮品然干其根帶回內地入藥其清火之功勝於金銀花解毒之用更捷于山慈菰一物而兼二物之用如此清火疏風豁痰解一切疔瘡癰疽腫毒如神波斯菜即今紅菜一名洋菜汪連仕云生長海陽者佳根本紅豔色鮮麗止血治刑杖瘀血攻心搗汁沖酒服即散可理跌打干冬菜陳冬菜滷陳芥菜滷糞金子冬菜乃白菜杭俗小雪前後居人率市白菜以鹽醃之作齏藏為御冬及春時所食名曰冬菜頗利膈下氣其滷汁煮豆及豆腐食能清火益肺誠食中佳品也至春分後天漸暖菜亦漸變黑色味苦不堪食以之曬作干飯鍋上蒸黑再曬再蒸如此數次乃曝之極燥貯缶器中可久藏不壞名曰黴乾菜即干冬菜也年久者出之頗香烈開胃噤口痢及産褥以之下粥大有補益蓋白菜本能和中下氣利三焦通二便含土德之精有生金之用干之則苦返其初而從母化也久蒸久曬則味反甘全其德故有中和之運功與參耆等惜乎世多忽而不知余故特為表之瀕湖綱目菘下無干菜之用殊為缺略近日筧橋人所市者乃蘿蔔英所幹與芥菜乾蒸曬成者皆不入藥須人家冬白菜醃作蒸曬年久者為佳群芳譜有造黑醃齏法用白菜如法醃透取出挂於桁上曬極干上甑蒸熟再曬乾收之極耐久藏夏月以此齏和肉炒可以久留不臭即今干冬菜也開胃下氣益血生津補虛勞已痰嗽年久者泡湯飲治聲音不出和酒搗爛塗湯火傷白火丹黃氏傳方此症形如水脹肢體俱腫皮膚色白飽脹不食畏見燈火用冬菜勿落水陰乾陳三年者可用愈陳愈妙煎湯洗浴並煎服之立消如神陳冬菜滷汁清肺火痰嗽解咽喉腫毒物理小識鹽乾菜水滴蜈蚣即死以鹽菜炒雞蜈蚣亦不食陳芥菜滷汁味鹹性涼治肺癰喘脹用陳久色如泉水緩呷之下痰清熱定嗽真能起死回生作法以芥滷貯甕中埋行人處三五年取用糞金子凡油白菜收子作種者其中心老根內必有一子枯時搖之有聲剖出名糞金子以其得糞力而花實幹中子又得菜之生氣大能益人曰金子重之也田種者其子更佳王聖俞云糞金子在收菜種子時其中干內剖出形如鼠糞而黑色如麥粒大小千百干中不過數十粒蓋有生不生之別不能每干皆産也治血症取三錢炒研白湯調服立愈治慢驚神效王聖俞麒麟菜出海濱石上亦如璚枝菜之類瓊州府海濱亦産周海山煌琉璃國志載雞腳菜麒麟菜皆生海邊沙地上又名鹿角菜今人蔬食中多用之煮食亦酥脆又可煮化為膏切片食綱目鹿角菜云甘大寒滑陳芝山食物宜忌云微咸性平大有消痰功用瀕湖反引孟詵一説以為有微毒不可久食能發痼疾且其主治只載下食風氣小兒骨蒸治丹石熱結解面毒何昧其功用乃爾耶茲特表之朱排山柑園小識石花菜生海中沙石間高二三寸狀如珊瑚有紅白二種洗去沙土煮化凝成膏糟醬俱佳又有細如牛毛者呼牛毛石花味稍劣郭璞海賦所謂土肉石華是也味鹹性平消痰如神能化一切痰結痞積痔毒敏按盛京志龍鬚菜生於東南海濱石上叢生狀如柳根長者至尺余白色以醋浸食亦佳蔬也土人呼為麒麟菜出金州海邊鹿角菜生東南海中大如鐵線分丫如鹿角紫黃色干之為海錯水洗醋拌則如新味今金州海邊有之據志則似一類二種也石花膏毛世洪養生集治辛苦勞碌之人或嗜酒多欲忽生外痔發作疼痛步履難移服此或大便瀉一遍或不瀉亦即止痛可以行走再用搽洗等藥自能斷根用麒麟菜洗去灰一兩用天泉水煮煬和白糖五錢食之此方乃李治運臬司傳靈隱寺僧杭人蕭成子患此症僧往候授以此方服之隨愈豫記之後治數人多效諸筍干筍綱目竹入苞木類以筍附菜部所載亦只苦竹䈽竹淡竹冬竹諸筍且於義類多未詳盡不知春冬所出性皆各別鮮干諸品味亦迥殊則入經絡主治自不能合一陳芝山食品真一筍譜及食纂所載較詳頗近時尚即取以補之春筍筍譜其佳者曰豬蹄紅冬月即生埋頭土中以鋤掘之可三寸許其味極鮮甲於他筍未出土名豬蹄紅若長尺許則其籜圓故人名圓筍亦名蚤筍蓋冠諸筍而先出者味甘辛微寒下氣養血利膈消痰化熱爽胃解渴利水療風邪止喘嗽毛筍即茅竹筍筍之大者筍譜毛筍為諸筍之王其籜有毛故名俗呼為貓筍者非也大者重幾二十餘斤猶未出土肉白如霜墮地即碎以指掐之其軟嫩如腐嗅之作蘭花香毛筍大者清明後方有其出於臘月及正月者形短小籜亦有毛土人名貓兒頭食之多嘈心然消痰之力較勝他筍味甘性平利九竅通血脈化痰涎消食脹多食令人易飢鞭筍即發於竹邊者夏秋有之其生於四月者曰梅邊蓋感梅雨濕蒸之氣而生頗早味淡肉硬不如秋生者筍譜邊筍即毛筍之旁出者方筍盛時生氣上升筍皆豎生氣既衰根既橫生盡其力可橫亙十餘丈至地之邊際與竹之長短相稱謂之竹邊故名邊筍其狀類鞭亦名鞭筍地肥者軟嫩長尺許其籜紫色而兼白其味恬淡而鮮其氣醇而有蘊藉不類毛竹之精英盡發泄於外也味甘性寒開胃利腸消痰渴冬筍即潭筍沈云將食纂貓竹冬生筍不出土者名冬筍又名潭筍味甘溫陳芝山宜忌云味甘性寒利九竅通血脈治吐血衄血及産後心腹痛一切血症食之肥白人食纂消痰滑腸透毒解酲發痘疹中諸筍毒者生薑麻油解小兒及脾虛者多食難化食物宜忌痘疹不出採未出土冬筍煮粥食即有生髮之意不藥良方青筍即青竹筍竹細小故出筍色青山間遍地有之系野竹所生筍也即時下俗呼水竹者是也胡承謀湖州府志天目出筍乾其色緑聞其煮法旋湯使急轉下筍再不犯器即緑矣味甘止肺痿吐血鼻衄治五痔並妊娠食纂青筍乾即青竹筍鹽湯煮曬乾者出杭臨安天目者最佳色如鸚哥緑有尖上尖球子二尖等名味鹹甘性平爽胃消痰鹽筍乾以春筍鹽湯煮曬而成有泥黃烏尖直腳等名味鹹甘性平行氣清痰衢筍乾以筍用鹽湯煮熟熏干而成味鹹甘性平利膈化痰羊尾筍乾主治同處筍片俗名素火腿以毛筍微醃湯煮熏干而成味甘微咸性平利血消痰緑筍片即玉版筍以毛筍淡煮曬乾者浙閩江西多有有草鞋底蝴蝶尖玉版等名湖州府志緑筍大者謂之闊緑有名泥里黃者尤美味甘性平治實喘消痰張石頑云干筍淡片利水豁痰水腫葶藶丸用之紅海粉蟲語海珠生嶺南狀如蛞蝓大如臂所茹海菜於海濱淺水吐絲是為海粉鮮時或紅或緑隨海菜之色而成或曬晾不得法則黃有五色者可治痰或曰此物名海珠母如墨魚大三四寸海人冬養於家春種之瀕湖田中遍插竹枝其母上竹枝吐出是為海粉乘濕舒展之始不成結以點羹湯佳治赤痢風痰疳積壞眼慈航活人書穀精草小青草俱炒青黛水飛海粉刺蒺藜使君子肉各一兩為末早用羊肝七片拌藥三錢蒸熟食
