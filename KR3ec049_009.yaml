body:
  text: 卷九器用部四十八種附六種番打馬形長尺許內藏油膏外裹棕皮可代火把又可鞭馬番舶上來哈喇叭出方輿勝覽做打麻乃樹脂結成夜點有光塗舟水不能入華夷考曰做打麻乃樹脂流落膠汁土內掘出如松香瀝青狀內有明淨好者都似金珀一般出滿刺加國性專殺蟲不可服有毒入外科瘡瘍膏用治陰癬救生苦海用番打馬和鉛水銀雄黃樟腦各等分豬油和搽效癩疥膿瘡積善堂良方麻黃膏中用之疥瘡救生苦海番打馬三錢楓子肉五錢水銀杏仁蛇床子各一錢川椒樟腦雄黃各二錢用紅燭蓋油共研勻擦之神效治疥瘡應驗良方用全蠍乳香枯礬大楓子蛇床子土木鱉川椒雄黃水銀番打馬輕粉樟腦為末用燭油為丸擦之即效此方番打馬作番答木擦諸瘡並楊梅風毒經驗濟世良方黃柏去皮一錢黃連去蘆一錢川大黃五分三味另研雄黃膽礬銅青兒茶青黛輕粉枯礬各二分冰片一分半另研入大楓子七個去殼去油人言壯人七釐弱者五釐用番打馬即番舶打火把之物另為末瘡毒盛而人壯健能食者每分五分毒盛而人弱者每分用三分不健不弱之人每分用四分和入前藥內研勻水銀壯健人每分用一兩中等人用五錢弱極人用三錢不可多藥須研極細否則粒粗恐傷皮肉右先將水銀一分並前藥末一分入盞內加真脂麻油少許以指研開逐漸添油研至不見水銀為度大約如稀糊可矣於兩手兩足掌後動脈處周圍擦之每一分藥擦三日每日早晚各擦一次每次以七八百擦為止大率擦使熱透則住擦時凡周身破傷處俱用無麝香膏藥貼之每日一換不可經風避帳幔內冬月用暖床厚被褥即春夏秋暖時亦不可見風擦至七日必口吐臭涎若口齒破爛出血者用黃蜂窩煎湯候冷漱解勿咽下輕則用花椒湯漱之擦處多皮破不可畏痛而少擦忌魚腥生冷發風等物及醋茶醬一個月尤忌房事其牛肉燒酒團魚之類忌二三年若蕎麥麵與羊肉則終身忌之每次擦畢以藍布尺許包裹所擦處此治楊梅風毒法也如楊梅瘡初發者擦五六日痊愈所用藥皆同惟水銀只用四五錢足矣不必貼膏藥久遠臁瘡應擦處如有破爛可於腳手心擦之其藥料照中等者亦包布貼膏如前下疳及蛀乾重者亦照中等藥擦治貼膏喉內瘡癬潰爛不能進飲食者亦照前中等藥擦遍身牛皮風癬作癢作痛出水者亦照前用中等藥擦凡擦藥仍須內服煎藥兼之煎藥方防風荊芥銀花防己白芷連翹苡仁白蘚皮桔梗川芎當歸赤芍生地黃連黃柏知母牛膝木通陳皮羌活獨活粉草梔子各等分加土茯苓乾者四兩鮮者八兩水六碗煎至三碗分三次一日早午晚服完自擦起之日服至七日發口止虛人加人參二三錢痔漏消管藥線妙靈方用藥先用燈心試其深淺頂至極痛處為率以藥條如式送入漏口三日後又試內根漸漸生肉條漸漸短用藥直至滿而止玉簪花根白者佳焙乾四兩番打馬焙乾三兩馬兜鈴炒乾二兩磁石三錢煅紅醋淬三次共研極細末以面打條或粗或細候瘡管用之通始化去始再插廣瘡仙遺拾珠用膽礬三錢皂礬石黃青黛各二錢番打馬二錢硃砂五分為末豬脂一塊搗勻夏布包擦手足心候腹鳴即止病自愈膿窠瘡慈航活人書斑蝥三個麻黃二錢番打馬三錢樟冰五錢臘豬油二兩先熬化次入斑蝥煎焦撈起再入麻黃煎焦撈起再加番打馬末同樟冰調勻掐破瘡頭以藥點上立時結痂次日痊愈老材香山陝等省無漆民間棺殮俱用松香黃蠟塗於棺內數十年後有遷葬者棺朽另易新棺其朽棺內之香蠟名曰老材香土人用合金瘡藥按脂蠟乃先天流液之精又得土以固其力借血肉餘氣以凝其神是一物合三才之用故入藥功效倍於他草木也藥性考北地古棺中松脂合金瘡藥止血極效治跌打損骨止金瘡血出生肌定疼神效盧氏仙方金瘡鐵扇散中用之縛木藤綱目藤部有省藤即紅藤集解云堪縛物主治止言去風殺蟲無腦漏治法治腦漏急救方用縛木紅皮藤燒存性為末每用酒服三錢服後覺有一線從鼻至脊背而下股其腦漏隨愈一人一年服一次效腸癰經驗廣集凡腸癰生於小肚角微腫而小腹隱痛不止皮色不變是也紅藤一兩許好酒二碗飲醉臥午後用紫花地丁一兩許亦以好酒煎服後痛必漸止再服敗琉璃浮子系羊角所造有五色惟白者入藥佛前十餘年者良去淨油垢新瓦煅研退管漏湯火傷乳痛急救方用琉璃片燒灰存性食後酒服一錢即消救生苦海退一切管祕方手指甲炙黃研細象牙銼末研細山甲炙黃研細乳香沒藥俱炙硃砂水飛舊琉璃燈底佛前白者用三十年者佳如若難得十餘年者亦可用打碎麩炒為極細末各三錢合勻再研用黃蠟四兩化和為丸如椒大初服五粒次服六粒每日加服一粒加至十四粒止共服十日計服九十五粒至十一日每日減一粒至五粒仍舊逐日加上一粒加至十四粒又逐日遞減一粒如此周而復始或服至十四粒每從五粒服起更妙每日空心陳酒送下管漸褪出褪盡為度如若未盡再從頭服起神效祕之祕之內消痞管神方陳直夫躬行録載此方治痔管如神有一小兒從高墜下傷背脊骨月餘後生毒潰爛成漏蛔蟲從漏孔中出經云外癰透膜者生內癰透膜者死此症已屬不治直夫用此藥一料而愈亦奇方也凡諸般漏管皆可服不獨痔管耳琥珀燈心研末象牙屑焙血餘須自制蝟皮陰陽瓦合好泥封煅存性雨前芽茶舊琉璃底翦碎製法同蝟皮蟬蛻炒人指甲不拘手足俱可用瓦上焙脆為末穿山甲炒脆當歸白茯苓豬懸蹄甲殼夾翦翦碎制同蝟皮蜣螂瓦炙牛皮膠酒煮化和藥如不足加煉白蜜以上之藥各三兩小蜂房十個制同蝟皮火候更宜輕勿煅成灰蛇蛻十條翦碎瓦上炙煬自作汁將凝即覆存性否則過性矣為末同阿膠和搗捻丸每日早午晚服三錢滾水送下一料自愈已驗過數十人痔潰成管俞曉園鈔方克蛇龜活者一個泥裹擇朝南牆下背陰處煅烟盡為度去泥用多年白琉璃底一具琥珀象牙各三錢珍珠西黃冰片各五分為末摻之此藥亦可服每服九分肺癰傳信方陳年琉璃煅灰存性陳年油絮漆匠店有煉成和勻酒服試驗神效尿血救生苦海用舊琉璃燈洗淨翦碎入瓷罐內泥封火煅以紅為度待冷取出酒下三錢輕粉結毒救生苦海用舊琉璃燈燒存性研每服二錢毒在上者川芎湯下毒在下者牛膝湯下輕者十日重者一月痊愈濟世方用佛前照過舊琉璃燒存性酒調下日一二次一月痊愈凡人火燒取廟中琉璃浮子松樹厚皮做的燒灰放地土上用碗覆蓋灰上存性研末用紅糖真香油調敷臘利瘡百藥備遺用陳年佛前琉璃只取底用瓦上煅存性為末真麻油和搽喉癬選奇方用陳年琉璃煅為末一錢加薄荷末白硼砂各五分冰片少許和勻吹入立愈敗毒散不問新久腫毒癰疽發背疔瘡皆治家寶方琉璃陳年破損者一個楝樹子四兩舊髮網巾一頂鳳凰衣四十九個三七一錢敗龜板炙五個共為末每服五分楝樹子湯下男女臁瘡家寶方先用白蘿蔔打爛貼瘡口上一日一換三日毒血去盡再用後藥松香一兩杏仁三十粒去皮尖油黃丹八錢輕粉五錢舊琉璃燈三錢火焙為末研細麻油調搽一日一換數次即愈癧𤶱雲谷醫鈔多年佛前舊琉璃焙存性麻油調搽癧𤶱即消散結核石臨初結核論凡馬刀瘰癧一切結核用破舊琉璃煅存性為末每服二錢取微汗此物乃羊角製成能療節中結氣佐以養血和榮清熱解毒之品標本並治乃佳散結湯熟地當歸白芍川芎丹參丹皮柴胡桔梗元參白蘞各等分水煎沖琉璃末同服頸上癧瘡舊琉璃燈燒灰菜油調搽神效長明酒種福堂方治痔漏神效用積年舊琉璃燈洗淨油膩火煅研細以紅酒服四錢不過七日管自退去治遍身漏醫宗彙編云驗過良方用陳年琉璃底三錢人指甲麩皮炒一錢象牙末一錢辰砂一錢蟬蛻去土五分沒藥去油八分白礬八錢如漏在上身加川芎六分在下身加牛膝六分共為細末以黃臘三兩溶化入前藥和勻衆手急丸如緑豆大初服七八丸每日加一丸至十六七丸止無灰好酒送下上身飽服下身飢服最忌雞及一切有蔥之物油胭脂藥性考油胭脂平豕膏合就潤膚𦙑裂活血點痘西北風高塗舒面皺不龜手藥古名非謬一名碗兒胭脂用小錫碗盛故名色紅潤如膏百草鏡製造油胭脂法紅花汁一杯白蠟二兩微火熔化攪勻傾於磁盤內待成薄餅用碾麵杖碾數百遍則膠黏如膏藥矣假者系胭脂腳所造不入藥活血解毒治痘疔塗蜂咬王氏準繩同珍珠末塗治痘瘡燕窩疔救生苦海痘初起時預免壞眼用臨清濟寧好油胭脂點眼大眥普濟方有四聖丹治小兒痘中疔或紫黑而大或黑壞而臭或中有黑線此痘十死八九惟都御史得祕傳此方點之最妙用豌豆四十九粒燒存性頭髮灰三分珍珠十四粒炒研為末以油胭脂同杵成膏先以簪挑破咂去惡血以少許點之即時變紅活也乳頭破裂油胭脂蛤粉水飛敷之不用蛤粉亦可治疹子眼眼科要覽用雞膽將油胭脂調勻塗上雖眼突出能好無雞膽用田雞膽代之亦可木套皮古為屐今名木套治血風瘡救生苦海用木套皮燒灰東丹礬各一錢為末菜油和搽火漆火漆乃造胭脂紫梗水以染脂胚所漉之渣滓也紫梗本名紫鉚出波斯真臘南番等處有小蟲如蟻緑樹枝造成正同造白蠟一般吾杭造胭脂者藉以染制然第用紫梗一味則色不能紅必須配以黃葉水同煎色始紅豔其所餘之渣則火漆也入藥只須研極細用之中有枝梗不受研者篩去物理小識火漆一名紫膠治血崩救生苦海火漆不拘多少入無油淨鍋內令化炒黃烟淨見白烟起退火取出研末空心時好酒和服三錢重者不過三服腸風下血不藥良方火漆三錢研細末以豆腐皮分包作三十包白滾水送下至重三服即愈九種心痛神方考用火漆一味燒灰存性每服一錢送下即愈七氣罌瓶此乃人家屋檐脊上用壓鎮不祥者以七小壇橫疊相聚如七星狀外以灰泥黏覆入藥用年久者王子接絳雪園方罌小口瓶也七氣者日月風雨露霜雪也七罌人家多置古屋上廣漢前上層生瓶年深者良火土結成堅剛性利復借天之七氣能透骨入髓理傷續絶入藥取純鋼銼生銼末研至無聲水飛用慈惠編接骨七釐散中用朝天寶即人家屋上瓦將軍前小瓶也愈久愈妙必要取其朝天之得精華者研末入藥用接骨丹絳雪園方七氣罌口銼末水飛一錢古文錢有半兩五銖自秦汗鑄紅銅者佳唐時開元錢亦可用火煅醋淬七次研至如塵粉無聲為妙用五分與罌末和勻每服七釐先用甜瓜子仁去殼三錢嚼爛吐出拌藥再服下清酒過口此方用七氣罌口古文錢功專腐蝕壞肉陳藏器云能直入損處焊人斷骨甜瓜子仁開腸胃之壅遏通筋骨之機關因丹藥釐數微甚助以入胃轉輸為丹藥之響導也紅毛曷白褐附紅毛曷乃毛布今名褐子西人多以牛羊毳雜織而成以茜草染則色紅治疳瘡醫便用紅毛曷燒灰存性五錢樹上自干桃子燒灰存性五錢爐甘石火煅黃色童便淬七次二錢五分共為細末臨搽入片腦少許其瘡先用椒蔥湯洗淨再搽藥三次即愈血崩醫便六合散治血崩不止諸藥不效用此立止此急則治其標也杏仁皮燒存性香附童便浸三日炒黑舊紅毛曷子燒存性地膚子炒舊棕薦燒存性壯血餘燒存性蟹殼燒存性陳蓮蓬燒存性共為末每服三錢用酸漿草汁一鍾衝上熱酒一鍾空心熱服按此方初服反覺多以漸而少由紫色而紅以至於無即止既止之後用十全大補湯二十劑調補方斷根矣走馬牙疳祝氏效方黃蜆殼煅存性研末一錢五分黃連忌鐵器為末五錢栝蔞根膽礬煅五穀蟲要尾全者佳瓦上煅存性紅毛曷燒存性以上各五錢為末加冰片二分和勻先以米泔水漱口連吹數次即愈吹後仍用泔水漱口淨去治臍血臍濕救生苦海用紅毛曷燒灰油和敷或用裁衣店中百家碎五色布燒灰摻之清香散治癖疾生牙疳潰爛臭穢萬病回春用乳香沒藥孩兒茶輕粉炒象皮炒灰象牙焙黃紅毛曷炒灰珍珠焙黃海巴焙乾各等分為細末搽患處立時止痛生肌如神白褐治小兒牙疳集驗方銅緑水飛雄黃水飛五倍子炒焦枯礬白褐燒存性烏梅肉炙乾細辛去葉蘆炒焦胡黃連炒焦共八味各等分用老茶葉蔥根煎湯以雞翎洗去腐肉見鮮血然後用此藥搽上罾布粵山録出新安南頭罾本苧麻所治漁婦以其破敝者翦之為條縷之為緯以棉紗經之煮以石灰漂以溪水去其舊染薯莨之色使瑩然雪白布成分為雙單雙者表裡有大小絮頭單者一面有之絮頭以長者為貴摩挲久之葳蕤然若西氈起絨更好或染以薯莨則其絲徑爽可為夏服不染則柔以禦寒粵人甚貴之亦奇布也小兒服之可辟邪魅舊帽沿治疳毒外科正宗下疳用油透羅緞舊帽沿燒灰杭粉瓦上煅黃色等分研極細先用紅棗十五枚甘草三錢煎湯洗後摻之金瘡集驗方用舊氈帽油口沿燒灰摻之愈綿珠綿有木棉絲棉二種惟絲綿制服則有珠新制衣每每有絲珠透出衣外周履靖群物奇制云伏中裝綿布衣無綿珠秋冬則有以燈草少許置綿上則無珠也入藥用舊衣內綿珠取其襲人氣既久其新衣透出衣外綿珠無用也治蠍虎咬香油調塗神驗紅絨治稱勾瘡此症小兒月內糞門上忽有瘡孔即此症也救生苦海用紅絨燒灰二錢珍珠五分輕粉五分兒茶二錢血竭一錢乳香一錢為末乾摻棉紗養素園方此乃草棉花所紡線也吳松人以之織布名曰棉紗本色者白或染藍靛作青色為婦人縫紉之用古用木棉今用草棉綱目服器部有棉乃絲棉故從絲性平能透斑疹傳信方風疹斑瘄出不透快用白棉紗二兩柳柳一兩共煎湯浴之避風頃刻透發無柳柳以櫻桃核代之亦可煎服藍棉紗此乃經靛染者煎湯解毒與藍汁同功舊頭繩百草鏡俗名扎根乃婦人以之扎發入藥取油透棄去者良綱目有巾及繳腳布而無此治紅絲疔蛇傷扎束肉上能令毒氣不透小兒一切頭瘡秦中用云燒灰油塗立愈治難産經驗廣集用婦人舊頭繩一條燒灰加人參一兩煎服不論橫生逆生服之順流而下矣神奇不可思議北雁砂出關東緑豆色如珠顆粒擲碗中有響聲者真明目治一切眼病洪清遠方用明目砂五分用針刺入紅者佳北雁砂三錢再用羊肝一具連膽不落水刺開數路不要剖開將二味砂為末入肝內以無灰酒二斤蒸熟煎剩二碗空心一服晚飯後一服以儘量為度羊肝配之一服完不論眼病內障外障黑暗不明無不神效烏金紙皮金紙江浙造紙處多有兩面黝黑如漆光滑脆薄不中書畫惟市鋪用以裹珍寶及藥物作襯紙又呼熏金紙以其燻黑捶砑而光也物理小識造金箔隔碎金以藥紙揮巨斧捶之金已箔而紙無損紙初褐色久則烏金色魏良宰云烏金紙惟杭省有之其造紙非城東淳右橋左右之水不成其法先造烏金水刷紙俟黑如漆再熏過以捶石砑光性最堅韌凡打金箔以包金片打之金成箔而紙不損以市遠方價頗昂值蓋天下惟浙省城人能造此紙故也治下疳集聽用烏金紙銅杓內炒末加冰片少許塗復明散陳嘉木眼科要覽專治翳膜遮睛瞽者亦可復明用七八歲童子口中吐出蛔蟲一條用竹刀剖開清水洗淨將新瓦以炭火焙乾勿焦研極細末烏金紙包好再用硼砂四兩將蛔蟲包藏其中一七日取出以骨簪蘸藥點眼一日三次後將骨簪腳撥去眼中翳膜熱水洗之少頃又點點完此藥無不重明皮金紙又名羊皮金出廣東凡金箔店皆有售者呼皮金紙治跌撲擦傷釘鞋打傷足跟病久蔭瘡擦痛並凍瘡足跟𤺄爛流水凡小擦傷刀傷腫潰紅赤皮光潮濕皆效看患處大小以此翦取將金面貼傷處過宿即愈毛世洪養生集舊傘紙綱目有桐油傘紙只言治蛀干陰瘡及疔瘡疔汗而已無他治法今補之治纏腰丹急救方用舊傘紙燒存性為末香油調敷對口瘡祝氏效方淡底白色者佳一兩陳傘紙燒灰五錢將烏梅肉一兩先打爛入末再加生桐油搗勻敷患處漸愈發背立效方周氏家寶千年石灰研為細末鐵杓內炒紫色傾出磚上待略冷微有熱氣不可太冷太熱三錢大川芎研細末二錢和勻入真麻油五六點用井水或河水調服遍身大汗出即散矣若遇惡瘡可加黑傘紙灰三分照前服臁瘡蔡育晉方用人家蓋牆頭舊傘須多年經霜雪者取傘衣依瘡大小翦成一塊上用木針刺洞貼上三日另換一張每日翻貼貼上三張即愈集聽方臁瘡以輕粉豬骨髓研勻攤舊傘紙上貼之周氏家寶諸瘡隔紙膏臁瘡經驗膏隔紙膏胱身隔紙膏俱用舊傘紙夾藥貼包烟紙此乃烟鋪內包烟外一層厚白紙系石灰槽浸造灰氣未去紙亦不韌只可包烟用名建紙近人食烟以其紙擦烟筒頭咀令銅潔白可擦錫器武原朱進士醒葊言北方朝士多貯此紙每日清晨盥頮後以之拭面久之能轉黝為白令光發如玉拭面去黝䵟汗斑美容顏發光豔粗草紙廁草紙此乃稻草所造南貨店以之包物有厚薄二種厚者名銅板草紙入藥用發疹瘄百草鏡折角草紙半張南貨店包物厚者是也煎服較柳柳尤透發小兒臍瘡不藥良方急用大草紙燒灰敷之則不致變瘋癇或加枯礬或再加龍骨燒灰等分入麝香少許撒之腸風下血不藥良方粗草紙燒灰砂糖拌勻開水服貝母團經驗廣集治羊兒瘋百發百中用川貝母去心一兩研粉用羅篩過鋪大草紙一百張一層草紙篩一下百張草紙篩百下然後用線縫之入四碗水煮乾每清早取一張紙成團煨過滾湯泡汁飲之服盡痊愈神妙無比廁草紙此乃坑廁中拭過糞草紙棄於地者同壽録云傷寒內有一症名咯蒂傷寒非用此不能除也覓此紙四十九張燒灰為末水二碗煎一碗去渣飲之效酒罈上紙此乃蓋封酒罈口上紙陳久者佳以其得酒氣多黴爛不堅韌又脫去灰性也治皮膚間忽然血濺出同壽録用此紙碎扯如楊花攤於血出處即止燒酒草此即燒酒罈頭泥中之草慈航活人書有此一種入藥故補之治翦刀風活人書云其症腰生紅瘰如物纏緊作痛用針挑出血取此草加鹽擦出汗即愈古瓦綱目土部有烏古瓦不言治癤毒治小兒生毒救生苦海已成形者用多年古瓦研末用細茶葉煎極濃汁和敷留頭即散蟺拱癤用瓦片火煅醋淬七次為末菜油和搽消渴用舊屋上瓦兩片洗淨捶碎以水煮濃汁食後溫服一小盞同壽録青龍背龔廷賢回春云鍋蓋面上垢膩名青龍背可治瘰癧潰爛久不愈者用此入烏龍膏治之烏龍膏木鱉帶殼燒存性去殼側柏葉焙人中血即亂髮也燒灰青龍背紙錢灰飛羅面各一錢俱為末好陳米醋調成膏塗瘡上外用紙貼絹篩籮今呼篩子有馬鬃織作底者有絲絹作底者入藥以絲絹者良治過月難産彙集有急救過月難産仙方用陳篩籮底一個捲筒燒碗內與産婦服即下如産生之兒身上皆有羅其驗如神陳年竹燈盞治多年陰陽諸癬救生苦海用陳竹燈盞油透者入尖底瓶內瓶口安一鐵絲髻將地挖一土坑內安大碗一隻將瓶倒覆碗上瓶底朝天周圍用礱糠填滿燒之取滴下碗中之油搽之效驗文堂驗集治癬多年油竹燈掛一個火上烤出油汁如膠者良另將五倍子去蟲炒研為末二味和一處用陳醋火上溫熱和勻搽之甚效臘梨頭瘡張子卿祕方集驗以酒飯店油透陳竹燈臺一個劈碎裝於瓷瓶內口上用舊髻鐵絲覆於瓶上倒轉下再用一空瓷瓶以此瓶合於下瓶口上用火煅之其汁溜下取汁搽瘡其效如神腦漏百草鏡竹燈絡子十年者須覓鄉村中有油垢者勿淨煅成炭伏土存性研細每用一二錢包豆腐皮清晨滾水吞下陸續服盡自愈腸癰肚癰神效方便易良方云右腳拘急是腸癰左腳拘急是肚癰取數十年舊油印竹燈臺俗名善福以一隻燒半過不用水息悶合成灰研為細末陳三白酒沖服二錢或三錢即愈王站柱不藥良方云此藥又治肺癰極神方銅燈盞青即盞內之油垢起銅緑者入藥良治燕窩瘡救生苦海本名髮際瘡生頭枕骨下發盡處以銅燈盞內青垢刮下研爛擦之如神料絲物理小識滇金齒衛用瑪瑙石英屑汁以北方天花點之乃凝練為絲以作燈近日丹陽松江皆能作料絲李西涯書作繚絲大內青瑣即此物磨漿能止血破血烏龍翅汪連仕草藥方烏龍翅即焦火把零落泥土中經霜雪者佳治足爛至凶者燒炭油搽燒斑痧淬神鬼箭神效船篷箬治耳內腫爛脹痛救生苦海用多年船篷箬燒灰存性加冰片少許研細吹入洋船璞此乃海船底中間有櫬木舟人名曰龍骨藥生其間形如菌菌干之入藥治胃脘疼痛按潘子恆廣菌譜舵菜即海船舵上所生菌也不可多得果爾則宜入蔬部留以俟考櫓箍治奶串毛世洪經驗集凡乳癰串爛年不愈洞見內腑深陷不愈者取搖船之櫓上首手捏之處舊藤箍翦下以陰陽瓦上熯末竹管扎繃篩日日摻之如干處以香油調搽不過半月痊愈漆盤上漆治羊眼漏救生苦海此症生足脛骨上生一孔無膿無血惟流清水大痛用多年漆盤刮下漆燒灰摻之愈油木梳木梳以木製成用以通發黃楊木者能清火石楠木者理風其器以此二木造者為最余雜木及駝骨牛角等梳不入藥或曰牙梳可辟邪皂角木梳不䐈發柏木鉛梳皆能烏髮總不若常用黃楊石楠二木為佳也綱目梳篦合一不分所載治法亦夥惟油梳尚遺其功用因補之治肺痿救生苦海油木梳須二三十年者一個燒存性滾水和服甜酒亦可治五淋同壽録以多年木梳燒存性空心冷水調下男用男梳女用女梳神效拗頸海上名方此病俗呼落枕乃頸項夜間誤落枕下或偶被閃挫血滯而強作痠疼以舊油梳火上烘熱梳背於疼處極力刮之自愈誤食螞蝗俞潛山云曾誤食此腹中作瀉不時疼痛瀉血以黃土漿水他藥拭之多不效有教以取多年舊油梳燒灰酒調服一夕蝗皆化水而下真神方也衣帶治蛇纏救生苦海用繫腰帶煅存性研細和好醬塗或加水龍骨和柿漆水塗刀鞘治中惡腹痛救生苦海用刀鞘燒灰水服舊竹箸治蜈蚣傷救生苦海將小頭燒過伏土取少許研細敷之立愈草鞋鼻上布綱目屐屧鼻繩下有草鞋鼻無取布法亦不知其有發瘄之功今補之治兒患瘄疹不發取破草鞋鼻上所袞之布七八條煎湯服立效如神周寶生醫通織機上草辮楊春涯驗方治白蛇纏此物以陳為好燒灰存性麻油調搽紅蛇纏亦治肉臺上屑綱目故木砧條列几上屑止言治饞瘡唇耳等瘡乾霍亂蟲牙等症急救方言其治手毒如神因急補之治手掌連虎口邊腫毒用豬肉臺上刮下木屑如膏作餅貼患處即愈吐血慈航活人書醃臘肉店中切肉木墩上刮取肉垢火上燒枯勿令成白色存性研末酒沖服狗咬楊春涯驗方刮取切肉墩上油垢和沙糖拌敷神效盛米栲栳爛籮底治血臌楊春涯驗方用二三十年盛米栲栳一隻擊碎煎湯服一二次即消爛籮底此乃人家盛米竹器浙人呼為淘籮以竹絲織成用以淅米者舊者多用以貯柴灰淋水洗衣年久則爛截經同壽録云婦人行經不止服此可截用頭紅花爛籮底爛八搭草鞋鼻子蓮房此四味俱燒灰存性共為末每服一錢黃酒送下不過三服其紅立止砂壺出宜興紫泥者佳入藥吸毒用取其口光滑而薄不傷肌肉也治傷寒不出汗用吸法以二砂壺各盛燒酒八分重湯煮滾將酒傾去即將壺口對臍上合住使吸之緊輪換汗出即愈瘰癧破爛拔毒法將先破處麵糊作餅貼上用小砂壺二個燒酒煎滾去酒以熱壺口覆於麵餅上熏瘡如拔火壺一樣壺冷又易一壺如此數次將毒氣拔盡即愈熏後用豬膽熬成膏貼瘡口此方神效治獸蟲咬傷並風寒一切毒用砂燒酒壺二個盛大半壺燒酒先以一壺火上令滾無聲傾去酒即按在破口上拔出汙黑血水滿則自落再以次壺仍按瘡上輪流提拔以毒盡為度俱見經驗廣集按王站柱不藥良方治瘋狗咬傷用砂壺吸法與此同吸後再拔去頂上紅髮即愈靈鶴盞李金什曾客淮南言山陽一帶洲渚皆蘆葦産鶴多卵育於中村人有能識其期者俟鶴下卵後竊歸入鍋煮熟急以涼水沃之看卵殼不熱復置其窠鶴不知而尤煦伏之過三七日其卵中黃白復鮮如故又竊之歸急煮而又納窠鶴又伏之如是者三次則鶴卵外殼厚如紫玉而杯成矣復竊之歸鋸去其頂外則鑲飾金玉令成杯形名靈鶴盞注酒其中輒有小鶴影浮酒上云食之益壽延年且能治心疾不易得有市者價亦不資安神魂定心悸小兒用之除驚癇孕婦用之養胎稀痘出外帶之闢蛇蠱及一切毒花簪楊春涯驗方治乳癰初起時將女人頭帶花簪對向日中打圈口中默念天上一朵黑烏雲地下女子害乳疼我今特授金簪上金簪化去永不疼如此七遍將簪交付婦人圈患處即好小兒破鞋接骨家寶方用市鎮上乞小兒破鞋一隻燒灰白麵等分好醋調成糊敷患處以絹束之杉木板夾好須臾疼止骨接有聲為妙夏布舊蚊帳江西麻布染藍入夏作蚊帳名夏布今人以此舊帳作漆器坯最佳治走遊風王化九簡便方用青夏布舊蚊帳燒灰存性麻油調敷如再發再敷陰奇癢難忍不藥良方用青夏布舊蚊帳燒灰存性麻油調搽即愈廁上椽木尿板此即毛坑上椽子多年為糞熏漬其解毒之功不下糞清也治紅絲疔敬信録紅絲疔先將針挑斷其絲將多年糞坑上碎木椽子煅灰研細用飴糖拌塗留頭疔即拔出尿板治手足瘡無力不能收口家寶方用多年尿浸爛白色木板煅存性為細末加冰片摻之立時收口白秋霜萬表積善堂方白秋霜即多年糞缸底結成白霜須經風雨者入藥炭火煅紅醋淬九次用綱目人部溺白垽為人中白乃溺垽也且所列主治及附方皆無接骨治傷之說特補其缺治跌撲損傷閃挫骨傷極重者研極細末每服五分好酒調下萬表陳海曙云凡多年廁坑底石板背後有白胎如雪結其間鑿取微有穢氣陳久亦無然糞力透石故其精華凝聚於此能清火毒王聖俞云一名糞霜曾見小兒瘄痘初愈者忽然肺燥咽乾唇裂目中出火滿面紅赤此火毒壅遏未化滯於上焦每服此藥一二錢不數日全愈敏按蔣儀藥鏡云泥宿糞坑之底疔腫發背止痛當塗而霜又其精華也大抵清火解毒功用亦不甚相遠禽部十五種附八種燕窩素燕窩一名燕蔬菜從新云出漳泉沿海處有之乃燕銜小魚春壘之窩中人取之閩小記云燕取小魚黏之於石久而成窩有烏白紅三色烏色品最下紅者最難得能益小兒痘疹白色能愈痰疾泉南雜志閩之遠海近番處有燕名金絲者首尾似燕而甚小毛如金絲臨卵育子時群飛近沙汐泥有石處啄蠶螺食之蠶螺背上肉有兩筋如楓蠶絲堅潔而白食之可補虛損已痢癆症此燕食之肉化而筋不化並津液嘔出結為小窩附石上久之與小雛鼓翼而飛海人依時拾之故曰燕窩也似此則形狀功用時候族類俱有可信嶺南雜記燕窩有數種日本以為蔬菜供僧此乃海燕食海邊蟲蟲背有筋不化復吐出而為窩綴於海山石壁之上土人攀援取之春取者白夏取者黃秋冬不可取取之則燕無所棲凍死次年無窩矣香祖筆記燕窩紫色者尤佳崖州志崖州海中石島有玳瑁山其洞穴皆燕所巢燕大者如烏啖魚輒吐涎沫以備冬月退毛之食土人皮衣皮帽秉炬探之燕驚撲人年老力弱或致墜崖而死故有多獲者有空手而返者是為燕窠之菜粵録海濱石上有海粉積結如苔燕啄食之吐出為窩纍纍巖壁之間島人俟其秋去以修竿接鏟取之海粉性寒而為燕所吞吐則暖海粉味鹹而為燕所吞吐則甘其形質盡化故可以清痰開胃云凡有烏白二色紅者難得蓋燕屬火紅者尤其精液一名燕蔬以其補草木之不足故曰蔬榆肉産於北燕窩産於南皆蔬也宦遊筆記燕窩出南海日本諸國春間取者色白為上秋間取者色黃次之一種微黑而多毛是揀擇所遺者價亦不能廉怯症人久服之亦能潤肺止嗽功等參苓查浦輯聞南燕歸海外水邊難達因啄小魚肉作窩口銜之而飛飛倦即投窩水中棲止其上少息復銜之而飛故東南風則飄掠近岸人就取之阮葵生茶餘客話許青岩松佶方伯語豫云燕窩産海島中窮岩邃谷足力繩竿之所不及估舶養小猿猴善解人意至山島間以小布囊系猿背上縱之往升木深岩盡剝塞囊中而歸猿之去也苦不得食三數日始返海客以果餌充囊中俾之遠出不飢拙者出即剝塞囊中歸而傾囊不過數片為果餌占地也其黠者將果餌傾岩竇間剝塞滿囊盡燕窩矣空而復去尤為便捷猿一值數百金價數倍於拙者云許謹齊黃門每晨起食蔗漿燕窩一巨觥以融軟為度謂他人皆生食也終日不溺味甘淡平大養肺陰化痰止嗽補而能清為調理虛損勞瘵之聖藥一切病之由於肺虛不能清肅下行者用此皆可治之開胃氣已勞痢益小兒痘疹可入煎藥或單煮汁服從新云今人用以煮粥或用雞汁煮之雖甚可口然亂其清補之本性豈能已痰耶有與冰糖同煎則甘壅矣豈能助肺金清肅下行耶物理小識燕窩能止小便數逢原云甘平無毒鳥銜海粉作窩得風日陽和之氣化鹹寒為甘平能使金水相生腎氣上滋於肺而胃氣亦得以安食品中之最馴良者惜乎本草不收方書罕用今人以之調補虛勞咳吐紅痰每兼冰糖煮食往往獲效然惟病勢初淺者為宜若陰火方盛血逆上奔雖用無濟以其幽柔無剛毅之力耳張石頑云暴得咳嗽吐血乍止以冰糖與燕窩菜同煮連服取其平補肺胃而無止截之患也惟胃中有痰濕者令人欲嘔以其甜膩戀膈故也食物宜忌云壯陽益氣和中開胃添精補髓潤肺止久瀉消痰涎嶺南雜記紅色者治血痢入梨加冰糖蒸食治膈痰何惠川云翻胃久吐有服人乳多吃燕窩而愈者老年痰喘文堂集驗方用秋白梨一個去心入燕窩一錢先用滾水泡再入冰糖一錢蒸熟每日早晨服下勿間斷神效噤口痢救生苦海白燕窩二錢人參四分水七分隔湯頓熟徐徐食之立效素燕窩月湖筆藪近時素食中盛行一種素燕窩寧波洋行頗多形白而細長空心虛軟儼如食鋪中饊子而細有七八寸至尺長不等望之晶瑩握之輕虛每三十餘枝作一束廚人買得湯沃之即起脹蕤蕤然凝白類官燕以入素饌為珍品食之亦淡而少味不知何物造成或曰糯粉山谷為之何以見沸湯反脆美或曰銅鉛之苗産海外深山食之可明目近日始知有用者不知然否附記俟考北硯食規有制素燕窩法先入溫水一蕩伸腰即浸入滾過冷水內俟作料配菜齊集另鍋制好笊籬撈出燕窩將滾湯在笊籬上淋兩三遍可用軟而不糊半燘用解食烟毒石燕粵語産西樵巖穴中大如乳燕足生翼末綱目石燕條引日華子本草無治疳之說今廣人用之頗驗故補之治兒疳小兒羸瘦取食即愈諺曰嬰兒瘦探石鷇即此蝙蝠腦李氏蝠腦丸中用之治癰疽內陷服之能令毒不攻心石鍤張氏日鈔乃大鵬之精也鵬獨運無雌海靜不波之日見影在下以為雌也其精溢出墮土上為土鍤木上為木鍤惟石上為不失本性最佳或墮水中以婦女衵衣投水自能躍出按石鍤乃慎恤膠之類浸酒服壯陽令人有子以姜酒解之鸕鷀涎蛋鸕鷀形如鵝而色黑麵紅俗呼摸魚公水鄉人家多養之以捕魚十月後飼以狗肉則身暖不畏寒雖破冰入水亦不𤻎死治腎咳俗呼頓嗆從小腹下逆上而咳連嗽數十聲小住又作甚或咳發必嘔牽掣兩脅涕淚皆出連月不愈者用鸕鷀涎滾水沖服下咽即止蛋能打胎有不欲留孕者取一個白水煮服胎即化為血水從小便出多則二服無有不驗翠鳥舌翠鳥即魚翠也其舌大而可用綱目魚狗下只言其肉可治魚骨哽而附以翡翠亦云方書無用此者其功效大約相同今為補其舌之用針頭風集聽翠鳥舌一個以桐油浸曬乾又浸又曬硬如三稜針方病發時將鳥舌於頭上亂針即愈白鵺雞珍異藥品文首白翼黃足治嗌痛郁雞珍異藥品出廣中孫硤川云此物在山中多食鬱金苗故肉鬆脆解鬱散結氣豁雞出廣中雞頭而烏喙色黃腹毛純黑尾長下垂嗚聲豁豁性嗜蛇其哺子時取雛折其兩足乃以蛇飼之三日即復屢折屢復捕食之能治骨節折傷雪雞生西陲千百成群棲止雪中西域聞見録喀什噶爾雪雞群飛極肥美人以為食惟性燥耳入藥雄者良暖丹田壯元陽除一切積冷陰寒痼癖之疾較雪蓮尤效洋鴨朱排山柑園小識洋鴨種出海洋形如鴨紅冠群羽馴而善飛雄者重至十斤雌者如常其性淫雌雄相交日必四五次故房術用之卵大如鵝子味極美以母雞伏之約一月餘則雛出矣雛極易長大助陽道健腰膝補命門暖水臟烏鴉膽此乃慈烏之膽浙東最多悉體肥黑而大所在多有豫門人奉化徐朋圭居白岩其地山僻徑幽古木叢雜言其土人有取鴉膽者云烏鴉膽汁晝則散注身目故精聚而能見烟霄外物夜則汁歸於膽取之法須伺鴉夜睡時乘其罔覺以利刀斷其頭急剖腹取之膽汁全飽並無漏溢然後以線穿陰乾入藥用若取之不得法或鴉被驚覺縱殺得其膽亦空皮無汁不堪用明目開瞽功勝空青點青盲最驗解藤黃毒爛弦風眼及醫障不藥良方烏鴉膽點之即愈鵝毛屎涎蛋殼腿骨喉管綱目鵝下載其毛治射工毒通氣闢癇開噎其屎治小兒鵝口蒼鵝者可敷蟲蛇咬而不知毛可治癰屎更治犬咬悉為補之治癰毒集驗方用鵝毛煅灰一兩明礬二兩研末麵糊為丸每服二錢好酒下大麻風赤水元珠參毛丸治大麻風神效苦參一斤鵝毛八兩煅存性為末陳米糊為丸桐子大每服五十丸酒送下一日二次神功至寶丹王秋泉家傳祕方專治男婦溜膿肥瘡膿窠瘡臘梨頭遍身風癩癮疹疥癬瘙癢異常麻木不仁諸風手足痠痛皮膚破爛陰囊癢極並婦人陰癢濕癢酒丸散擦藥洗貼如神隨病上下茶湯送下日進二次戒暴怒房勞炙煿發毒之物苦參一斤為末鵝毛香油炒存性六兩黃米糊丸硃砂為衣此方與元珠治大麻風所用大同小異因並存之按鵝白者能疏風瀕湖謂其氣味俱厚發風發瘡莫此為甚而駁韓𢘅醫通以為疏風大誤殊不知鵝能發瘡生濕火熏者併發火毒宿疾害誠有之而疏風之功亦不可盡誣至其毛與肉則性尤不同本經逢原云昔人治癘風方中取純白鵝通身之毛及咀足之皮與肫肝內皮固濟煅灰存性和風藥用之為風藥之響導也然不可遺失一處遺一處即不能愈又不可用雜色者若有一處色蒼風愈之後其處肌膚色黑正取其疏利而不燥能和風藥之熯烈而不用蒼色者以純白鵝無毒耳絶胎方保和堂祕方用血管鵝毛燒灰百草霜各一錢行經後酒調下終身無孕又周氏家寶方用鵝毛一把煅細茶煎湯經後服永不生此二方雖存不可輕用寶生論有受打不痛法用血管鵝毛七根地龍七條煅過同乳香白蠟為丸好酒送下治瘰癧初起傳信方白鵝大者二隻取周身毛翎並口腳黃皮新瓦焙焦為末分作十服每日食後服之服完即愈治腫毒救生苦海用血管鵝毛一握銅鍋炒焦腐皮包裹酒吞下即內消初起者效諸腫毒痛甚有膿即潰無膿即消用鵝毛燒灰一兩雄黃三錢川烏草烏各錢半黃蠟熔化入前藥為丸每服一錢好酒送下嚴氏方諸毒內消方吳涵宇用鵝毛二個炒蜈蚣十條醋炒穿山甲一兩炒殭蠶一兩炒全蠍五錢洗廣膠二兩炒桑黃二兩炒羊角屑二兩炒共為末每服三錢砂糖調好酒下以醉為度發背疔瘡對口風毒醫宗彙編穿山甲蛇蛻蟬蛻蜈蚣俱為末鵝毛全副燒灰存性全蠍血管雞毛二翅燒灰人指甲用十分之一敗龜板一個殭蠶俱為末每用一錢酒下誤吞銅錢及鉤線慈惠方用鵝毛一錢燒灰磁石皂角子火煅象牙一錢燒存性為末每服五分新汲水下艾火帶乃炙火所傷爛痛不可忍同壽録用雉雞毛同鵝毛燒灰敷之效喉𫋂癬傳信方用鵝毛灰三分兒茶二錢牛黃三釐雄黃一錢人中白一錢半煅存性如吃深加珍珠煅存性一分為末先將生桐油探刷一番後用藥吹入加膽礬更妙鵝屎救生苦海治犬咬以鵝屎敷之不爛痛鵝涎綱目只載治咽喉谷賊今人治小兒鵝口瘡甚效鵝蛋殼急救方癰疽無頭用新生鵝蛋殼燒灰存性為末醋調敷立出膿血妙鵝腿骨奇效方犬傷日久發者用鵝腿脡骨煅存性研末摻之鵝喉管家寶方治喉症用鵝喉氣管一個陰陽瓦炙黃色冰片一分共為細末吹二三次愈治赤白帶家寶方取鵝水喉管煅存性研末酒調臨臥服之鷹吐毛鷹條百草鏡鷹每日食雀時連毛與食肉化而毛不化聚成一團如芡實大次早吐出收用入藥綱目有鷹毛無吐毛故補之按鷹稟西方兌金之氣其性猛烈而竄捷故余居士以其頭治眩暈王燾以其糞治食哽皆取其得庚辛鋭氣一往無滯反胃之症食而復吐久積於胃不能運化故旋出大概由於憂鬱者居多取此復吐之意而又得其爽猛之性為治其義精矣治反胃煅存性研醫方集聽查將軍家傳噎膈方用牙烏灑出毛肘即鷹吐鳥毛也要七個不可落地用布接在架中微火熯燥為末服之營內凡喂毛肘但在下午次日天明即吐出最易得不可使肘落地落地則不驗鷹條本經逢原云鷹屎中化未盡之毛謂之鷹條入陰丹陽丹用不特取其翮之善脫以治難脫之病並取屎中未化之羽以消目中未脫之翳可謂妙用雄雞卵茅昆來云雞本南方積陽之象於卦為巽五更則日臨巽位故嗚凡鳥雌卵而雄否惟雞則雄者間亦生卵乃陽極而陰乘之其卵較小於雌雞卵殼堅如石殼色微紅入藥妙用可安胎稀痘王緘秋燈叢話古北口叭噠嶺有喇嗎令巡檢張某市雄雞卵張笑曰雄雞焉能生卵故相難也曰非也俗有斯言即有斯物第覓之可得也張漫應之語其役役曰聞前村民畜雄雞連生三卵衆以為不祥嫗異而藏之命役取送喇嗎收其一給價五十金張詢所用曰能醫眼疾年遠瞽者得其汁點之即復明與空青同陳藏器本草今雞有白臺如卵而硬有白無黃云是牡雞所生名父公臺二申野録成化二十三年吳縣湯惟信家雄雞生卵平湖縣志萬曆四十八年四月施太史家公雞生子形如雀卵色紫史異纂天啓二年陝民王進榜白雄雞生卵三岡識略壬申二月二十九日提標左營韋元鼎廨中雄雞連生二卵述異記康熙甲戌十二月松江吳南林家雄雞生卵大如鴿蛋殼甚堅厚椎破之亦有黃白白如凝脂不散黃帶赤色質直談耳嘉定湖南村民錢嵩家雄雞生卵與雌無異乾隆壬寅夏間事紀曉嵐先生云雄雞卵大如指頂形似閩中落花生不能正園外有斑點向日映之其中深紅如琥珀以點目眚甚效德少司空成汪副憲承霈皆嘗以是物合藥然不易得一枚可以值十金阿少司農迪斯曰是雖罕睹實亦人力所為以肥壯雄雞閉籠內縱群雌繞籠外使相近而不能相接久而精氣團結自能成卵此亦理所宜然然雞秉巽風之氣故食之發瘡毒其卵以盛陽不泄鬱積而成自必蘊熱不知何以反明目本草之所未載醫經之所未言何以知其能明目此則莫明其故矣汪副憲曰有以蛇卵售欺者但映日不紅即為僞託亦不可不知也敏按諸書所載雄雞生卵自古有之原非有異據陳藏器所說有白無黃而述異記所載則有黃有白想本間氣所生其形色亦無一定乾隆庚戌臨安慈聖寺有放生雄雞忽生卵日産其一如是旬余人以為異其卵較小色紫而殼堅為一錫匠索去豫時適館臨安聞而索之已無有矣錫匠徽人亦云其卵白可入藥故乞之歸里然此物又不特入藥李懷白先生云曾見喇嗎誦黑經用雄雞蛋川中鬼師有用雄雞蛋以行禳者白蓮教則又需以解魘迷術今人徒吒其異而不知天生此正所為世用也安胎稀痘開瞽獸部二十五種附二十種獅子油血糞辛溫有毒色微黑者真善透經絡凡用勿多沈良土云塗指甲上涼透指甲者真又方以黍許入沸湯湯即不沸者真逢原云獅為百獸之長性最難馴一吼則百獸辟易爾雅言其食虎豹熊太古言其乳入牛羊馬乳中皆化成水西域人捕得取其油入貢以供宮人滌除衣垢之用又能去紙上墨跡刮少許隔紙尉之即脫豫嘗試用垢雖去而衣易毀紙易脆僅供一時之用雖系方物方藥罕用近世醫者以之治噎膈病蓋噎膈皆郁疾瘀積所致用取滌痰之意試之輒驗由是方家爭為奇物但性最猛利力能墮胎孕婦忌用象油亦能去垢滌痰但不能去墨跡耳椿園聞見録溫都斯坦西域一大回國從葉爾羌西南行百日可到其國西隅有巨澤圍數千里澤中有山圍逾千里萬峰聳峙高入雲天或曰人間第一高山也名曰牽各里麻膽達喇斯山中産獅子於新月皎潔輒負雛于山中往來頭大而毛虯尾形帚黃質黑章如虎皮長六七尺時登山絶頂望月垂涎咆哮跳擲猛飛吞月有飛去八九里十餘里而墜死山谷中者其國人以豢養獅子為上戶每當秋月其汗使人取獅以精鐵作柱大如甕密布層遮圍畜之於中飼以牛時而吼如雷霆滿城震動人畜不寧取之法擇炮手之最精者開地為阱人匿其中遇有負雛者來乘其不備發炮斃之而取其雛倘一炮不中則拋山裂石而人無噍類矣張菉漪有此油云熬之可挑絲一二尺不斷他油則不及也陳海曙曾在京邸簡親王府見獅油堅如石絶如雞卵白潔可愛朱排山柑園小識獅子油白膩如豬肪氣味俱薄利小便凡人小便不通雖腹脹莖痛病在危急者以酒或白湯送下三四釐或半分即通嘗有一丐因受暑熱逐致小便不通每月一發發至二三日後莖痛如割至不可忍屢投繯祈死人以獅油少許投之片刻即通奏效之速無逾於此而本草不著其功用何哉豈當時未知用歟第虛祕者似宜酌而用之敏按獅油性最猛烈內服尤不可單用更勿多服嘉慶元年三月豫友邵某得獅油少許因病欲服之未果為一鄉人轉乞去市於人獲重價其人市得服半黍許夜半而死鄉人懼罪亦投水死蓋外用不妨內服尤宜審慎以人之腸胃太弱不任峻利之攻削耳消熱結治膈大小便不通救生苦海用獅油酒服二三釐自效獅血沈云將食物會纂獅血殺百蟲燒之去鬼氣獅糞王沂堂藏有獅糞一段用鐵匣盛之四圍以鐵屑養之其形至堅如鐵石磨之作紅色云非鐵屑養則易朽爛也治一切腿足下部惡瘡年久不愈者塗之即痂而落象糞象白象尾毛按象有家野二種京師者食俸料滇廣山産者食竹木雜草入藥以野象糞良京象糞銷皮坊皆多取濺黃貂黃狼能令毛黑如漆綱目象下凡牙肉睛皮膽骨俱入藥不及其糞為補之治鵝掌風以象糞燒熏自愈起死回生散李文炳經驗廣集治痘瘡至七八日忽然變黑收入腹內遍身抓破吭喘死在須臾服此從新另發出立可回生當歸川芎白芍生地升麻紅花上陷加白芷下陷加牛膝遍身黑陷加麻黃象糞微炒如一歲兒用二錢大兒用至三五錢上銼一劑水酒各半煎服從新發出腳下黑疔至七八日用針挑去以太乙膏貼之即拔去毒連進二三服瘟疹良朋彙集方治小兒大人出瘟疹回在心胸作喘發燒用象糞八錢升麻二錢水二鍾煎一鍾服即刻透出象白乃象交於水其精浮水面象房人用用瓷瓶收貯入藥敷面不皺亦可入房藥用象尾毛通雅云今人剔牙杖極重象尾謂可去火犴血孫含懿云有客自川中來帶有犴血言此獸乃星禽為天上井宿五百年一降於世以濟人其降也必於蜀降之前三日天乃大風振屋拔木為降犴風左右村落居民知犴必降悉遷避之求鐵工造蓮萼箭鏃如橄欖形而窪其中鏃上刻名以記犴降之日形如胡犬有鱗大十倍於象首必朝歲星蹲踞不動土人從其後射之矢集其身如蝟三日後乃去遺失於地各認所鐫以歸矢人無爭者其鏃頭有血一塊大如欖核可入藥土人亦甚珍寶之不輕售自明洪武時曾一降至今幾四百年所珍藥亦罕有存者縉紳舊族或有之亦寶同和璧矣治一切陰疽發背一切大毒凡癰疽必死之症無藥可救者每以一釐潰則敷膏外貼未潰則調酒服一夕自愈合治癰等藥一斤加入分許即奏效如神醉虎油膽脂三岡識略壬子正月初十日福山戍卒遇一醉虎縛獻王大將軍轅門將軍剖肉分贈郡紳之小兒食之可以稀痘按虎食人與楊柳及狗皆醉宦遊筆記載山人捕虎法云虎嗜食犬食之必醉如人中酒虎匿深谷峻嶺往來不時難尋其跡人以劣犬縛于山凹犬嗥不已虎聞聲而前果腹而醉不能遠去從跡犬血而捕之則無所遁矣此縛醉虎之法也主稀痘虎油物理小識虎一身皆入藥而本草未載虎油之功效愚於獵戶取其油以塗臘梨瘡一二次即愈亦可治大麻風藥性考虎油療禿塗狗咬傷五痔下血反胃酒嘗虎膽治打傷垂死飲食不進前後不通乃瘀血在心命在旦夕可用此方虎膽五分去外皮用老黃酒在碗內研細為末白茯苓二錢為末用熱陳酒調灌下出可不死矣虎脂治打碎頭骨蓋方用虎脂一兩浸好熱酒內俟化勻服之汗出為度如患處青者不治反胃不藥良方虎脂八兩清油一斤瓦瓶浸一月密封勿令泄氣每以油一兩入無灰酒一盞溫服以瘥為度油盡再添按虎膽虎脂綱目雖載其用而未及入折傷料之用此二方出錫山華氏經驗録並屢試有效故補其說以濟急鹿胎乳餅脛骨瀕湖綱目鹿條精髓筋膽胎糞俱皆備載張璐逢原另列鹿胎一條頗詳辨可採録出以補其遺璐曰胎中鹿其嘴尾蹄跲與生鹿無異者為真其色淡形瘦者為鹿胎若色深形肥者為麋胎慎勿誤用能損真陽又獐胎與鹿胎相類但色皎白且其下唇不若鹿之長於上唇也其它雜獸之胎與鹿胎總不相似也入藥取真者酥炙黃用氣味甘溫無毒鹿性補陽益精男子真元不足者宜之不特茸角莖胎入藥而全鹿丸合大劑參耆桂附大壯元陽其胎純陽未散宜為補養天真滋益少火之良劑然須參耆河車輩佐之尤為得力如平素虛寒下元不足者入六味丸中為溫補精血之要藥而無桂附辛熱傷陰之患但慎勿用麋胎反傷天元陽氣也鹿乳餅苕陰札記孝豐深山産鹿土人計其産子時輒於夜半伺其洞側鹿乳子必五更乳畢出洞至暮方歸每日只乳小鹿一次小鹿食乳於腹結十二小餅每一時輒消一餅土人候母鹿出洞即將乳鹿抱歸剖腹出餅持貨遠方為珍藥價值兼金其餅如雲南棋子大色微黃乾者做老黃色腥氣最烈食之大能強陰益命門火衰於老羸最宜理怯弱虛損發痘漿通女子乾血勞鹿脛骨綱目鹿條有骨乃指全體而言至脛骨不聞有用法今時醫有斑龍散純取其脛為用因載其方以補之生肌收口救生苦海用斑龍散取鹿脛骨濕紙包固灰火煨之以黃脆可研為度若焦黑色者為過性勿用摻大毒生肌甚速猴經入藥名申紅深山群猴聚處極多覓者每於草間得之色紫黑成塊夾細草屑云是母猴月水乾血也廣西者良治乾血勞犬豕胎糞史長惺有不服藥而點眼發汗方以初男胎糞煉而升之加冰麝磁罌收有當發汗者男左女右以乳點之臥即汗出本草所未載小識云犬豕初生糞皆可合煉不必定嬰孩也猯油猯即獾字所在山澤有之穴居食蟲鼠劉仲旭云北直河堤一帶尤多穴岸而居最為堤防之患守河兵卒多捕之一說猯入蟄時必食蜂始過冬不飢有人於初冬發其蟄穴得獾破腹其肚胃中猶有蜂獾腹中皮為蜂螫輒厚數寸或藉此不飢此說亦未可深信堤民得猯脂多市煤廠作地燈非此不可他油輒為地風吹滅惟猯油作燈能御地風也入膏中拔濕如神繆仲淳廣筆記趙府膏藥中用之治頭上白禿集驗用獾油火烤擦三四次即愈如年久者恐不生髮以枸杞子煎湯飲痔瘡劉怡軒云一切內外痔猯油塗上立效咳血胸中哽噎怵怵如蟲行者不藥良方豬獾油入酒和服或下或吐或自消也海狗油海狗出遼東登州海中即膃肭獸也綱目載膃肭臍不言及其油之用故為補之蓬萊李金什言其地登州海口出海狗皮可作裘帽俗美其稱曰海龍即此其腎乃藥中膃肭臍土人取海狗名曰打狗此物晝夜潛海底惟孳乳時登島産子稍大即相率入水人不可得須冬月極凍時海崖水口結冰天晴海狗群出處冰上曝日必候其臥冰時驟入水以木棍擊其腰方可得之若冰裂或步履有聲非其睡時皆不可得然每年打狗墮水溺死者亦多因利重人亦不惜軀命以往性熱而降善消利治三焦濁逆之氣能清水臟積寒停飲觀近海人取鰒魚海參者用其油滴海面海水即清見底砂石畢見可知其性之分利也近有人自關東帶來其油緑色如干糊以塗皸瘃即愈次年不復發其性熱烈可知狐麝金沙江志産東川昭通二府較常麝香氣尤烈佩之辟邪絶惡夢定魘獺糞綱目獺條載其屎治魚臍瘡及下痢而已不知有消瘤之功今補之王氏檢祕消瘤用獺糞一兩天南星三錢麝香三錢共研末醋調塗上即愈狼脂本經逢原云狼性追風逆行故其糞燒烟能逆風而上燒灰水服治骨鯁以其性專逆行而無阻滯也狼脂摩風首推而本草不録亦一缺事按周禮冬獻狼取其膏聚也內則食狼去腸古人以為食品綱目獸部狼膏下瀕湖僅據飲膳正要載其能潤燥澤肌塗惡瘡而已不知其大功用乃能驅風散逆結之氣何可昧耶故急補之入風氣膏中能去積久風痹調酒服散逆結之氣山羊血油糞常中丞筆記山羊生平樂山崖間能陟峻阪蹺捷若飛其血可治跌損傷及諸血症凡跌撲死者未絶氣以一分許調酒飲之遂蘇神效立見第捕甚難每見人則決驟而去飆迅非常非足力所能及必密布繩網草間罥其足始能生得之刺其心血待乾凝結成塊可以攜遠蓋凡血皆患凝滯山羊逾高歷險旦夕不休則其血活矣而心為主故心血最良語云流水不汙戶樞不蠹觀此益信本經逢原云山羊産滇蜀諸山中性善走逐好鬥肉能療冷勞山嵐瘧痢婦人赤白帶下其心血瀕湖綱目失載苗人取血法以麋竹通節削鋒利活刺心血收乾者良宰取者不堪用柑園小識山羊血産廣西諸土郡山羊似羊而大善鬥能上絶壁每登高處失足或至骨折少頃如故喜食三七苗其血主治損傷極妙輕者服數釐重者二三分以心血為上身血次之色黑有光而質輕者為真陸祚蕃粵西偶記試山羊血取雞血半杯投一粒過宿變成水或以久凝臭雞血一塊投入山羊血過宿反變成鮮血乃真瀕湖綱目云山羊即野羊也一名羱羊非今之家山羊也時珍于山羊主治條僅載其肉之功用不及油與血之用此並附之今人收得乾血成塊者必用糯米養之云可久留不枯性溫味鹹無毒逢原云為和傷散血之神藥其治跌撲損傷單用酒服取醉醉醒其骨自續每用不過分許不可過服雖不耗傷元氣而力能走散陰血然必初患便服得效最速若過三五日血凝氣滯無濟於治矣價等牛黃心血亦不易得滲血丹用之真虛勞失血之續命丹也藥性考山羊血味鹹療跌撲損傷咯吐嘔衄便溺諸血能止血消瘀和酒服其皮作茵褥愈筋骨疼痛角作火罐灸頭風以入水一絲不散者真吐血蔣莘田經驗方臨臥時用廣西真山羊血每服三分能引血歸源不過二三服其血自止黎峒丸治跌打及一切癰腫天竺黃八分牛黃四分冰片四錢三七四錢血竭四錢兒茶四錢麝香四分沒藥四錢阿魏二錢雄黃二錢藤黃四錢孩兒骨一兩山羊血制浸藤黃入藥共為細末煉蜜為丸如龍眼大陰乾外用蠟為殼封固三白酒服祝氏效方山羊血能解鮮菌河魨毒傷損惡血治痘內無漿不起發集驗良方用真山羊血三分用甜酒釀調服痘漿立起太乙神針方人參四兩三七八兩山羊血二兩千年健一斤鑽地風一斤肉桂一斤真川椒一斤乳香一斤沒藥一斤穿山甲半斤小茴香一斤蒼朮一斤真蘄艾四斤甘草二斤麝香四兩防風四斤以上共為細末用綿紙一層高方紙三層紙寬裁尺二寸五分長一尺二寸將藥末薄薄鋪勻在上一針約用藥七八錢緊卷如花炮式務要緊實兩頭用紙封固外用印花布包面亦要齊整好看此針能治一切痛風寒濕筋骨疼痛諸症用時將針以火淬著或按穴道或在痛處下襯以方寸新紅布數層將針按上若火旺布薄覺痛多墊布數層但針必須三四枝一針已冷再換一針連進七針無不立驗治喉癬喉症惟此最遲久則失音不可救種福堂方西牛黃一分真山羊血二分川連五分血珀三分冰片一分硼砂一錢青果核灰三分燈草灰五分共為細末每一茶匙藥用一茶匙蜜調放舌尖上徐徐咽下一日五次兩月可愈或加蜒蝣梅灰更妙馬氏夾棍神方吉云旅抄山左馬家市夾棍藥極效方用蚺蛇膽二錢山羊血一錢半琥珀一錢大白頸地龍七條去泥珍珠三分辰砂一錢兒茶八分金箔一帖為衣為細末蜜丸桐子大金箔為衣每服一錢五分好酒下如不打夾者用刀破皮藥自出治急心痛集驗方用山羊血一分燒酒化下中遇邪鬼醫鈴此症乃陽氣衰而陰甚治須急補其陽以存正氣則陰邪自平即或治痰然亦當加意補正為本人參二錢當歸六錢白朮一兩菖蒲二錢半夏三錢白芥子三錢丹參五錢皂角刺五分山羊血八分附子一錢此方用山羊血皂角刺為開關聖品以通邪祟之要路半夏白芥消其寒痰無寒之侵斷不中鬼大用參以扶其陽陽生陰滅此不易之理也救絶仙丹石室祕録此丹專救五絶及有邪祟昏迷一時卒倒者皆可灌之以起死回生實神奇之極宜端午日修合備用濟急大可救人山羊血三錢菖蒲二錢人參三錢紅花一錢皂刺一錢製半夏三錢蘇葉二錢麝香一錢各為末蜜丸如龍眼核大酒化下敏按山羊血以産滇黔及蜀者佳以其地深山多三七苗及理血定風諸草山羊每食之峒人追逐得之山羊本迅躍無一刻之停其體血自頂貫尾終日旋運如飛又被逐捕則躁性頓發血隨氣運矯捷尤甚黎峒人捕得以竹槍刺入其心取血用此上品也其血成條深紫有光以少許入水中自然旋運如飛蓋矯捷之性猶存也若網取刀剖而得者血色黯滯入水亦不能迅捷他省産者亦能如峒苗之合衆追逐令其騰躍上下而後刺取其心血用亦可較次於滇黔山羊血惟今之各處所獲山羊皆用網取其或槍斃而後剖其死血以僞充心血則力微性緩更有以他血代充者則尤屬贋質無用故今市中每多此物高索重價非親歷其地真知灼見而得者勿用也山羊油張卿子祕方集驗治主心疝用山羊油不落水者荷葉包裹掛風處陰乾不可著雨遇此症取三五錢沖熱酒服不飲酒者滾湯亦可並治諸疝按文堂集驗主心疝用山羊血其言與此同然細繹文義有不落水句則用油非血矣文堂誤以油為血故並正之南方亦有山羊但不及粵産者其血尤為迅捷也山羊糞山羊糞同水粉各一升浸一夜絞汁頓熱午刻服治疳痢祝西葊本草山草屎煅灰療潰爛生肌入外科收口藥用祝氏效方大棗丸用山羊屎曬乾入鍋炒炭存性研細收藏每久爛不堪將見內腑者以大棗去皮核搗爛如泥後入前粉捶至成丸每服四錢黑棗湯送下此物大能斂潰爛諸口神效無比山蓮散用大活鯽魚一尾破腹去雜以山羊屎塞實魚腹放瓦上慢火炙乾存性研末加麝香一錢封貯如遇潰瘍爛見內腑止膈一膜者以此藥摻上立愈雷頭風祝氏效方云諸藥不愈惟山羊糞炒炭研粉甚效歌曰雷霆頭裹震山羊糞有緣酒送二錢下不在腦門喧治心痛不論遠年近日玉泉方山羊糞七粒油頭髮一握同燒為末好酒和服永不再發石羊膽廣東通志石羊色黑類人家羊而矯捷其角燒紙為火罐能收頭風其皮作褥可愈筋骨疼痛其血能療跌打損傷猶秦中山羊也肇慶志石羊出高要山中似羊而高大長角厚耳此羊一孔三毛服用柔而能久內兄朱問亭官粵曾寄石羊膽一對盛以銀匣大如小指以絨線扎其一頭乃乾者據言此物不易得試驗之法以此膽囊掛胸前急行不喘者真治折傷勝於山羊血也治一切目疾勞眼青盲人乳調點風火防風汁調點此物去翳障如神水調亦可跌撲功同山羊血曹閏亭先生曾宦黔中雲邊邑皆産石羊形小如兔趫捷難獲有得之者須即破其腹取膽少遲則裂於腹內矣其膽干之可療肝厥暴絶酒服一二釐即蘇其心血能治真心痛頗有效骨皮熬膠去風活血如神山貍坤輿圖說利未亞國有山貍似麝臍後有一肉囊香滿輒病就石上剔出始安其香似蘇合油黑色療耳病犀牛皮物理小識近有從舶上來者此真是海犀其皮入藥治風活血最效貂尾貂出西北塞外食松栗即南中松狗之類其行捷穿樹枝如飛蓋以尾為用者故其力在尾綱目貂鼠條止載其皮毛拭目去眯而遺其尾故為補其功用凍瘡用貂尾燒存性為末摻爛處自愈未破者用舊貂皮毛煅研香油和搽養素園驗方七葛回疆志出伊犁西番一帶用馬乳裝皮袋內以繩繒口手捉袋提壓半時許放於熱處一夜即成名之曰七葛飲之熱而補人若日日服之有返老還少之功云性熱補虛羸長力怯弱者宜之香鼠珍異藥品云出雲南形如鼠僅長寸許周櫟園書影云密縣西山中多香鼠較凡鼠小死則有異香蓋山中之鼠多食香草亦如獐之有香臍也山中人捕置篋笥中經年香氣不散桂海志云至小僅如指擘大穴於柱中行地上疾如激箭治疝甚驗鼠血此乃家鼠血綱目於鼠下獨遺鼠今補之本經逢原云生鼠血蘸青鹽擦牙宣有效牡者良貓尿胞胎尾血白松香取蒜片擦貓牙溺即下鳳聯堂驗方治偷糞老鼠用貓尿井底泥和勻圍之立愈急救方塗蠍毒螫傷蟲入耳中不出以貓尿滴之立死貓胞衣為治膈噎之神藥瀕湖綱目貓下雖附胞衣惟引楊氏經驗方治反胃吐食燒灰入硃砂服其他概未之及焉且取之有法食之有忌均為補之膈噎同壽録用貓初生胞衣以新瓦焙乾研細末每服一二分好酒送下口含竹筆管睡恐咬牙及咳嗽米不下者五六服即愈取貓胞法貓將産以木枷枷之恐生出即食也忌燒酒翻胃鳳聯堂經驗方貓胞衣三個好酒洗用豬肉四兩淡煮熟服之數年者立效莫際華云胃脘痛非服貓胞不能斷根金御乘雲貓胞衣凡患小産婦於産後或為羹或為末食嗣後即不小産極驗貓胎祝氏效方治癧𤶱用貓胎一個泥裹煨存性菜油調搽貓尾血不藥良方急驚風剪破貓尾滴血沖滾湯下白松香汪連仕云即瓦上多年貓糞色白火煅用治鹽哮蛔厥作痛更理瘟疫鼠瘡立刻見效浙驢皮膠黃云盛言近日浙人所造黑驢皮膠其法一如造阿膠式用臨平寶莊水煎熬而成亦黑色帶緑頂有豬鬃紋與東阿所造無二入藥亦頗有效蓋阿膠真者難得有浙膠則較勝於用雜膠也寶莊在臨平湖西岸有寶莊泉土人名為大力水云食之多力向聞虎跑泉水注大缶中平口投錢於中能吞一百六十青錢而水不溢他水至八十已浸漫於外矣故虎跑泉食之益氣力寶莊水能吞二百青錢不溢其力更可知以此水作膠自可敵伏流之濟水然豫每索此膠於市遍詢藥客皆云造者亦少不易得而云盛言之甚詳姑存之以備異日考證補血潤燥功同阿膠治內傷腰痛強力伸筋添精固腎尤別有殊能也霞天膏綱目畜部牛下附倒倉法而無霞天膏製法近時用之頗多故附録之本草經疏亦載為專品其法用肥嫩黃牛肉三四十斤洗極淨水煎成糜濾去滓再熬成膏用繆仲醇曰胃屬土為水穀之海無物不受胃病則水穀不能以時運化羈留而為痰飲壅塞經絡則為積痰老痰結痰等症陰虛內熱生痰則為偏廢口眼歪斜留滯腸胃則為宿飲癖塊隨氣上湧則為喘急迷悶流注肌肉則為結核王隱君論人之諸疾悉由於痰然而痰之所生總由於脾胃虛不能運化所致惟用霞天膏以治諸痰證者蓋牛土畜也黃土色也肉者胃之味也熬而為液雖有形而無濁質也以脾胃所主之物治脾胃所生之病故能由腸胃而滲透肌膚毛竅搜剔一切留結也陰虛內熱之人往往多痰此則由於水涸火熾煎熬津液凝結為痰膠固難散者亦須以此和竹瀝貝母橘紅蘇子栝蔞根枸骨葉之類消之或以橘皮白茯苓蘇子白豆蔻仁半夏蒼朮為曲治脾胃積痰或以橘皮貝母蘇子栝蔞根及仁硼砂為曲治積熱痰結味甘溫無毒主中風偏廢口眼歪斜痰涎壅塞五臟六腑留痰宿飲癖塊手足皮膚中痰核繆氏經疏羊哀形圓如彈大小不等産羊腹在胃中惟山羊有之胡羊不能成也蓋羊食百草其精氣聚於胃久則成此物俗呼百草丹亦牛黃狗寶之類牛黃細膩而疏鬆且香烈故以黃名狗寶花白而堅凝如石故以寶名此則如爛草團成輕鬆而氣膻人多惜其不能如牛黃狗寶之精美而亦産於羊腹得日月精華又食異草孕結乃不堅重香凝僅成此物故哀之因名曰哀常中丞宦遊筆記載軍營於羊腹中得石子名鮓答形如鴨卵色紫黃兩頭有二白圈圓如黃豆腰有束帶寬如韭葉色青藍束帶上亦二白圈質細如玉滋潤如水輟耕録亦載蒙古求雨取淨水一盆浸石子數枚持咒播弄其石子名鮓答産畜腹中牛馬皆有不必定羊也而羊哀又與鮓答異鮓答堅重細潤此則輕鬆膻臊亦無束帶白圈庚戌冬友人李金什在臨安西關外屠羊肆見屠者剖一羊胃中忽湧出一彈如鴨卵黃勻圓光潔浮水盆上購歸示豫豫曰此羊哀也氣臊而鬆非鮓答之類彼云屠者呼為百草丹云業此三十年止取得三枚亦不易遇也此物惟山羊始生因山羊食百草偶齧得異草或石乳其膏液注胃中日久凝成胃為精氣往來之所日為氣運動故所結之物多圓如丸鮓答結於腹不為氣擾動故形匾圓如石金什即以此贈豫豫復取細視其質松而亦堅嗅之作羊臊氣外則色澤光膩儼如油潤其體質非石非酥如腐草融結始信說略所載羊哀如濕茅紙之說為不謬因附記於此以待折衷于格物諸君子按百草鏡羊胲結成在羊腹中色微黑可治反胃或即此歟解百草藥毒治噎膈翻胃敏按慈航活人書端五日收羊屎名百草丹可絶瘧與羊胃所積草有別不可不知蘭熏嘉鄉肉陳火腿骨豬項上蜻蜓骨雄豬眼梢肉制火腿法俗名火腿出金華者佳金華六屬皆有惟出東陽浦江者更佳其醃腿有冬腿春腿之分前腿後腿之別冬腿可久留不壞春腿交夏即變味久則蛆腐難食又冬腿之中獨取後腿以其肉細厚可久藏前腿未免較遜蓋金華一帶人家多以木甑撈米作飯不用鑊煮飯湯釅厚者以飼豬其養豬之法擇潔淨欄房早晚以豆渣糠屑餵養兼煮粥以食之夏則兼飼以瓜皮菜葉冬飼必以熱食調其飢飽察其冷暖故肉細而體香茅船漁戶所養尤佳名船腿其腿較小於他腿味更香美凡金華冬腿三年陳者煮食氣香盈室入口味甘酥開胃異常為諸病所宜東陽縣志熏蹄俗謂火腿其實烟燻非火也醃曬熏收如法者果勝常品以所醃之鹽必臺鹽所熏之烟必松烟氣香烈而善入制之及時如法故久而彌旨另一種名風蹄不用鹽漬名曰淡腿浦江為盛本邑不多陳遠夫藥鑑浦江淡腿小於鹽腿味頗淡可以點茶名茶腿陳者止血痢開胃如神陳芝山食物宜忌火腿醃過晾燥高掛至次年夏間者愈陳愈妙出金華府屬邑者佳常中丞筆記蘭熏金華豬腿也南省在在能制但不及金華者以其皮薄而紅熏淺而香是以流傳遠近目為珍品然亦惟出浦江者佳其制割於冬月用鹽勻稱使肉堅實不敗最上者曰淺腿味美香潔可以佐茶各處皆無此制蓋此地畜豕闌圈清潔俟其將茁壯時即宰剝醃曬或曰其豕種原異他處而又得香溪等水飼之亦近乎理陳瑤藏藥祕訣凡收火腿須擇冬醃金華豬後腿為上選皮薄色潤日照之明亮通體隱隱見內骨者佳用香油遍塗之每個以長繩穿腳排勻一字式下以毛竹對破仰承以接油置之透風處雖十年不壞倘交夏入梅上起緑衣亦無害或生毛蟲見有蛀孔以竹籤挑出用香油灌之如剖切剩者須用鹽塗切口肉上荷葉包好懸之依此可久留不壞朱氏僕葛三言少時曾傭金華習其業知醃腿法甚詳云火腿金華六屬皆有總以出浦江湯家村者為第一村止一二千戶皆養豬作腿其豬不甚大極重者不過七八十斤製為腿干之不過三四斤或五六斤不等四時皆可醃惟冬腿為第一冬醃者皮細無粟眼手摸之潤膩切開無黃膘爪灣可久留不蛀他時者皆易蛀春腿多粟眼夏腿爪直秋腿皮粗醃法每腿十斤用炒鹽四兩以木刻楦如人手掌狀摻鹽後用掌楦輕輕揉擦四圍兼到俟皮軟如綿然後入缸缸面蓋以辣蓼竹匾覆之待七日後有滷翻攪一轉令上下勻再以炒鹽四兩如前法以手揉醃入缸十日後出缸即用缸中原汁洗淨一一以草繩縛定掛懸風處惟冬醃者不滴油味鹹甘性平陳芝山云和中益腎養胃氣補虛勞陸瑤云生津益血脈固骨髓壯陽止泄瀉虛痢蓐勞怔忡開胃安神藥性考火腿鹹溫開胃寬膈病人宜之下氣療噎腹痛或三四日不止筆苑仙丹火腿肉煎湯入真川椒在內撇去上面浮油乘熱飲湯立愈纍驗久瀉救生苦海陳火腿腳爪一個白水煮一日令極爛連湯一頓食盡即愈多則三服此豫宗人柏云屢試屢效之方也百草鏡云火腿出浦江縣脛骨細者真陳者佳皮上緑黴愈重其味愈佳須洗去垢及黃油用嘉香肉食物宜忌云又名家鄉肉出浦江者最佳藥鑑云家鄉肉金華屬邑俱有之秋即醃給客販入省城市賣其肉皮白肉紅鮮氣香美不似他處醃豬肉色少鮮澤也但一入杭城店便加消滷投缸中浸透然後出售蓋不爾則肉味淡反不美而秋時尚暖不漬透消滷不易腐臭也肉為消漬食之恐乏補益不似火腿冬醃陳久者為佳然今店中所售火腿均以家鄉肉腿風乾至次年皮上起緑衣充陳火腿賣人多不察若療病作食餌須真金華腿方有效也味鹹甘性平陳芝山云補虛開胃百草鏡云平肝運脾和血生津藥鑑云滋腎健足力敏按芝山所言乃未經杭肆滷漬之肉故能補虛若經滷漬透便能爍肺凡肺痿陰虛咳嗽者恐非所宜産婦虛勞須補者亦忌其肥肉得消滷入腹即成痰體肥作痰者亦不宜多食倘食之作痰杏仁研食可解附治箭鏃不出方家寶方用陳年醃肉去皮取紅活美好者同其肥細切銼濃將象牙末及人所退爪甲為末共為研細拌入所銼肉內再為勻銼令其合一厚傅箭鏃周圍約一飯頃其鏃即自迸脫竟有迸至二三尺遠者陳火腿骨百草鏡云煅黑研用治食積及痢治痢救生苦海用陳火腿骨二根炭火煅灰篩過加上白糖一兩米湯飲或滾水或酒調服無不效又方治赤白痢陳火腿骨灰陳皮炙草各一兩為末蜜丸如緑豆大空心服一錢白痢用姜赤痢用白湯送下神錦方生火腿骨焙燥研極細末無灰酒送下即止醫林集祕用陳火腿骨煅灰六兩飯鍋巴煅灰五兩砂仁炒三兩南山楂炒五兩共為末每服三錢久痢人參湯下紅痢紅糖湯下白痢白糖湯下糞痢炒焦白朮三錢煎湯服霍亂吐瀉藿香湯下噤口痢筆誅萃火腿骨煅一兩蓮肉二兩木香七錢烏梅三錢醋糊為丸桐子大每服七丸蜒蝣湯下大人小兒積食諸藥不能消者不藥良方陳年火腿骨煅黑色研末三錢用火腿一斤煮熟去汁上肥油取清湯一碗將末送下鼠咬救生苦海陳火腿骨燒灰香油和傅小兒臘梨瘡販翁醫要陳火腿骨燒灰如癢加礬少許麻油調傅不生髮用老薑擦豬項上蜻蜓骨燒灰塗一切頭項疽毒凡腦疽鬢髮對口等症麻油調傅立愈王聖俞手集雄豬眼梢肉能拔僵肉散毒滯劉羽儀經驗方治對口癤用雄豬眼梢肉三錢剁爛如泥加滑石末四錢和勻傅患處項上以膏藥蓋之拔去僵肉放出黃水即愈制火腿法李化楠醒園録有醃火腿法每十斤豬腿配鹽十二兩極多加至十四兩將鹽炒過加皮硝末少許乘豬鹽兩熱擦之令勻置大桶內用石壓之五日一翻候一月將腿取起晾有風處四五個月可用金華做火腿每斤豬腿配炒鹽三兩用手將鹽擦完石壓之三日取出又用手極力揉之翻轉再壓再揉至肉軟如綿掛風處約小雪後至立春後方可掛起不凍戴羲養余月令有制火腿法十一月內圈豬方殺下只取四隻精腿乘熱用鹽每一斤肉鹽一兩從皮擦入肉內令如綿軟用石壓竹柵上置缸內二十日次第三番五次用稻草灰一重間一重疊起用稻草烟薰一周時掛在烟處初夏以水浸洗仍前掛之按此乃村鄉土醃火腿法要不及金華之蘭薰也然較之杭市醃臘店所買火腿則又不啻霄壤矣故並載其法造火腿醬法用南火腿煮熟切碎丁如火腿過鹽先用水泡淡再煮去皮單取精肉用火將鍋燒得滾熱將香油先下滾香次下甜醬白糖甜酒同滾煉好然後下火腿丁及松子核桃瓜子等仁速炒翻取起瓷罐收貯其法每腿一隻用好麵醬一斤香油一斤白糖一斤核桃仁四兩去皮打碎花生仁四兩炒去衣打碎松子仁去衣四兩瓜子仁二兩桂皮五分砂仁五分
