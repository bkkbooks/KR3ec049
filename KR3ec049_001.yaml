body:
  text: 卷一水部凡二十四種春水南詔志春水有三俱在鶴慶府一在城東南二十里石碑坪一在城南三十里龍珠山麓一在城東北三十里五老山下春水盈時有硫黃氣郡人於二三月間和鹽梅椒末飲之能祛疾職方考雲南鶴慶府出春水在觀音山蓮花寨之北立夏前三日出後七日止水無定所每出時地中漉漉有聲土人循其聲掘之其水始出能除百病遠近村民競飲之走彝方者飲之不染瘴病癘者飲之立除外境人尤效數日內有鸚𪃿緑鳩數百群飛來飲水涸乃去味甘性平除痼疾厚腸胃已虛勞去瘴癘敏按土為萬物之母凡物得土之精者均入脾胃而能扶正氣正氣足則百病自除此水在地能鳴出無定所乃川脈得先天之氣借地力宣泄故有厚胃除疾之功出七日即涸並具來復之機鶴慶為雲南邊境山川蒙密民多瘴癘府志載城東南尚有溫泉每歲三月郡人浴之有痞疾者輒愈則又不特春水之出其地也天心愛人生一害必生一物以救之如出鳩之地多犀觀於此水可以悟物理矣天孫水廣志云即七夕水廣人每以七夕雞初鳴汲江水或井水貯之是夕水重於他夕數斤經年味不變益甘甚以療熱病謂之聖水若雞二唱則水不然矣色清性微寒味甘治一切熱症神效喉蛾喉癰陸氏濟世良方用肥婆草捶爛將些聖水開服如牙痍牙癰將此草捶爛和聖水含在口內吐換數次即愈治食百尿濟世良方用苦瓜捶爛取汁和聖水服之即愈若無苦瓜取其核捶爛和聖水服之荷葉上露夏日黎明日將出時將長杓坐碗於首向荷池葉上傾瀉之以伏露為佳秋露太寒花上者性散有小毒勿用味甘明目下水臌氣脹利胸膈寬中解暑大力丸用之蓮葉象震卦荷上露或亦入肝而滋益肝臟歟按露本陰液夜則地氣上升降而為露其性隨物而變居易録有碧玉露漿方於中秋前後用無五倍子新青布一二匹扯作十餘段每一段四五尺五更時於百草頭上或荷葉稻苗上者尤佳先用細竹一根掠去草上蛛網乃用青布系長竹上如旗樣展取草露水絞在桶中展濕即絞視青布色淡則另換新布陽光一見則不展所取露水用瓷罐洗淨盛貯澄數日自清晚間用男乳一酒杯約一兩半白蜂蜜一酒杯人參湯一酒杯多少同乳人參鬚上等四五分不拘總入一宮碗內將露水一飯碗攙入宮碗共得七八分和勻以棉紙封口用碟蓋好次日五更燒開水二大碗將宮碗內露隔湯頓熱睡醒時緩緩溫服之藍所以殺蟲露去諸經之火參補氣乳補血蜜潤肺治一切虛損勞症有奇效可知露本養陰扶陽又得荷葉之清氣故能奏功如此糯稻露俞佳士妙應方治痞塊八月白露後收糯稻頭上露水晚作二服飲下立消按諸草木皆需天露始潤惟稻至酉時其根上津潤之氣漸升入夜乃達葉尖至曉復自上而降於根故無露之夜稻葉獨潤陳翠虛詞一些珠露阿誰運上稻花頭是也白雲云本山澤之氣蒸而為云水屬也故入水部有五色惟白雲可治病唐守時言凡高山大川悉有云氣五嶽名山多出云山曾取之餉客其取云法用金漆盒蓋上鑿一孔以木塞之俟天氣晴朗黎明往山岩石畔覓之見地上有白雲如線者如筍者茁土而出即云苗也急以盒蓋孔對其氣使盡入其中以木塞口收必須白雲如雪色有香氣如梅蘭方合用其他雜色云多帶草土氣黑雲尤腥多帶怪物不宜盒取放云之法擇淨室須四面有窗者通上下用紙裱糊勿令泄氣然後將云盒置中去塞則云自出悠揚渙散芬芳四繞可以醒脾胃舒肝鬱而和經絡令人有翛然出塵之想治啞瘴余淡庵云滇廣山瘴有一種人受之終身不能語名曰啞瘴唯聞白雲之氣久久自引毒外出可以全愈血臌水腫聞雲氣漸消滷水苦鹼無毒治大熱消渴去煩除邪下蠱毒柔肌膚去濕熱消痰磨積塊垢膩多服損人食纂綱目有鹽膽水乃已燒成鹽復瀝下之苦鹵一名滷水此乃取於鹵地瀝以燒鹽之用與鹽膽水不同竹精汪東藩醫奧云毛竹內剖之新竹多有水乃竹精也以不臭色清者入藥佳治汗斑以雞毛蘸水刷上立退五月五日雨剖竹得水名神水古刺水帶經堂詩話左公蘿石手書一帖云乙酉年五月客燕之太醫院從人有自市中買得古刺水者上鐫永樂十八年熬造古刺水一罐淨重八兩罐重三斤內府物也按左詩中有再拜嘗此水含之不忍咽句則此水未嘗不可服食也又云瓶中古刺水制自文皇年制之扃天府元石流清泉列皇飲祖澤旨之如羹然繹詩意又似常服所制亦不止十八瓶也王阮亭居易録有客自燕至出其橐有阿房宮磚瓦一陸探微畫一古刺水十餘罐古刺水用錫罐貯之上朱刻永樂二年熬造罐重二斤水八兩香氣酷烈據此則古刺水又如是之多罐面以錫刻字塗朱其曰二年則又在前或明時內府有此制耳何氏闢寒録云古辣本賓橫間墟名以墟中之泉釀酒埋之地中日足取出名古辣泉色淺紅味甘不易敗此或另一種也按輿地志賓橫在廣西南寧界陳墨樵苕水札記云姚履中坦為豫言餘杭一舊家祖遺一錫瓶制極精緻面刻三楷字云古刺水口封固極密搖之有水聲相傳數世亦不知何用薛澱山洪云嚴嵩抄家籍二有此其涼沁骨蓋暑月以涼體者李覲王日記云豫館河東裴氏其家有古刺水一罐系銅製高四寸圍一拱身圓面平狀如花鼓銅質青黃四圍牢鑄永樂二十一年十月鑄古刺水一罐罐重三斤水重八兩共二十二字字皆陰文據云世宦鄭氏舊物也鑽銅取水可療瞽疾朱退谷曾於陝西陳渭野處見古刺水一瓶云是海壇鎮張傑家物其制上大而下小圓如瓶式四圍無痕迹搖之有水聲面微有小鑽孔言曾有富瞽持十金欲售之以治目方取鑽鑽孔天大霹靂因懼而止然此物亦神矣孫雍建云古刺地名古刺水乃三寶太監所求得之物天下止有十八瓶其瓶以五金重重包裹其近水一層乃真金也水色如醬油而清光可鑑以火燃之如燒酒有焰者真其性大熱乃房中藥也婦人飲之香沁骨肉性涼澤肌膚明目療青盲開瞽功同空青治熱症有效以茶匙滴汁入湯浴能令香氣透骨不散按古刺水據薛氏言性涼可治熱疾孫氏言性大熱止可入湯沐不可服今是物世雖有之但市充貢品價值千金不聞有服試之者故並附孫説以俟考又葉東表言古刺水手蘸少許嗅入鼻中能驟長精神強骨力其香氣蓋能和血通竅昔未有鴉片煙以前惟用此後因呂宋有鴉片而人遂不知用古刺水緣水貴而鴉片賤故人爭用賤者其實功效相仿房中術嗅法更勝於服強水西洋人所造性最猛烈能蝕五金王怡堂先生云其水至強五金八石皆能穿漏惟玻璃可盛西人造強水之法藥止七味入罐中熬煉如今之取露法旁合以玻璃瓶而封其隙下以文武火疊次交煉見有黑氣入玻璃瓶中水亦隨氣滴入黑氣盡藥乃成矣此水性猛烈不可服食西人凡畫洋畫必須鏤板於銅上者先以筆畫銅或山水人物以此水漬其間一晝夜其漬處銅自爛勝於雕刻高低隱顯無不各有肖其妙銅上有不欲爛處先用黃蠟護之然後再漬俟一周時看銅有爛痕則以水洗去強水拭淨蠟迹其銅板上畫已成絶勝鐫鏤且易而速云入藥取其氣用治癰疽拔疔謝天士云凡癰疽已潰或未潰用強水可蝕惡肉勝於硇砂只須置強水於玻璃瓶內以瓶口對癰疽上掩少時其藥氣自升入患處疽肉變白而腐毒亦拔出然後再敷他藥治之疔有根亦以此治法則根自爛出物理小識有硇水剪銀塊投之則旋而為水傾之盂中隨形而定復取硇水歸瓶其取硇水法以琉璃窯燒一長管以煉砂取其氣道朱公為余言之崇禎庚辰進坤輿格致一書言採礦分五金事工省而利多壬午倪公鴻寶為大司農亦議之而政府不從今日番硇甚少但有氣硇真番硇乃能幹汞按此硇水取強水也特古今異名耳刀創水出西洋不知何物合成番船帶來粵澳門市之治金創以此水塗傷口即斂合如故鼻沖水出西洋舶上帶來不知其制或云樹脂或云草汁合地溲露曬而成者番舶貯以玻璃瓶緊塞其口勿使泄氣則藥力不減氣甚辛烈觸人腦非有病不可嗅島夷遇頭風傷寒等症不服藥惟以此水瓶口對鼻吸其氣即遍身麻顫出汗而愈虛弱者忌之宜外用勿服治外感風寒等症嗅之大能發汗丹砂水臞仙神隱有造丹砂水法丹砂一斤石膽二兩硝石四兩以小口瓷罐漆固其口埋地中四十九日出視成水則藥成矣若未化再埋又法用竹筒盛亦可味苦服之延年殺精魅卻惡鬼養精神安魂魄曾青水神隱云制同丹砂不用石膽易以汞二兩藥用洗眼亦可服止目痛收風淚久服輕身不老白鳳漿痘學真傳有造白鳳仙漿法用單葉白鳳仙花採閉壇中令滿以箬封口再將泥搪之埋土內二三十年方取用壇中花悉化成水割去滓腳其清水即鳳漿也另貯瓷瓶聽用性大寒治痘疹焦陷不救者藥內加一茶匙服之立能回焦更生痘不可多用疏痰解一切火毒大有奇功天蘿水救生苦海霜降後擇粗大絲瓜藤掘起根三四寸剪斷插瓶中一夜其根中汁滴入瓶內名曰天蘿水封固埋土中年久愈佳治雙單蛾飲一杯即愈又可消痰火化痰成水解毒如神兼清內熱治肺癰肺痿更效肖山有一老嫗家市肺癰藥水三服立愈門如市已數世矣王聖俞曾得其方述之即此水也於立秋日取存甕用愈陳愈佳黃茄水梁侯瀛集驗方秋天黃老茄子不計多少以新瓶盛埋土中一年化為水取出聽用治大風熱痰能消痰成水用茄水和苦參末為丸桐子大食後及臥時黃酒送下三十丸甚效梅子水秋泉祕録有造梅子水法用大梅子三五十個搗碎入有嘴瓶內加鹽三兩入河水浸過二指日取蜒蚰投入多多益善經年更佳凡毒將水搽之即消治諸毒惡瘡櫻桃水梁侯瀛集驗良方春日鮮櫻桃收數斤盛在瓷瓶內封口放在涼處發過成水濾出渣聽用治凍瘃瘡神驗將水搽在瘡上即愈若預搽面則不生凍瘃疹發不出名曰悶疹用櫻桃水一杯略溫灌下垂死者皆生不藥良方各種藥露凡物之有質者皆可取露露乃物質之精華其法始於大西洋傳入中國大則用甑小則用壺皆可蒸取其露即所蒸物之氣水物雖有五色不齊其所取之露無不白只以氣別不能以色別也時醫多有用藥露者取其清冽之氣可以疏瀹靈府不似湯劑之膩滯腸膈也名品甚多今列其常為日用知其主治者數則於左余俟續考以補其全金銀露乃忍冬藤花蒸取鮮花蒸者香乾花者少遜氣芬鬱而味甘能開胃寬中解毒消火暑月以之代茶飼小兒無瘡毒尤能散暑金燦然藥帖云金銀露專治胎毒及諸瘡痘毒熱毒廣和帖云清火解毒又能稀痘薄荷露鮮薄荷蒸取氣烈而味辛能涼膈發汗虛人不宜多服金氏藥帖清涼解熱發散風寒玫瑰露玫瑰花蒸取氣香而味淡能和血平肝養胃寬胸散郁點酒服金氏藥帖專治肝氣胃氣立效佛手露佛手柑蒸取氣香味淡能疏膈氣金氏藥帖專治氣膈解鬱大能寬胸香櫞露香櫞蒸取氣香味淡消痰逐滯與金桔橙露同功桂花露桂花蒸取氣香味微苦明目疏肝止口臭金氏藥帖專治齦脹牙痛口燥咽乾廣和帖止牙痛而清氣茉莉露茉莉花蒸取氣香味淡其氣上能透頂下至小腹解胸中一切陳腐之氣然止可點茶不宜久服令人腦漏薔薇露出大食占城爪哇回回等國番名阿剌吉灑衣經歲其香不歇能療心疾以琉璃瓶盛之翻搖數回泡周上下者真功同酴醾露皆可以澤肌潤體去發䐈膩散胸膈鬱氣又一種內地薔薇露系中土薔薇花所蒸專治溫中達表解散風邪蘭花露此乃建蘭花所蒸取者氣薄味淡食之明目舒郁雞露道聽集云雞露能大補元氣與人參同功男用雌雞女用雄雞一年內者名童子雞可用若兩年者肉老質枯不可蒸露入藥須選童子雞以繩縊死竹刀破腹醇酒洗去毛及腹中穢物勿見水蒸取露飲之氣清色白望之如有油氣味甘消痰益血助脾長力生津明目為五損虛勞神藥米露以新鮮白米勿用陳久者蒸取色白氣清如蓮花者大補脾胃虧損生肺金如神一云米露用稻花蒸者更佳廣和帖鮮稻露和中納食清肺開胃薑露闢寒解中霜霧毒驅瘴消食化痰椒露鮮椒蒸取能明目開胃運食健脾丁香露氣烈味微辛治寒澼胃痛梅露鮮緑萼初放花采取蒸露能解先天胎毒六月未出痘小兒和金銀露食之極佳周櫟園閩小記海澄人蒸梅及薔薇露取如燒酒法酒一壺滴少許便芳香骨皮露地骨皮所蒸解肌熱骨蒸金帖一切虛火許帖藿香露清暑正氣白荷花露治喘嗽不已痰中有血金帖止血消瘀清暑安肺廣和帖桑葉露治目疾紅筋去風清熱金帖夏枯草露治瘰癧鼠瘻目痛羞明金帖枇杷葉露清肺寧嗽潤燥解渴金帖和胃許帖甘菊花露清心明目去頭風眩暈廣和帖御溝金水集效方有治御溝金水法用篾籮八隻高二尺取山上淨土裝八籮內用瓷鉢八個盛之取童便八桶傾入七籮土內淋下上以井花水推之共傾在一籮土內如淋少再用清推前七籮淋下又加上一籮內待他一夜淨淋下水三五碗以瓷罐收貯外用井水養之但遇此症待口中要茶吃將此水半杯溫服即安至重不過三七次立愈性平味微咸帶甘治男婦骨蒸乾血勞童子勞晝夜發熱至緊不肯服藥此水不比尋常大有功效起蛟水徽州張宇南言其地多山每春夏之交久雨有起蛟之患村人習見勿異也蛟初起一二日間地中先有聲隱隱如雷鳴或如牛吼至期土中輒陷出一小穴如豆大水從穴出直上一二尺如箭已而漸升漸長長至簷隙與溜合則水勢乃大下穴亦漸大如碗孔蛟入鰍鱔形從穴出乘水而上過簷則形變大乃飛越奔騰而去屋宇亦無害惟相隔一二里許田禾間有傷損者為山水沖刷而然此水初起一二尺時山人以瓶盎之屬接取食之力大無窮蓋出蛟口中含吮精力貫注直逼而上其全身之力盡在此水故人亦不能多食壯健者三盞即腹脹不能再飲土人以釀酒更壯精力可已虛勞單杜可云蛟初起時水如箭清如泉脈漸湧而高必合天雨水則勢大而能飛騰蛟出穴口始泛出水名曰發洪若初起時用河水一勺灌入其穴則蛟水自回便不能出穴或取婦人月經穢布塞之亦止若人服蛟水作脹用千里長流河水煎服之亦可解也壯筋骨健腰膝已虛勞除驚悸殺蟲蠱尸疰鬼疰遁尸邪氣浴瘡疥虛弱者以代水煎滋補藥良性升能直透巔頂混堂水混堂今浴池燒水浴者人多則穢濁積垢使然人氣熏漬體虛者觸之昏暈名曰暈堂毛達可曰凡少年思欲不遂或赤白濁者待欲溺時入混堂坐水中令出溺即愈蓋得人氣通洽也洗疥癬通淋濁蛇鱗纏身劉羽儀驗方飲浴湯水便可解毒發痘杭士元方痘出八九日黑陷用混堂水煎藥立起雞神水太元玉格新書有造雞神水法眼科要覽選其方製法擇大蘿蔔一個開一大孔須近莖邊一頭開勿傷其根方可活孔內入雞蛋一枚仍種地上俟其發葉長成取雞蛋內水點眼其明如童明目去障日精油泰西所制本草補云其藥料多非中土所有旅人九萬里攜至中邦決非尋常淺效勿輕視焉可也治一切刀槍木石及馬踢犬咬等傷止痛斂口大有奇效用法先視傷口大小若何其長闊而皮綻先以酒洗拭淨隨用線縫大約一寸三縫合不可太密傷口小者無用縫矣既縫以酒又洗拭淨將潔淨瓷器盛油烘熱以男人所穿舊綿布取經緯長短以傷口為度逐縷蘸油貼滿瘡口又以男人所穿舊布包裹忌用女人所穿者至三四日後解開潤油少許如前包固數日即愈如傷久血乾略爪破或刀刮俾令血水以通藥氣如前包固但血多則至流藥故無血不可多血亦不可也傷處忌水與口涎最宜防之若傷以已含膿及骨折者此油無益不必用矣如心腹耳鼻手足及各處骨節疼痛果屬風寒非關燥熱則此油可治問的痛之所以油揉擦極熱為度然後以男人所穿舊布包裹當用藥須坐密室切勿見風並忌食寒冷等物本草補
