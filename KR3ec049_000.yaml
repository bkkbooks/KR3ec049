front:
  text: 利濟十二種總序先君子昔艱於嗣嘗至京師遇異人云准君相無後若行利濟事可得子及總鹺下砂時海溢淹斃者不下數十萬先君悉為設法撈埋秋疫癘繼作又為捐俸延醫合藥以療疾賴生者數萬人更詳創築塘當事轉題得奉俞旨允行時各場皆被潮災攀轅借寇自下砂石堰穿山鳴鶴龍頭等凡七邑皆一身董其事塘成名曰利濟是年秋潮驟至迄無害後由永春可馬宰尤溪甫生余昆季二人乳字之曰利濟退居之日用以名其堂此利濟所由昉也先君嘗以一子業儒一子業醫故楷弟自幼年讀經書外兼課以靈素難經及傷寒論諸書嚇時覆命默畫銅人圖以嬉戲貯甲乙卷於養素園區地一畦為栽藥圃豫弟兄春秋輒寢食其中今弟鋭意岐黃用承先志雖未敢自信出以應世然親串間有請診者服其藥無不應手愈居恆喜著書所纂有百草鏡八卷救生苦海百卷皆言中肯綮解洞玄微誠有裨於斯道者不淺豫自愧譾庸號涔勺水曾當大雅之目者乃欲為瓦釜鳴耶憶自髫齡性好博覽凡星曆醫卜方技諸學間亦涉歷之意有所得即欣欣忘倦鈔撮成帙納之篋久而所積溢簏外束庋閣上纍纍幾千卷近亦稍自厭棄間歲檢閲其無用者焚之此十二種內祝由串雅二稿己丑春已取投之焰時因小輩攫去乃姑存焉自甲戌歲始成醫林集腋從鄰人黃販翁家閲所藏醫書萬餘卷參以舊存江閩祕本集其屢驗者名之曰腑見精選之匪易也戚好中有以驗方見示及遊篋所得歷年頻增為傳信方乙亥春湖南汪子師僦豫舍居見其案頭有祝由本汪君用之素驗暇日因借録一通後又得張氏本及儒門事親萬薛二家抄採擇試之刪其妄而存其效且便於行者以為山居一時不能備藥石之助作祝由録驗豫素有書癖日不給焚膏繼之恐堂上呵禁嘗篝燈帷中藏書夜觀煤積翠帳皆黑丙子秋患目幾廢息視不啓者六月乃愈因作囊露集較瑤函銀海龍木論明鏡箋自謂過之以囊露名者蓋取囊柏葉露可治目意宗子柏云挾華扁術行遊名都戊寅航海從中山歸相闊已八載矣投刺來竭豫時讀禮家居館之三月間與談有闢其謬處柏云故虛懷士頗以豫言為然慷慨出其歷遊方術頂串諸法合豫養素園簡驗方本彙編之串而曰雅知非江湖俗技之末也鏡水居士隱元上人皆擅點茆法素與何竹里善庚辰豫讀書西山寺回峰精舍適竹里避暑至與之結河朔飲曾一面焉因得聞制伏鼎火諸說豫用其法於諸科升降藥中體不耗而功倍捷因集古來升降諸方參以製法為祕要一書而以藥性之奇制者為元解以見本草之用為最廣昔高濂有珍異藥品而搜其未全瀕湖著本草綱目而後出未補悉為續之一曰奇藥備考一曰綱目拾遺均各有義例焉天本草之成書自神農本經桐君藥録而下繼作者不下數十家固無乎不備矣然後重者藥性則論性者多考其真僞若何辨其地産各別如地黃有三才之判天冬有五嶽之分縱李氏已略言之而究之風俗異宜古今殊轍百餘年來未有不轉易者況乎婆奶公須名隨俗改丹經媚帖藝以途分苟隱僻或謝未知將名稱亦云素昧乎有不為所竊笑者幾希因作本草話花藥小名録至於攝生間覽為導引卻病之方坎離栽接之說何取哉嗟乎學期適用醫可通元殊慚襪線之才敢詡金針之祕用是述其緣起贅於簡端他日倘能將靈素脈經傷寒有見解處著為醫論續增十種合吾弟所著二書並梓之為利濟後集斯豫之志也夫庚寅春仲上浣六日恕軒趙學敏序利濟十二種全目醫林集腋十六卷養素園傳信方六卷祝由録驗四卷囊露集四卷本草話三十二卷串雅八卷花藥小名録四卷升降祕要二卷攝生閒覽四卷藥性元解四卷奇藥備考六卷本草綱目拾遺十卷通計一百卷
