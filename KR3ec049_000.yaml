body:
  text: 本草綱目拾遺跋本草綱目拾遺十卷乾隆間吾杭趙恕軒先生所著利濟十二種之一也十二種者醫林集腋養素園傳信方祝由録驗囊露集本草話串雅花藥小名録升降祕要攝生間覽藥性元解奇藥備考及是編也全目及總序備載於是編卷首鮑氏匯刻書目亦載十二種之目但有傳鈔本皆未刻至嘉慶末年傳鈔本則只有是編與串雅二種其十種已不傳且是編每藥品下論列各條顛倒錯亂眉目不晰余因訪知杭醫連翁楚珍藏其稿本假閲乃先生手輯未繕清本者初稿紙短續補之條皆黏於上方黏條殆滿而未注所排序次故傳鈔錯亂耳余乃按其體例以稿本校正排比傳鈔本之誤然後各條朗若列眉還其舊觀原稿本仍歸返連翁逮庚申寇亂翁家原稿本亡失串雅亦佚余編繕此本幸攜帶僅存得存先生遺著之一亦足寶重矣余又聞雍乾間杭人汪君懷著有草藥綱目一書裒然大部與瀕湖綱目等其稿未傳鈔訪諸其族人皆未見想已湮沒失傳恨未得其書與李氏趙氏鼎峙為本草之大全也惜哉同治甲子秋日錢唐張應昌仲甫氏撰
