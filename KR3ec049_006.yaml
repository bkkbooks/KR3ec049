body:
  text: 卷六木部七十九種附二十四種響豆池北偶談樂安有孫公者年九十強健如四五十歲人自言生平惟服響豆每歲槐子將熟時輒令人守之不令鳥雀啄落既成即收作二枕夜聽其有聲者即響豆也因棄其餘如是數月而得響豆所在每樹不過一枚每歲不過服一粒如是者數十年無他術也顏氏家訓庾肩吾常服槐實年七十餘目看細字鬚髮猶黑抱朴子云槐子服之令人補腦發不白而長生殆即此歟明目悅顏色開心志強筋骨補血髓紀曉嵐先生姑妄聽之云響豆者槐實之夜中爆響者也一樹祗一顆不可辨識其法槐始花時即以絲網罥樹上防鳥鵲啄食結子熟後多縫布囊貯之夜以為枕聽無聲者即棄去如是遞枕必有一囊作爆聲者取此一囊又多分小囊貯之枕聽如初得一響者則又分二枕如是漸分至僅存二顆再分枕之則響豆得矣木蛇百草鏡云木蛇似蛇有鱗甲內紋黃色如菊花瓣亦奇物也治狗咬通香木邊志木長數尺出塞外以沸湯沃之取其汁洗衣服及灌一切花卉灑屋宇壁經年香氣不滅燒之能降天神香氣達數百里契丹珍之治奇疾人不知名者服之即愈焚之闢瘟疫穢氣邪祟閏月棕皮徽州者色紫為上救生苦海棕櫚皮每歲只生十二瓣逢閏月多生一瓣惟此瓣中間有界紋為異按詹氏小辨云棕每月生一片歲生必十二片唯當閏月之年值所閏之月則此一片僅有其大半亦不成片家有棕園每歲臘盡剝之歷驗此無中氣之徵也據此則閏月棕皮無全瓣者石室奇方棕櫚遇閏年則生半片歲長十二節閏月增半節治血症郭大林雲煅存性研陳年者尤佳服二三錢試過效驗王巽初云用一瓣燒存性作二服亦可南天竹即楊桐令人多植庭除云可闢火災綱目木部南燭條載其枝葉功用云苦平無毒止泄除睡強筋益氣久服長生不飢變白卻老並引上元寶經言服草木之王氣與神通食青燭之精命不復殞皆謂指此而於其尋常日用功用概不著録至其所引附方亦僅取聖惠方中之治風疾及誤吞銅錢而已余亦未之及焉故悉補之王聖俞云烏飯草乃南燭今山人寒食挑入市賣與人家染烏飯者是也南天竹乃楊桐今人植之庭除冬結紅子以為玩者非南燭也古方用烏飯草與天燭乃山中另有一種不可以南天竹牽混此説理確可從之明目烏須解肌熱清肝火活血散滯食物宜忌云南燭葉味苦性平從新云苦酸澀平子名紅杷子治八角蝨同水銀搗爛擦之即除亦可浸酒去風痹從新云南燭子酸甘平強筋骨益氣力固精駐顏子白色者名玉珊瑚小兒天哮三奇方用經霜天燭子臘梅花各三錢水蜒蝣一條俱豫收臨用水煎服一劑即愈下疳久而潰爛名臘燭疳不藥良方紅杷子燒灰存性一錢梅花冰片五釐麻油調搽即愈陰莖泄慈航活人書紅杷子燒灰存性一錢加冰片五釐麻油調搽三陰瘧文堂集驗南天竹隔年陳子取來蒸熟每歲一粒每早晨白湯下解砒毒劉霞裳云凡人食砒垂死者用南天竹子四兩擂水服之立活此方劉在松江府署親試驗者如無鮮者即用乾子一二兩煎湯服亦可葉洗眼去風火熱腫眵淚赤痛及小兒疳病取其葉煎湯代茶服卻疫仙方行篋檢祕凡人稍覺頭疼身體酸困便即感冒寒邪急宜服此藥發散毋使傳經變成時疫此方經驗多人神效異常用烏梅紅棗各三枚燈心三十根南天竹葉三十片芫荽梗三段無芫荽以蔥白三節代之亦可甘草麥冬各三錢小柴胡二錢水二鍾煎一鍾不拘時溫服微汗即愈瘰癧初起百草鏡南竹葉威靈仙夏枯草金銀花各四兩陳酒四壺隔水煮透一日三服半月除根每服藥酒須吞丸藥丸藥方殭蠶一斤炒研砂糖和丸桐子大每次吞一錢梗今人畫眉籠中置之可去鳥風作箸可治膈食膈氣查剋木宦遊筆記塞外有查剋木叢生樹高五尺許無皮枝幹清翠可愛葉似三春之柳然質甚堅並無柔條垂絲頗耐霜雪若伐以為薪箸火即燃形似炭有紅焰而無煙置徑寸於爐中歷一二日乃燼惟生於瀚海沙磧之地遇大風根株即拔因入土未深是以夭扎無經久者西北域記查剋木産推河似絲柳而不垂無皮耐霜雪色青時入爐即燃數日乃燼然大者拱高者尋風斯拔之何者地沙且咸根難據而易朽也治産難臨蓐之時握其木易産心痛燒灰服之緑益子邊志出遼東樹高丈餘其葉兩兩相對開花如盞大黃色花謝結實亦兩兩相對大如木瓜緑色春生夏熟人不可食誤食之入口即齒落如屑舌黑如漆滿口裂碎血出如水終日不能食經旬方止又能碎骨如泥彼處橐駝初生取以潤其蹄則千里可行否則不能行其性剛利如錐舉而刺之利如刀鋸凡作角器必用此性烈有大毒能腐骨碎齒入外科方術家用丁香油百草鏡丁香油出南番乃用母丁香榨取其油色紫芳香辛烈番人貯以琉璃器蓋偶不密即香達於外粵澳門多有之藥性考丁香油出西番氣味甘辛性大熱透關竅驅寒力更速於丁香治胃寒痛或滴少許入煎藥或以油塗臍上痛處暖丹田除水瀉塗暖臍膏貼解蟹毒以一滴同薑湯服揩牙治口臭藥性考云壯陽暖腎疝痛陰寒按齊民要術雞舌香即母丁香時珍所謂雄為丁香雌為雞舌香也丁香中雌者獨大而可取油雄者細小不中榨取豫內兄朱放鷳曾宦於粵據云丁香油亦近時始有其性熱而淫凡衣飾器物經染其氣數日不滅近日豪貴家多珍之為房帷用以色紫同玫瑰滴水中攪之散而復聚者為真偽者曰樟木油色稍淡紫中帶黃黑色氣辛烈觸鼻作樟腦氣滴沐器洗衣或入香佩可以闢汗不入藥用綱目於丁香下附丁皮及根枝不及油或其時尚未有即有亦未行入中土也塗臍散臌痞受寒胃痛好酒和服金御乘雲胃寒厄逆嘔吐甚者用丁香油擦透中脘痛痹擦痛處皆立效試過極驗祝穆試效方治瘰癧化核膏用之取其香烈直透經絡辛以散結滯耳檀香油藥性考出粵中舶上帶來味苦除惡開胃止吐逆肉桂油百草鏡粵澳洋舶帶來色紫香烈如肉桂氣或云肉桂脂也或云桂子所榨未知孰是性熱氣猛入心脾功同肉桂傳信方治各種瘧用燈草一莖約長三四寸以水稍潤再以肉桂油塗之貼背脊風府穴下至肺俞止外以綿紙條封之須臨發前一二時為之或先一日更妙貼後次日發瘧更重嗣後漸減蓋風寒暑濕盡為提挈而然也水安息出廣中洋舶帶來波斯交趾皆有之形如荔枝而大外有殼包裹皮色亦如鮮荔枝開之中有香如膠漆黃褐色氣甚馥郁此物如開用不盡者須連外殼置碗中方不走溢否則遇五月黃梅時其汁自滿溢出殼外雖殼內所存不過少許也會溢出亦一異也綱目安息香本條所言皆乾者云是樹脂集解下引葉廷圭香録云有如餳者謂之安息油即是此種瀕湖又未詳其功用今時頗行故採補以備用其殼有絲毫裂縫油即走溢須以瀝青熬化滴之百草鏡云安息香有水旱二種水安息難得焚其香旁置水盂試之其香煙投水中還結為香惟分兩稍減耳五雜俎云安息香能聚鼠其煙白色如縷直上不散辛平無毒通心神除邪魅闢蠱毒止心痛下鬼胎入心經通腎氣尤益房箔故龜靈劑用之以興陽反魂丹用之以救急然大耗真氣凡氣虛挾火者不可服忌見火藥性考水安息香辛苦性溫除風寒霍亂暖腎興陽治心腹蠱氣血淋遺精鬼交鬼孕熏勞瘵闢瘟丹陳杰回生集用紅棗二斤茵陳切碎八兩大黃切片八兩水安息五錢合為錠每晨焚之種子二方周氏家寶潮腦飛升白霜一兩麝香二錢枯礬三錢龍骨三錢良薑三錢五倍子二錢明雄二錢水安息母丁香酥合油各五錢官桂三錢輕粉二錢紫梢花二錢大山茨菰三錢共為細末煉蜜為丸桐子大臘丸封固月信後納一丸次日再納一丸種子如神並治血淋白帶陰瘡陰蝕楊梅瘡毒等症又方真川附子一個重一兩二三錢者山茨菰四錢此二味要童便浸透焙乾研末川烏八錢五倍子三錢此二味同研末水安息五錢生蟾酥八錢此二味同研不麻草烏五錢明雄五錢此二味同研末官桂五錢母丁香八錢同研末酥合油五錢真鴉片三錢同研末紫梢花三錢蛇床子一兩倭硫黃五錢輕粉五錢上藥為末同白芨五錢煎水合前藥打成錠每行時用津磨少許搽莖首能治精滑並久不生子且能解毒遇瘡不染若早午晚各搽一次久不斷更有神效與前方男婦同用更佳或再加人參五錢尤妙穿腮起管年久不愈許氏方用水安息搽之管化毒愈夜蘭嶺南雜記産粵道旁小樹也狀如木蘭亦類紫薇高一二尺葉大如指頭頗帶藍色葉老則有白篆文如蝸涎名鬼畫符葉下有小花如粟米至晚香聞數十步恍若芝蘭又名蚊驚樹暑月有蚊折此樹逐之即驚散粵語夜蘭木本高尺許葉如槐花如粟米至夜則芳香如蘭折之可以闢蚊插門上蚊不敢入一名蚊驚樹有病取其葉生啖或煎水即吐痰數日而愈葉上有篆文如符又名神符樹關涵嶺南隨筆夜蘭生羅浮幽谷中有香無形與肉芝同為神物與此名同物異敏按粵志步驚木以嫩葉和米數粒微炒煎湯飲之可愈嘔瀉寒痰花有幽香步行遇之往往驚為蕙蘭故亦曰步驚永安人以嫩葉干之持入京師作人事核其功用形狀或即夜蘭歟治一切風寒諸病取葉煎湯服少頃大吐痰涎或行路侵寒暑吐瀉危篤採數葉嚼或吐或不吐病即愈黎椒白胡椒山胡椒馬思答吉邊州見聞録川椒故有名産自黎大所城隅者尤香冽大小必雙肉理細密罅裂而子不墮俗呼抱娃子椒四川志各洲縣多出椒惟茂州出者最佳其殼一開一合者尤妙性同川椒入藥尤效按黎椒近日亦罕有真者外方所得俱屬彼土人以他産偽充其功效亦僅與川椒相埒據劉少府挹清云真者含一二粒口中可闢瘴毒解魚蝦食毒更可為導淫具彼土中有一種生惡瘡妓女人不敢近惟吞黎椒三粒與之接則無害次日便出椒內盡包其毒不入人臟腑也故真者彼土亦珍貴之罕有出售於外者白胡椒通雅云廣舶胡椒有一種玉椒色白味獨辛於他椒今寧波洋貨店頗多其色如雪以內外通白者為上皮白內黃者劣解魚蝦毒入房術用蓬萊李金什言洋舶帶來白胡椒據彼中人云即用胡椒之嫩者生去其皮曬乾即如白玉色非別有他種物理小識胡椒出番國亦是蔓生有白色者或曰即畢澄茄胃痛百草鏡用大紅棗去核七個每個內入白胡椒七粒線扎好飯鍋上蒸七次共搗為丸如緑豆大每服七丸溫滾水下如壯實者用十丸服後痛止而胃中作熱作飢以粥飯壓之即安此寒食痰飲皆治治九種心疼葉天士方丁香去頂蓋廣木香雄黃巴豆去油淨白胡椒各三錢枳殼紅花五靈脂各一兩共為細末好酒發為丸如萊子大候乾收貯瓶內每服八釐唾津送下忌生冷油膩半月除根白痧藥種福堂方白胡椒一兩牙皂一錢火硝檀香末明礬丁香蟾酥各三錢北細辛二錢冰片麝香各五分金箔量加山胡椒百草鏡雲南木邦土司出一種山胡椒色黑顆大主止痛破瘀馬思答吉五雜俎出西域似椒而香酷烈彼土以當椒用主開胃消食破積除邪金剛纂滇志金剛纂花黃而細土人植以為籬又一種形類雞冠湧幢小品金剛纂生天目其樹長不滿三四尺多屈曲雖春夏亦無葉每觸其枝曳裾不前夷緬國有是種相傳銼其末漬水水必毒飲者立死曰人瘴又能借之為誘淫之法張洪使緬録緬地有木曰金剛纂狀如棕櫚枝幹屈曲無葉銼以漬水暴牛馬令渴極而飲之食其肉必死劉魁若程賦統會雲南大候州出金剛纂青色如刺桐最毒滇記云金剛纂碧干而蝟芒孔雀食之其漿殺人以為草者誤今曲江建水石屏處處有之性有大毒入丹術家用丹房本草金剛纂純陽草也伏硫與柳葉藤同用其功最神鍛樹皮本草補泰西有鍛樹呂宋亦有之其色紅狀如杜仲初因人取樹皮包切肉數臠抵家合成一片始知其皮能合肉接骨也因名曰鍛樹本草人參條下所載椴木音賈而此鍛音斷不同或系二種當與有識者辨之敏按椴葉與烏血桕相似而大如團扇有巨齒初生時可裹餅餌蒸食霜後鮮赤若丹楓照耀岩谷其皮柔韌如麻皮烏喇之人採以治繩作魚網入水不濡又可為鳥槍火繩中國所無也治折傷胎疝一切損傷肉破骨斷取皮搗碎煎酒服又以渣敷患處完好如初幼兒患疝由於胎中得者此因皮開裂腸入腎囊疼痛難忍亦能戕命此葉久貼皮膜裂處自然復合永無患矣但非幼童之年則不可治方用鍛樹皮或搗爛或削片以油潤濕黏布上貼患處外以布牢繫腰間或半年三個月方愈黃葛樹川槿皮邊州聞見録蜀多黃葛宜賓學宮前騎牆樹而生根未至地已合抱此樹以某月種每歲必某月始芽入藥用根皮藥肆中多取其皮以代川槿峨嵋山志嘉樹在羅目縣東南三十里陽山江溉兩樹對植圍各二三尺上引橫枝亙二丈相援連理陰庇百夫其名曰黃葛號嘉樹蘇子由詩豫生雖江陽未省到嘉樹即此益部談資黃葛樹葉似桂梢大團欒蔭數畝冬春不凋干則擁腫根皆蟠露土上至於石崖之側則全欲不藉土生者夔之梁方最多惜無材用按王阮亭居易録雲南多黃果似海棠稍大者香如佛手甘脆如梨多津液蜀産者樹而不結實其皮類川槿亦能愈癬今曰黃葛或音之訛耳治疥癬取其根皮煎湯浴之川槿皮生川中色紅皮厚而氣猛烈産孟獲城者只一株傳為武侯遺植殺蟲如神生剝其皮置蟻其上即死今亦罕有他省産者名土槿皮薄而氣劣不得混施今川人多用黃葛皮代之以售他處通雅真川槿皮切斷中有絲白茸如杜仲群芳譜川槿色紅氣厚力優癬瘡楊起簡便方癬瘡不愈以川槿皮煎湯用肥皂去核及內膜浸湯時時擦之或以汁磨雄黃搽尤妙又見不藥良方頑癬多年不愈活人書川槿皮二錢輕粉五分斑蝥七個大楓子七粒河井水共一鍾煎半露一夜筆蘸塗之又方川槿皮四兩輕粉雄黃各四錢百藥煎四餅斑蝥一錢巴霜錢半大黃二兩海桐皮二兩研如粉陰陽水和抓損敷之必待自落愈荷葉癬活人書川槿皮切片海桐皮檳榔各二錢輕粉錢半紅娘子五分陰陽水浸一二日用鵝翎掃上如癢以竹片刮破搽此藥夜露三宿更妙遍身頑癬大楓子四十九枚川槿皮二兩斑蝥去翅足五個川椒一錢輕粉二錢杏仁三錢海桐皮二錢共末河井水各一碗浸一夜鵝翎蘸汁搽之癬瘡不愈不藥良方川槿皮煎湯取肥皂去核及肉膜浸湯內時時搽之牛皮癬癩毛世洪經驗集川槿皮一斤勿見火曬燥磨末以好燒酒十斤加榆面四兩浸七日為度不時蘸酒搽擦二三十年者搽一年斷根如無川槿土槿亦可代之治頑癬種福堂方川槿皮海桐皮尖檳榔樟冰苦參黃柏白芨各二錢雷丸一錢五分大楓子杏仁各二粒木鱉四個用火酒浸七日將穿山甲刮癬少碎以酒搽之即愈五仙散經驗廣集治久年頑癬牛皮癬神效紅粉霜五分明礬川槿皮杏仁各一錢蜜陀僧三錢為末津調抹一日三次三日全愈粉刺孫臺石方川槿皮一兩硫黃二兩杏仁二兩去皮尖輕粉二錢樟腦五錢麝香少許為末雞子清調早洗晚搽祕傳雄鼠骨散治牙落可以重生用雄鼠骨一具生打活雄鼠一個剝去皮雜用鹽水浸一時炭火上炙肉自脫落取骨炙燥入衆藥內同研為末香附白芷川芎桑葉曬乾地骨皮川椒蒲公英青鹽川槿皮旱蓮草共為末擦牙百日復出固齒無不效土漆玉環志皮如桃樹皮黏著人手即發腫若刀瘡見血搗此皮敷之即止止金瘡出血水團花李氏草祕生溪澗近水處葉如蠟梅樹皮似大葉楊五六月開白花園如楊梅葉皮皆可用治金刃傷年久爛腳瘡搗皮葉罨上一宿即痂草祕麻櫪果治胎疝毛世洪經驗集凡小兒初生髮疝只見啼哭不見病形延至一周兩歲始知是疝諸醫不效用麻櫪樹上之鴛鴦果一對其果連樹枝取下可辨真假一對果可治三人荔枝核七枚杵碎平地木三錢同煎飲即瘥亦不復發千張紙木蝴蝶木實也出雲南廣南府形似扁豆其中片片如蟬翼焚灰用治心氣痛按千張紙滇志以為木實據程豹文言千張紙乃仙人掌草曬乾其中心層層作羅紋捲心折之如通草狀故名此物用七張燒灰酒服可治胃脘痛楊桐岡云蘇州有之狀如通草約手掌大曾用入丸中可治浸淫惡瘡今並存其説以俟考本草綱目雜草內有宜南草即此形狀亦同云主邪小兒女以緋絹袋盛佩臂上辟惡止驚而不知其可服食也木蝴蝶出廣中乃樹實也片片輕如蘆中衣膜色白似蝴蝶形故名四邊薄而明中心微厚不甚明透似有子壁錢白膜狀治肝氣痛用二三十張銅銚上焙燥研細好酒調服貼癰疽項秋子云木蝴蝶出廣西儼如蝴蝶中心如竹節色更白凡癰毒不收口以此貼之即斂治下部濕熱風葉稗史郴之桂陽縣産風葉充茗飲能愈頭風故名亦可浸酒性微熱前人志記不載性微熱追風活血可浸酒服拔爾撒摩坤與圖説木名出白露國此樹生脂膏極香烈可入藥敷金刃傷一晝夜肌肉復合如故塗痘不瘢塗尸千年不腐楓果即路路通即楓實一名欇子乃楓樹所結子也外有刺球如栗殼內有核多孔穴俗名路路通以金箔貼之村嫗簪於發云可明目宜老出浙臨安縣署後安樂山者名錢墳楓果最佳焚之香郁可薰衣闢瘴疫綱目楓脂香載其木皮不及其實之用今補之宜於焚燒未有入湯液之用其果冬月即孕楓蠶子於中交春內生蠶每果中有一個立夏後乃化蛾飛去入藥取無蟲陳久者用槐西雜志楓香果出雲南者焚之殺鬼去邪闢瘴濕闢瘴卻瘟明目除濕舒經絡拘攣周身痹痛手腳及腰痛焚之嗅其煙氣皆愈薰衣被可除蚤敏按楓果去外刺皮肉園如蜂窠即路路通其性大能通十二經穴故救生苦海治水腫脹用之以其能搜逐伏水也治癬德勝堂傳方楓木上球十個燒灰存性白砒五釐共末香油搽上即愈臟毒古今良方路路通一個煅存性研末酒煎服咬人狗刺暈臺灣府志咬人狗其木甚松手掐之便長條迸起可為火具木高丈餘葉長大似煙葉有毛刺刺人入毛孔甚癢搔之發紅痛一晝夜乃止治瘰癧臺海使搓録附刺暈李氏草祕其樹形似烏柿有刺刺人即暈故名治癰腫定痛取樹腦葉入醬板鹽花罨發背癰疽腫毒痛甚者罨上即止痛不問已未潰罨至愈桂子桂丁桂耳桂根學圃余蔬有一種四季開花而結實者此真桂也閩中最多常以春中盛開凡桂四季者有子此真桂也江南桂八九月盛開無子此木樨也臨海志唐垂拱四年三月月桂子降臨海芳香有桂氣味食之和暢宋紹定間舒某於天台山得月桂子二升大如樟子無皮色似白玉紋如雀卵中有仁嚼之作芝麻氣以之雜菊入囊為枕有散佚石縫中者旬日輒出樹葉柔長經冬猶在種入盆中久之亦失所在性溫味辛平肝暖胃胃脘寒痛甚宜藥性考甘辛溫中暖胃平肝益腎散寒止噦桂丁百草鏡云形如吳茱萸出廣西交趾乃肉桂子也治心痛闢寒邪胃痛百草鏡桂丁研細酒下三錢桂耳出開化山中乃多年老樹蒸出菌也面紅色土人採得以治血疾治一切血症及吐血按綱目分桂為五種曰桂即今所謂交桂曰牡桂今廣桂曰箘桂俗呼木犀曰天竺桂浙中山桂也有子如蓮曰月桂四季有花者此桂子乃天竺桂子也綱目失載主治若月桂則固載其子矣曰桂丁乃廣桂子綱目亦不言其主治至於桂耳則各桂皆有之性亦略同綱目皆不載悉為補之和霽園夜談隨録呂司馬季弟琪從司馬官嶺南署中有小院頗幽靜舊有古井在軒右井畔有二老桂大合抱值夏夜月光甚皎琪納涼軒下聞井中有聲不絶憑欄窺之見井水白如銀中有紅丸大如彈子約數十百點光明如火向上競相跳躍漸躍漸高去欄僅尺余琪驚白司馬次日命夫縋下探之無他異得桂子數十粒鮮赤如新琪即戲以井水服之日七枚七日而盡蓋適取得四十九枚也後琪壽至九十九歲無疾而逝平原董太史曲江與琪善親見而志之敏按今月桂子如蓮菂鮮者色青干之淡黑色呂琪所見大如彈丸鮮赤如新當別是一種考天地運度經云太山北有桂樹七十株天神青要玉女三千守之其實赤如桔人食之一年可以上升或是此種惜琪公所服只四十九枚耳故得壽桂根陳年入土最深者入藥用貼牙痛可斷根即取桂樹根上皮用學齋咕嗶花中惟岩桂四出豫謂土之生物其數皆五故草木花皆五惟桂乃月中之木居西方地四乃西方金之成數故花四出而金色且開於秋云㮨木似檜亦名水松抱木生者性韌皮同乘鮮剝削造履俗稱抱香履潮州頗多能治濕腳氣辟邪風樟皮樟梨此香樟樹皮也綱目有樟材樟腦樟節而皮與子皆不及焉今山人率以皮子治病有效因急補之樹皮以年久老樟節為佳治天行溫疫濕毒流注浴疥癬洗腳氣心疼玉局方香樟樹皮取時去面上黑色者用內第二層皮搗碎煎湯服即止永不再發刑杖傷神錦方樟樹皮用老酒燉出味調老公雞冠血食止痛散血立效霍亂上吐下瀉傳信方樟樹皮一把水煎溫服立止腳上生瘡家寶方此瘡個個如小筆管大者用樟樹葉牙咬熟略摻拔毒丹外貼樟樹葉連換即愈敏按樟木綱目言辛溫香竄性能除濕故山居人患病多宜之象山縣志萬曆中邑大疫有一道人教人取千年老樟樹皮煎飲可愈並言樹老久飲霜雪其性轉清涼可消疫氣此即藏器所云樟木能治惡氣中惡鬼疰之意樟梨即樟樹子也出處州府遂昌縣福羅塢仙人壩周公園大者為貴小者次之豫友黃慶春與一遂昌人相善其人饋以樟梨云可治心胃脘疼服之立效即香樟子也較他産者略大蓋千年樟樹所結故效如神葉南郊自處州回詢以樟梨據云此非子乃千年樟樹所結於枝丫間者如瘤然土人以形似梨故名之然則此乃樟瘤也然與豫所見又不類姑並存其説以俟再考焉磨塗腫毒治中酒心胃疼皆效榕須藥性考榕葉似大麻子如冬青枝幹拳曲木本稜凹不成材器而結奇香其脂與漆相似可以貼金膠物勝於楮脂嶺南雜記榕樹閩廣最多他省則無故紅梅驛以北無榕大者蔭十餘畝離奇古怪備木之異然體曲不中梁柱理斜不中材用質虛不中薪爨莊子所謂以不材而壽者也漳浦黃石齋先生有榕頌其木年久者常結伽南香焚之致鶴植於水際其子可以肥魚細枝曝乾束為炬風雨不滅其脂乳可以貼金接物與漆同其須可入藥用説文以坰谷匝為古松字六書故以古松字為公匝而坰谷匝為南方之榕通雅云榕當別出狀木始於稽含分字始於戴侗柳宗元詩榕葉滿庭鶯亂啼後山叢談言蔡州壺公觀有大木四垂傍出人莫能識張戣間人嘗至蔡為余言乃榕木此木無用惟枝上垂根曝之可作火繩以發炮又可染黑贊寧志所云倒生木不死樹橫枝生根下地如柱即榕無疑粵志榕之怪在根自上生下語曰榕木倒生根粵志榕葉甚茂盛柯條節節如藤垂其干及三人圍抱則枝上生根連綿拂地得土石之力根又生枝如此數四枝幹互相連屬無上下皆成連理其樹可以倒插以枝為根復以根為枝故一名倒生樹干多中空不堅無所用離之木也其象如離之大腹其中空處常産香木炎精所結往往有伽南焉粵人以其香可來鶴子可肥魚多植於水際其樹脂可以貼金接物與漆相似性畏寒逾梅嶺則不生故紅梅嶺有數榕為炎塞之界有紅白大葉小葉數種按泉州府志榕有二種一種矮而盤桓其須著地復生為樹一種名赤榕上聳廣大二種蔭最寬廣入藥用有須者固齒羲復方止牙痛取榕根鬚摘斷入竹管內將監塞滿以泥封固火煅存性為末擦牙搖動者亦堅竹管不用櫚七樹治腹中蛔痛救生苦海用櫚七樹柴內取之燒灰研細酒下或滾水下三錢且能除根破傷風百草鏡櫚七樹刮去外面粗皮取內白皮搗爛酒煎服渣和白麵搗敷患處自愈柏癭百草鏡老樹生此其狀如瘤柏性西指乃稟西方兌金之氣故能平胃土而治胃痛亦取其氣相攝服耳治胃痛柏子殼綱目有柏實無子殼近時奇功散用之解砒霜如神集驗良方奇功散用柏子殼三錢炒紅土三錢同研為末用雞子清調服服後作一寒顫即愈重者不過兩服松球松皮膏此即山松所結卵球初青久則裂作鱗甲形片片四開而墜兒童拾之盈筐攜入市貨與茶爐代炭能益茶味入藥取青嫩者綱目松下列松實云見果部不知果部乃海松子出關東與山松異山松球內老亦有子細如粟米不中食品白點風家寶方先以蔥花椒甘草三味煎湯洗再以青嫩松球蘸雞子白硫黃同磨如粉搽上八九次除根松皮膏色如琥珀出西域伊犁等處西域聞見録烏魯木齊乾隆四十年改為迪化州其土人取松皮為膏謂之松樹膏藥性溫治血一切虛怯勞瘵婦女血枯血閉諸症服之有效陳海曙家有此膏自西域帶來黑如漆上蓋松皮一塊云其松皮厚者二三尺即此皮所熬曾以治勞嗽十日病減又十日而病痊又十日而生肌漸復如舊每服三錢空心白水調下服一月無不愈者槐西雜志田耕野官涼州鎮時攜回萬年松一片性溫而活血煎之色如琥珀婦女血枯血閉諸症服之多驗親串家遞相乞取久而遂盡後豫至西域乃見其樹直古松之皮非別一種也土人煮以代茶亦微有香氣其最大者根在千仞深澗底枝幹直出山脊尚高二三十丈皮厚者二尺有餘奴子吳玉保嘗取其一片為床意直盤古時物萬年之名殆不虛矣羅汗松實物理小識羅汗松闊瓣厚葉樹老結實長四五分底平上鋭色紫黑干之可入藥本草綱目所未載也永寧僧云羅汗松葉長者名長青能結實葉短者名短青不結實其結實儼如佛大者如雞子小者如豆味甘可食味甘補腎其香益肺治心胃痛大補元氣汪連仕採藥書羅汗松一名金錢松又名徑松其皮治一切血殺蟲瘴癬合蘆薈香油調搽金松物理小識出臺州垂條結子如碧珠三年子乃一熟每歲生者相續璀燦其間子治腸風山西柏油松油其色黑若紫者系此油腳也其氣若松香竹箸挑之懸絲不斷者真殺壁蝨凡人家床凡板壁患此者以油滴縫內其蝨盡死又搽禿瘡治癬集驗良方真柏油四兩黃蠟一兩雄豬膽一個斑蝥三錢川椒去目並閉口者三錢先將斑蝥川椒二味研末聽用次將生柏油入砂鍋內熬極熟似有生煙之狀然後將蠟入油內熔化再將豬膽汁傾入即離火將斑蝥川椒二味末子拌入用竹節急急攪勻將藥放在滾水盆上浸三日去火毒然後入瓷罐內封固聽用治諸般癬多年近日癰毒生柏油一瓶塗患處後用年老枯桑柴火燻烤內有毒蟲即死待好即止如一次尚不瘳再熏即愈又癬方經驗廣集真柏油調輕粉塗上起泡泡消即愈治狗癬疹同壽録用柏油不拘多少鐵杓內熬次下鵓鴿糞雞糞同和加香油少許擦之治頭面耳上黃水瘡活人書真柏油真香油各二兩同熬成膏搽上如神赤遊丹醫林集祕蜒蝣十條土蛛窠五六個出草屋老壁內柏油舊漆器上刮下漆少許共搗以柏油調搽患處立愈松油其取油法以有油老松柴截二三寸長劈如燈心粗用麻線扎把如茶杯口大再用水盆一個內盛水半盆以碗一隻坐於水盆內用席一塊蓋於碗上中挖一孔如錢大再以扎好松把直豎放於席孔中間以火點著少時再以爐灰周圍上下蓋緊勿令走煙如走煙其油則無候溫養一二時其油盡滴碗內去灰席取出聽用一名瀝油治疥瘡久遠不愈百藥不效以此油新浴後擦之或加白礬末少許和擦更妙茶油即梣樹子油枯餅乃梣樹子油也豫省閩粵皆食茶油而不知為梣樹子油俗呼茶油實非茶子之油也煎熬不熟食之令人瀉味甘性涼氣腥色緑潤腸清胃殺蟲解毒不宜生食燃燈益目抹發解䐈枯餅藥性考云餅能浣衣除垢最潔燒灰敷瘡亦可下積洗風瘙癢可用皮葉杉木油經驗廣集有取杉木油法用紙糊碗麵以杉木屑堆碗上取炭火放屑頂燒著少時火將近紙即用鐵箸抹去燒數次開碗看即有油汁在碗內治一切頑癬先用穿山甲刮破用羊毛軟筆蘸油塗上甚加疼痛停半日再塗癬自結痂而愈如已破者不必刮癬藥極多都不及此真神方也清明插簷柳清明日插在屋簷下枯柳枝朝南者入藥物類相感志清明楊柳能止醬醋之潮溢甜瘡濟世良方以清明插過柳枝燒存性一錢銀硃七分共研再入飛礬一分敷之小兒胎火不尿濟急方凡初生小兒小便不通乃是胎中熱毒未化不可用寒涼金石之劑只須取清明插簷柳枝朝南者一握煎湯服之即尿大人小便閉服之亦效治尿梗周子象方用清明插屋簷下枯柳一大把折碎煎湯傾坐桶內被圍住熏片時即通再內服白濁盧復芷園臆草清明所插柳條煎之治白濁蓋勢為肝苗柳為卯木同類也渾濁之色清明之氣相待也用藥恰好有如此下痢後成醃魚水此險症也慈惠小編用清明人家插簷柳取葉來煎湯下如止可救起病不多日下醃魚水年少者方可治老者難治少者勞傷之症肉而化成血水平和調理可以挽回十分之二三老者血氣久成衰弱故成此症神仙難治柳椹柳屑柳菌此乃柳花未放時其枝垂下如椹形所謂柳蕊也淡黃色若俟花出則無用矣綱目有柳華無柳椹別録乃有柳實或即此歟明目驅風壯筋骨堅牙齒岣嶁神書有柳椹牢牙法以柳椹揩牙去其宣露諸風不生明目駐顏黑髮聰耳壯筋力益壽輕身急救方柳椹陰乾為末日用擦牙去風明目烏髮固齒久用不徹可咀金石柳屑即空心柳樹中屑也治濕氣腿腫慈幼筏淮陰卑濕民多粗腿偶得一法治之甚效用空心柳樹中屑取出篩細入鍋內炒熱以臭泔水灑濕又炒加面少許拌勻趁熱取起敷腿上候水出再炒敷數次自愈柳菌陳氏筆記云柳樹上菌也煎服治心痛柳柳俗名西河柳性最透發綱目柳柳下云其枝葉消痞解酒毒利小便不及治疹瘄之用宏治紹興府志柳俗呼西河柳其葉甚細似桐而香天將雨水則生花試之多驗本草匯柳柳甘得土氣鹹得水氣故能解血分之毒消痞利便是其本功近世往往以治痧疹熱毒不出用為發散不知本自何氏本草乘雅之柳柳繆仲淳本草經疏廣之以治痧疹此不獨取其能通又取其象形疹亦三顯三隱三而三之合為九烹以應九藏也芷園臆草柳一歲三開花一日三眠起自成一家不與四時之生長收藏相流行超五行而純二氣無殺機而唯生機者也且雨以陰陽氣和而作先知之應從可知矣第氣魄鮮小未可以大道載靈樞陰陽二十五人之外有陰陽五人此當屬陰陽和平之人又當啓陰陽自和之汗也逢原云柳柳獨入陽明故其功吉發麻疹兼解酒毒去風煎湯洗浴風症身癢效性平疏散驅風解表治斑疹麻瘄不出經驗方或因風而閉者俱用西河柳葉同櫻桃核煎湯洗之即透出救生苦海草痧藥方用之又肝天清蓮散用之急救方治小兒痧疹不出喘嗽煩悶躁亂用西河柳葉風乾為末水調四錢頓服立定疹後痢從新用西河柳葉為末砂糖調服疹發不透喘嗽悶亂西河柳煎湯去渣半溫用芫荽蘸水擦之但勿洗頭面並忌夜間洗之蓋痧疹晝發而夜斂也乳母及兒仍以西河柳煎服酒積成病良方集要西河柳曬乾為末每服一錢溫酒送下桑癭鐵扇子桑榾柮桑葉滋桑油百草鏡桑老則樹生癭其壯如瘤用刀斫下陰乾入藥去風痹諸濕浸酒用治胃痛百草鏡鐵扇子百草鏡桑葉採過二桑者勿用只採過頭葉其二葉力全至大雪後猶青於枝上或黃枯於枝上皆可用須經大雪壓過次日雪晴採下線穿懸戶陰乾其色多青黑色風吹作鐵氣聲故名鐵扇子冬至後採者良治腸風目疾咳嗽盜汗百草鏡洗一切天行時眼風熱腫痛目澀眩赤取鐵扇子二張用無油茶碗一隻要有蓋者置鐵扇子於中以滾水沖半盞蓋好候湯溫其色黃緑如濃茶樣為出味然後洗眼拭乾隔一二時再以藥汁碗隔水頓熱再洗每日洗三五次即愈此水一盞可洗三四十人養素園驗方中年眼目昏花眼科要覽復明散用經霜雪桑葉葉須臘月在樹不落者同甘菊側柏葉荊芥穗桑白皮如有眵淚加艾葉蒼朮發癢加赤芍川椒為粗末等分和勻煎湯熏洗惟紅腫者不可洗風眼下淚不藥良方臘月不落桑葉煎湯日日溫洗之或加入芒硝少許桑榾柮乃多年老桑數被剪伐嫩條其枝頭長成如拳者是也治膈症梁侯瀛集驗方用老桑榾柮燒紅存性為末好酒送下即愈桑葉滋鮮桑葉摘開其葉筋有白汁名桑葉滋又名桑脂綱目桑葉載其用最廣獨未及此性微寒味苦有天絲入眼以此點之山海草函桑葉滋點眼治蜈蚣咬治乳癰集聽用桑葉不拘頭二葉摘取半段取後半段脂三分黃柏八錢水煎乾只用三分飯鍋蒸一次夜露一宿塗患處雖爛見骨者亦能收口平復小石癤今人呼為扎馬疔錢峻經驗單方云小石癤採二蠶桑葉滴下滋水點上愈消癭瘤秋泉祕方用蝌蚪一錢蛇蛻泥球包煅為末三分鬼饅頭滋幹一錢桑滋幹一錢乳香沒藥各三分麝香一分共為細末飯和搗為錠臨用時再取鬼饅頭滋化開以雞翎搽患處過宿即消桑油萬氏家抄有取桑油法鮮桑木捶碎裝入瓶內用一瓶蓋口倒埋土中粳火煨之油自滴下貯罐聽用治小兒身面爛瘡輕粉雄黃各五錢豬膽一個滑石一兩硫黃五錢穿山甲十五片炙鳳凰退燒存性五錢為末用桑油豬膽汁調絹包擦之伽備香今俗作奇楠乘雅作奇南棧香棧木速香名而廣人亦呼奇南為棧名同而香異也粵海香語伽備雜出海上諸山凡香木之枝柯竅露者木立死而本存者氣性皆溫故為大蟻所穴大蟻所食石蜜遺漬其中歲久漸浸木受石蜜氣多凝而堅潤則成伽備其香木未死蜜氣未老者謂之生結上也木死本存蜜氣膏於枯根潤若餳片者謂之糖結次也歲月既淺木蜜之氣未融木性多而香味少謂之虎斑金絲結又次也其色如鴨頭緑者名緑結掐之痕生釋之痕合按之可圓放之仍方鋸則細屑成團又名油結上之上也伽備本與沉香同類而分陰陽或謂沉牝也味苦而性利其香含藏燒乃芳烈陰體陽用也伽備牡也味辛而氣甜甘香勃發而性能閉二便陽體陰用也然以洋伽備為上産占城者剖之香甚輕微然久而不減産瓊者名土伽備狀如油速剖之香特酷烈然手汗沾濡數月即減必須濯以清泉膏以蘇合油或以甘蔗心藏之以白萼葉苴之瘞土數月日中稍曝之而後香魂乃復也占城者靜而常存瓊者動而易散靜者香以神行動者香以氣使也藏者以錫為匣中為一槅而多竅蜜其下伽備其上使熏炙以為滋潤又以伽備末養之他香末則不香以其本香返其魂雖微塵許而其元可復其精多而氣厚故也尋常時勿使見水勿使見燥風黴濕土則藏之否則香氣耗散本草乘雅云奇南與沉同類因樹分牝牡則陰陽形質臭味情性各各差別其成沉之本為牝為陰故味苦厚性通利臭含藏燃之臭轉勝陰體而陽用藏精而起亟也成南之本為牡為陽故味辛辣臭顯發性禁止能閉二便陽體而陰用衛外而為固也至若等分黃棧品成四結狀肖四十有二則一矣沉香有四十二品第牝多而牡少獨奇南世稱至貴即黃棧二等亦得因之以論高下沉本黃熟固坎端棕透淺而材白臭亦易散奇本黃熟不唯棕透而黃質邃理猶加熟色遠勝生香爇炙經旬尚襲襲難過也棧即奇南渡重者曰金絲其熟結生結蟲漏脫落四品雖統稱奇南結而四品之中又有分別油結糖結蜜結緑結金絲結為生為熟為漏為落井然成秩耳大都沉香所重在質故通體作香入水便沉奇南雖結同四品不唯味極辛辣著舌便木顧四結之中每必抱木曰油曰糖曰蜜曰緑曰金絲色相生成迹迥別也奇南一品本草失載後人僅施房術及佩圍系握之供取氣臭尚爾希奇用其形味想更特異沉以力行行止為用奇以力行止行為體體中設用用中具體牝牡陰陽互呈先後可默會矣宦遊筆記伽備一作琪𪻳出粵東海上諸山即沉香木之佳者黃蠟沉也香木枝柯竅露大蟻穴其竅蟻食石蜜歸而遺香其中歲久漸漬木受蜜氣結而堅潤則香成矣香成則木漸壞其旁草樹咸枯有生結者紅而堅糖結者黑而軟瓊草亦有土伽備白質黑點今南海人取沉速伽備於深山中見有蟻封高二三尺隨挖之則其下必有異香南中香品不下數百種然諸香賦性多燥烈熏燒日久能令人發白血枯唯伽備香氣溫細性甚益人而範石湖桂海香志獨不載及詎不使寶鴨金猊之間少一韻事乎但佳者近亦難得陳讓海外逸説伽備與沉香並生沉香質堅雕剔之如刀刮竹伽備質軟指刻之如錐畫沙味辣有脂嚼之黏牙其氣上升故老人佩之少便溺焉上者曰鶯歌緑色如鶯毛最為難得次曰蘭花結色微緑而黑又次曰金絲結色微黃再次曰糖結黃色者是也下日鐵結色黑而微堅皆各有膏膩匠人以雞刺木雞骨香及速香雲頭香之類澤以伽備之液屑偽充之物理小識云奇南與沉同類自分陰陽沉牝也味苦性利其香含藏燒更芳烈陰體陽用也奇南牡也味辣沾舌麻木其香忽發而性能閉二便陽體陰用也其品有緑結油糖蜜結金絲虎斑等鋸之其屑成團舶來者佳東西洋考交趾産奇南以手爪刺之能入爪既出香痕復合又有奇楠香油真者難得今人以奇楠香碎片漬油中蠟熬之而成微有香氣此偽品也黎愧曾仁恕堂筆記柬埔寨日本支國也夜中不睹奎宿國人多騎象産奇楠其取奇楠之法國人先期割牲密禱卜有無走密林中聽樹頭有如小兒語者便急數斧而返遲則有鬼搏人隔年始一往取先上王及三人𮕹讀如馬彼國專政之將軍也重加洗剔視上者留之厚酬其值次者下者乃聽別售也查浦輯聞榕樹千年者其上産伽備香金立夫言盛侯為粵海監督時須上號伽備入貢命十三洋行於外洋各處購求歲余竟無佳者據云惟舊器物中還有所謂油結色緑掐之痕生釋之漸合者今海外諸山皆難得矣即占城所産香氣輕微久而不減冬寒香藏春暖香發靜而常存者是蜜結嗅之香甜其味辛辣入手柔嫩而體輕為上上品今時亦罕有其熟結生結蟲漏脫落四結之中每必抱木曰油曰糖曰蜜曰緑曰金絲其生結者紅而堅糖結者黑而軟或黃或黑或黃黑相兼或黑質白點花色相生成迹逈別也現在粵中所産者與東莞縣産之女兒香柑似色淡黃木嫩而無滋膩質粗松者氣味薄久藏不香非香液屑養不可不足寶貴其入藥功力亦薄識者辨之味辛性斂佩之縮二便固脾保腎入湯劑能閉精固氣故房術多用之不知氣脫必陷之症可以留魂駐魄也瀕湖綱目香木類三十五種質汗返魂尚搜奇必備而獨遣此何歟藥性考伽備味辛下氣辟惡風痰閉塞精鬼蠱著通竅醒神邪風追卻十香返魂丹中配藥以香中帶辛辣紅堅者佳其次黑軟至虎斑金絲皆雜木性下品也藏奇南香以錫匣貯蜜蘇合鑿竅為隔則潤若枯者用白萼葉苴之瘞土數月即復日中少曝尤香忍溺法物理小識伽備糖結末作膏貼會陰穴則溺不出特迦香五雜俎出弱水西形如雀卵色頗淡白焚之辟邪去穢鬼魅避之情物志載漢武帝焚西使香宮中病者盡起徐審得鷹嘴香焚之一家獨不疫疾即此類歟辟邪去疫安魂魄定驚悸氣結出交趾真臘占城瓊海等處單斗南云此乃伽備香樹中空腹內所結借伽備芬烈之氣得日月雨露之精凝結而成故名氣結形亦同香塊而酥潤松膩不甚堅大約伽備得其質此得其魂亦如天生黃出湯泉為硫氣熏結而成者然頗難得世不多見治噎隔用一二釐酒磨服下咽即開飛沉香查浦輯聞海南人採香夜宿香林下望某樹有光即以斧斫之記其處曉乃伐取必得美香又見光從某樹飛交某樹乃雌雄相感亦斧痕記取之得飛沉香功用更大此香能和陰陽二氣可升可降外達皮毛內入骨髓益血明目活絡舒筋方輿志生黎居五指山山在瓊州山中所産有沉香青桂香雞骨香馬蹄棧香同是一本其本頗類椿及櫸柳葉似桔花白子若檳榔大如桑椹交州人謂之蜜香欲取者先斷其積年老根經歲皮乾朽爛而木心與枝節不壞者即香也堅黑沉水者為沉香細枝堅實不爛者為青桂半沉半浮者為雞骨形如馬蹄者為馬蹄粗者為棧香地蠟香黃夢珠輪絶句云石火平分地蠟香注云地蠟香出哈密可闢蚤蝨闢蚤蝨金雞勒查慎行人海記西洋有一種樹皮名金雞勒以治瘧一服即愈嘉慶五年豫宗人晉齋自粵東歸帶得此物出以相示細枝中空儼如去骨遠志味微辛云能走達營衛大約性熱專捷行氣血也治瘧澳番相傳不論何瘧用金雞勒一錢肉桂五分同煎服壯實人金雞勒可用二錢一服即愈解酒煎湯下咽即醒亦澳番傳臭梧桐臭牡丹生人家牆砌下甚多一名芙蓉根葉深緑色大暑後開花紅而淡似芙蓉外苞內蕊花白五出瓣尖蒂紅霜降後苞紅中有實作紫翠色百草鏡云一名臭芙蓉其葉圓尖不甚大搓之氣臭葉上有紅筋夏開花外有紅苞成簇色白五瓣結實青圓如豆十一月熟藍色花葉皮俱入藥周廷園云臭梧桐一年三月十月兩次作花若葉無紅筋搓之不臭者非學圃余疏臭梧桐者吳地野産花色淡無植之者淮揚間成大樹花微紅者縉神家植之中庭或云後庭花也獨閩中此花鮮紅異常能開百日名百日紅花作長鬚亦與吳地不同園林中植之灼灼出矮牆上至生深澗中與清泉白石相映永嘉人謂之丁香花汪連仕採藥書秋葉俗呼八角梧桐味臭又名臭梧桐取根皮搗汁如膠為土阿魏能寬筋活血化痞消症群芳譜臭梧桐生南海及雷州近海州郡亦有之葉大如手作三花尖長青不凋皮若梓白而堅韌可作繩入水不爛花細白如丁香而臭味不甚美遠觀可也人家園內多植之皮堪入藥採取無時敏按臭桐與梧桐有家野之別家生者成樹而高大野生者本小不成樹不過三四尺花色粉紅亦無大紅純白者二種俱可入藥功用亦相近治獨腳楊梅瘡洗鵝掌風一切瘡疥煎湯洗汗斑濕火腿腫久不愈者同菴䕡子浸酒服並能治一切風濕止痔腫煎酒服貼臁瘡搗爛作餅加桐油貼神效半支風百草鏡取葉連根挂於風頭廊下吹乾將葉燒灰入瓶內每早服三錢酒吞又邢虎臣驗方用臭梧桐葉並梗曬燥磨末共二斤用白蜜一斤為丸早滾水下晚酒下每服三錢驗過神效治半邊頭痛用川椒五錢臭梧桐葉二兩先將桐葉炒黃次入椒再炒以火酒灑在鍋內拌和取起卷在綢內扎在痛處吃熱酒一碗取被蓋頸而睡出汗即愈一切內外痔急救方用臭梧桐葉七片瓦松七枝皮硝三錢煎湯熏洗神效花治風氣頭風集聽凡頭風用臭梧桐花陰乾燒灰存性為末每服二錢臨臥酒下三服無不愈止痢必效方用隔年臭梧桐花煎湯服即愈葉消臌脹疝救生苦海臭梧桐葉一百片煎湯服三四次拄心疝華玉先試效之方臭梧桐葉每歲用一片共歲若干葉若干清水洗葉用無灰白酒煎服外痔黃氏醫抄用臭梧桐葉煎湯洗數次愈梧桐酒經驗廣集治內外一切乳毒用臭梧桐春夏取頭三個秋冬取根搗爛絞汁對陳酒熱服取汗為度神效豨桐丸濟世養生集此丸治男婦感受風濕或嗜飲冒風內濕外邪傳於四肢脈絡壅塞不舒以致兩足軟痠疼痛不能步履或兩手牽絆不能仰舉凡辛勞之人常患此症狀似風癱服此丸立能全愈用地梧桐俗謂臭梧桐不論花葉梗子曬乾切碎為末一斤豨蘞草炒磨末八兩二味和勻蜜丸如梧子大早晚以白滾湯送下四錢忌食豬肝羊血番茄等物或單用臭梧桐二兩煎湯飲以酒送之連服十劑其痛即瘥或煎湯洗手足亦可莖中蟲治風毒流注臭牡丹葉形與臭梧桐相同但薄而糙氣亦臭五月開花成朵一蒂百花色粉紅洗痔瘡治疔赤水元珠蒼耳臭牡丹各一大握搗爛新汲水調服瀉下黑水即愈一切癰疽淳安陳老醫云用臭牡丹枝葉搗爛罨之立消脫肛祕方集驗先將臭梧桐葉煎湯洗後將浮萍草末摻上不脫矣應昌按梧桐二字疑牡丹之訛否則此方宜列入臭梧桐諸方之內惜不得原書正之木八角草八角木高二三尺葉如木芙蓉八角有芒其葉近蒂處有紅色者佳秋開白花細簇取近根皮用唐王周金盤草詩注金盤草生寧江巫山南陵林木中其根一年生一節人採而服可解毒也其詩云今春從南陵得草名金盤金盤有仁性生在林木端根節歲一節食之甘而酸風俗競採掇俾人防急難巴中蛇虺毒解之如走丸巨葉展六出軟干分長竿搖搖緑玉活裊裊香荷寒世云酷暑月郁有神物看天之産於此意欲生民安云云味詩意則似今之草八角其性又能解蛇毒也苦辛溫有毒治麻痹風毒打撲瘀血停積其氣猛悍能開通壅塞痛麻立止虛人慎用草八角藥鑑出於潛昌化深山中葉角仰上色黃獨莖一葉五六月開花雙朵成對粉紅色下垂根圓而不長俗名孩兒撑傘百草鏡云草八角高尺許根生疙瘩獨莖一葉入秋開花只有兩朵相對粉紅色又名紅孩兒結子紅色成對如孩兒也其根可以消毒入藥得草本者良根治癰毒余功同木八角葛祖方性溫治骨內之風按八角金盤有草木二種木本者其葉尖角仰起如盤之狀葉背色黃故曰金盤草本者葉尖角不仰葉背不黃微有分別此藥性熱力猛有毒咀之味麻雖壯實人亦宜少用服藥後忌魚腥豬羊牛馬等肉犯之令人癲狂惟白菜蔔應昌按菜字疑萊字之訛否則菜字下當補一萊字可解入藥用近根皮酒煎服取汗即愈力弱者發戰作吐病亦愈戚孔昭云木八角之須乃麻黃未知確否鳥不宿俗名老虎草又名昏樹晚娘棒梗赤長三四尺本有刺開黃花成穗其根下蟲治風毒流注神效綱目有楤木名鵲不踏與此別性熱追風定痛有透骨之妙治風毒流注風痹跌打勞怯合保生丸治虛勞如神下胎催生汪連仕採藥書鳥不宿又名鳥不踏又名刺根白皮性溫行血追風治紫雲風大麻風筋骨疼痛濟世良方婦人將産時以鳥不宿莖葉銼碎一大把加甘草一錢酒水各半煎一大鐘服之易産且産後無病其葉如杏葉而枝梗有刺鳥不可宿故名又名石米刺跌蹼百草鏡鳥不宿根皮鮮者一錢乾者七分加入藥中煎服取汗極妙難産家寶方鳥不宿葉一兩甘草五錢好酒二碗煎一碗或一次二次服即産敏按救生苦海云茨梧桐又名晚娘棒多生山塢最高者四尺許皮色如桑細者大如大指老者大如甘蔗若根曲而皮色紫者非也取根去泥剝其白皮搗汁用二鍾加米醋一鍾清水半鍾和勻口中噙咽可治雙單蛾若喉閉用鵝毛攪之即開噙咽如前吐出痰涎三四碗即能飲食如常此乃以色紫者為非晚娘棒或同名而物異耶存以備考破布葉廣東通志從肇慶新橋而上人煙寥落山路多歧乃三縣交界之區舟人及此險地即燃夢香客皆醋臥昏迷遂被啓鐍易資財以礫塊封識宛然若枕間置水一盂則迷藥皆渙散矣又有藥名破布葉可解行者歌曰身無破布葉莫上夢香船按廣志注夢香船中以胡蔓草合香焚之人即迷悶解夢香毒能醒迷肇慶志破布葉出陽江陽春恩平狀如掌而緑嶺南舟人多用香煙及毒水迷悶過客以此草煎湯服之立解天成沙生蘇木中劈破取之但難得須囑染坊陸續收存不拘多少入藥用治卒心痛救生苦海以天成沙溫酒和服治心痛神效淡竹殼此乃淡竹嫩時所苞籜解下者是綱目竹條止載慈竹籜而淡竹略焉不知其性能去目翳功同熊膽故為補之此君丹治翳一草亭眼科方用淡竹殼不拘多寡以布拭去毛燒灰存性每藥一錢加麝香三五釐同擂細末點在翳上最妙桃絲竹二黃李氏草祕諸癰瘡痘疔爛久不愈用桃絲竹刮取二黃為末敷之降痰火煎服功勝淡竹茹治蛇咬天蛇毒王安採藥方治發背不長肉取桃竹茹作餅貼之血崩取竹青炒末水調服桃竹筍治六畜瘡癰內蛆煎湯洗之即絶草祕白濁煎服即愈草祕桃竹筍殼治楊梅瘡煅灰酒調服王安竹衣此乃金竹內衣膜劈竹取鮮者入藥治喉啞勞嗽張景嶽古方因陳治一切勞瘵痰嗽聲啞不出難治者服之神效用鮮竹衣一錢竹茹彈子大一丸即金竹青皮也刮取之竹瀝即取金竹燒取麥冬二錢甘草橘紅各五分白茯苓桔梗各一錢杏仁七粒去皮尖研水一鍾半加竹葉十四片煎七分入竹瀝一杯和勻服枸橘今之臭橘山野甚多實小殼薄枝多刺而實臭人多棄之綱目枸橘條下葉刺核樹皮俱收而其實獨略葉天士家抄本草有主治特録出補之入藥陳者佳橘録枸橘色青氣烈小者似枳實大者似枳殼近時難得枳實人多植枸橘於籬落間收其實剖干之以和藥味與商州之枳幾逼真矣療子癰及疝氣俱取整個枸橘煅存性研末陳酒送服解酒毒逢原胃脘結痛取枸橘實煅存性酒服方寸匕內傷諸痛以實醋浸熬膏貼須久貼方不復發以其力能破氣散熱也葉底紅乃小木也生山土長不過一二尺葉如石楠四月生蕊五六朵成簇垂如脂麻鈴樣花作青白色六七月結小子如天竺子霜後色紅儼如天竺子而大俗呼矮腳樟以其似樟葉而本短也山人每掘之入市售作盆玩又名葉下紅李氏草祕葉下紅一名平地木長五六寸莖圓葉下生紅子生山隰等處治吐血楊春涯經驗方葉底紅即矮腳樟用二兩洗淨木槌搗爛豬肺一個洗血淨將葉入肺管內河井水各三碗煮爛至五更去葉連湯食之一二次愈多食絶後患陶殿元語豫云某撫軍得宮傳祕方治吐血勞傷怯症垂危久嗽成勞無不立愈曾經試驗多人用平地木葉乾者三錢豬肺連心一具水洗淨血用白湯焯過以瓦片挑開肺管將葉包裹麻線縛好再入水煮熟先吃肺湯然後去藥食肺若嫌味淡以清醬蘸食食一肺後病勢自減食三肺無不愈者但所用乃平地木與葉下紅有別或一類相同其性本通耶治偏墜疝氣李氏草祕搗汁沖酒服半碗屢效茶樹根爛茶葉經霜老茶葉綱目茶子茶油俱載惟茶根及爛葉經霜老茶葉未收故補之口爛救生苦海茶樹根煎湯代茶不時飲味最苦食之立效爛茶葉此乃泡過殘茶積存瓷罐內如若干燥以殘茶汁添入愈久愈妙治無名腫毒犬咬及火燒成瘡俱效如神搗爛似泥敷之干則以茶汁潤濕抹去再換敷五六次全愈救生苦海痘毒家寶方用泡過茶葉曬乾為末五倍子各等分雞子清調敷諸毒努肉不退保和堂祕方硫黃研細末敷上即退再用後收口藥爛茶葉五錢烏梅三個燒灰共為末敷上即收經霜老茶葉治羊癲瘋家寶方用一兩為末同生明礬五錢為細末水法丸硃砂作衣每服三錢白滾湯送下三服痊愈好吃茶葉家寶方即以茶葉入肉汁湯內飯鍋上蒸吃二三次即不喜吃雨前茶産杭之龍井者佳蓮心第一旗槍次之土人於穀雨前採撮成茗故名三年外陳者入藥新者有火氣清咽喉明目補元氣益心神通七竅性寒而不烈以其味甘益土消而不峻以其得先春之氣消宿食下氣去噫氣清六經火下疳外科全書雨前茶麻黃各一錢五分用連四紙方七寸許用鉛粉錢半擦紙上鋪前二藥捲成筒子火灼存性研細加冰片各一分研勻用之偏正頭風醫方集聽升麻六錢生地五錢雨前茶四錢黃芩一錢黃連一錢水煎服又治頭風百發百中赤白首烏各一兩真川芎一兩藁本二錢細辛一錢蘇葉一錢此散邪方也風寒甚者可加川羌活川烏服以此散邪不愈便進後方真雨前茶四錢赤白首烏各二錢北細辛四分米仁一錢五分炒牛膝八分大川芎一錢五分甘草五分煎藥時令病者以鼻引藥氣服後宜密室避風至重者四帖全愈加金銀花二錢更效若生過楊梅瘡者加土茯苓四兩煎湯煎藥肚脹集聽凡人肚脹不思飲食用五虎湯治之核桃川芎紫蘇雨前茶以上藥先煎好好時加老薑砂糖在湯內即服三陰瘧集聽真雨前茶三錢胡桃肉五錢敲碎川芎五分寒多加胡椒三分未發前入茶壺內以滾水沖泡乘熱頻頻服之吃到臨發時不可住不論新久諸瘧慈航活人書白芥子一兩炒為末雨前茶和服一撮瘧久者不過二次即愈遠年痢鳳聯堂驗方臭椿皮一兩五錢雨前茶錢半扁柏葉二錢五分烏梅棗頭各二枚酒水各一碗煎好緩緩服恐泛五色痢慈惠編陳年年糕陳雨前茶冰糖茉莉花共煎湯一盞服之立愈消痰止嗽膏米白糖一斤豬板油四兩雨前茶二兩水四碗先將茶葉煎至二碗半再將板油去膜切碎連苦茶米糖同下熬化聽用白滾湯沖數匙服之治痞蜈蚣一條用頂好細茶葉煎服以身癢為度醫學指南又家寶方治痞陳年雨前茶一兩枳殼三錢水煎渣再煎次日服傷寒無汗彙集用白糖雨前茶入水熬數沸服下汗出即愈加生薑又治紅白痢疾療豬癲羊兒瘋陳氏筆記用晉礬一斤雨前茶一斤為末茶汁米飲為丸每服四十九丸發日前用二服茶送下風痰癇病生白礬一兩細茶五錢為末蜜丸桐子大一歲十丸茶湯下大人五十丸久服痰自大便中出斷病根指南風眼爛皮眼科要覽甘石童便淬七次黃連汁淬七次雨前茶淬七次出火氣入冰麝研勻點頭風滿頭作痛家寶方川芎七錢明天麻三錢雨前茶一錢酒一碗煎六分渣再用酒一碗煎四五分晚服過夜即愈楊梅瘡雄黃四兩雨前茶四兩生芝麻四兩共為細末黃米磨細粉糊為丸桐子大每早白湯下三錢家寶上清丸蘇薄荷二兩雨前茶白硼砂各七錢烏梅肉貝母訶子各三錢冰片三分煉蜜為丸風寒無汗發熱頭痛者用核桃肉蔥白雨前茶生薑等分水一鍾煎七分熱服覆衣取汗氣虛頭痛不藥良方用上春茶末調成膏置瓦盞內覆轉以巴豆四十粒作二次燒煙燻之曬乾擂細每服一字別入好茶末食後絞白湯服之立愈肩背筋骨痛醫學指南槐子核桃肉細茶葉脂麻各五錢入瓷罐內二碗熬一半熱服神效五虎湯治外邪在表無汗而喘者麻黃三錢杏仁去皮尖三錢石膏五錢甘草一錢細茶一撮有痰加二陳湯生薑蔥水煎熱服加桑白皮一錢尤效醫學指南千杯不醉乾葛橄欖細茶等分為末逢半酣時以茶服下普洱茶出雲南普洱府成團有大中小三等雲南志普洱山在車裡軍民宣慰司北其上産茶性溫味香名普洱茶南詔備考普洱府出茶産攸樂革登倚邦莽枝蠻專慢撒六茶山而以倚邦蠻專者味較勝味苦性刻解油膩牛羊毒虛人禁用苦澀逐痰下氣刮腸通泄按普洱茶大者一團五斤如人頭式名人頭茶每年入貢民間不易得也有偽作者名川茶乃川省與滇南交界處土人所造其餅不堅色亦黃不如普洱清香獨絶也普洱茶膏黑如漆醒酒第一緑色者更佳消食化痰清胃生津功力尤大也物理小識普雨茶蒸之成團狗西番市之最能化物與六安同按普雨即普洱也普洱茶膏能治百病如肚脹受寒用薑湯發散出汗即愈口破喉顙受熱疼痛用五分噙口過夜即愈受暑擦破皮血者研敷立愈悶瘄百草鏡云此症有三一風閉二食閉三火閉惟風閉最險凡不拘何閉用茄梗伏月採風乾房中焚之內用普洱茶二錢煎服少頃盡出費容齋子患此已黑黯不治得此方試效研茶粵志東莞人以脂麻薯油雜茶葉煮煎而成去風濕解除食積療飢龍脊茶出廣西亦造成磚除瘴解毒治赤白痢安化茶出湖南粗梗大葉須以水煎或滾湯衝入壺內再以火溫之始出味其色濃黑味苦中帶甘食之清神和胃性濕味苦微甘下膈氣消滯去寒澼湘潭縣志茶譜有潭州鐵色茶即安化縣茶也今京師皆稱湘潭茶雪茶出滇南色白久則色微黃以盞烹瀹清香迥勝形似蓮心但作玉芽色耳平來仲云雪茶出麗江府屬山中雪地所産色白味甘性大溫怯寒疾如神甘苦性溫治胃氣積痛療痢如神敏按雪茶出雲南永善縣其地山高積雪入夏不消雪中生此本非茶類乃天生一種草芽土人採得炒焙以其似茶故名其色白故曰雪茶己亥臘過餘杭往訪劉挹清少府啜雪茶云帶自雲南茶片皆作筒子如蜜筒菊蕊瓣樣詢所主治因言此茶大能暖胃凡嚴寒冰凍時啜一盞滿腹如火若患癆損及失血過多之人腹胃必寒最忌食茶惟此茶不忌乃相與烹瀹食之果入腹溫暖味亦苦咧香美較他茶更厚大觀茶論白茶自為一種與常茶不同其條敷闡其葉瑩薄崖林之間偶然生出非人力所可致有者不過四五家生者不過一二株所造止於二三銙而已芽英不多尤難蒸焙湯火一失則已變而為常品須製造精微運度得宜則表裡昭徹如玉之在璞它無與倫也東溪試茶録白葉茶民間大重出於近歲園焙時有之地不以山川遠近發不以社之先芽葉如紙民間以為茶瑞武彝茶出福建崇安其茶色黑而味酸最消食下氣醒脾解酒單杜可云諸茶皆性寒胃弱者食之多停飲惟武彝茶性溫不傷胃凡茶澼停飲者宜之治休息痢救生苦海烏梅肉武彝茶乾薑為丸服松蘿茶産徽州本經逢原云徽州松蘿專於化食秋燈叢話北賈某貿易江南善食豬首兼數人之量有精於岐黃者見之問其僕曰每餐如是已十有餘年矣醫者曰病將作凡藥不能治也俟其歸尾之北上將以為奇貨久之無恙復細詢前僕曰主人食後必滿飲松蘿數甌醫爽然曰此毒惟松蘿可解悵然而返姚希周經驗方云凡患眼服羊肝者忌服松蘿茶以沙苑蒺藜煎湯代茶消積滯油膩消火下氣除痰病後大便不通吳興錢守和慈惠小編用松蘿茶葉三錢米白糖半鍾先煎滾入水碗半同茶葉煎至一碗服之即通神效治頑瘡不收口或觸穢不收口梁氏集驗上好松蘿茶一撮先水漱口將茶葉嚼爛敷瘡上一夜次日揭下再用好人參細末拌油胭脂塗在瘡上二三日即愈羊兒瘋集效方好松蘿茶末八兩生礬末四兩米粥搗為丸臨發日清晨及常日各服三錢米湯下水臌氣臌彙集服此藥不忌鹽醬一服立消活魚一尾重七八兩去鱗甲將肚剖開去腸淨入好黑礬五分松蘿茶三錢男子用蒜八片女七片共入魚腹內放在瓷器中蒸熟令病人吃魚連茶蒜皆食更妙從魚頭吃起就從頭上消起如從魚尾吃起即從腳上消起立效繡球風活人書五倍子炒松蘿茶各五錢研末茶和敷黃病劉羽儀驗方生脂麻八合好松蘿五合砂仁二合以上三味先將脂麻研細再另將茶葉烘脆研再將砂仁研各為細末和勻每日常服如年久病深者服到黃退乃止如因好食茶葉者成黃此方不可用一切頭風兼熱者王站柱不藥良方蓽茇為細末用豬膽汁拌過嗅鼻中作嚏立愈如兼濕者以瓜蒂松蘿茶為末嗅鼻中出黃水立愈治五癭醫學指南破結散用海蛤通草昆布海藻洗膽草枯礬松蘿茶各三分半夏貝母各二分麥面四分為末酒調服日三次忌鯽魚豬肉治痢疾神方核桃五個帶殼敲碎松蘿茶生薑糖各三錢用水三盞煎如紅痢用紅糖如白痢用白糖如紅白相兼用紅白糖各一錢五分煎服重者連渣服五臌驗方松蘿茶研末雞毛管炒研各等分每服二錢白湯下二十服痊愈忌鹽百日半身不遂祕方集驗白糖槐豆子化皮紅穀子松蘿茶各五錢水三鍾煎一鍾服出汗即愈十日後方可出門小兒牙疳同壽録松蘿茶花椒去目烏龍尾食鹽各一錢童便一鍾水一鍾煎湯漱口口內含之不可咽下白濁古今良方車前草五六棵陳松蘿茶一二錢燈心一二十根三味煎服止後宜服水陸二仙丸以固之除瘟救苦丹專治一切瘟疫時症傷寒感冒不論已傳未傳百發百中有力者宜修合以濟人陰德最大李炳文經驗廣集天麻麻黃松蘿茶緑豆粉各一兩二錢雄黃硃砂甘草各八錢生大黃二兩共為細末煉蜜為丸彈子大收瓷器內勿令泄氣遇症大人每服一丸小兒半丸涼水調服出汗即愈重者連進二服未汗之時切不可飲熱湯食熱物汗出之後不忌治爛眼皮方種福堂方用挂金燈淨殼每殼一個摻入研細透明緑膽礬二釐或用殼十個或二十個裝套好外用淨黃泥包裹好勿泄氣炭火煅至中間殼將成黑灰存性放地上用碗蓋熄火將中間灰研細包好放土地上一夜出火毒每用灰少許放在茶杯內以冷松蘿茶浸之用薄棉紙蓋在茶麵上俟茶滲出紙面上將此水洗眼皮每日五六次二三日即愈烏須方吉云旅抄王守副家傳烏須藥甚驗用五倍子二錢皂礬四分八釐青鹽六分紫銅末一分五釐榆香末六分松蘿茶三錢共為末蒸透用六安茶張處士逢原云此茶能清骨髓中浮熱陳久者良年希堯經驗方有異傳終身不出天花法用金銀花揀淨七兩六安茶真正多年陳者三兩共為粗末沖湯代茶每日飲數次終身不出天花雖出亦稀極驗千金不易方稀痘丹用新拋羊屎一粒六安茶一錢甘草節二分燈心二十七寸赤黑緑豆各二十一粒珍珠一分銀簪一枝洗淨油氣水二碗煎八分溫服太上五神茶經驗廣集治傷風咳嗽發熱頭痛傷食吐瀉陳細六安茶一斤山楂蒸熟麥芽紫蘇陳皮厚朴乾薑俱炒各四兩磨末瓷器收貯高燥處大人每服三錢小兒一錢感冒風寒蔥薑湯下內傷薑湯下水瀉痢疾加薑水煎露一宿次早空心溫服消疽膏廣集治一切疽仙方松香官粉細六安茶各三錢萆麻仁去皮四十九粒為末先將萆麻搗爛然後入藥末搗成膏如干少加麻油搗勻攤青布上貼患處再以棉紙大些蓋好扎住七日全愈普陀茶定海縣志定海之茶多山谷野産又不善制故香味不及園茶之美五月時重抽者曰二烏苦濕不堪産普陀山者入藥不可多得治血痢肺癰江西𡵚片羅𡵚宦遊筆記出贛州府寧都縣製法與江南之𡵚片異茶疏𡵚茶不炒甑蒸熟然後烘焙此指江南者言耳出江西者大葉多梗但生曬不經火氣槍葉舒暢生鮮可愛其性最消導貯飯一甌以茶泡之經半日飯不加漲而消少許故飽食者宜飲此茶別有一種極細炒𡵚乃採之他山炒焙以欺好奇者反非其真然則茶亦不可以貌取也花鏡𡵚片産吳興似茶而實非茶種味苦性刻利消宿食降火利痰虛人禁用以其能峻伐生氣羅𡵚茶疏長興羅𡵚疑即古人顧渚紫筍也介於山中謂之𡵚羅氏隱焉故名羅西吳枝乘湖人於茗不數顧渚而數羅𡵚顧渚之佳者其風味已遜龍井𡵚梢清雋然葉粗而作草氣嘉靖長興志羅𡵚在互通山西土地廟後産茶最佳吳人珍重之凡茶以初生雨前者佳惟羅𡵚立夏開園梗粗葉厚微有肖箬之氣還是夏前六七日如雀舌者最不易得然廟後山西向故稱佳總不如洞山南向獨受陽氣專稱仙品只數十畝而已凡茶産平地多受土氣故其質濁羅茗産高山岩石純是風露清虛之氣故可尚長物志云浙之長興者佳價亦甚高今所最重荊溪稍下採茶不必太細細則芽初萌而味欠足不必太青青則茶已老而味欠嫩惟成帶葉緑色而團厚者為上不宜日曬炭火焙過扇冷以箬葉襯罌貯高處蓋茶最喜溫燥而忌冷濕也味甘氣香性平滌痰清肺除煩消臌脹治咳嗽祕方醫學指南用川貝母茶葉各一錢米糖三錢共為末滾湯下水沙連茶産臺灣在深山中衆木蔽虧霧露濛密晨曦晚照總不能及色緑如松蘿每年通事於各番議明入山焙制性極寒療熱症最效能發痘紅毛茶臺灣志草屬也黃花五瓣葉如瓜子亦五瓣根如藤刨取曬或遇時氣不快熬茶飲之即愈治時氣腹脹或悶郁不舒角刺茶出徽州土人二三月採茶時兼採十大功勞葉俗名老鼠刺葉曰苦丁和勻同炒焙成茶貨與尼庵轉售富家婦女云婦人服之終身不孕為斷産第一妙藥也每斤銀八錢味甘苦極香兼能逐風活血絶孕如神欒茶範石湖集修江出欒茶蓋石楠樹葉也毛文錫茶譜云湘人四月採楊洞汁作飯則必採石楠芽作茶乃能去風治頭風雲芝茶宦遊筆記山東蒙山在蒙陰縣城南三十里高二十里許周圍約三百餘里産茶曰云芝茶土人售於市曰蒙山茶然絶非茶類乃山石中所生石衣如苔蘚之屬土人掬而沃之冒登茗荈五雜俎蒙山在蜀雅州其中峰頂尤極險穢蛇虺虎狼所居得采其茶可蠲百疾今山東人以蒙陰山下石衣為茶當之非矣然蒙陰茶性冷可治胃熱之病性寒能消積滯綱目有石蕊云性溫不言消積滯紅花茶出粵西似紅花嫩苗為之土人制以贈客宋鄒道鄉有詩消膈滯宿食闢煙嵐瘴氣烏藥茶出東莞以脂麻薯油雜茶為汁煎之去風濕破食積療飢應昌按烏藥茶與前研茶製造主治皆同未知是一是二瀘茶四川通志瀘州出通呼為瀘茶味辛性熱飲之可以療風瘟茶閩志出福寧府治瘟樂山茶茶譜鄂州樂山出茶黑色如韭又云出鄂州東山名東山茶色黑如韭性與韭相反食之已頭痛
