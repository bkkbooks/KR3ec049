body:
  text: 卷二火部二十一種附二十二種陽火陰火火有陰陽乃太極之妙蘊人盡以火為純陽不知有陰火惟聖人知之故離卦中虛陽中有陰也坎卦中實陰中有陽也火地生物亦然陽火無質以物為質然後寄其形以燃物陰火有質不必寄形於物而不能盡焚諸物蓋陽火乃火之魂屬陽氣熱陰火乃火之魄屬陰氣不熱瀕湖統十二火以分陰陽其曰天之陽火二太陽火星精飛火地之陽火三鑽木火擊石火戛金火人之陽火一丙丁尹火夫太陽炙背即暖星精火有光有聲其墜地之初如燔石手不可近鑽木之火鑽與木皆熯熱有烟擊石戛金必兩物摩蕩熱則火出皆有火氣人身君火所呵出之氣天雖極寒而人氣無不熱此皆陽火為火之魂氣雖熱必寄形於物乃燃故水晶取日中之火承艾而烟起火殃為飛星之精入土乃起焚房屋鑽木擊石戛金非物受其火不能存也人身丙丁火能解犀角散積陰之氣已不啻寄其身而焚之也其氣皆猛烈可知其曰天之陰火二龍火雷火地之陰火二石油火水中火人身之陰火二命門相火三味真火龍火不能焚物止能焚砂石蓋龍本純陽而火反陰者以陽為體以陰為用也雷火不能焚物能焚金鐵蓋雷之擊物必有聲其用屬陽而其體屬陰也砂石本土之餘氣為先天火結以陽體焚之金鐵為水之母本陰精而即以陰體熔之此五行生剋之妙也石油能於水中生火凡水中一切物非石油不能焚之水中火本咸精故海水入夜則明至陰之氣不能焚物也命門相火即人身欲火與三味真火皆能自焚不能焚物此皆陰火為火之魄氣不熱不必寄形於物而有能焚不能焚之別非若陽火之遇物無不消熔也瀕湖僅列其名又不晰言其故且其主治功用又皆晦之故特為詳述以補太陽火除濕止寒澼舒經絡痼冷以體曝之則血和而病去冬月以舊帛曬受陽氣覆體皆能卻疾補脾養胃作醬日曬受日氣多人食之多補脾胃久服長生養生家有服日光法星精飛火闢伏屍陳子靜養生注云火殃即流星之精入土中其地有伏屍皆遠去增志慮聰明談道錄有制星精米法以白米露星月下百日承受星精小兒食之多聰明增神智且辟邪除瘧鑽木火除瘟疫卻四時不正之氣周禮司爟掌火政四時變火以救時疾即此殺精魅凡一切山魈木怪年老精魅用千年古柏不得以凡火燃須鑽木按時取火燃之沈云將食纂榆柳火助養生之氣利肝膽調筋脈棗杏火消蕃茂之氣養心血通神明柞楢火斂耗散秉元清利肺而滋本源制陽而結髓槐檀火補腎臟益陰血使遍體調和周身通暢桑柘火補脾胃壯真元擊石火宜針灸百病取其含陰氣於陽中有太極之妙張石頑以石取火為陰火云不宜以之灼艾以太陽取於陽燧者為陽火宜灸病不知石雖陰質非真火蘊結則不成形凡石中皆有火火石較他石尤火多而易取者以此石獨受太陽之氣厚也石陰而火陽必受擊乃出火多者且有灹炸聲若陰火則無聲矣故瀕湖列為地之陽火石頑以為陰火未免拘墟之見耳戛金火能散鬼磷野祟戛金取火照之即滅跡人身君火即人元氣能救卒死魘死以口布氣度之即生散鬼氣呵氣吹之即滅發痘凡陰寒不起不漿者用壯健人氣呵之即起發紅活漿行而毒化止腹痛腹瀉老年人多有氣弱受寒患此者用壯年人以手搓極熱頻互掩其臍使手中熱氣透入丹田自愈此借君火之力也龍火龍起石中石內必有焦裂處乃龍口火所燒也刮其石末煎湯治痞膈如神以石受龍火之氣無堅不破也海上格物論雷火其震木有硫黃氣者得雷火之氣也能治驚癇邪祟合闢瘟丹加用最妙石油火有毒不宜熯物以紙捻蘸油點火照瘡可引毒外出水中火著體能漬肉腐爛可摩風氣相火三味火凡人皆不能運用惟有道之士能運以療病起死回生相火能結舍利成堅固子三味火能殺精魅黃金火以金器燒紅烙肉上能止血凡人神所在誤針出血不止者燒金器烙之選元方煤火本經逢原云北方炊食多用煤火以地屬坎足勝其氣且助命門真火食煤火長氣於陰所以膂力強壯南人食之多發癰毒受其毒者以虀汁解之然煤火處置大缸水於旁則毒從水解南方炊食多用薪火人食薪火長氣於陽氣多輕浮不實不似北方之稟氣剛勁也然近日南方亦產煤薪價日昂市井多有用煤者其煤在浙省則出於衢嚴湖州較北煤堅細以之代薪煤氣亦減薄甚有如薪炭無臭氣者名曰香煤出太湖山中綱目石部收烏金石即煤也其主治多言其質之用而火部又不收煤火故為補之用以香煤為佳烹一切食物能和脾胃滋氣力通腎氣助陽道婦人暖子宮雜煤臭煤有毒藤火匏火藤乃木本各種山藤性最蔓延喜束物故為火亦如其本性匏屬皆瓠類草本也蔓皆中空而長養最速其性行甚捷今徽人作花炮者其藥線必用壺盧炭取其疾速勝於杉柳梢同一藤也而草木之性不同如此藤火宜煎臌脹水腫四肢諸病等藥匏火宜煎救急諸藥取其頃刻能達經絡也荷梗火荷梗入秋人多采取積之使干為薪入鑊煮肉則精者反浮肥者反沉入藥用其火氣能通肝肺二竅宜煎一切轉脬交腸藥能正倒陰陽之氣稻麥穗火稻穗火烹煮飲食安人神魂利五臟六腑糯稻穗尤峻烈盧鏜日記鳥槍用糯殼炭取其熔鐵力速見風鉛子不凝其能久住之力如此麥穗火煮飲食主消渴咽乾利小便松柴火煮飯益人壯筋骨煎茶不佳食纂松卵火煎茶美以能聚茶力使不解散真味櫟柴火櫟柴煮豬肉食之不發風煮雞鵝鴨魚腥等物易爛且良茅柴火炊煮飲主明目解毒食纂燒酒火酒本米曲之精華屬陽燒酒則又為酒之精華乃陽中之陽燃之色綠陽極陰生之象與石硫性同皆以陽為體藏陰於用也故其光照人面皆作青灰色照魑魅則不能遁形以陰為用者多含毒今人率以此酒冬月為大碗用以熯物代炭火久食則發癰毒默受其毒而不覺然維藏寒者宜之氣能透達骨髓軟堅燥濕薰衣著之能發骨髓中汗魚膏火海上人多取魚膏為油代菜豆油用其油割海鰍腹中脂或取其肉並煉為膏燃之照夜然烟重氣腥多昏目損神秦始皇墓中以鯢膏為燈即此後人多解為人魚者誤也闢蚊蛾熏竹木除蠹蝟油火乃刺蝟脂肉所熬油山左蝟大者如貓山人獲取之熬其脂肉可得油鬥許用以照夜光明皎沏同白晝比蠟猶明此油可入神燈照用按蝟脂可烊鐵骨能縮人筋骨其性峻利可知入神燈其氣照毒能箍毒使小丹藥火錦囊秘授有制救苦丹法真麝香一錢劈砂水飛二錢好硫黃三錢各研極細先將硫黃化開次入麝砂二味離火攪勻在光石上攤作薄片切如米如粞二樣小塊貯瓶勿泄氣治病將藥安患處以燈火點著候至火滅連灰罨在肉上立見痊愈重者用米粒大輕者用粞粒大安放銅錢眼內香火燃之只須一炷不必復灸如若患處闊大連排數炷一起灸之且灸時不甚熱亦不甚疼灸後並不潰膿一茶之頃痼疾如失系觀音佛所授真神方也又海上仙方亦有救苦丹其法用麝五分硃砂水飛錢半硫黃五錢樟腦錢半俱為細末入銅器內文武火烘烊取其冷定敲碎如米粒大用能治各種風痹跌撲癰疽初起有效敏按此丹藥諸火為人工製造本非天生藥料然本草中又不得不載造釀一類即瀕湖火部收載神針之意也因與神燈火併錄以補李氏所未述治一切風寒濕氣流注作痛手足踡攣小兒偏搐口眼喎斜婦人心腹痞塊攻疼無分年深月久皆可用蓬萊火茅昆來家傳醫要有蓬萊火法西黃雄黃乳香沒藥丁香麝香火消各等分去西黃加硼砂草烏皆可用紫棉紙裹藥末捻作條如官香粗以緊實為要治病翦二三分長一段以粽黏黏肉上點著不過三次即除根若點穴不差灸至藥盡皮肉發爆病即立愈每次三狀重者不過三次即除根不復再發灸後忌豬肉待瘡平復再食此茅氏家傳五世試效神驗方也治風痹跌撲瘰癧俱按患處灸水脹膈氣胃氣按穴灸陽燧錠趙氏集要古有烙法今罕用之不但粗工不知用法抑且患者見之駭然故以此代之法用乾蟾酥銼薄片焙研硃砂水飛川烏草烏各五分殭蠶一條各研細將硫黃一兩五錢置勺內微火熔化入藥末攪勻急攪為要遲則凝矣傾入瓷盆內速𢵡成片待冷收用用時取甜瓜子大一塊上尖下平先將棗肉擦患處黏藥於上香火點著即起火焰五壯七壯九壯隨症施之灸畢即飲米醋半酒杯候起小泡線針穿破出黃水些須膏藥蓋住其毒即消此方遺寫冰片麝香二味原稿眉注治濕痰流注附骨陰疽寒濕瘡毒經久不消內潰不痛者能使未成即消已成即潰已潰即斂如若風痹用竹箸點之有痠痛處筆蘸墨記之照墨上灸若腿膝疼痛灸鬼眼穴諸瘡初起灸三五壯即瘥神燈火外科有神燈照法用硃砂雄黃俱研水飛血竭沒藥箬烘去汗各二錢麝香四分為極細末每用三分以紅棉紙緊卷捻條約長七寸麻油潤透以火燃著須令患者坐無風處將藥條離瘡半寸自外至內周圍徐徐照入火頭向上藥氣乃入毒即隨火解散自不內侵臟腑不可太過恐傷好肉其瘡微微覺熱心神即爽每日只熏一次初用三條每日加一條加至四五條勢即漸減然後每日減去一條直熏至紅腫消盡為度熏後用後藥豨薟草新鮮採得者搗爛入陳年小粉等分初起者再加白鹽研細少許打成稠糊敷半寸厚留頭必須敷過瘡暈三分方能箍定毒根瘡口之上用大蔥葉滾水泡熱扯開貼之或膏蓋亦可避風為妙自能拔出膿毒如無鮮草以如意黃金散代之集要云神燈照法勿用太早如瘡四五日間形未成毒未聚驟用之毒必內郁反難外出須用在八九日後瘡勢已定毒氣已聚未成膿腐之時用此照之未成者自消已成者自高不起發者即發不腐潰者即潰若毒已潰膿已泄者不宜用每日以豬蹄湯淋洗或蔥頭煎湯洗亦佳忌發物治一切腫毒癰疽發背能解毒活血消腫散瘀火罐氣火罐江右及閩中皆有之系窯戶燒售小如人大指腹大兩頭微狹使促口以受火氣凡患一切風寒皆用此罐以小紙燒見焰投入罐中即將罐合於患處或頭痛則合在太陽腦戶或巔頂腹痛合在臍上罐得火氣合於肉即牢不可脫須待其自落患者但覺有一股暖氣從毛孔透入少頃火力盡則自落肉上起紅暈罐中有氣水出風寒盡出不必服藥治風寒頭痛及眩暈風痹腹痛等症烟草火沈云將食物會纂烟以閩產者佳燕產者次石門產者為下春時栽植夏時開花土人除一二本聽其開花收種外余皆摘去頂穗不使開花並去葉間旁枝使之聚力於葉則葉厚味美秋日取葉用竹簾夾縛曝乾去葉上粗筋用火酒噴制切葉細如髮每十六兩為一封貿易天下其名不一有真建假建之分蓋露頭黃二黃之別近日北方制烟不切成絲將原曬烟片揉成一塊如普洱茶磚茶一般用時揉碎作末入烟袋中貯用頂上數葉名曰蓋露味最美此後之葉遞下味遞減相傳海外有鬼國彼俗人病將死即舁置深山中昔有國王女病革棄去之昏憒中聞芬馥之氣見臥傍有草乃就而嗅之便覺遍體清涼霍然而起奔入宮中人以為異因得是草故一名返魂烟方氏物理小識烟草明萬曆末年有攜至漳泉者馬氏造之曰淡肉果漸傳至九邊皆含長管而火點吞之有醉僕者崇禎時嚴禁之不止其本似春不老而葉大於菜曝乾以火酒炒之曰金絲烟可以祛濕發散久服則肺焦諸藥多不效其症令人忽吐黃水而死粵志粵中有仁草一曰八角草一曰金絲烟治驗亦多其性辛散食其氣令人醉一曰烟酒其種得之大西洋一名淡巴菰相思草物理小識淡巴姑或呼擔不歸閩產者佳近出江西射洪永豐者亦佳製成烟有生熟二種熟者性烈損人尤甚凡患咳嗽喉癰一切諸毒肺病皆忌之近蘭州出一種烟名曰水烟以水注筒吸之令烟從水過云絕火毒然烟味亦減張良宇云水烟出蘭州五泉地種者佳食其氣能解瘴消臌寬中化積去寒癖但不宜多食其製法以砒夾香油炒成故不能無毒也近日粵中潮州出一種潮烟其性更烈姚旅露書云呂宋國有草名淡巴菰一名金絲醺烟氣從管中入喉能令人醉亦闢瘴氣搗汁可毒頭蝨延綏鎮志烟草其苗挺生如葵葉光澤形如紅蓼不相對高數尺三伏中開花色黃八月採陰乾用酒洗切成絲而各省之有名者崇德烟黃縣烟曲沃烟美原烟惟日本之倭絲為佳百草鏡烟一名相思草葉如菘菜厚狹而尖秋月起莖高者六尺花如小瓶淡紅色產福建者良用葉以伏月採者佳生頂上者嫩而有力色嫩黃名蓋露烟烟品之多至今極盛在內地則福建漳州有石馬烟色黑又名黑老虎系油炒而成性最猛烈多食則令人吐黃水浙常山有面烟性疏利消痰如神凡老人五更咳嗽吐痰者食之嗽漸止痰亦消江西有射洪烟性情肅導氣湖廣有衡烟性平和活血殺蟲可已虛勞山東有濟寧烟氣如蘭馨性亦克利甘肅蘭州有水烟可以醒酒近日粵東有潮烟出潮州每服不過米粒大性最烈消食下氣如神然體弱者忌長州張璐玉本經逢原云烟草之火方書不錄惟朝鮮志見之始自閩人吸以祛瘴向後北方藉以闢寒今則遍行寰宇豈知毒草之氣熏灼臟腑遊行經絡能無壯火散氣之慮乎近日目科內障丸中間有用之獲效者取其辛溫散冷積之翳也不可與冰片同吸以火濟火多發烟毒不可以藤點吸恐其有蛇虺之毒也吸烟之後慎不得飲火酒能引火氣熏灼臟腑也又久受烟毒而肺胃不清者以砂糖湯解之蘭上徐沁埜著烟誡載有祛烟蟲方云杜湘民說凡人食烟則腹中生蟲狀類蠅兩翅鼓動即思烟以沐之故終日食不暇給久之蟲日盛而臟腑敗疾疢大作不可救藥常有臨革吃烟而始瞑者哀哉其方用生豆腐四兩戳數孔黑砂糖二兩加腐上置飯甑中蒸之使腐與糖融化每思烟輒進數匙只三日後其蟲盡下聞烟氣則嘔不欲食矣汪東藩云近日有一種熟烟閩人能制其法以油炒烟片令黑名黑老虎又曰紫建云食之香辣甘一體而備三味中其毒者欲吐不得須食北棗一二枚解之凡烟種有山田之分山種者味厚田種者味薄多草氣張景岳云烟草味辛氣溫性微熱升也陽也燒烟吸之能醉人用時惟吸一二口若多吸之令人醉倒久而後蘇甚者以冷水一口解之即醒若見煩悶但用白糖解之即安亦奇物也吸時須開喉長吸嚥下令其直達下焦其氣上行則能溫心肺下行則溫肝脾腎服後能使通身溫暖微汗元陽陡壯用以治表善逐一切陰邪寒毒山嵐瘴氣風濕邪閉腠理筋骨疼痛誠頃刻取效之神劑用以治里善壯胃氣進飲食祛寒滯陰濁消臌脹宿食止嘔噦霍亂除積聚諸蟲解鬱結止疼痛行氣停血瘀舉下陷後墜通達三焦立刻見效此物自古未聞近自我明萬曆時出於閩廣之間自後吳楚地土皆種植之總不若閩中者色微黃質細名為金絲烟者力強氣勝為優求其習服之始則向以徵滇之役師旅深入瘴地無不染病獨一營安然無恙問其故則眾皆服烟由是遍傳今則西南一方無分老幼朝夕不能間矣予初得此物亦甚疑及習服數次乃悉其功用之捷有如此者因著性於此然此物性屬純陽善行善散惟陰滯者用之如神若陽盛氣越而多躁多火及氣虛氣短而多汗者皆不宜用或疑其能頃刻醉人性必有毒蓋其陽氣強猛人不能勝故下咽即醉既能散熱亦必耗氣然烟氣易散而人氣隨復陽性留中旋亦生氣此耗中有補所以人多喜服未見其損者以此敏按釋氏書言人乃山川火土之氣和合以生故脾胃亦受火土之氣以養烟本火土之精人喜吃烟者病重即不食烟以脾胃不受火土之氣故烟亦不受也火土之氣不特養陽亦兼能生陽所以妖䰡鬼鬽多能吃烟以無質吸無質味之氣也至干麂子閉土中多年亦思得烟吸以融和其體開礦閉死穴中之人久不為出亦不死鑿礦者于山穴中遇之呼為干麂子見常中丞安宦遊筆記則知烟力之能走百絡通堅邃可知矣凡烟氣吸出悠揚於外陰為鬼吸人不見耳故食烟之人多面黃不盡耗肺而焦皮毛亦因精氣半為鬼吸也友人張壽莊己酉與予同館臨安每晨起見其咳吐濃痰遍地年餘迄未愈以為痰火老疾非藥石所能療一日忽不食烟如是一月晨亦不咳終日亦無痰唾精神頓健且飲食倍增啖飯如湯沃雪食飽後少頃即易飢予乃悟向之痰咳悉烟之害也耗肺損血世多陰受其禍而不覺因筆於此以告知醫者景岳所云特一偏之見惟闢瘴卻佳秋燈叢話予堂叔疾延一醫至食畢茹烟烟房大如升容烟斤許盡吸入腹即瞑目不語欹椅仰臥而氣息闃如眾大驚其僕曰無慮也頃且蘇俄唇動口翕烟自口中噴騰而出蓊然若雲霧數刻始息乃欠伸而起張目四顧曰快哉晚食復如之詢其僕曰家居朝夕餐烟二次俱以斤為率否則病家人聞其言懼而辭焉其酷嗜之量有如此者辛溫本草從新云治風寒濕痹滯氣停痰山嵐瘴霧其氣入口不循經絡頃刻而周一身令人通體俱快然火氣熏灼耗血損年藥性考烟草味辛性溫開鬱燒吸解倦罨傷止血烟油有毒殺蟲最捷諸蟲咬傷塗之病失烟有毒中其毒者煎胡黃連合茶服之汪東藩醫粵云烟毒以黑砂糖和井水服之延綏鎮志云性熱味辛有毒主寒濕胸膈痞滿益津止飢多食傷氣格致鏡原云損容王桂舟云烟渣入目如以他物洗之愈洗愈疼必盲後已須用亂髮或髮纓緩緩揉之即愈文堂集驗云凡服至寶丹須停烟茶酒飯一二時按至寶丹即塘棲痧藥腳氣同壽錄腳氣痛不可忍以致口眼喎斜手腳如搐不省人事昏迷如死用黃建烟二斤炒熱以坐桶盛入內將腳解光放入烟中出汗少冷又炒熱隔日一熏七次即除根金瘡止血良朋彙集以烟末敷之烟梗陳良翰云烟葉生者有毒人食之即中毒發病難治其莖更烈登萊人用以毒魚凡溪塘中大魚難捕者用此法毒之用烟莖幹濕俱可銼碎同青胡桃皮搗爛置水中一飯間大魚輒如醉浮水面小者皆死雖鰻鱺龜蝦鱉蟹蚌蛤之屬一齊擊斃其毒之猛烈如此然以此造烟則梗之味淡迥不如葉之味厚烟葉治腦漏楊春涯驗方烟葉半斤曬乾研極細末調花露四兩曬乾用玫瑰餅再研吹入吃蘭花烟成腦漏者以白鯗脊骨燒烟燻之數日愈蘭花乃江西賈人帶來一種蘭子即澤蘭子也氣香烈取其子研拌入烟名曰蘭花烟人食之作蘭花香然其氣竄上往往入頂傷腦易成腦漏葉天士種福堂方治風寒濕氣骨節疼痛痿痹不仁鶴膝風歷節風偏頭漏肩等症有見晛膏中用新鮮烟葉搗汁浸松香曬乾入藥亦取其氣味以透利筋絡也毒蛇咬傷慈航活人書先避風擠去惡血用生烟葉搗爛敷之無鮮葉用乾者研末敷即烟油烟灰皆可不藥良方治毒蛇及毒蟲傷用魚腥草皺面草烟葉草決明等分杵爛敷之闢臭蟲活人書用烟葉鋪床代褥或燒熏之則臭蟲盡絕烟桿年久色黑毛竹男子用者良秋燈叢話新昌張姓茹竹烟管五十餘年色如漆而光可鑑珍同拱璧雖戚好不輕假也母病無藥餌資質錢二緡典主子患損病諸藥罔效或謂非多年竹烟管不可治遂取張物截之數寸煎湯服之愈後酬張以鉅萬金陳毅齋云烟桿雖受烟火熏漬之氣然非借人氣津液漸漬之必不酥透其杆經男子食者光澤可鑑一經婦人口便色暗不鮮明且多直裂紋又最忌糞凡多年好杆持以上廁能令光澀若象牙杆便裂開走油不堪用物性之相忌如此殺蠱毒傳屍癆塗惡瘡劈取中心油透而酥者搗如糊塗瘡即痂或攤油紙上貼治蟲膈百草鏡毒蛇傷先取婦人舊油頭繩扎住腫處勿令腫上再取耳垢封之止痛隨用多年油黑竹烟筒杆紫色者亦可毛竹者佳一段約長三寸咀嚼咽汁渣淡吐去並取杆中之油搽患處烟桿味辣服之反甜蛇毒亦隨解痛止自愈試效多人凡蛇咬有蛇齒留肉內者烟油塗之自出婦人血崩劉怡軒云凡血崩諸藥不效者用多年舊烟桿紫色油透者佳截一寸燒灰黃酒調服下喉即止屢試屢效烟筒中水俗名烟油古今秘苑烟油染衣以瓜子水洗之即去同壽錄云烟油入目如小兒及好吃烟者誤犯之若將別湯洗愈洗愈疼必至瞎而後已須用亂頭髮或騌纓緩緩揉之即愈解蛇毒塗惡瘡頑癬殺蠱毒蛇咬劉羽儀驗方取吃烟杆內脂膏塗在咬傷處用手指搓入肉中痛即止最效蜈蚣咬劉氏驗方用烟筒內膏油塗在咬處或烟灰擦之立止痛按烟油一名烟膏味辛微毒陳貢士毅齋云烟油乃五行之氣相合而生近日外丹家用以點藥金又可益金色術士隱其名呼為太極膏又曰氣泥曰五行丹剔以燃燈代油則一切毒蟲皆不近入水蛟龍亦畏之入藥舊竹杆劈取者良凡梅條藤條紫檀烏木老鸛草及純銅純銀杆中油皆不及竹中者性良惟象牙杆中烟油可殺蠱毒閩有橄欖木烟桿其中油可毒魚至烟膏亦各隨所食烟質為高下烟肆所市烟俱以烟葉噴油打成塊用鐵刨披作絲售之此為純葉不雜為上品更有打塊時夾素馨葉雜以礬紅刨成絲再加薑黃末以和其色者其氣燥烈損人烟膏亦淡而薄不及上品力厚也海鹽朱進士醒庵云烟油解蛇毒初不甚信後見里人獲一赤練蛇長八九尺粗如臂口吐毒烟一犬近之蛇噓以氣即腹裂死一人戲以舊竹烟桿去頭嘴以竹絲通出油刺入蛇口蛇齧之即瞑目閉口身捲縮俄復伸長如是數次直如繩而斃始知其解毒殺蟲之功信不虛謬諸城劉仲旭少府云西北口外出一種毒蟲名曰蜢䗱狀如中土虻蠅人出遇之即觸人面不論何處被其觸者亦不甚痛頃覺眼眶四圍出細蛆攢食睛膏痛不可忍彼土人治法惟取烟桿四五枝折取烟油塗目內忍痛片時其蛆皆死然後再用溫水洗去烟油即愈椿園聞見錄撻拉巴哈臺即準噶爾故地夏多白蠅為害觸人畜眼角輒遺蛆而去非以膠黏之不出按常中丞筆記云西北臺站及伊犁等處出一種野蠅亂撲人面若被其觸者眼角內即出蛆蟲痛癢異常有因此成瞽者土人多以烟油塗眼角治之然疾愈後目亦紅腫數日不消總不若蒙古治法以魚膠一塊向眼角黏出之又不損目較烟油為佳烟筒頭中煤濟急良方治蜈蚣咬傷取烟筒頭內硬煤擦之立時止痛鼻烟廣大新書有造鼻烟法香白芷二分北細辛八分焙乾豬牙皂角二分焙乾研薄荷二分冰片三釐干烟絲為君乾絲一錢必配福烟六七分許上藥各為細末酌量配合不必拘分兩以色如椶色者佳有內府造洋造廣造及土烟數種鴨綠者最佳玫瑰色者次之醬色者為下陳久而枯者不堪用出洋中者能追風發汗香祖筆記近京師有制鼻烟者可明目尤有闢疫之功以玻璃為瓶貯之象牙為匙就鼻嗅之皆內府製造民間不及張玉叔云近有廣東來者較內府造者尤勝有五色以蘋果色為上澳門紀略西洋出鼻烟上品曰飛烟稍次則鴨頭綠色厥味微酸謂之豆烟紅者為下常中丞筆記鼻烟或冒風寒或受穢氣以少許引之使嚏則邪穢疏散積懣亦解若刻不少間反有致疾者烟有多品總以洋烟為最取其滋潤不烈所以為佳通關竅治驚風明目定頭痛闢疫尤驗水烟參看前烟草條下沈君士云水烟真者出蘭州五泉山食之性尤峻削豁痰消食開膈降氣惟慮弱者忌服亦解蛇虺毒予家有姻戚饋食品因天暮未暇食置筐中經宿為蛇涎所漬次日食之舉家皆患嘔吐腹痛惟一小僕免詢之則每食後輒服水烟也蔡云白言蘭州五泉種水烟其葉與枇杷葉相似與烟葉迥別鴉片烟臺海使槎錄鴉片烟用麻葛同鴉土切絲於銅鐺內煮成鴉片拌烟另用竹筒實以椶絲群聚吸之索值數倍於常烟專治此者名開鴉片館吸一二次後刻不能離暖氣直注丹田可竟夜不寐土人服此為導淫具肢體萎縮臟腑潰出不殺身不止官弁每為嚴禁常有身被逮繫猶求緩須臾再吸一筒者鴉土出噶喇吧海東扎記鴉片產外洋咬𠺕吧呂宋諸國為渡海禁物臺地無賴人多和烟吸之謂可助精神徹宵不寐凡吸必邀集多人更番作食鋪席於坑眾偃坐席上中燃一燈以吸百餘口至數百口烟筒以為管大約八九分中實椶絲頭髮兩頭用銀鑲首側開一孔如小指大以黃泥掐成葫蘆樣空其中以火煅之嵌入首間小孔上置鴉片烟於葫蘆首烟止少許吸之一口立盡格格有聲飲食頓令倍進須肥甘不爾腸胃不安初服數月猶可中止迨服久偶輟則困憊欲死卒至破家喪身凡吸者面黑肩聳兩眼淚流腸脫不收而死主治胃脘痛神效藏香出西藏作團成餅者良如香炷者次之色紫黃氣甚猛烈焚之香聞百步外者佳偽者名京香不入藥用有出打箭爐者不及西藏出者第一有紅藏黃藏紫藏之分肖騰麟西藏見聞錄云藏香有紫黃二色粗細二種各處皆有惟產於巴塘者為最朱大駿云親見藏香有黑如墨者燃之催生甚炒宓元良云藏香有紫黃二色紫者內有瑣瑣葡萄汁合成故色紫而性開關竅透發而上升能發痘瘄黃者性下降可催生不可亂用聞人達遠云藏香有綠色者云最貴焚之嗅其烟可清目不知彼中何草合成葉明齋云藏香中有一種白色小丸子焚之氣頗幽爽亦系番僧所貢不知何名其香氣嗅之可治老人腸燥氣虛便秘入廁時焚一二丸最妙亦可治痘馬少云衛藏圖識藏香有紫黃二種真者焚之烟凌霄漢蓋以珍寶屑成之又有黑白香白香亦名吉吉香黑香亦名唵叺香敏按藏香只有紫黃二色為正品其所云紅綠黑白諸色皆屬他香近亦罕見姑存其說以備考王景略曾為織造寅公制藏香其方云得自拉藏予求其法附載於此速香二片沉香黃熟香黃檀香廣木香各四兩春花甘松三柰玫瑰瓣母丁香細辛檜皮生軍排草乳香金顏香唵叺欖油蘇合油伽㑲水安息各二兩冰片一兩右各為極細末以頂好榆面二斤火消十兩化水加老醇酒調和為香殺邪治祟功同蒼朮痘瘡不發點床角上令兒聞之能透斑甚妙愈虐催生明目按痘乃先天胎毒非火不結因感而發最忌燥烈以香氣熏觸不愈滋其枯裂手透斑之說予終未敢深信蓋凡香皆作燥爇者猶烈夫痘靨曰苗痘發曰花既曰花則性未有不喜潤者安得以香燥助其毒即能透斑終恐乾紅而歸黑陷耳土部十八種楊妃粉產馬嵬坡上取之者必先祭然後掘之去浮土三尺有土如粉膩滑光潔於女子最宜澤肌有效職方典出陝西西安府女面有黑黝以水和粉洗之即除拭面去黝皯雀斑美顏色丹灶泥嶺南雜記出羅浮山以粉紅色者佳粵志羅浮沖虛觀後有稚川丹灶取灶中土以藥槽之水洗之丸小粒投水中輒有白氣數縷沖射四旁生泡不已咍咍有聲頃之一分為二二分為四四分為八然後融化服之可療腹疾道士號為丹滓嘗以餉客治暈船不服水土等症丸如豆大飲水調服洗手土坤輿典雞足山有迦葉洗手土彼方人若頭痛者以些少塗之即瘥觀音粉處州府志雲和山中有白善泥以水攪碇而取之和糯米粉一半蒸食之可以療飢名觀音粉生山土內白如粉絕細膩歲荒鄉人輒掘取之和麥面作餅餌以食但不可多食多食能令便閉腹重以其土性滯澀腸胃耳生洞內者不可服恐其有蛇虺涎毒鄭仲夔冷賞載云丙子歲荒戈陽石窩村庵僧夢大士告以山下土中有石粉可取充飢如言往掘果得之儼若蕨粉研細作粉蒸熟甘美異常鄉人聞而競採之或有以葷油裹者即苦甚不堪入口名大士粉即此綱目石部載石面即此以為不常生不知今山中皆有瀕湖主治止言益氣調中食之止飢而不知其去濕之功十倍於蒼朮蓋亦土能制水之意耳味微甘苦性平解蟲毒逐水腫明目療濕黃烏龍粉丹術家名黑龍丹系燒馬糞釜臍煤生肌收口藥用之摻瘡口即驗白硃砂一名翠白古方有用之乃舊定窯器末也近窯火氣未脫有毒能腐肉不宜服青磁末曰翠青本經逢原白瓷器研細水飛付癰腫可代針砭又點目去翳百草鏡云白硃砂系古瓷白色者研粉入藥以其年久無火毒之害必不得已用破碎定窯入土過者火煅醋淬研細水飛用今人以近日窯氣白色者代用誤矣按外科有九種十三根法凡種癰留根有白瓷種能令患毒不收口時以取利今逢原用以付癰腫恐種毒留根不宜誤用或加入膏中以代針可也然亦以少為貴接斷骨神效方黃氏醫抄研極細末同黃蠟丸酒吞三錢取汗出骨接有聲片時即復去翳障得效方有點眼翠白丹用之錄驗方有推雲散翠青翠白同用醫學指南目疾門有撥雲能光散中用白硃砂以童便合醋煅制二十一次方用遠近星障眼科要覽白硃砂牛黃熊膽白丁香珍珠冰片各一分石燕石蟹琥珀珊瑚各三分爐甘石煅三錢麝香半分共為細末蜜一兩調點鼻血不止慈惠編定窯瓷器乳極細末吹少許入鼻孔內立止治膈羲複方用白瓷片燒紅醋淬七次研極細末燒酒服三釐臁瘡起沿白硃砂煅紅淬入乾燒酒內四兩七八次以酥為度研細水飛每上藥一錢加冰片三釐研細摻之黑膏藥蓋貼孕婦勿服能墜胎慎之鱔扛頭葉氏方用細瓷器為末香油調塗立效治跌打閃衄傷方白硃砂即回青瓷器用火罐燒紅童便淬七次研成粉淨用三錢乳香沒藥俱去油各一錢三味研為細末用好黃酒送下三日一服三服全愈難產催生便易良方白細碗研碎末一錢酒吞下立刻即產綱目四卷主治內云白瓷器水磨可滅瘢痕鑄銅罐云溪方浙江湖州人每擔爐具赴他州代人鑄銅勺鍋鏟其泥罐不輕棄可入藥治小兒頭生軟癤出膿水不幹仍復㿗腫用罐石上捶細末醋調敷之膿自溢干迨泥落而疾自愈白蠟塵此乃白蠟面上年久積塵埽下貯用治瘵蟲萬邦孚家抄檀香泥乃檀香心中所含脂垢不易得色如塵土故以泥名爇之亦作檀香氣治胃氣滯痛肝鬱不舒席下塵治水腫聖惠方治遍身水腫用鹿蔥根葉曬乾為末每服二錢入席下塵半錢食前米飲服回燕膏本草經疏朝北燕窠土名回燕膏治瘰癧經疏合胡燕窩內土研敷有效鞋底泥瀕湖綱目引藏器本草治不服水土用而外治無聞焉今補之治聤耳頭瘡良朋彙集人生耳底即聤耳用鞋底陳土吹入耳內即干此土又治頭上瘡不幹擦上即好一切無名腫毒用毒郎蒜一枚津唾磨鞋底泥箍之三五次即消鼠穴泥治偏正頭風救生苦海用老鼠洞內泥炒熱乘熱絹帕包頭上即愈椅足泥物理小識此泥炕干可以生肌狗溺硝此藥處處有之生人家石墈上鄉村尤多乃狗溺石上多年結成如硝樣取之水飛用或甘草湯拔去穢氣用性涼色清白治咽喉腫痛等症能降虛火雞腳膠出雲南雞足山近地土中俗名雞腳膠土人往往從土中掘得形如碎磚入火即烊如膠然故名終不知何物所結也治風如神煎湯服烏金磚乃糞窯中多年磚也取起一塊洗淨以清水煎熬撇去浮沫候浮沫淨其汁亦濃每一二盞治痘不貫漿虛弱無力者大效蛆鑽泥乃糞坑中蛆鑽之泥其質松凡蛆在泥中過冬必鑽此土作窠蛆過冬則短縮頭生二角白如蛹清明後化黑蟲而去蛆必退殼每退每大其退時輒扒越牆石從高墜下退一節再扒再墜如是屢次則全退矣此泥有湧故入退管藥用須冬時取治痔漏多年起管用蛆鑽泥一斗曬乾以五升炒熱袋盛令患者去褲坐其上則稠水濃血淋下久之泥冷再用五升炒熱接盛坐之如此一袋坐一袋復炒泥炒熱又易換數次則稠膿自盡三度後管自退出又不傷人屢用屢效之方也金部十一種附五種鐵線粉色黑產廣中以香炷點之有烟起如蚊子飛者真陳廷慶雲色白者真此乃熔鐵鍋中浮起白沫如枯礬者若色黃黑者假治癬神效多年頑癬久不愈者先以姜擦患處後以粉付之百草鏡云用醋調搽忌姜椒一切發物楊春涯驗方云廣東剔癬粉治癬神效其色如沉香末則是鐵線者乃剔癬之訛也兩腿陰面濕癬毛世洪經驗集以荸薺蘸鐵線粉擦之立瘥鐵線粉即火炮中刮下銷粉也粵中洋行有舶上鐵絲帶來出售中土日久起銷用刀刮其銷明亮如新所刮下之銷末名鐵線粉其色黃如香灰帶白色者乃熔鐵浮起鍋中白沫搗細而成亦名鐵線粉廣中有此二種開元錢附萬曆龍鳳錢無顏錄唐開元錢燒之有水銀出可入藥以有楊妃手掐痕者佳以火煅紅淬醋中六七次用入目者磨用入散者同胡桃研成粉用明目醋煅入眼科治小兒急慢驚風楊仁齋直指有孔方兄飲治慢脾驚風利痰奇效用開元錢背後上下有兩月痕者其色淡黑頗小以一個放鐵匙上炭火燒四圍上下各出珠子取出待冷傾入盞中作一服以南木香湯送下或人參湯亦可錢雖利痰非胃家所好須以木香佐之禁口痢張氏必效方開元古錢一個火煅醋淬以錢化為度研細末拌粥內食之如十分沉重並粥不能食者以溫開水調下一二時辰即思飲食矣然後用薄粥漸漸開導再用調理脾氣自愈折傷接骨槐西雜誌交河黃俊生言折傷接骨者以開通元寶錢燒而醋淬研為末以酒服下則銅末自結而為圈周束折處曾以折足雞試之果接續如故及烹此雞驗其骨銅束宛然此錢唐初所鑄歐陽詢所書其旁微有一偃月形乃進樣時文德皇后誤掐一痕因而未改也其字當迥環讀之俗以為開元錢則誤矣周氏方治跌打損傷用開元錢一個醋煅和酒服至重者用兩個立愈古方選注云唐時開元錢亦可入藥功專腐蝕壞肉陳藏器曰能直入損處焊入斷骨廣志自河頭至高廉二郡皆用唐宋錢開元錢以平頭元為上尖頭元次之有萬曆錢則以跂歷為上以歷字左撇直下也古錢皆可治病如漢之五銖秦之半兩其質薄多青綠剝蝕痕醋煅入眼科綱目已載之世亦多有知者秋燈叢話載順治初湖南孝感縣民多病虐或於古錢中檢開元通寶錢一文持之即愈遠近喧傳每文價值制錢一緡若是則又不止開元錢可用也然准古酌今入藥惟開元錢為當故特為拈出以廣其用王楙野客叢書唐之錢見於今者有二開元通寶與夫乾元重寶按食貨志開元通寶高祖時鑄徑八分得輕重小大之中其文以八分篆隸三體洛並幽益桂等州皆置監賜秦王齊王三爐右僕射裴寂一爐高宗復行開元通寶錢天下皆鑄之元宗亦鑄此錢京師藏皆遍天下而乾元重寶錢肅宗命第五琦鑄錢徑一寸每緡重十斤與開元通寶參用以一當十琦為相後命絳州鑄此錢徑一寸二分每緡重二十斤與開元通寶並行以一當十乾元錢惟肅宗朝鑄而開元錢鑄於累朝所以至今尚多按開元通寶錢有二種一種有手掐痕儼如月眉輪廓微仄銅色頗古即世所稱楊妃手痕者閱譚寶錄載錢文如甲跡者因文德皇后也武德中廢五銖錢行開元通寶錢此四字乃歐陽詢所書初進樣後掐一甲痕因鑄之始知今所傳乃開通錢也存以備考萬曆龍鳳錢婦人臨產置錢一枚手掌內可催生朱文藻附記菜花銅風磨銅附藥性考此天生者今之黃銅乃赤銅合爐甘石煉成味辛宜制刀切藥性味不改打箔用入損傷劑能斂金瘡傷口強脾益肺除一切風痹風磨銅生西蕃置風露中色燦如金佩之除一切風疾白銅礦白銅附此乃礦中白銅質脆今時用白銅以赤銅砒石煉成有毒不堪用辛溫治風散毒敷牛馬瘡亦續筋骨白銅辛涼鎮氣不足益肺下痰伐肝明目藥性考紫銅鉚金花鉚錫鉚附藥性考產雲南入藥鎮心利肺降氣墜痰火煅末用可罨續筋骨折傷金花鉚藥性考與紫銅鉚相類主治亦同錫鉚藥性考有毒磨塗疔腫錢花藥性考此乃鑄錢爐中飛起黃沫輕鬆者佳主敷騾馬迎𩣑瘡馬口鐵一名馬銜鐵乃馬口中嚼環是也其性愈久愈軟市人以之打簪鐲戒指偽充銀器儼如真者或以作包金地子皆好年久者質軟更得馬之精液入藥良味辛煎湯治小兒驚風金頂品級考頂制以銅外鍍以金七品以下皆純鍍金七品以上則嵌珍石不同入藥取純銅鍍金色舊難用者良先以甘草煎湯乘熱洗用治頭風及口眼喎斜傳信方袁良臣云煎湯者藥有效舊雀頂更妙絕邪虐余機云取年久色舊純金頂一枚以紅絹囊盛之藏臥席下勿令病人知自愈按頂制加於冠首日受陽氣熏浹又得風日之氣年久者得氣愈厚凡今之屬皆能剋木風屬巽巽為木故能治風斜絕邪虐者亦取正氣以定之耳烏銀綱目銀下附烏銀言用硫黃熏銀則色黑成烏銀養生家制為器盛露飲之長年辟惡止載其服食功用而不言有治病之用故從行篋檢秘方得其法以補之治翻胃如神用紋銀一錢二分硫黃一斤將硫黃分作一百二十包取大傾銀罐一個將銀放入罐內炭火上煅將硫黃逐包投入罐內黃盡為度取銀為末初次服三分二次服二分三次服一分再加丁香茴香藿香沉香各三分麝香一分分為三服每服用銀粉二分水一鍾煎藥至半鍾將銀粉空心送下作三日服完即愈子母懸翟筠川掌記子母懸出貴州鉛礦中乃鉛之精氣所結得其大者成塊有數十斤生鑿為洗盆沐頭面發至老不白明目去瘢痣澤容潤肌凡人面有紫黑癍記久沐盡去解毒去疣贅息肉烏鬚髮明目銀銪一作釉此乃傾銀鋪熔銀腳也凡熔銀入罐必多用硝及硼砂黃砂以去鉛銅雜腳則成十足成色為紋銀其罐底所餘黑色滓渣名曰銪有毒不可誤食食能墜人腸此物無入藥用者故綱目銀下附烏銀雖無主治尚列其名而銪末及焉者或以其毒而棄諸人有誤食者急用黃泥水服二茶盞即可解或每日用飴糖四兩作小丸不時以芝麻油吞下俱可瀉其毒出須服至百日外無患經驗廣集服銀銪水者烏梅湯灌之即解楊春涯驗方誤食銀釉帶皮綠柿連吃數十枚冬日吃柿餅茨菇汁可解神妙治癬救世青囊凡頑癬用銀銪不拘多少盛瓷盤內安放露天將盤微側使銪沾露有水流下抓破搽之內府萬應膏慈溪陳水東得來用銀銪一斤黑芝麻油二斤先將銪入油內浸十日敲碎同油煎至四五分熟用絹袋濾去銪入炒過飛淨東丹一斤熬成膏治一切無名腫毒癬瘡痔漏發背疔瘡一貼即愈五云膏不藥良方治馬刀瘰癧又鼠瘡已潰者用銀黝子四兩捶碎黃丹八兩飛淨香油二十兩用砂鍋一個盛香油火溫候油熱將黝子投入油以桃柳桑槐棗五枝攪之候起珍珠花撈去渣用布濾淨復將油下鍋慢慢將黃丹篩入油內仍用五枝不住手攪之以滴水成珠為度取出收貯用時勿見火以重湯燉化紅緞攤貼石部二十七種附二種吸毒石袁棟書影叢說云吳江某姓有吸毒石形如雲南黑圍棋亦有白色者有大腫毒者以石觸之即膠黏不脫毒重者一周時即落輕者逾時即落當候其自脫不可強離也強離則毒終未盡俟其落時預備人乳一大碗分貯小碗以石投乳中乃百沸踴躍再易乳復沸入前俟沸定則其石無恙以所吸之毒為乳所洗盡也否則石必粉裂云得之大西洋嶺南雜記出西洋島中毒蛇腦中石也大如扁豆能吸一切腫毒發背亦可治今貨者乃土人捕此蛇以土和肉舂成如圍棋石子可吸平常腫毒及蜈蚣毒蠍等傷置患處黏吸不動毒儘自落浸以人乳變綠色即遠棄之不浸即裂下次不驗真腦中石置蛇頭不動者真張綠猗言吸毒石乃蛇蟄時口中所含泥驚蟄後吐棄穴畔人取貨之按庚辛玉冊云蛇入蟄時含土起蟄時化作黃石並無此事如綠猗所言縱有之亦蛇銜土耳何能吸毒耶泰西石振鐸本草補云吸毒石又名蛇石有兩種小西洋有毒蛇頭內生一石如扁豆仁大能拔除各種毒氣此生成者也土人將蛇石並本蛇之肉與本地之土為末造成如圍棋子大此造成者也小西洋用蛇石大西洋惟用藥制凡遇蛇蠍蜈蚣等傷及癰疽大毒一切惡瘡用此石置患處則緊黏不脫其毒吸盡則解脫須防墜損以綿氈等盛之吸時只可一二時不脫亦當摘下否則石碎脫離時急用乳汁浸之或人乳不便牛羊乳亦可浸至乳汁略變綠色或黃或黑是其毒盡也或諸乳皆無以溫水浸之亦可浸之稍遲石即受傷不可再用矣既浸之後又以清水洗淨抹乾收貯但所浸乳汁有毒在內須掘地坑埋之免傷人畜或患處無血用小刀刮損微見血出方能黏也或預服解毒傷藥內攻再用此石吸之更妙如試此石置毒蛇頭上蛇即不敢動然亦必須乳汁浸如前法則石不傷蓋一試之頃蛇毒亦在內也紀曉嵐先生濼陽消夏錄云小奴玉保烏魯木齊流人子也初隸特納格爾軍屯嘗入谷追亡羊見大蛇巨如柱盤於高岡之頂向日曬鱗周身五色爛然如堆錦繡頂一角長尺許有群雉飛過張口吸之相距四五丈皆翩然而落如矢投壺知羊為所吞矣乘其未見循澗逃歸恐怖幾失魂魄軍吏鄔圖麟因言此蛇至毒而其角能解毒即所謂吸毒石也見此蛇者攜雄黃數斤於上風燒之即委頓不能動取其角鋸為塊癰疽初起時以一塊著瘡頂即如磁吸鐵相黏不可脫待毒氣吸出乃自落置之乳中浸出其毒仍可再用毒輕者乳變綠稍重變青暗極重者變黑紫須吸四五次乃可盡餘一二次愈矣予從兄懋園家有吸毒石治癰疽頗驗其質非木非石至是乃知為蛇角矣敏按吸毒紀曉嵐先生以為即大蛇之角綠猗以為蛇含土恐皆非是瀕湖綱目蛇角一名骨咄犀引輟耕錄及松漠紀聞曹昭格古論諸書止言能治癰毒並無吸毒之說書影叢說及嶺南雜記皆斷以為石其說詳核可從故列石部兼採諸說備證至蛇含土乃蛇黃也與此更迥別尤不辨自明治一切無名腫毒及毒蟲傷以石吸之立愈天生磺毗陵劉霽軒先生諱煥章任浪窮令有天生磺紀略曰浪窮東城外五里有溫泉焉乃昆明海洱之委也周圍三四里許泉底產硫磺水熱如湯投以雞蛋可熟中流峙一平岩名九氣臺中空而旁穴穴凡九溫泉注其內其氣熏蒸上浮於石沾濡流浹如垂乳然積時既久質漸堅色甚瑩白歷數百餘年其色灰蒼堆聚岩下磈碕玲瓏與巧石相似土人鑿取之以為藥其性大溫補命門真火虛寒等症服之厥效如神蓋硫黃泉之熱氣所結質最輕清又久而後成故功效遠過於石硫黃也今土人建文星閣於九氣臺上為浪邑勝蹟云治膈症補命門火衰余功同倭黃按西儒高一志空際格致云硫黃有人造者有天生者天生者外如灰色內如黃泥而淡其體濃肥其味苦鹹其氣臭毒其性造熱故近火則易為養也倭硫黃出東洋琉球日本呂宋等國以日本者佳其色白似蜜氣不臭烈光潤而嫩高濂四時修合方云舶上硫黃倭夷海船上作灰塗縫者佳人不多見俱以市硫有油者用舶硫色如蜜者黃中有金紅處如七月石榴皮打開儼若水晶有光全非鬆脆性如石硬者真按硫出內地者取土與油煎熬而成氣腥觸鼻作老黃色倭產者嫩白瀕湖集解但引庚辛玉冊所載石土二種於倭硫卻無考據僅云倭舶者佳不知倭硫黃與內地迥別也其附方內所載本事方之陰證傷寒博濟方之陰陽二毒瑞竹堂方之酒齇赤鼻宣明方之鼻面紫風皆用舶上硫黃者斷不可以內地臺黃代用故補著其功於左百草鏡白硫黃出琉球國名倭硫黃洋舶帶來質堅如石不臭光潤滑澤形如滴乳者真物理小識舶硫如蜜黃中有金紅處擊開如水晶有光今青硫不佳也蓋陽氣入地遇水則死為硫升云則爆為雷乃生養萬物之源故以金紅者為第一種但須善制耳遇硫毒研釜底煤泡湯飲以煤為火之宅硫本陽火見而服也岳鹺使秀峰先生曾語予曰在京師見倭黃如梅花式成餅色亦不甚白握手中置耳畔聽之索索作聲如蟲鳴云此種系倭舶來者特筆於此以候考性大熱味微酸有小毒補下元助陽道益命門火衰於老人尤宜滅斑殺蟲治瘡通血止瀉痢暖肚封臍膏周氏家寶云夏天貼之秋後不生痢疾用韭菜子蛇床子大附子各一兩肉桂一兩川椒三兩倭硫黃一兩麝香三分獨蒜一枚麻油三斤入粗藥浸半月熬至枯色去渣熬至滴水成珠再加黃丹十二兩再熬俟冷加細藥聽用孕婦忌貼登仙膏萬氏家抄云此藥存精不漏固體壯陽強形健力凡交不泄可採十女之精兼治腰疼下元虛損五勞七傷半身不遂膀胱疝氣下焦冷氣小腸偏墜又治二三十年腳腿疼麻陽事不舉婦人白帶血淋陰痛血崩皆宜貼之麻油一斤四兩入甘草二兩熬至六分下諸藥第一下芝麻四兩第二下甘草二錢第三下天門冬酒浸去心麥冬遠志俱酒浸去心生地酒洗熟地酒蒸牛膝去蘆酒浸蛇床子酒洗虎骨酥炙菟絲子酒浸鹿茸酥炙肉蓯蓉酒洗去甲膜川續斷紫稍花木鱉子去殼杏仁去皮尖穀精草官桂去皮各三錢文武火熬至枯黑色去渣下飛過黃丹半斤第四下松香八兩槐柳枝不住手攪滴水不散第五下倭硫黃雄黃龍骨赤石脂各為末二錢再上火熬半時第六下乳香沒藥木香母丁香各末五錢再熬離火放溫第七下蟾酥麝香陽起石各二錢滴水不散第八下黃佔一兩用瓷罐盛之以蠟封口入井中浸三日去火毒用紅絹攤貼臍上如行房欲泄以婦人唾津潤去膏藥即泄便有孕應昌按御女之說適足以找生也種子之說亦足以導淫也貽誤多而成功少觀者慎諸寶珠膏行篋檢秘此藥能助筋骨補血長肌固元未貼此膏之前先用擦久易丹擦腰眼三日後再貼此膏赤石脂天冬麥冬生地熟地紫稍花蛇床子鹿茸穀精草防風元參厚朴虎骨菟絲子木香各一兩母丁香肉桂川斷赤芍黃耆肉蓯蓉白龍骨杜仲各一錢五分附子一個生用蓖麻子一百粒去油穿山甲一錢五分地龍去土二錢木鱉去殼不去油切片倭硫黃沒藥各一錢血竭一錢乳香二錢松香黃蠟各四錢麝香少許用麻油二斤將藥入油浸三日後入鍋內熬至黑色去渣用槐柳枝攪次下黃蠟松香再下細藥油滴水成珠不散為度瓷器收之絹緞布攤貼腰眼其效如神擦久易丹肉蓯蓉良薑蛇床子丁香馬蘭花韶腦各一兩木鱉蟾酥少許為末煉蜜為丸如彈子大每用一丸擦腰眼千百遍軟絹綢護之一日不解三日後貼前寶珠膏七寶丹高濂修合方治久患瀉痢療不瘥者服之即效老人及脾泄滑宜服用附子童便和黃泥炮五錢當歸一兩乾薑五錢吳茱萸厚朴薑製花椒各三錢舶硫黃八錢七味為末米醋合成兩團白麵和外衣裹藥在內如燒餅包糖一般文武火煅面熟去面搗為末蜜丸桐子大諸痢米湯下二十丸空心日午服宿食氣痛不消姜鹽湯下神效乾丹演揲兒集此藥堅陽益腎強筋力和血脈種子如神天雄三錢去皮尖雄精三錢鴉片三錢蟾酥三錢母丁香大者四粒人參三錢樟腦瓦上升淨霜三錢乳香沒藥去油各五分倭硫黃三錢共研細末用絹羅裹外麝香二錢研極細另包將白芨不拘多少以敷用為度放碗內用滾水泡開將白芨裝入絹袋內擰汁去渣再用蘇合油三錢同白芨汁和藥調勻將麝香末灑上做成錠放瓷盒內陰乾或將口封固略曬俟乾研擦翦根丸經驗廣集治胃氣一服除根冷痛尤效元胡索胡椒五靈脂白豆蔻各五錢倭黃如無用石硫黃水浸早晚換水取出用瓷器熔數沸於土地上候冷再用水泡過洗淨一兩木香切片曬乾二錢五分研細末拌勻收貯體壯者服一分弱者八釐老人幼童五釐取溫燒酒半小鐘調服入密室一切食物不可吃待次日吃稀米湯至五日後方可吃乾飯永不再發孕婦忌服石腦油出陝西延安榆州等處乃石中流液土人取之格物須知云石腦油真者透金銀惟真琉璃可貯入水涓滴烈焰遽發餘力入水魚鱉皆死撲之以灰則滅常中丞宦遊筆記西陲赤金衛東南一百五十里有石油泉油生水面如肥脂色黑氣臭土人多取以燃燈極明可抵松膏或云可治瘡癬筆談鄜延脂延安石油也生於水際沙石與泉水相雜惘惘而出土人以雉尾裛之入缶中頗似漆燃之極明元和志石油泉在玉門縣東一百八十里泉中有苔如肥肉燃之可代燭此油能於水中發火如燃此油沃以水其光愈熾以灰撲之則滅按此即古之石漆也漢書注延壽縣南有山石山泉漾漾如不凝脂燃之極明不可食縣人謂之石漆張華言延壽縣南山有溝脂始黃後黑謂之石漆方鎮編年錄謂之地脂時珍以為石腦油一曰硫黃油今雲南緬甸廣之南雄皆有之聞見雜誌蜀富順縣火井先以木火下引而上用大竹破半去節火由內行可引入灶下煎鹽其火色青綠不紅井中油用紙布捻燃入水沉底不滅搽瘡癤立愈此亦石腦油之類北史屈茨川在龜茲國西北大山中水如膏流出成川行數里入地狀如睘糊甚臭服之齒髮再生癘人服之亦愈此亦石腦地溲之類通志略龜溺亦名石腦油與此別治白禿堆灰俗名狗屎蠟梨瘡剃頭以此油塗上立瘥又治頑癬風癩惡疥無名腫毒救生苦海緬甸出石油即石腦油在石縫流氣臭惡不可聞色黑用塗惡毒良又治癤毒東西洋考三佛齊在東南海中本南蠻別種後為爪哇所破更名舊港產猛火油樹津也一名泥油大類樟腦第能腐人肌肉燃置水中光焰愈熾蠻夷以制火器其烽更烈魚鱉過者無不燋爍敏按此即石油觀其一名泥油可知非樹脂也洋考誤以為樹津故取附石腦油下神火救生苦海有取神火法用劈砂一斤帶水研細以滾水沖之面上有浮起細沫一層用荊川紙拖水面其沫即黏著紙上將紙曬乾掃下即神火也其砂澄清去水再研再衝見有浮起沫依前法拖曬如此六七次直至無浮沫方止每砂一斤約可取神火八九分用烏金紙包收貯性能拔毒收口凡癰疽毒瘡難收口者以神火少許鵝翎蘸掃膏藥上貼毒水易干瘡口易斂為外科聖藥天龍骨乃千年塔頂石灰也瀕湖石灰條下附古墓中石灰名地龍骨艌舡油石灰名水龍骨而獨遺此特補之盛再華云塔上石灰受天陽風露之氣變悍烈之性而成溫和故能定痛生肌止血去濕為金刃要藥內服亦良外治止血生肌塗惡瘡腫毒寒濕臁瘡內治心腹痛烏痧脹婦人血崩漏帶男子久痢便血及一切打撲損傷惡血凝聚腹痛欲死者俱可服白虎丸治一切青筋腹痛萬氏家抄天龍骨不拘多少去泥土水飛過凡似桐子大每服五十丸看輕重加減燒酒下初覺頭痛惡心腹脹即進一服當時血散若過三五日青筋已老者多服取效玉田沙本經逢原云夏月發麻疹用之良亦河沙中之一種也綱目失載瑤池沙朱排山柑園雜識喇嗎嘗進瑤池水水香如蓮色白而重以玻璃器貯之數百年不涸不變人飲之能療百病康熙五十三年遣理藩院員外盛柱取之自京出西寧口望西北行凡七千里至星宿海即世所稱火敦腦兒也更西北行三千里達崑崙山山形如桃皆積雪人不能上測影高三百餘丈山前名孔雀門後名馬門左名獅門右名象門山四隅各有一山皆低於崑崙孔雀門內有池名麻蓬達𡃤華言天河也四山之水合流於天河河水伏流至星宿海複流出入中國去崑崙西北四五里即瑤池池匝百八十里岸傍皆雪水中有五色細砂滑膩可食取水一瓶並圖山川風土而歸往返凡二年零六月稀痘取沙與小兒常食之即永不出痘木心石樟岩附生古木中圓如雀卵中色正白著木處燦如黃金書影叢說有孝子某母嘗患心痛日久不瘳孝子日禱於神求治一夕夢神曰爾母疾必得木心石乃愈醒而遍訪名醫皆不知此藥一日入山忽有二匠解木下鋸有聲孝子乃悟急止告以故視鋸下有石持歸磨酒與母服痼疾頓除治心痛按造化之用無風不能生物無火不能結物故萬物之動者皆生於風萬物之靜者皆凝於火觀於火死而質不朽可知木性疏達得風以生之是以自萌而芽而苞苞圻而花而實皆得風以散之故春榮秋落如有知也其實與脂質之靜者均屬於火火為木子所以樹老則自焚火鬱必泄也木心有石乃風不能散火鬱於內又不得泄致其脂液凝聚至精者久則變為石余者皆朽如松脂成琥珀柏脂成瑪瑙所謂物物有一太極也心為人身之太極主中宮而至靈以至變之物治之則合同而化故能愈此疾論事雖變而論理則常也樟岩沈氏秘檢樟樹內有石名樟岩治心痛能通五經煅研煎酒服仙人骨與地誌雲南鎮南州山中出碎石如朴硝土人掘取作粉貨之相傳仙人曾化於此因名焉南詔備考鎮南州城東二十里山中世傳仙人張明亨遺蛻瘞此治一切瘡神效取粉敷杜昌丁藏行紀程楚雄府七十里至呂合有呂祖廟去村數里山腳出仙人骨如水晶能療瘡癤相傳仙人為呂祖所度又三五十里為鎮南州滇略南詔時張王二生遇呂仙於呂合驛王得度上升張不能從憤而死埋骨山中化為石瑩沏如水晶付一切瘡瘍立愈禹穴石產四川龍安府石泉縣石紐鄉以紅如潠血者佳四川通志出石泉禹穴下石皮如血染氣腥以滾水沃飲之能催生治難產桃花鹽柑園小識桃花鹽產澤旺每春深紅如桃花至夏紅色漸減秋冬色白入春仍紅胃痛人炙鹽熨之立止治胃痛以鹽熨之立止瘤卵石池北偶談高陽民家子方十餘歲忽臂上生宿瘤痛癢不可忍醫皆不辨何症一日忽潰中有圓卵墜出尋化為石劉工部霦以一金售之用治膈症如神治痞結膈症松化石唐書僕骨東境康於河斷松投之輒化為石其色佳謂之康於石錄異記婺州永康縣山亭中有枯松因斷之誤墜水中化為石取未化者試於水隨亦化焉其所化者枝幹乃皮與松無異但堅勁博物志云松本石氣石裂受沙即產松松至三千年更化為石與地紀宋建炎間遂寧府轉運使衙門後圃有松石外猶松樹而中化為石又重慶府永川縣有石松坪有松花石石質而鬆理或二三尺許大可合抱然不過相望數山有之俗呼雷燒松神仙傳三千年當化為石張綠猗塗說松花石有黃紫二色質理甚細皮上有水紋或松皮紋亦有節暈紋者天台山間有之西北亦產乃年久折松入澗水得地氣變石且有變不全尚帶松質者入藥宜用全化者服之令人忘情絕想治相思症凡男女有所思不遂者服之便絕意不復再念敏按松化石乃有情化無情為陽極反陰之象男女愛慕結想成病致君相二火虛磨妄動鑠耗真陰魂狂魄越神不守舍非此反折之使入和平不可正取其貞凝之氣以釋妄緣也瀕湖石部不灰木後附松石云松久所化不入藥用殆未深悉其奧妙耳云核羅浮志云核出羅浮亦云母之類黃者出黃云峰白者出白雲峰屑之調為漿服之久能吞吐五色云性平服食用之延年卻病功同雲母瀚海石竅沙朱排山柑園小識瀚海石出瀚海地近澤旺為方三百里無水草其石大者如瓜如拳小者如芋慄亦有如珠如豆者皆具五色如瑪瑙有竅而中空其竅中有沙可入藥石質堅其外可碾其中不可碾故每因形成器主明目岩香深山皆有之凡山岩洞壁上有泉滴下年久其水流處則生水結乃至陰之精華憑石乳滋液乘風力而結者土人名岩香俗呼水鹼鑿石取之色白如窯灰置手中冷入骨者真百草鏡云性寒敷湯火傷金瘡出血用水鹼火煅醋淬研末同白果肉水浸搗汁和服七分可治白濁亦入眼科用龍窩石名勝志出廬山溪中及有龍居之所此石夜覺涼冷者真王伯厚云深山有龍蟄處皆有之土人俟龍升去乃跡而獲之有五色以透明者煅用生用有毒敲碎投醋中片片能動而相合者良性大寒磨面能滅瘢痕解熱瘡毒煅粉撲暑痱立消按龍體純陽凡陽之體以陰為用故其蟄處石皆性冷入夜更涼者真陰為用也投醋中輒能相合者龍乃東方之神應木木味作酸石感精氣所以遇醋而能合其功能解熱滅瘢亦取其寒斂之性以奏效耳石髓福建續志石髓出泉州安溪長潭石罅間接骨如神療內傷折骨酒研三分服能接斷骨不可多服多則骨大紅毛石皮出粵澳門來自紅毛國中國用作火石外皮白如粉甚鬆脆番人去其皮其中石質售為火石皮不甚貴重任人搬取治金刃傷以石皮搗粉功勝千年石灰云可以黏合皮膚裂痕金精石福建續志出永春州雙髻山等處其石似鐵磺而鬆色如黃金本草綱目金星石集解後引劉河間宣明方點眼藥中用金精石時珍疑以為即金星石蓋未見續志也去翳明目入眼科用雄膽雉窠黃附六研齋筆記王存思太僕貴陽人云其土多山出雄黃有大至數百斤者中有浮沙成團如鵝卵曰雄膽破之有清水盞許急飲之沉疴俱消壽二百歲特以山民頑獷遇之不謹即散漫不得飲耳有一人飲之至今猶在健如三十許人自言百五十餘歲矣殺三蟲毒除痼疾駐容延年雉窠黃簪云樓雜記雉窠底有雉黃黃氣遠射能闢毒物鄉人三四月中遍覓之為市其取黃法先以溺繞窠三幣從而掘之所獲約二三兩價倍於他產海外三珠有轉胎法五月五日午時取金針花葉俗名鵝腳花單葉名金針花陰乾聽用婦人孕滿月四十日之前將雉窠黃撿明透重一兩一塊者用葉包裹三四張再用布包縫上孕婦腹前貼身衣上候四十日分娩生男不生女解一切毒蛇咬傷辟邪魅山精按雉窠有黃猶鶴窠有礜所以助陽氣能令子不毈也千金方有轉女成男法用雄黃養胎取其陽精之全於地產則雉蓋不獨取以解毒也竊謂雉之精氣呴伏既久人得佩之可解一切產厄於孕婦尤宜石螺螄百草鏡出廣東修治與石燕同治瞽目眼疾按石螺螄形似螺而體質則石也亦石蟹石蛇之類故主治亦大略相似貓睛石墨莊漫錄宣和間外夷貢方物有石圓如龍眼實色若綠葡萄號貓兒眼睛能息火燃炭方熾投之即滅按此即寶石中一種貓兒眼也今雲南緬地寶井中有之解蟲毒闢驚石一名闢驚風石本草補云西巴尼亞國有一處土中產石色黑而光嫩取而琢之或大或小佩孩童胸前遇邪風而起慢驚急驚此石代受其患邪氣盡收於石內自然裂破孩童無恙必須常佩永遠方可無虞真可寶之物也治急慢驚風一切天釣屍疰奇功石出大西洋形狀無可考本草補云此石能治婦人產難凡遇產難者用芝麻油一鍾放此石在油內浸一宿後用此油擦婦人肚面即無難產之患或用此石綁在婦人大腿上即產產後隨時除去凡遇發擺子中華名虐身熱或心中脹悶或胃氣疼痛或痰滯及錯食毒物等患將石或泡酒一碗水一碗浸一宿取此酒石用手擠一擠令此石氣汁下酒水內空心飲此酒水即愈血熱瘡疥飲此酒水並塗抹患處即愈患眼將此酒水或飲或洗皆妙保心石本草補生鹿腹中鹿食各種解毒之草其精液久積結而為石亦名寶石有二種一是鹿獸生成一是泰西名醫至小西洋採珍藥製成服之令毒氣不攻於心故曰保心石用法以刀刮如麥大者六粒為粉調服多用亦無害更增加精神常服此藥酒水隨人能令腹中不多生蛔蟲體健神旺治大熱燥渴小便不通泄瀉俱水調服胸傷憂悶無熱者或酒或水調服有熱者酒水各半調服病後軟弱酒水各半調服胸肉傷心痛風寒氣痛吐蛔咯血吐血皆水調服毒蛇毒蟲傷不拘酒水服刀箭瘋犬毒物傷以粉敷瘡口外以布包即愈俱見本草補
