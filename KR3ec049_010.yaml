body:
  text: 卷十鱗部二十六種附二種脆蛇雲南志順寧府出脆蛇見人則斷人去復續取而干之可治腫毒滇黔記遊出滇黔土司長尺余伏草莽見人輒躍起跌數段頃復合一色如白金光亮誤拾之觸毒即斃陳鼎蛇譜脆蛇産貴州土司中長尺有二寸圓如錢嘴尖尾禿背黑腹白暗鱗點點可玩見人輒躍起數尺跌為十二段須臾復合為一不知者誤拾之即寸斷兩端俱生頭齧人即斃出入往來恆有度捕之者置竹筒於其徑側則不知而入其中急持之方可完稍緩則碎矣故名曰脆豫家多蓄奇藥曾購得其臘見寸斷處皆光潤如新截然亦一異也查慎行人海記脆蛇出崑崙山聞人聲即寸斷人伺其斷鉗取之須寸各異處待風乾入藥若少頃無人聲寸寸仍續成蛇治色癆及驚疑喪膽諸症玉鏡新談肉熬膏箍癰疽去風癘其骨醋磨圍腫毒良接斷骨滇黔記遊脆蛇人得而臘之用接斷骨價值兼金視其上中下治頭腹脛股無不效大麻風痢滇略脆蛇一名片蛇産頓寧大候山中長二尺許遇人輒自斷為三四人去復續干之色如黃金治惡疽腰以上用首以下用尾又治大麻風及痢近人貨之為夾棍藥環蛇蛇譜云出三佛齊國如環大數圍至數十圍者逐獸即疾走如轉車輪於千仞山獸入環中即斃其口眼俱生環之半與尻相對脂服之刀劍不能傷翠蛇珍異藥品云形如曲蟺長可五六寸蟠旋作圈治癤毒癰疽良碧飛湖州府志武康山多蝮蛇名碧飛大者如圍甕小亦如杯案斧首出目鋸齒方文而綬色厥雄赤紫厥雌青黑色曄焴如蜃甲光目亦如之山中人謂有目而無視也春夏布絲草篠人物觸絲激射迅於矢忽不見已攫肉去矣殺人至死霜降絲脆開商樹杪施吐白涎烏鵲下啄則吞之惟鹿以為膳獵獲之前左足扼其腰中首尾盤繞右足又趾寸解啖無餘者人得而臘之可入藥凡西北諸山自余英嶺而內皆是物也治風痹蝮傷人被其齧者還食其肉則生敏按湖志所言碧飛吾杭山鄉多有之土人名方勝板以其遍身花紋如錦中方勝形匾似板故名齧人最毒惟野豬能食之土人言冬日蛇蟄地中野豕嗅其氣輒翻石掘土出而啖之蛇性大熱野豬食三條即能過嚴冬綱目蝮虺為二蝮即方勝板虺即土錦俗呼灰地匾是也惡風頑痹非此猛烈積熱之性驅之則肢廢者不能復舉殆以毒攻毒之義想碧飛或同類而異名者書此以俟證蟒油爾雅蟒王蛇注蛇中最大者故曰王蛇今深山處處有之大小不一色如菜花蛇而較黃頭上皆有王字亦有黑色者土人名曰烏蟒捕蛇者有呼蛇法不拘何種蛇呼之即至末後俟蟒到則諸蛇皆圍伏不動聽其擇取惟不敢傷蟒蟒傷則諸蛇無王環起嗾人聞其人云蟒蛇自有此種生而皆有王字故不論大小也蟒至則諸毒蛇皆不敢傷人治漏瘡集驗取蟒油銅鍋內熬熟隨將黃蠟入油內攪勻油紙攤膏貼患處十餘日便封口全愈按蟒蛇名王字蛇其首天生有一王字豫於庚子在奉化長橋見丐者手握此蛇乞錢其蛇亦不甚大性頗馴良因以千錢買得縱之綱目諸蛇獨遺此因急補之斷草烏粵志斷草烏出廣中蛇也大僅指許長五六寸頭如龍形而小身純烏其行也百草沾之立斷人見斷草輒跡得之故蛇每離地丈許使身如矢直以入穴使不沾草人莫得而跡之此亦烏蛇中一種綱目烏稍蛇不載龍頭者一種故録其遺治大麻風煮酒服龍涎香龍泄通雅龍涎有嶼在花面國傍獨立南海中彼人言於樹收之最收香氣今大內甜香用之澳門記略大食國産龍涎香為上西洋産於伯西兒海焚之則翠烟浮空結而不散坐客可用一剪以分烟縷嶠南璅記龍涎香新者色白久則紫又久則黑白者如百藥煎黑者次之似五靈脂其氣近臊和香焚之則翠烟浮空不散試法將結塊者奮力投沒水中須臾突起浮水面或取一錢口含之微有腥氣經宿其細沫已咽余膠結舌上取出就濕稱之仍重一錢又幹之其重如故雖極乾枯用銀簪燒極熱鑽入枯中乘暖抽出其涎引絲不絶驗此不分褐白褐黑俱真海東札記海翁魚大者三四千斤小者千餘斤即海鰍也皮生砂石刀箭不入或言其魚口中噴涎常自為吞吐有遺於海濱者黑色淺黃色不一即龍涎香也聞上淡水有之欲辨真贋研入水攪之浮水面如膏以口沫捻成丸擲案有聲噙之通宵不耗分毫者為真每兩值數十金廣志新安有龍穴洲每風雨即有龍起去地不數丈朱鬣金鱗兩目如電其精華在浮沫時噴薄如淡泉如雨土人爭承取之稍緩則入地中是為龍涎或謂龍涎多積於海上枯木如鳥遺狀其色青黧其香腥雜百和焚之翠烟千結蜿蜒蟠空經時不散可以剪分香縷然多不真從番舶來者出大秦波斯於雨中焚之腷膊有聲者真坤輿圖記龍涎香黑人國與伯西兒兩海最多有大塊重千餘斤者望之如島每為風濤湧泊於岸諸蟲鳥獸亟喜食之汪機本草龍吐涎沫可制香星槎勝覽錫蘭山國卜剌哇國竹步國木骨都束國剌撒國佐法兒國忽魯謨斯國溜山洋國俱産龍涎香稗史彙編龍涎香白者如百藥煎而膩理極細黑者亞之如五靈脂而光澤其氣近於臊似浮石而輕香本無損益但能聚香耳和香而用真龍涎焚之則翠烟浮空結而不散坐客可用一剪以分烟縷所以然者入蜃氣樓臺之餘烈也泉廣合香人云龍涎入香能收斂腦麝氣雖經數十年者香味仍存廣東通志龍涎在水採者褐黑色在山採者褐白色東西洋考海傍有花若木芙蓉花落海大魚吞之腹中先食龍涎花咽入久即脹悶昂頭向石上吐沫乾枯可用惟糞者不佳若散碎皆取自沙滲力薄範咸臺灣府志龍涎香傳為鰍魚精液泡水面凝為涎能止心痛助精氣以淡黃色嚼而不化者為佳出淡水者皆淡黃色無黑色朱國楨大政記龍涎香出蘇門答剌國西有龍涎嶼峙南巫里大洋之中群龍交戲其上遺涎焉國人駕獨木舟伺採之舟如龍形浮海面人伏其中隨風潮上下傍亦用槳龍遇之亦不吞也每一斤值其國金錢一百九十二枚准中國銅錢九千文嘉靖三十四年下戶部取香百斤遍市京師不得下廣東藩司採買部文至臺司集議懸價每斤銀一千二百兩僅得十一兩上進內驗不同姑存之亟取真者部文再至廣州夷囚馬那別的貯有一兩三錢上之黑褐色密地都密地山夷人繼上六兩白褐色細問狀之黑者採在水白者採在山皆真不贋尋有密地山商再上通前共得十七兩二錢五分次年進入內辨驗是真許留用自後夷船聞上供稍稍挾來市始定價每一兩價百金龍涎之為用也入香合和能收斂腦麝清氣雖數十年香味仍存得其真者和香焚之翠烟裊空不散涎沫有三品曰泛水曰滲沙曰魚食泛水則輕浮水面善水者伺龍出取之滲沙則凝積年久氣滲沙中魚食則化糞於沙磧惟泛水者可食香用又言魚食亦有二種海旁有花若木芙蓉春夏間盛開花落海大魚吞之若腹腸先食龍涎花咽入久即脹悶昂頭向石上吐沫乾枯可用惟糞者不佳嶺南雜記諸香龍涎最貴市值每兩不下百千次亦五六十出大食國近海有云氣罩山間知有龍睡下或半年一二載土人守視雲散則龍已去必得其涎五七兩或十餘兩衆共分之又大洋中有渦旋處龍在其下湧出之涎日爍成片風漂至岸取之又嶺外雜記龍枕石而睡涎浮水積而堅新者色白久紫甚久者黑氣近臊形如浮石而輕膩理光澤入香焚之翠烟浮空結而不散又出沒海上吐出涎沫有三品一泛水二滲沙三魚食泛水輕浮水面善水者伺龍出隨取滲沙凡風浪飄泊舟嶼積年氣盡於沙土中魚食涎作糞散沙磧氣腥穢進貢亦不過四兩按龍涎論色則瑣記言有白與紫黑之分而札記又有淺黃色廣志有青黧色辨真僞亦諸說互異大抵不必論其色總以含之不耗投水不沒雨中焚之能爆者良東璧綱目鱗部龍下龍腦龍胎俱有主治而於龍涎獨遺之惟附其名雲龍涎方藥鮮用惟入諸香云能收腦麝數十年不散出西南海洋春間群龍所吐涎沫浮出者番人採貨之亦有從大魚腹中剖得者其狀初若脂膠黃白色干則成塊黃黑色如百藥煎而膩理久則紫黑如五靈脂而光澤其體細飄似浮石而腥臊其說亦未確核蓋所云魚腹中得者即札記所云海鰍魚之精也亦名龍涎出臺灣不若大洋中産者佳夫龍腦龍胎世上所無龍涎則閩粵貨售者多東璧何得於罕見者載之於所有者反略之耶則甚矣該博之難也入藥用隔湯頓化如膠糖狀者佳氣腥味微酸鹹無毒藥性考味甘氣腥性澀張瑤實云夾砂者有小毒乃土人於砂磧上收取之入藥須以甘草水煮過用酉陽雜俎云龍漦遇烟煤則不散入藥忌鐵器及石膏活血益精髓助陽道通利血脈廖永言驗方云利水通淋散癥結闢精魅鬼邪消氣結逐勞蟲尸疰陳良士云在澳門見倭夷用合舶硫及他藥作種子丸雲漢時術士和丹用此倭夷皆有其方祕不傳中國札記云出淡水者止心痛助精氣周曲大云龍涎能生口中津液凡口患乾燥者含之能津流盈頰微若有腥氣粵中夷人合龍涎丸和以他藥便不腥入口亦不耗減一丸可用數十年不敗如單用龍涎入藥須先用雞湯將龍涎制死則入腹便化否則入腹絲毫不損蓋極難克化者方書云焚之其烟能入水盂豫嘗試之多不驗按龍乃東方之神其體純陽能噓氣成云陽之質輕浮故云上升其骨反入手足少陰厥陰經者蓋凡知覺運動之物皆肖陰陽以立體孤陽則不生龍秉純陽而骨反屬陰入藥能收陽中之陰治心腎諸病所謂一陰一陽之謂道也其質靈其齒能治魂遊不定鎮驚癇凡病在肝而龍主肝木治之最神涎乃陽中之陽故其氣絶香龍屬木木之氣得太陽多者必香故諸香以龍為最得盂水徑撲其中不落空外龍以水為用見水則精入焉入藥所以能利水道分陰陽能殺精魅鬼邪者亦以至陰之物見真陽而立解也龍泄河南薛姓客言曾在嘉興永太守處見有龍泄結成大塊其質亦輕有六七兩及斤許不等每塊皆起螺旋紋如象牙花紋其色有純黑有褐白二種欲辨真僞刮屑少許以滾水泡之其氣悉滃而成云遇婦人云輒撲入髮際旋繞不散蓋龍性好淫故也人服之入腹亦不耗惟見雞湯輒化如服後不食雞湯次日糞出其藥仍在色亦不改淘出洗淨復可再用氣亦不臭其功效食之能暖婦人子宮治男子下元虛冷入房術中用又史良宇言曾見龍血結塊如棋子大光滑可鑑觸手冷如冰夫龍純陽也而血獨冷又不解何故龍泄又何物也其涎與血歟抑精與溺歟俱不可知悉存其說以俟證西楞魚坤輿圖說大東洋海産魚名西楞上半身如男女形下半身則魚尾其骨入藥用女魚更效止血治一切內傷瘀損等症鰣魚鱗本經逢原鰣魚性補溫中益虛而無發毒之慮其生江中者大而色青味極甘美生海中者小而色亦味亦稍薄觀其暗室生光迥非常魚可比綱目主治言其肉補虛勞油塗湯火傷於集解下記其鱗為婦人鈿飾不及入藥功用張佳時云鰣魚須乘活時拔划水邊二鱗尖長者佳若死魚鱗便減藥力湯火傷逢原云用鰣魚鱗香油熬塗立效茅集之云鰣魚鱗貼腿瘡疼痛立效治疔陳氏傳方疔瘡用鰣魚鱗貼上則咬緊先須與酒飯吃飽然後將魚鱗邊略略揭起些須用力急揭去疔根便帶出也但揭出疔根時極痛無比非醉飽即暈倒也傅氏方水疔用鰣魚腮下近腹處有划水二瓣瓣間有長鱗二瓣最佳但難得今人以背上大鱗代之貼上即消毛世洪經驗集鰣魚靨用手剖下不可見水陰乾收貯此拔疔第一妙藥也用時以銀針撥開疔頭將一片貼上以清涼膏蓋之俟一宿揭開其疔連根拔出後用生肌散收功豫治兩貴婦大腳趾患瘡二三年不收功將靨一片以銀花湯浸軟拭乾貼之不數日而愈下疳救生苦海鰣魚鱗焙乾煅研白色名白龍丹敷之即愈得此可包醫血痣蔡云白言人生血痣挑破血出不止者用鰣魚鱗貼之即痂而愈苦魚劉基苦齊記匡山在處州龍泉縣劍溪之水出焉注入大谷其中多斑文小魚狀如吹沙味苦而微辛可食故名解酒毒可以醒酒藥性考苦魚微辛形細色斑烹食腴美消酒除𤸷金魚此魚自宋南渡始有一名硃砂魚乃人家蓄玩於盆盎中者有三尾四尾品尾金管銀管之分有蛋魚名龍蛋文蛋虎頭及鱗諸品純紅純白或紅白相間體具五色極大者三四寸小者寸許綱目金魚條云主治痢而所用乃金絲鯉魚按金魚雖有鯉鯽鰷諸種殊不知鯉魚中一種紅鯉名金鯉鯽魚中一種紅鯽名金鯽皆有金魚之名與此全別而東璧合為一則誤矣味苦微咸有小毒食之令人吐綱目本條氣味下云甘平無毒此指紅鯽而言並非今之金魚也解服滷毒用金魚一二枚搗之灌下吐出涎水自蘇治瘋癲石臌水臌黃疸慈航活人書俱用紅色金魚一個取三尾者甘蔗大者一二枚同搗爛紋汁服立刻即吐出痰涎愈阿羅魚一首十身音如吠犬亦可御火珍異藥品療癰疽渼陂魚輿地志鄠縣渼陂出魚味美可入藥治痔四足魚物理小識遊子六曰閩高山源有黑魚如指大其鱗即皮四足可調粥入藥治小兒疳河豚目子逢原云抉河豚目拌輕粉埋地中化水拔婦人腳上雞眼瘡可以脫根河豚子性有毒可絶壁蝨行篋檢祕同蟹殼樟冰各五分拌棉花子安床下燒烟燻之蜣螂魚三才藻異産撫仙湖狀如龜殼青大如盤無尾入足腹白食之闢瘴毒蜜姑魚宦遊筆記自光溪入四明二十餘里有蜜岩峭壁千尋下臨深溪窅洞無底岩顛舊有蜂窠聚蜂數百萬其蜜滴下溪魚食之故魚味甘絶曰蜜姑魚其釣法倍多曲折魚性極喜苔須縋懸崖下有水衣演漾深碧而細者剜以為餌魚性暴遇釣則跳岩卒不可制而蜜岩下溪水清甚用粗綆則恐魚之瞥見而驚遊也用細絲則又恐不足以勝魚跳岩之力釣者乃取絲長十餘丈盤於杆上遙望見深波中魚詡詡鼓鬣而至則取絲徐徐放之如小兒之送紙鳶者使得縱其所往魚入鉤果一躍數尺翻波跋浪橫激溪面其鱗光閃爍如千片碎金雜珠顆中隨風散灑觀者莫不目眩心動已而徐徐力倦乃可取之性溫味甘食之生胃津益肺氣補血脈增髓去熱除虛羸壯筋骨止嗽定喘功同燕窩蛤蚧也按此魚最潔惟食苔蜜苔寒而蜜溫得水火既濟之力大能補土生金燕窩性清肅而下行蛤蚧性和中而溫臟此則故能兼之真勞嗽虛羸之食品上藥也柳崖外編載張方海浙人少年讀書四明嘗斷炊者數月山澗谷多竹峭壁有蜜蜜入江化為魚名蜜鮎張逐掘筍釣鮎而食自言筍味淡以清蜜鮎濃而美有天台胡麻所不如者嗣後遂輕身耐寒暑不復思烟火味據此則其功用信不誣也雪魿粵語魿魚廣人池塘多蓄之以魚秧長成與鯽性相反鯽屬土其性沉長潛水中魿屬水其性浮長躍水上鯽食之可以實腸魿食之可以行氣鯽守而魿行性各不同如此其物以冬而肥故名喜泳浮波上得渀流則跳躍尋丈生食之益人氣力梧潯雜佩魿魚形似鰱而稍短味甚美作膾尤佳健筋骨活血行氣逐水利濕帶魚出海中形如帶頭尖尾細長者至五六尺大小不等無鱗身有涎干之作銀光色周身無細骨正中一脊骨如邊箕狀兩面皆肉裹之今人常食為海鮮據漁海人言此魚八月中自外洋來千百成群在洋中輒銜尾而行不受綱惟釣斯可得漁戶率以干帶魚肉一塊作餌以釣之一魚上釣則諸魚皆相銜不斷掣取盈船此魚之出以八月盛於十月霧重則魚多霧少則魚少率視霧以為貴賤云綱目無鱗魚條獨遺此品故為補之五雜俎閩有帶魚長丈餘無鱗而腥諸魚中最賤者獻客不以登俎然中人之家用油沃煎亦甚馨潔福清志帶魚身薄而長其形如帶無鱗入夜爛然有光小者俗名帶柳物鑑帶魚形纖長似帶銜尾而行漁人取得其一則連類而起不可斷絶至盈舟溢載始舉刀割斷捨去其餘玉環志帶魚首尾相銜而行釣法用大繩一根套竹筒作浮子順浮洋麵綴小繩一百二十根每小繩頭上拴銅絲一尺銅絲頭拴鐵鉤長三寸即以帶魚為餌未得帶魚之先則以鼻涕魚代之凡釣海魚皆如此釣期自九月起至次年二月止謂之魚汛朱排山柑園小識帶魚生海中狀如鰻鋭首扁身大眼細齒色白無鱗脊骨如篦肉細而肥長二三尺形如帶亦謂之裙帶魚冬時風浪大作輒釣得之藁為鯗以致遠味甘性平和中開胃食物宜忌帶魚形長扁薄似帶色白無鱗肉細佳膾醃䱒風乾久藏不敗煎烹味美多食發疥注帶魚銜尾而行得一可連數十醃食佳黑夜有光故有毒藥性考血鱔出浙江寧波府慈溪縣以白龍潭産者為第一他産者尾尖尚黑不能通體如硃砂紅也葛三春言白龍潭血鱔周身紅如血每年所産亦稀取其血沖酒飲可以驟長氣力行伍中學可入段錦工夫者多服之增氣力壯筋骨益血填髓沙魚翅沙即鮫魚種類甚多皆可食綱目鮫魚條集解下瀕湖注云沙魚腹下有翅味並肥美南人珍之主治下特載其肉皮膽之功用翅獨略焉今人可為常嗜之品凡宴會肴饌必設此物為珍享其翅乾者成片有大小率以三為對蓋脊翅一划水翅二也煮之折去硬骨檢取軟刺色如金者瀹以雞湯佐饌味最美漳泉有煮好剔取純軟刺作成團如胭脂餅狀金色可愛名沙刺片更佳味甘性平補五臟消魚積解蠱毒食物宜忌益氣開膈托毒長腰力閩部食疏清痰開胃進食藥性考土附嘉興縣志一名菜花魚以其出於菜花時最肥美故名程大昌演繁露土部吳興人呼為鱸鱧以其質園而長與黑鱧相似其鱗斑駁又似鱸魚故兩名之長興謂之蕩部又曰蕩魚湖州府志鮒魚今呼土部此魚質沉常附土而行不似他魚浮水遊也故又名土附錢塘縣志土鶩俗名土哺以清明前者佳藻異云吐哺産杭本名土附以其附土而生也色黑味美雨航雜録吐哺或曰食物嚼而吐之故名敏按美上諸說皆無杜父之名而綱目載杜父魚云其色黃黑有斑脊背上有鬐刺螫人又名渡父魚黃䱂魚船碇魚伏念魚似與土附絶不相類沈云將食纂陳芝山食物宜忌皆以為今之土部魚即父魚也此乃承山堂肆考之誤今土部杭城甚多一年皆有惟正二三月獨旺背黑亦有淡黑帶土黃色者不聞能刺人俗云此魚立冬後則伏土閉眼不食冬至後出土附土而行清明後開眼遍食小蟲蝦故有毒陳芝山云土部清明後頭上生紅蟲不可食細核其形狀食性與杜父全不相類何能強合豫故於禽蟲考中魚類辨之甚詳以杜父入吹沙類而另立土附本條蓋不敢附古人而欺後世也土部綱目所無復為補之味甘性溫補脾胃治噎膈除水腫濕氣療一切瘡疥此物又能扶陽其子用燒酒醉食頗能興腎與對蝦同功以其食蝦力也子助相火暖腰腎烏魚蛋産登萊乃烏賊腹中卵也藥性考以為即雄魚白味鹹開胃利水青魚膽梧潯雜佩青魚膽出藤縣之禢禢字不見字書讀如萱郡人亦有此姓洲洲在江中長可五六里許其上居民甚多水多石上青苔此魚食之其膽極涼可入藥他處即不堪用魚大者百餘斤漁人網得必以聞官割取其膽乃鬻於市白皮子蟫史䖳生南海四五月初生如帶至六月漸大如盤形似白緑絮而無耳目口鼻鱗骨一段赤色破碎者謂之䖳頭其肉如水晶以明礬醃之吳人呼為水母鮮久則漸薄如紙俗呼為白皮紙按今所云白皮紙乃海蜇外面之皮非陳久之海蜇也一名秋風子朱排山柑園小識海䖳上有白皮潔白脆美過於海䖳謂之白皮子綱目載海䖳名水母人以石灰礬水醃之去其血水色乃白其形最厚者謂䖳頭味更勝云而不録其外皮之用且其言性暖可治河魚腹疾而農田余話云水母本陰海凝結之物食而暖其性未詳東璧亦無發明敏曾居東甌數年見土人販䖳為生者詢之據言其物確係海水所結東南海俱咸遇春夏天雨在海中者一滴雨水入海輒有一小泡凝聚海面初則大如豆隨波逐蕩受日烘染漸長大成形如笠上頭下腳塊然隨潮而行土人撈䖳者每於海塗間插竹為小城以稻草作網圍之潮長䖳隨潮而來入竹城為網所絡不得去然後取之以刃剺其中段砉然而開有似腸胃穢積者落落交下名蜇花食之亦最美再以礬灰醃而售之按海為陰水天雨水屬陽相入而感便生此物受太陽真氣所以日漸長大而性暖也味鹹澀性溫消痰行積止帶祛風貼爛腿救生苦海用白皮子照瘡大小剪作膏貼內摻銀硃無名腫毒集聽方用白皮子一片白糖霜揉軟中開一孔貼上重者潰輕者散又止痛流火文堂集驗取海蜇皮薄者貼上燥則易之頭風貼兩太陽能拔風濕外出膝臏風濕以白皮子貼之消痞王聖俞云有二方一用白皮子同荸薺燒酒浸服一用白皮子荸薺同煮止食荸薺自消痞也程克庵云凡小兒一切積滯用荸薺與海蜇同煮去蜇食薺則諸積自消亦以積非寒不滯而成海蜇能暖水臟荸薺化堅相因而用其效故捷也同壽録載其方治痞用大荸薺一百個古錢二十個海蜇一斤皮硝四兩燒酒三斤共浸七日後每早吃四錢加至十個止即愈魢魚滇程記雲南百夷中有小孟貢江産魢魚彼夷食之日御百婦故夷性極淫貴賤俱數妻其地亦産彎姜說略云魢魚産孟貢江牡者恆多牝而遊夷人常食其肉一日能御百女入藥用雄者壯陽道固精髓八十老翁服之多子介部十六種附四種海龍赤嵌集海龍産澎湖澳冬日雙躍海灘漁人獲之號為珍物首尾似龍無牙爪大者尺余入藥譯史此物有雌雄雌者黃雄者青功倍海馬益房箔催生尤捷效握之即産百草鏡云海馬之屬有三小者長不及寸名海蛆不入藥中等者長一二寸名海馬尾盤旋作圈形扁如馬其性溫味甘暖水臟壯陽道消瘕塊治疔腫産難血氣痛海龍乃海馬中絶大者長四五寸至尺許不等皆長身而尾直不作圈入藥功力尤倍雖同一類形狀微有不同此物廣州南海亦有之體方周身如玉色起竹節紋密密相比光瑩耀目誠佳品也介語蝦姑一名海馬其扁如蜈蚣者燒服主夜遺海牛本草原始海牛生東海海螺之屬頭有角如牛故名其角硬尖鋭有紋身蒼色有龜背紋腹黃白色有筋頂花點魚尾今房術中多用之氣味鹹溫無毒主治益腎固精興陽白鱉粵志白鱉可以治痰火其初得之神授廣人甚珍之有口號曰烏耳鱓白甲魚滋陰降火只須臾一名玉鼉龍以其背上僂起如鼉龍也連首白者良甲白而首足乃青者不及補虛勞愈痰火滋陰降氣養血益精鱉膽盧之頤云鱉無耳以眼聽故其目不可瞥識精於明復識於聰也不惟精專肝竅膽亦異衆而味大辛穹脊連脅脅亦少陽膽府所屬此木金交互故得聲色疊用而肝為膽藏取決更相親耳本草乘雅云味辛開聾瞽除癥瘕痞積息肉惡陰蝕痔核今人以入房術用風斯下矣痔瘡痔漏家寶方鱉膽一個取汁磨香墨入麝香冰片少許雞毛蘸塗物理小識云鱉膽最辣通竅尤捷此人所未知者蟶殼綱目蟶條止載其肉云治冷痢補蓐勞不及其殼之功用治喉風急痹萬選方用蟶殼置瓦上日曬夜露經年取下色白如雪搗細水漂淨末曬乾同冰片吹喉專治咽喉一切急症立愈海螄杭州府志海螄杭俗立夏以為應時之味以花椒灑之麻油拌食從新云比螺螄身細而長殼有旋紋六七屈頭上有靨春初蜒起碇海崖石壁海人設網於下一掠而取治以鹽酒椒桂按海螄有大如指長一二寸許者名釘頭螺溫臺沿海諸郡多有之海螄螺生海塗中立夏後有人見其群變為虻今人所稱豆娘是也或云此螺能跳丈許蓋遷其處此物又能食蚶明州奉化多蚶田皆取苗於海塗種之久則自大時田者不時耨視恐有海螄苗蓋蚶不畏他物惟畏海螄蚶田中一有此物蚶無遺種皆被其吮食盡玉環出者大如指名釘頭螺鹹寒治瘰癧結核能降鬱氣闢蛆云客傳方立夏日食海螄後以殼七枚勿令人見撒廁中或馬桶內暑日不生蛆蟲頗驗吐鐵沈云將食物本草曰吐鐵海中螺屬也大如指中有腹如凝膏白其殼中吐膏大於本身光明潔白可愛姑蘇人享客佐下酒小盤為海錯上品一名麥螺一名梅螺産寧波者大而多脂餘姚者不及生食之令人頭痛土人以鹽漬之去其初次涎便縮可食海味索隱曰土鐵一名泥螺出寧波南田者佳五月梅雨後收制會稽志吐鐵歲時含以沙沙黑似鐵至桃花時鐵始吐盡見只編云九月可食蓋此物産泥塗以泥為食八月至九月不復食泥吐白脂晶瑩塗上比他月出者佳福州府志吐鐵為海錯上品色青外殼亦軟肉黑如鐵吐露殼外人以醃藏糟浸貨之四方別有小如緑豆者桃花時方有名桃花吐鐵産泉州者名曰麥螺楷弟觀頤録云吐鐵出海寧者無脂多泥肉韌不堪食出寧波者極大多脂無泥肉脆水洗三次用甜生白酒浸半日待鹽味出換白酒釀加燒酒或單用燒酒浸亦可必多入白糖藏久不壞柑園小識吐鐵生海中微似扁螺殼薄而白肉青黑色大者多脂以鹽漬之可以致遠甘酸鹹寒補肝腎益精髓明耳目按吐鐵色青得甲木之氣以斥鹵為食不復他食更得土之餘潤而生脂膏八九月不食土者以秋金盛而木氣衰故吐泥而不食其能補肝腎益精髓亦猶脾土得養化津液上升而並及耳目也東璧以蓼螺為泥螺味酸入肝二物形質不同性味亦異則強合為一誤矣此物又能潤喉燥生津豫庚申歲二月每患燥火入夜喉咽乾燥舌枯欲裂服花粉生津藥多不驗一日市吐鐵食之甘至夜咽乾亦愈可知生津液養脾陰之力大也田螺涎保元方田螺涎能去水腫用田螺不拘多少水漂加香油一盞於水內其涎自然吐出取曬乾為末每服不過三分酒調下水自小便下氣自大便出腫即消再服養脾胃藥全愈蛤蜊肉厚殼紫口而園者曰蛤蜊綱目本條下載其肉性寒而闢高武宗痘疹正宗以為可發疹及治痘毒入目取其汁點之說為謬不知其肉惟性寒方能解熱藥之毒正取其與丹石相反為用耳治癰疔痘毒集聽載一捻金方治一切癰疽腫毒初起最驗兼治疔瘡喉風蛇傷犬咬及小兒痘毒乳香一錢雄黃三錢血竭錢半此三味不必制沒藥一錢明礬一錢硃砂三錢紅信六錢麝香六分蟾酥一錢蛤蜊肉二錢蜈蚣三錢甲片炒三錢殭蠶一錢川烏一錢牙皂四錢共為末以瓷罐貯之大人一分五釐小人七釐強者二分亦可將蔥白三寸搗爛和藥為丸好酒服下取汗再服不必汗蜆臘蜆生沙泥中江湖溪澗多有其類不一有黃蜆黑蜆白蜆金口玉口等名黃蜆殼薄肉肥黑蜆殼厚肉薄又番禺韋湧地方産無耳蜆更甘美異常凡蛤之屬皆能孕子而黃蜆化蛾而散卵白蜆藉霧以生形則又一異海南介語蜆在沙者黃在泥者黑蜆老則肉出小蛾而蜆死小蛾復散卵水上為蜆凡南風霧重則多白蜆北風霧則否蓋白蜆之生生於霧霧味鹹咸為白蜆所生之本始生時白蜆之形如霧自空而下若無若有人見以為霧也漁人知之以為天雨蜆子也蜆子即成以天暖而肥寒而瘠在茭塘沙灣二都江水中積厚至數十百丈是曰蜆塘其利頗大綱目蜆下集解尚缺詳晰且其主治下殼肉蜆水皆載而蜆臘無聞焉特採介語以補解蠱並治不服水土介語蚌淚蚌中水也蚌生淡水中色蒼入肝故有清熱行濕治雀目夜盲之力綱目載蚌肉及蚌粉功用獨遺其殼內所含之水不知此水乃真陰天一之精入藥最廣特為補其缺清熱安胎消痰除濕解酒積丹石藥毒初生小兒啞驚逢原云用活蚌水磨墨滴入口中少頃下黑糞而愈湯火傷用生蚌炙水塗之西施舌屠本畯曰沙蛤土匙也産吳航似蛤蜊而長大有舌白色名西施舌閩部疏曰海錯出東四郡者以西施舌為第一蠣房次之西施舌本名車蛤以美見諡産長樂灣中本草從新西施舌浙溫州有之生海泥中似車螯而扁常吐肉寸余類舌故名敏按臨安館劉芳洲明府署中劉為諸城相國胞侄據言介屬之美無過西施舌天下以産諸城黃石瀾海濱者為第一此物生沙中仲冬始有過正月半即無取者先以石碌碡磨沙岸使沙土平實少頃視沙際見有小穴出泡沫即知有此物然後掘取之綱目海蛤蛤蜊條中獨遺此今依吳氏從新本補之甘鹹平益精潤臟腑止煩渴為補陰要藥從新宦遊筆記西施舌似車螯而扁生海泥中一名沙蛤長可二寸常吐肉寸余類舌俗以其甘美故名石蜐俗呼龜腳蟶海濱多有之古未聞入藥瀕湖獨增比品止載其能利小便不知其別有功用今依介語補之朱排山柑園小識龜腳蟶形似龜腳生海中石上殼如蟹螯其色紫可食即石蜐也江淹有石蜐賦下寒澼消積痞濕腫脹虛損人以米酒同煮食最補益介語干蝦蝦米鶯爪蝦子對蝦蝦生淡水者色青生鹹水者色白溪澗中出者殼厚氣腥以其得土氣薄也湖澤池沼中者殼薄肉滿氣不腥味佳海中者色白肉粗味殊劣入藥以湖澤中者為第一以蝦煮曬乾去殼大者曰鶯爪小者曰蝦米又蝦子名曰蝦春錢塘八月潮盛時江濱人俟潮退後率於江沙淺水處撈取蝦子入市貨賣黠者以腐渣攙和須取少許置銅銚中和鹽炒之色純紅者乃真多醃藏貯作來春食品綱目蝦及海蝦分條明晰於蝦內集解下載蝦米海蝦集解下載對蝦皆不立主治僅云充饌品而已故悉為補正其缺蝦米味甘性平逐風痰胡潛法制編有蛤蚧蝦製法云食之補腎益陽蝦米一斤蛤蚧二枚茴香蜀椒各四兩並以青鹽化酒炙炒以木香末一兩和勻乘熱收新瓶中密封每服一匙空心監酒嚼下甚妙鶯爪味甘性平治疣去癬食物宜忌治無乳及乳病蝦米酒鮮蝦米一片取淨肉搗爛黃酒熱服少時乳至再用豬蹄湯飲之一日幾次其乳如泉宣吐風痰不藥良方連殼蝦米半斤入蔥姜醬煮汁先吃蝦後吃汁緊束肚腹以雞翎探引取吐赤白遊風不藥良方蝦米搗碎敷之蝦子鮮者味甘醃者味鹹甘皆性溫助陽通血脈俱見食物宜忌敏按粵語云蝦春非蝦子也江中有水蠔大僅如豆其卵散布取之不窮然則蝦春之性當與蝦性有別陳芝山助陽之說或未加精核耳對蝦粵志䗿蝦産鹹水中大者長五六寸出水則死漁人以絲黏網其深四尺有五寸六寸者仄立海中絲柔而輕䗿蝦至則須尾穿罥弗能脫也兩兩干之為對蝦鮮者肉肥白而甘朱排山柑園小識海蝦磔須鉞鼻背有斷節尾有硬鱗多足而好躍大於溪河所生長尺余須可為簪土人兩兩干之謂之對蝦以充上饌宦遊筆記淮海産對蝦長數寸兩兩干之勾結如環烹以為羹味鮮美居人往往以享客且可致遠或曰以雌雄為對但當懷子即散之後雌雄亦無從辨至其出時自正月望後始二三四月大盛端陽而後即杳不可得亦物理之不可推者也補腎興陽燒酒浸服治痰火後半身不遂筋骨疼痛醫學指南核桃仁棉花子仁杜仲炒巴戟硃砂骨碎補枸杞子續斷牛膝各二兩菟大蝦米四兩絲餅四兩用燒酒二十斤煮服如年高者加附子肉桂各一兩酒服完將渣曬乾為細末蜜丸每服二錢酒送下蝦醬粵語蝦醬以香山所造為美曰香山蝦其出新寧大襟海上下二川者亦香而細頭尾與須皆紅白身黑眼初醃時每百斤用鹽三斤卦定缸口候蝦身潰爛乃加至四十斤鹽於是味大佳可以久食解毒樹蠱廣有毒樹蠱其樹無花結子如牛奶食之立死以蝦醬解之宦遊筆記遼東大淩河出蝦醬蝦油皆甘美平海又出一種小蝦名紅毛子作蝦醬尤佳今浙江寧波及蘇皆有蝦醬味亦佳石上螺螄俗名鬼螺螄形如海螄而小秋冬常在牆腳石隙中夏月在濕地青苔上取用洗去土治黃疸慈航活人書取石上螺螄半碗搗如泥無灰白酒頓熱沖服之疔濟世良方黃風膏治疔瘡及頭面熱毒瘡雄黃一兩釘鏽白梅肉各五錢消風散一兩夏月加鬼螺螄二十個共研細末苦鹽滷調勻貯瓷罐內凡患疔腫毒瘡用銀針挑破毒頂敷上此藥以綿紙蓋定其毒收斂不走三日後即愈黃氏醫抄取細長小鬼螺螄搗爛連殼敷患處露頭出膿次日即可消拔疔保合堂祕方鬼螺螄一個荔枝核三個煅存性白梅肉六個共搗爛成膏貼之取出疔根後用八寶丹收功鼻疔慈航活人書花盆中青螺二三個同鹽搗塗立效白火丹集聽丹有五種青黃赤白黑黃白易治黑丹莫救青丹十日內可治赤丹亦然俱不可見燈火食鹽物治法取溪澗中鬼螺螄酒煮食即消脹腫氣悶者食數次愈三漏丸活人書治穿屁漏通腸漏瓜藤漏皆濕熱之邪毒殺蟲退管穩當之劑土蜂窩煅鬼螺螄煅蟬蛻煅各七錢乳香沒藥川萆薢酥炙陳棕煅管仲煅各五錢豬懸蹄甲煅十個刺蝟皮炙一個雷丸三錢黃蠟四兩化開加麻油六七匙入藥為丸桐子大每服六七十丸空心白湯下通經周氏家寶鬼螺螄十四個砑碎油紙攤貼臍上縛定周時此螺生在陰處蟲部四十種附四種雪蝦蟆憶舊遊詩話巴里坤雪山中有之醫家取作性命根源之藥軍中人爭買之一枚價至數十金且不易得也朱退谷曾於吳門見之云遍身有金線紋其形絶似蝦蟆性大熱補命門益丹田能回已絶之陽功兼參附火盛者不可服內造伏虎丹祕方集腋興陽種子強腎助神用真川貝每四兩須四制第一次用大附子一個童便一湯碗蒸切細干燒酒三湯碗韭菜汁三湯碗同入砂鍋將貝母煮乾去附子不用第二次用雪蝦蟆一兩無則以大蛤蚧一對代之用石敲碎亦用燒酒韭汁各三碗同貝母煮乾去蛤蚧不用第三次用吳茱萸一兩亦用酒韭汁各三碗用貝母煮乾去茱萸不用第四次用公丁香五錢亦用酒韭汁各三碗同貝母煮乾去丁香不用制完其貝母爛如泥置石臼中舂再入真阿芙蓉一錢乳制蟾酥三錢麝香五分拌勻作條焙乾收貯用時唾津磨搽雪裡蝦蟆性熱微辛壯陽卻冷痿弱能興藥性考海參閩小記云閩中海參色獨白類撐以竹籤大如掌與膠州遼海所出異味亦淡劣入藥以産遼海者良紅旗街出者更勝於緑旗街有刺者名刺參無刺者名光參入藥用大而有刺者佳一名海男子有粳糯二種而黑膩者尤佳人以腎為海此種生北海鹹水中色又黑以滋腎水求其類也百草鏡云南海泥塗亦産海參色黃而大無刺肉亦硬不中食品土人名曰海瓜皮言其如瓜皮之粗韌也以其充庖熩豬肉食可健脾入滋補陰分藥必須用遼東産者亦可熬膏作膠用藥鑑海參出盛京奉天等處者第一色黑肉糯多刺名遼參刺參出廣海者名廣參色黃出福建者皮白肉粳糙厚無刺名肥皂參光參出浙江寧波者大而軟無刺名瓜皮參品更劣矣關東韓子雅言海參生東海中大小不一體滑如蜒蝣能伸縮群居海底遊行迅疾取參者用海狗油水海水乃清見底見有海參即入水取之此物沾人氣便不動先以兩手探握置頸兩傍再取置肋下次及兩腿胯下膝皆可夾取此物一沾人氣即不動然後出水以刀刳去腸胃石灰醃去腥涎令體肉緊密干之乃縮至寸許其實生者大如瓜長尺許也若干者寸外生時體更大可知蓬萊李金什言海參亦出登州海中與遼東接壤所産海參亦佳彼土人言海參多伏海中大石上水深不可見取參者必用海狗油滴入水中則有一暈散開清徹見底然後入水取之每每遭鯊魚毒害故其價亦不廉其體生者身多滑涎去腸胃以灰醃去腥涎干之出售每多灰咸氣也福山陳良翰云海參生北海者佳為天下其參潛伏海底至二三月東風解凍時多浮出水面在海塗淺沙中孳乳入水易取然腹中出子後惟有空皮皮薄體松味不甚美價亦廉識者賤之名曰春皮四五月則入大海深水抱石而處取之稍難體略肥厚至伏月則潛伏海中極深處石底或泥穴中不易取其質肥厚皮刺光澤味最美此為第一名曰伏皮價頗昂入藥以此種為上若秋冬時則又蟄入海底不可得矣五雜俎海參遼東海濱有之一名海男子其狀如男子勢然淡菜之對也其性溫補足敵人參故名曰海參藥性考海參遼産者佳吳浙閩粵者肥大無味虛火燥結同木耳切爛入豬大腸煮食歌云海參鹹寒降火滋腎通腸潤燥除勞怯症遼産小佳刺密脆硬南産厚大肉味稍遜甘溫食物宜忌味甘鹹補腎經益精髓消痰涎攝小便壯陽療痿殺瘡蟲生百脈血臨安儒醫盛天然語豫云曾往青山裡視一婦人病眼鼻口耳髮根皆出血下部亦然其人已昏不知人詢其夫得症之由數日前受驚而起時天酷暑大旱又中燥烈之氣致血溢奔騰上下散出即不救矣諸醫皆斂手無策盛有叔曾於都中得一方專治此症幸尚記憶逐急喚人取山泉一桶燒酒一斤挾婦起坐裸其小腿先以燒酒淋之俾酒從踝下即滴入水桶內淋訖然後將腿置水中一飯頃其上下血即止婦亦蘇面色如粉急叫人覓壯年乳婦以乳哺之再用海參半斤切片焙為末每次調服三錢日三服蓋海參能生百脈之血若失血過多必須以此補之其生血之功捷于于歸芍也治休息痢宋春暉云餘姚有孝子某其父患休息痢經年垂危孝子日走神廟祈求醫藥如是月餘一日途遇老人教以用海參每日煎湯服不數日全愈治潰瘍生蛆慈溪楊靜山云曾有人患癰破爛內生蟲蛆纍纍千百計治以殺蟲藥無效一老醫以海參片焙末敷之蛆皆化黃水然後以生肌膏貼之愈據言凡一切金創及疽毒破爛交暑內潰生蛆惟海參末可療不藥良方夏月潰瘍生蛆系陰濕所化海參為末摻之或皂礬飛過為末摻之皆化為水隊隊遊宦余談隊隊形如壁蝨生有定偶緬甸有之夷婦有不得於夫者飼於枕中則其情自合故不惜金珠以易詹景鳳小辨同年蘇侍御民傑按雲南還語豫雲南有小蟲名曰隊隊狀如蝨出必雌雄隨人偶得之以賣富貴家價至四五金富貴家貯以銀匣置於枕頭內則夫妻和好無反目此則物氣之正人也入媚藥治夫婦不和風蛤職方考閩邵武府出風蛤類蝦蟆峨嵋峰麓之數村每春初東南風起則此物滿床廚間土人取而脯之性溫暖治風及手足拘攣折傷飯蒼蠅謝天士云蟲中各種俱入藥用惟飯蒼蠅無用故本草不載其主治豫精思十年求其主治不可得嘉慶庚申偶在東江晤柴又升先生云昔在臺州患面疔初起即麻木癢幾入骨不可忍山中倉卒無藥有教以用飯蠅七個冰片一二釐同研爛敷之即不走黃如言果癢定次日漸痊旬日而愈束疔根不走黃塗瘡疤即生髮吳秀峰用以塗小兒癤愈後脫疤不長髮用此搗塗立生塞鼻治拳毛倒睫藥性考蠬蜂粵志陽春有蠬蜂嘗附橄欖樹而生雖有首足與木葉無別須木葉凋落乃得之土人以置篋笥每遇蠱毒必鳴鳴則自呼又以其聲之清濁卜禍福佩之闢蠱蜜蜂綱目只用子云入足陽明太陰而無用蜂者赤水元珠有治瘰癧方用之為補為後赤水元珠云蜜蜂同杏仁葉蝙蝠蛇蛻治瘰癧神效苦蜜出處州劉基苦齊記匡山之巔四面峭壁風從北來大率不能甘而善苦故植物中性之苦者莫不布族而羅生焉野蜂巢其間採花髓作蜜味亦苦山中方言謂之黃杜初食頗難久則彌覺其甘按綱目言蜜有黃連蜜味苦而知更有天成自然之苦蜜故補之除積熱已煩渴解熱痢暑積驅風丸藥中用之更佳老人腸燥以一盞和酒食尤宜蜜虎似蜂而大首尖身園狀如橄欖形有兩翼亦如蜂翅遍身生毛花斑色尾有短毫鋪張如鵝尾鼻上有須二根喜入花心中以須鉤取花蕊而出其須能伸縮屈曲如象鼻然以卷物登州人呼古路哥子安徽人呼為蜜虎養蜜者最忌之臺灣府志蜂虎蟲屬狀似燈蛾而大頭有斑點入蜜蜂窠則盡食其蜂汪杭葦言蜜虎多喜入鳳仙花叢中散子於葉背日久生小灰色蟲如青蠖體上有黑白斑暈食其花葉長大及老則下根底變為蛹頭粗尾尖如海螄狀作老黃色久則蛹出為蛾即成蜜虎如此循環生生不已治咽喉腫痛生蛾陳良翰云蜜虎登州最多人捕得裝入布袋懸掛檐下陰乾遇有咽喉腫痛或生單蛾雙蛾取一枚瓦上火焙去其周身絨毛剪去頭足尾翅再用火焙為末加冰片少許吹入喉中即愈此神方也又入壯藥用治心痛鞠子靜方用嘓嚕哥即蜜虎五六月飛行牆壁山東甚多取置竹筒中此物難死必待二十日方乾死在筒中自能撲打體上絨毛盡落有患心痛者及腹痛者瓦焙研末酒服一二枚即止諸城王遜亭云古路哥有雌雄雄者身瘦小雌者腹大入藥用雄者以線穿陰乾可合房術藥用其老僕王三云此蟲山東極多能食蜂養蜂家最忌之其蟲口中有黑絲常卷若入蜂窩即吐直其絲以刺蜂蜂即斃然後食之蓋蜂針在尾而此蟲之針在首想亦有毒針在尾者陰在首者陽以陽克陰故蜂為所刺無不立斃其蟲於初秋散子在豆莢中則為豆蟲如青蠖狀食豆在黍穰上則為朝天猴如刺蝥狀後黍葉自下食而上最為莊田之患然可食莊人候日未出時此蟲著露體重翅輕不能飛易於撲取人捕得去其翅群置瓦罐內令其自相撲擲其體上細毛自落然後以油鹽椒姜炒食之味勝蠶蛹但其體上毛不可著人眼著眼即損目蟾皮舌此乃癩蝦蟆皮也能拔大毒外出又能回毒攻效不可殫述綱目蟾蜍條主治皆全用無單用其皮者惟附方引孫真人千金方中治腸頭推出用蟾皮一片燒熏並敷僅録其些小功用反遺其大者故特著明補之貼大毒能拔毒收毒黃汝良行篋檢祕方載指頭紅腫生毒用活蟾一隻生剝皮將皮外面向患處包好明日其毒一齊拔出或發背對口等症毒忽收內如又起再貼切記不可將其皮裡面著肉即咬牢難揭凡痘疹後回毒亦可用此治瘰癧斂口膏藥治瘰癧膿已盡腫已平瘡口未斂以此貼之蝦蟆皮二個要活剝者鼠皮二張蛇蛻二條蜂房大者一個右四味俱煅灰將水膠一兩用井花水一酒鍾化開後加蜜一兩蜈蚣煎麻油一小鐘攪勻前四味灰臨起入麝香一分將絹攤來不濕為度靈祕丹藥云凡患癰疽瘡毒者用土中大蝦蟆一個剝全身癩皮蓋貼瘡口於蟆皮上用針將皮刺數孔以出毒氣自覺安靜且能爬住瘡口不令長大又可免蜈蚣聞氣來侵神妙神妙舌拔疔外科全書夏月患疔用蝦蟆舌一個研爛蟾肚皮蓋貼其根自出土檳榔粵西叢載狀如檳榔在孔穴間得之新者猶軟相傳蟾蜍矢也不常有之主治惡瘡蝃蝥黃物理小識余岸少養蜘蛛以小者飼大者久之以硃砂飼大者數十日滿身皆赤其腹有黃入藥用去翳開瞽藥蜂針物理小識取黃蜂尾針合硫煉加冰麝為藥置瘡瘍之頭以火點之灸瘡上本草未載此法須先以濕紙覆瘡先乾者即瘡頭灸之驢龍物理小識驢腹中蛔也方體方目有足可以小使入房術用與皋厭黑兜蟲瓦雀卵衛子莖墮蛤蚧吉吊脂同功龍蝨閩小記云龍蝨形如小蟑螂又似金龜而黑色每八月十三至十五日飛墮漳州海口餘日絶無除面上黝䵟赤氣食之良兼美男女顏色活血物理小識智少隨老父福寧曾見龍蝨後在姚有僕暑中食此云自濠鏡來則他處亦出此何漳獨異也蓋是甲蟲大如指頂甲下有翅熏干油潤去甲翅啖似火魚之變味洋蟲糞一名九龍蟲出外洋明末年始傳入中國或云出大西洋康熙初年始有此物形如米蛘子初生蟻如小蠶久則變黑如豆瓣有雌雄今人用竹筒置谷花飼之性極畏寒天冷須藏之懷袖中夜則置衾褥間否則凍死得人氣則生極蕃衍有飼以茯苓屑紅花交桂末者則色紅而光澤可愛入藥尤良性溫行血分暖脾胃和五臟健筋骨去濕摉風壯陽道治怯弱附治各症兼引老人不寐茯苓引小兒夜啼硃砂引女童夜溺枸杞引少婦陰寒附子引癰疽發背沉香末引舌燥作渴麥冬引眼目閉痛甘草引耳鳴耳聾當歸引感冒風寒防風引中濕瘟毒蒼朮引跌打損傷全蠍引酒醉傷人葛花引怒氣傷人沉香引絞腸痧痛青蒿引以上十四症俱用蟲十四個好陳酒沖服治刀斧傷用蟲搗敷即愈瘋癱用蟲九個木香湯送打傷用九個黑棗薄荷湯送黃疸痧用十二個薄荷燈心湯送哮喘用九個薄荷湯送眼脹用七個薄荷湯送傷食用九個薑湯送水毒用九個薄荷燈心湯送氣痛用九個檳榔湯送中風不語用二十四個薄荷燈心湯送小肚痛用九個薑湯送急慢驚風用九個薄荷杏仁湯送喉痛用二十四個薄荷銀花湯送脾風用二十四個酒送胃痛心疼用七個木香末沖酒服無名腫毒用十六個陳酒送五更服痘疹用七個米湯沖服膨脹用二十四個薄荷陳皮湯送嘔吐痰水用七個淡薑湯送乍寒乍熱口乾舌燥用七個陳皮半夏煎酒沖服五勞七傷白茯苓三錢用七個搗爛每日空心酒沖服以復元為止瘧後寒熱不調用七個以未發之先沖酒服三次即止夢遺白濁血淋白帶以芡實三錢微炒研末白果五枚去皮心先將藥搗爛再加淫羊藿二錢去邊廣皮二錢韭子三錢同煎用蟲七個酒沖服赤白帶及産後等症以香附炙耆烏鰂骨各八分酒煎用蟲七個沖服即愈氣急咳嗽以川貝母二錢牛蒡子當歸陳皮淮牛膝各八分水煎服如婦人去牛蒡子加益母炒香附各三錢水煎沖服三次神效腰痛以破故紙二錢雄豬腰一對竹刀剖開去衣將破故紙內入酒蒸熟爛加桔梗二錢為末用七個搗沖酒服神效痢疾白痢用紅糖紅痢用白糖陳酒沖蟲七個服水瀉不止豬苓白朮各一錢陳酒煎沖七個服之忌油膩魚腥等物偏正頭風以川芎防風荊芥蟬蛻各一錢細辛八分陳酒煎沖七個服之忌生冷蔥韭等物骨節痠痛胃寒等症以川芎白朮各八分酒煎沖蟲七個服三次即愈吐血不止喘息燥熱等症以古墨研濃貝母三分研末蟲七個陳酒沖服七次愈小便不通以燈心車前各七根蟲七個陳酒沖服飽悶成痞肚腹腫脹用酒沖七個服三次翻胃膈食以生薑七片裝布袋內入糞坑浸七日取起清水洗淨埋土中一層姜一層土七日取起用陰陽瓦焙乾研末每次一分用蟲七個沖酒服三次愈吐血以藕節茅草根洗淨酒煎用人乳酒各半沖七個服三次愈筋骨疼痛以核桃肉三錢陳酒沖蟲七個服癆嗽以牛骨髓三錢核桃肉三錢共為末入蟲七個再搗為丸每丸三錢每日五更銜化一丸九日見效痿症蛇床子三錢煎湯沖蟲九個服三次即愈久服延年種子經水不調以香附陳皮益母草當歸元胡索各八分水煎和酒沖蟲七個服之即愈久遠者連服數次其效如神産後崩症以香附白芍益母草當歸陳皮茯苓白果蘇木各八分酒沖蟲七個服三次即愈藥性考洋蟲色黑形如壁蝨活吞數枚止血勞怯糞如蠶砂狀金御乘雲研末敷金刃傷立結痂止血最效蟋蟀綱目於灶馬下附促織僅列其名云古方未用附此以俟考性通利治小便閉藥性考蟋蟀辛鹹溫能發痘勝於桑蟲治跌蹼傷小肚尿閉不出養素園集驗方用蟋蟀一枚煎服立驗小兒遺尿慈航活人書取全蟋蟀一個焙末滾水下照歲服如兒十一歲者每次服一個服至十一個為止治男婦小水不通痛脹不止集聽用蟋蟀一個陰陽瓦焙乾為末白滾湯下小兒半個即通催生趙際昌云鬥蟲之戲蟋蟀最盛其百戰百勝者俗呼為將軍其蟲至冬必死勿輕棄去留以救産厄神驗凡産不下用乾者一枚煎湯服即生並無橫倒之患許景尼云鬥蟋蟀家冬則封盆待其自死成對干之留為産科痘科用須成對者入藥治水蠱朱烺齊任城日鈔云促織可治水蠱昔有人患水蠱百治不效一日偶飲開水水中先有促織一對在內其人倉卒一併吞之越數日其病漸消方知促織可治此症後傳此方數人無不驗者一對不足連服二三對自效蚱蜢綱目䘀螽僅引拾遺佩藥一條並無主治按蚱蜢初夏大火始有得秋金之氣而繁性竄烈能開關透竅一種灰色而小者各土磔不入藥用大而青黃者入藥有尖頭方頭二種救生苦海五虎丹中用之治暴疾氣閉大抵取其竄捷之功為引也味辛平微毒性竄而不守治咳嗽驚風破傷療折損凍瘡癍疹不出治鸕鷀瘟王氏效方鸕鷀瘟其症咳嗽不已連作數十聲類哮非哮似喘非喘小兒多患此取谷田內蚱蜢十個煎湯服三劑愈百草鏡云鸕鷀郁小兒有之其症如物哽咽欲吐難出之狀久之出痰少許日久必死治以干蚱蜢煎湯服破傷風救生苦海治破傷用霜降後稻田內收方頭灰色蚱蜢同谷裝入布袋內曬乾勿令受濕致生蟲蛀壞常曬為要遇此症用十數個瓦上煅存性酒下立愈痧脹養素園集驗方用蚱蜢五六個煎湯溫服凍瘡養素園集驗方用方頭黃色蚱蜢風乾煅研香油和搽摻亦可小兒驚風李氏表方用蚱蜢不拘多少煅存性砂糖和服立愈一方治急慢驚量大小人多寡用之煎服王立人易簡方用螞蠟焙乾為末薑湯調服少許立愈急慢驚風百草鏡霜降後稻田中取方頭黃身蚱蜢不拘多少與谷共入布袋內風乾常曬勿令受濕蟲蛀遇此症用十個或七個加鉤藤鉤薄荷葉各一撮煎湯灌下渣再煎服重者三劑愈李東來常施此藥據云山東王蟲尤妙每服只須二個王站住不藥良方急慢驚風先用白鳳仙花根汁半盞服下即用方頭蚱蜢焙乾研末滾水調下即愈産後冒風王良生救急方干蚱蜢數十個瓦上煅存性好酒調服淮東子今名跳蝦蟲生濕土中形如跳蚤而大逾倍色如蝦青腹下多足如蝦善跳躍兒童以器置於水中捕得輒投入便不能躍出秋時鬥蟋蟀家多畜之凡蛩遇鬥傷及虛羸必每日以此飼之云能益蛩力也其性最竄捷能達透經絡皮裡膜外無不行到治風痹去濕腫燈蛾今古方無入藥者祝氏效方有治痔管法用蜣螂一個同撲燈蛾十個放罐內一宿加麝香一錢陰乾為末吹入管內自能出水水乾即愈蠅虎古今注蠅虎蠅狐也形似蜘蛛而色灰白善捕蠅一名蠅虎子潛確居類書一名蠅豹身黑嘴有雙肉爪攫蠅而食兩目似虎炯然生光易曰震來虩虩雅俗稽言曰虩蠅虎也常若多懼故取象焉按蠅虎亦蜘蛛之屬腹亦有絲而不能結網惟居牆壁捕蠅食其體灰褐色身上有微毛嘴有兩鉗翕吸頻動跳躍如虎亦有純白色兩目硃色絶可愛兒童捕置器中捉蠅以飼之視其搏躍為戲此物未聞入藥故瀕湖綱目壁錢螲蟷皆列入而此獨遺之今徐氏驗方云其性頻動而不靜取以調血脈治跌打因録其方以備品云治跌打損傷徐順之驗方取蠅虎數個研爛好酒下灶馬今之灶馬俗呼贓郎又作蟑螂綱目所謂蜚蠊也綱目蟲部亦有灶馬形如蟋蟀今人名灶壁雞又與蟑螂別瀕湖於蜚蠊條下無治疔疳諸法今備録之拔疔集聽灶上蟑螂不拘多少搗爛敷之其疔根自出卿子妙方蟑螂蟲其黃紫色甚臭者取數個用患者自吐唾沫幾口研爛敷瘡四圍頂上露孔使毒氣從孔出一日愈矣邵仲達方治疔瘡取蟑螂大者七個去頭足殼將砂糖少許同搗爛敷疔四圍露出頭晝夜即愈藥性考灶馬拔刺搗塗有效解諸疔毒傳信方灶上紅蟑螂五個研爛熱酒沖服取汗為度紅絲疔傳信方蟑螂一個去頭和青糖搗爛搽上即效白火丹葉氏方用蟑螂瓦上焙乾為末白滾湯服一二個立效兼治疔瘡對口活人書桂州荔枝肉二三枚蟑螂二三個同搗如泥敷露頭數次即散無名腫毒慈航活人書蟑螂十個鹽一撮同搗爛敷之留頭治諸毒惡瘡嚴氏家用方蟑螂搗石灰敷之痧症周延園方活蟑螂蟲二三個用紙包灶上焙乾研細冷水和灌或吐或瀉即愈吐血徐云生方取蟑螂五個止去翅淨在火盆淨瓦上焙乾為末紙包安土上存性用濕腐皮包一個滾湯吞下每日如此吞五日不可間斷氣虛中滿醫宗彙編以蟑螂七個為末用地枯蔞煎湯送數服愈臌脹家寶方蟑螂一個焙乾蘿蔔子一撮共炒為末好酒吞十日全愈一切兒疳集聽云凡小兒患疳疾不拘何等疳垂死者皆效取灶上蟑螂焙乾與之食患者但聞其香不知有腥臭之氣猶中蠱者食豆無辛含礬不苦也有患此症治之無不效只須食一二次即愈愈後體更肥白且屢試屢驗百草鏡云兒疳初起用蟑螂去頭足翅新瓦焙乾常與食之百個病愈水馬綱目名水龜於主治下云令人不渴殺雞犬不知有治痔之功更為補之按水馬四五月內出浮水面身硬腳長池沼中甚多性喜食蠅豫在甌親見小兒捕之嬉戲用釣竿繫繩繩頭穿一蠅擲水面誘之即來以四足抱蠅不放因而獲之治痔東醫寶鑑有水馬散夏月三伏內於止水中採婆子一名水馬兒高腳水面跳走是也採取三十個用三個紙包每包十個於背陰處懸掛陰乾每包作一服研爛空心酒調下良久乃吃飯三日連三服十日內效久痔膿血者二三十服絶根壁蝨俗呼臭蟲以其氣腥穢觸鼻故名行必南向為南方穢濕所産今江南北人家多有之稍不潔即生此物亦有遠行於旅店驛舍中帶入衣被歸家即生極易蕃育一日夜生九十九子與螽斯同其形儼如半粒豌豆老則黑次則棗皮紅初生者色黃而細小其子如蟻子白色卵生與蝨同初生便齧人生一二日即能褪殼愈褪愈大漸漸而老色轉紅而黑老者齧人愈毒多藏藁薦中及壁內或桌凳床縫間其身遍而易入至冬則入蟄多藏泥沙山穴中及古樹根下交春皆啓蟄而出入人家壁木內藏性畏蟻山中有一種紅蟻喜食之故近山及山寺僧舍此物甚少有帶入者輒為山蟻銜去其齧人尤狡黠不與蚤蝨同昔人謂暑時有五大害乃蠅蚊蝨蚤臭蟲也然蠅蚊迭為晝夜蠅可揮拂蚊可設帳蝨則暑時裸浴生者絶少蚤則因土濕而生夏時土乾亦不甚患惟此最可憎無分晝夜潛身床褥及幾闥間善識人氣伺人一徙倚即噆其膏血腫塊纍纍如貫珠然愈爬搔則愈大痛癢難禁小兒肉嫩尤遭其苦輒虯號不已或云其物口有白氣一二寸齧人能隔席穿膚吮血索之不可得在床褥輒夜聚曉散率其醜類待人倦睡而恣啖焉古方闢除之法甚多無一驗者惟席下鋪零陵香草及樟腦可稍殺其勢然隔一二日藥氣減則橫虐愈甚惟用真揚州安息香塗上好銀硃為衣燃床下周圍以席護令烟燻透則壁蝨盡死子亦不能復生第香氣惡烈觸鼻令頭痛須熏後停一二日方可臥宿貧家何能辦理古云南方淫氣生短狐此亦淫濕腥穢之氣所感而生凡勤潔之家鮮有之閩人云此蟲滾水泡死者能復生惟有以冷水浸死不能復生山堂肆考壁蝨身扁而臭不能跳善齧人名曰茭蚤又名扁蝨五雜俎壁蝨閩人謂之木蝨多杉木所生治者以蕎麥藁燒灰水淋之江南壁蝨多生水中惟延綏生土中遍地皆是入夜則緣床入幕噆人遍體成瘡雖徙至廣夏懸床空中亦自空飛至事物紺珠壁蝨一名壁駝遍小褐色殠而齧人六書故扁蝨著牛馬食其血産薦蓐間差小噆人膚俗謂薦蚍又名茭蝨今人訛為壁矣是古人雖有其名從無入藥者綱目並不列其品近來治療有用此者故録之見天下無棄物也氣腥味微咸性平在土者有毒凡用壁蝨須置溫水中令其臭氣泄盡入藥治咽膈集聽方用蝨十枚滴花燒酒浸服飯饎百草鏡云用臭蟲研塗臁瘡臭爛西亭藥鏡用臭蟲同水龍骨搗和麻油調敷出盡黃水立愈眼生偷針臭蟲血點之即散海上方有用壁蝨治小兒驚風用壁蝨於淨水中漂去臭氣焙乾入藥拔疔楊氏經驗方臭蟲同米飯搗勻搽疔上能立拔疔根外出𩶈魚刺戳醫宗彙編凹谷茴香葉使鹽花燒酒搗糊瘡上如口久爛用臭蟲劗去頭敷之叩頭蟲形黑如大豆以手按其身其頭能俯屈剝剝有聲出南方者小而微北土者大而力厚小而捕之為戲入藥用大者試法取蟲置桌翻其背令仰少頃便跳起三四寸有跳起過五六寸及尺許者力更大綱目以之附䘀螽後亦不言主治之功此蟲北人謂之跳百丈治腰腳無力與山螞蟻子併入壯藥用百草鏡云外用可絶瘧叩頭蟲一個安眉心蟲頭向上膏藥蓋住過時自愈大力丸彙集此馮嘉寶方蒺藜酒洗炒去刺白茯苓白芍蓯蓉酒洗杜仲酥油炒菟絲子酒煮續斷當歸覆盆子威靈仙破故紙薏苡仁各一兩五錢牛膝酒洗無名異自然銅醋煅七次各一兩乳香沒藥硃砂飛過血竭青鹽各五錢天雄二兩童便浸五日象鱉一個去頭足翅如無用土鱉代之跳百丈十個去足虎骨二兩酥油炙上藥俱為細末煉蜜丸二錢半重早晚鹽湯或黃酒送下少時用力行功散於四肢沙雞母物理小識土鱉是象房屎中所生或以旋土成窩者充之不知旋土窩者乃沙雞母非土鱉也同金墨磨塗口瘡禾蟲閩廣浙沿海濱多有之形如蚯蚓閩人以蒸蛋食或作膏食餉客為饈云食之補脾健胃廣志夏暑雨禾中蒸鬱而生蟲或稻根腐而生蟲稻根色黃蟲乃稻根所化故色亦黃大者如箸許長至丈節節有口生青熟紅黃霜降前禾熟則蟲亦熟以初一二及十五六乘大潮斷節而出浮游田上網取之得醋則白漿自出以白米泔濾過蒸為膏甘美益人得稻之精華者也其醃為脯作醢醬則貧者之食吳震方嶺南雜記禾蟲絶類螞蝗青黃色狀絶可惡厭潮所淹沒淡水田禾根內出數尺長至丈餘寸寸斷皆活能游泳午後即敗不可食滴鹽醋一小杯裂出白漿蒸雞鴨蛋牛乳最鮮粵録禾蟲狀如蠶長一二寸無種類夏秋間早晚稻將熟禾蟲自稻根出潮長浸田因乘潮入海日浮夜沉浮則水百皆紫採者以巨口狹尾之網繫於杙逆流迎之網尻有囊重則傾瀉於舟補脾胃生血利濕行小便瘡瘍勿食能作膿茄稞蟲此蟲生茄稞內梗上有蛀眼內即有蟲其蟲帶緑色黑嘴者是治男女童癆劉羽儀經驗方云男女童癆其症不必如大人咳嗽吐血泄精只是身體瘦弱皮毛焦枯肌膚微熱急宜早治用野茄稞內蟲取數十條私和在食物之內與病者吃數次即愈棕蟲滇南各甸土司記棕蟲産騰越州外各土司中穴居棕櫚木中食其根脂汁狀如海參粗如臂色黑土人以為珍饌土司餉貴客必向各峒丁索取此蟲作供連棕木數尺解送剖木取之作羹味絶鮮美肉亦堅韌而腴絶似遼東海參云食之增髓益血尤治帶下彼土婦人無患帶者以食此蟲也治赤白帶腸紅血痢其行血而又能補血功同當歸蔗蛄漳泉種蔗田中出一種蟲如蠶食蔗根名蔗蛄土人食之味甚甘美發痘行漿托癰清毒化痰醒酒和中利小便桃絲竹蝨此桃絲竹上所生竹蝨李氏草祕云罨疔瘡痘疔最妙牙皂樹蟲救生苦海云此樹大如錢粗者方得有蟲但取之有法以利刀速砍其樹遲則蟲即下行入根不可得其蟲子時下行過午則上行須午後伐取治一切腫毒初起其蟲有大小大者用一條小者用二條證輕者用一條證重者用二條或三條擂爛酒調服已膿者不治黃麻梗蟲須秋時先收取以蔥管藏之百草鏡麻蟲生麻梗近根上一節中二月化為飛蟲穿穴去山左人每於刈麻時將蟲連麻梗寸斷布袋裝盛帶至南方貨與養禽鳥家飼畫眉百翎之用云其蟲性暖去風行血鳥食之可以禦寒蟲形如小蠶細長明淨入藥須連麻梗蒸焙用如用生者須以蔥藏治疔程林即得方用黃麻梗內蟲以蔥葉包貯掛風頭令乾將疔瘡挑破以麻蟲少許入於所挑之處瘡即化為水而愈陶節庵治疔蜣螂膏用蜣螂三個肚白者佳黃麻蟲十個二味搗勻撥破患處貼之如患在手足有紅絲上臂絲盡處將針挑斷出血仍用前藥毒重者更服敗毒藥葉氏方用黃麻梗中蟲一條焙乾為末酒調服下疔化為水芝麻蟲生芝麻梗中三更輒從下而上至頂食露五更輒下取之以夜性熱助陽入幃箔用去痔管用芝麻蟲如蠶緑色取焙乾為末開水送下每日一錢服七日其管自出桐蛀李氏草祕生桐油樹中即木蠹也最治惡腫毒取七根焙末沖酒服即愈牛膝蛀李氏草祕蟲生牛膝草節中香油浸製治指頭毒晝夜痛不可忍者敷上即愈山螞蟻窠子朱樂只云山草中有之系草樹之葉結成大者如斗冬月取之蟻在土而不在窠矣救生苦海山蟻窠深山內大樹根中有之十一月或正月草枯時尋取有二種一種大如升斗色黃柔軟形如干黃爛葉又若柔皮紙窠皮上層層有刷紋成暈若虎頭俗呼虎頭螞蟻窠不知何物所造惟內中多筋其筋系松毛草莖之類也抽去內中筋及泥土用之一種色白系是泥土所為其形有類松皮研用入藥久不收口爛瘡貼之即收口治刀傷出血救生苦海用山蟻窠抽去內中筋及泥土包裹傷處再用布縛即血止收口沈氏傳云冬月用之有驗如神禿瘡周氏傳方山螞蟻窠中土鹽滷調敷數日即愈生皮結靨凡瘡膿腐已盡新肉已生不肯收口用山蟻窠搓去草泥等物扯開貼之即結靨生肉張聖來云山蟻生深山窮谷中頭如虎有牙鉗甚銛利有翼能飛凡虎食人過飽則醉醉後即吐蟻食其唾餘則形變虎頭而生翼即以其所吐涎齧樹汁草漿和山土釀如泥緣樹枝成窠其窠重疊如蜂窩內有臺外則黃白紋大如斗掛樹枝上山人見其窠以烟燻去蟻採之入藥窠敷金刃傷止血定痛生肌收口窠中臺治發背百鳥朝王毒窠上緣枝治蛀脊山螞蟻子白如粞米俗呼狀元子大力丸用之然微有毒食之作脹綱目蟻下僅存其名無主治近行伍中營醫以此合壯藥頗效益氣力澤顏色敏按蟻有各種入藥用窠則取山蟻窠蓋山蟻形大在草中或樹根內作窠其子粗如粒米入藥力太猛用子以黃色細蟻所生子為佳蓋此蟻力最大能舉等身鐵故人食其子亦力大也宦遊筆記廣人美味有蟻子醬于山間收蟻卵淘淨滓垢滷以為醬詫為珍品則其子亦無毒矣蛆窠王安採藥録大窖坑內有蛆蟲窠如白繭子樣掛在蓬堁內者取來淨去泥灰曬燥焙用治臁瘡疳蛀一切蟲蛀爛孔外科收口藥用疳瘡蛀梗柴氏獨妙方用糞坑內蛆蟲窠在蓬塵內者形如白繭子而小取來不拘多少放在罐中焙燥為細末貯小口瓶內瓶口以細絺紗包扎覆轉輕輕敲彈少許藥末於瘡口內如有小蛀眼藥末不能入用麥草稈吹藥入細孔內每日三五次其蛀爛者肉孔自能長平神效無比死人蛀蟲人蚜此檢尸場中棺內死蛆也唐怡士云凡人死後魂魄散盡其生氣有未盡者肉爛後悉腐而為蛆攢齧筋骨久之蛆亦隨死故強死者棺中無不有黑蛆凡有須問仵作於尸場收之治大麻瘋癩疾赤水元珠治大麻瘋癩疾方用死人蛆蟲洗淨鋼片上焙乾為末每用一二錢皂角刺煎濃湯調下若腫而有疙瘩者乃陽明經濕熱壅盛先以防風通聖散服二三帖然後再服此藥有補功以皂針為引故能達表能久服之極有神效非泛常草木可比也醫學指南有治大麻瘋祕方用人蛆一升細布袋盛之放在急水內流之乾淨取起以麻黃煎湯將蛆連布袋浸之良久取起曬乾再用甘草煎湯浸曬乾又用苦參煎湯浸曬乾又用童便浸曬乾又用蔥姜煎湯投蛆入內不必取起就放鍋內煮乾焙為末每一兩加麝二錢蟾酥三錢共為一處入瓷器內每服一錢石蘚花煎湯下花即山中石上生白蘚如錢樣用蒼耳草煎湯洗浴然後服藥七日見效體壯者一日一服體弱者二日一服即愈治勞癆能驅尸蟲以賊攻賊之義跌撲絶邪瘧尸蛀石疣驅癆蟲吳秀峰虛勞論云癆有蟲為濕鬱所化在外為蝨在臟腑為蟲用死人身上蛆蟲制令潔淨焙乾和藥服之則癆蟲化為水下人蚜陳所安今見録近有一種不肖奸徒輒於攢殯左右勾賄寄戶寄戶者以産賃人厝棺杭人呼為開寄場每有七日內之出厝棺木到場即被昏夜啓棺竊取人蚜貨與方術家及走醫為夾棍藥並治跌打絶邪瘧等用豫初不解人蚜為何物後詢唐博士與宜博士家有老僕來升曾見之云凡人死七日外遍身肌肉腐如漿心氣散漫蒸為人蚜形如九龍蟲而小色赤如血光滑異常男女皆有入藥男棺者佳其取之法用大鑽於棺和頭前鑽一大孔以香糟塗孔外內蟲聞糟氣皆從孔出其蟲雖有甲而不能飛用手搦投入小瓶中燒酒浸陰陽瓦上焙乾用按人死血肉腐為蟲或為蛆或為蚜形各不一或云二物並生或云一物先後互化又有云貧窮者多蛆少蚜富厚者多蚜少蛆第勿深考並存其說以俟博雅君子折衷焉虹蟲物理小識虹為淫氣方士於東海見虹處掘地得蟲紅色得之入術用媚藥益幃箔同紫稍花功力更大
